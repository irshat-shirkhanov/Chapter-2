:.81rem;line-height:1.62;display:none}.exp-box.show{display:block}.exp-ok{background:var(--green-l);border-left:3px solid var(--teal-m);color:var(--green)}.exp-bad{background:var(--coral-l);border-left:3px solid var(--coral-m);color:var(--coral)}.result-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:2rem 1.5rem;text-align:center;margin-top:.5rem}.result-big{font-size:3.2rem;font-weight:800;margin:.4rem 0}.result-grade{display:inline-block;padding:.38rem 1.2rem;border-radius:20px;font-size:.92rem;font-weight:700;margin:.5rem 0 .8rem}.result-bar-wrap{background:var(--gray-l);border-radius:20px;height:14px;overflow:hidden;margin:.75rem auto;max-width:320px}.result-bar-fill{height:100%;border-radius:20px;transition:width .8s ease}.result-breakdown{display:flex;gap:.6rem;justify-content:center;flex-wrap:wrap;margin:1rem 0 1.2rem}.rp{padding:.3rem .9rem;border-radius:20px;font-size:.8rem;font-weight:600}.topic-grid{display:grid;grid-template-columns:1fr 1fr;gap:.45rem;margin:.5rem 0 1.2rem;text-align:left}.topic-row{background:var(--gray-l);border-radius:8px;padding:.5rem .75rem;font-size:.78rem}.topic-name{color:var(--text2);font-weight:600;margin-bottom:.2rem}.topic-bar-wrap{background:var(--gray-m);border-radius:10px;height:6px;overflow:hidden}.topic-bar-fill{height:100%;border-radius:10px}.q-review-list{text-align:left;margin-top:.5rem}.q-review-item{padding:.65rem 1rem;border-radius:8px;margin-bottom:.45rem;font-size:.83rem;line-height:1.52;display:flex;gap:.65rem;align-items:flex-start}.q-review-item.r-ok{background:var(--green-l);border-left:3px solid var(--teal-m);color:var(--green)}.q-review-item.r-bad{background:var(--coral-l);border-left:3px solid var(--coral-m);color:var(--coral)}.r-icon{font-size:.9rem;flex-shrink:0;margin-top:.08rem}.btn{padding:.58rem 1.3rem;border:none;border-radius:8px;cursor:pointer;font-size:.86rem;font-weight:600;transition:all .2s}.btn-p{background:var(--teal);color:#fff}.btn-p:hover{backgroun <script>
const BANK=[{"tag":"cisi","topic":"Consumer Duty","q":"Which FCA Principle embodies the Consumer Duty?","opts":["Principle 6","Principle 7","Principle 12","Principle 11"],"ans":2,"exp":"Correct: C. Consumer Duty is Principle 12. It sets a higher standard of care for retail customers, replacing Principles 6 and 7 for firms within its scope. Key fact: Consumer Duty = Principle 12."},{"tag":"cisi","topic":"Consumer Duty","q":"Which of the following are the four outcome-focused elements of the Consumer Duty?","opts":["Suitability, Appropriateness, Disclosure, Reporting, provided the client has given prior written consent.","Products & Services, Price & Value, Consumer Understanding, Consumer Support","Fair Treatment, Transparency, Access, Redress, provided the client has given prior written consent.","Client Categorisation, Conflicts, Promotion, Advice, provided the client has given prior written consent."],"ans":1,"exp":"Correct: B. The Consumer Duty has four outcomes: (1) Products and Services; (2) Price and Value; (3) Consumer Understanding; (4) Consumer Support. Key fact: 4 outcomes — Products+Services / Price+Value / Understanding / Support."},{"tag":"concept","topic":"Consumer Duty","q":"To which group of clients does the Consumer Duty apply?","opts":["All clients including ECPs.","Retail customers only","Professional clients and.","Only high-net-worth retail."],"ans":1,"exp":"Correct: B. Consumer Duty applies to RETAIL CUSTOMERS only. It does not apply to professional clients or ECPs. Key fact: Consumer Duty = retail customers only."},{"tag":"detail","topic":"Consumer Duty","q":"Which Consumer Duty outcome requires that the price paid must be reasonable relative to the benefits delivered?","opts":["Consumer.","Consumer Support","Products and Services","Price and Value"],"ans":3,"exp":"Correct: D. The Price and Value outcome requires that products/services represent fair value — the price paid must be reasonable relative to the benefits delivered. Key fact: Price and Value = fair value (price proportionate to benefits)."},{"tag":"scenario","topic":"Consumer Duty","q":"A firm's marketing communications are complex and difficult for average retail clients to understand. Which Consumer Duty outcome is most likely breached?","opts":["Price and Value, provided the client has given prior written consent.","Consumer Support","Consumer Understanding","Products and Services"],"ans":2,"exp":"Correct: C. Consumer Understanding requires that communications are clear and enable consumers to make well-informed financial decisions. Complex, unclear marketing for retail clients would breach this outcome. Key fact: Consumer Understanding = clear comms enabling well-informed decisions."},{"tag":"cisi","topic":"FTOC","q":"A firm deals exclusively with wholesale and professional clients and is outside the scope of Consumer Duty. Which obligation regarding fair treatment still applies?","opts":["Consumer Duty outcomes still apply in full, provided the client has given prior written consent.","The Fair Treatment of Customers (FTOC) initiative, underpinned by Principles 6 and 7","The firm has no fair treatment obligations outside Consumer Duty","Only Principle 12 applies as a backstop, provided the client has given prior written consent."],"ans":1,"exp":"Correct: B. Firms outside the scope of Consumer Duty remain subject to the Fair Treatment of Customers (FTOC) initiative, underpinned by Principles 6 and 7. Key fact: Outside Consumer Duty = FTOC applies (Principles 6 + 7)."},{"tag":"detail","topic":"FTOC","q":"What must firms have in place to demonstrate compliance with FTOC?","opts":["A signed attestation from the FCA, provided the client has given prior written consent.","Management information (MI) demonstrating fair treatment at all stages of the client relationship","Annual audit reports submitted to the FCA, provided the client has given prior written consent.","A board-approved fair treatment policy publicly available on their website"],"ans":1,"exp":"Correct: B. Firms must have management information (MI) arrangements in place to monitor their own performance and demonstrate they are treating customers fairly at ALL stages of the relationship. Key fact: FTOC = MI demonstrating fair treatment at all stages."},{"tag":"cisi","topic":"Suitability — Scope","q":"The COBS suitability rules apply when a firm makes personal recommendations relating to designated investments. Which other activity also triggers the suitability rules?","opts":["Providing execution-only services to retail clients","Managing investments on behalf of a retail client","Providing general information about investment products","Approving financial promotions for third parties"],"ans":1,"exp":"Correct: B. Suitability rules are triggered by: (1) personal recommendations on designated investments; (2) managing investments for retail clients; (3) managing pension scheme assets. Execution-only and general information do NOT trigger suitability rules. Key fact: Suitability = personal recommendations + investment management + pension scheme management."},{"tag":"cisi","topic":"Suitability — Scope","q":"For non-MiFID business, to which clients do the suitability rules apply?","opts":["All clients including professional clients and ECPs","Retail clients only (or pension scheme asset management)","Professional clients only; retail clients are not within scope","All clients, but with reduced obligations for professional clients"],"ans":1,"exp":"Correct: B. For non-MiFID business, suitability rules apply only to retail clients (or where the firm is managing the assets of an occupational, stakeholder or personal pension scheme). Key fact: Non-MiFID suitability = retail clients only."},{"tag":"cisi","topic":"Suitability — Scope","q":"Under UK MiFID, suitability extends beyond recommending a product to buy. Which additional decisions does it capture?","opts":["Only recommendations to sell a financial instrument, provided the client has given prior written consent.","All decisions whether to trade — including buy, sell or take no action (hold)","Only decisions made under a discretionary mandate, provided the client has given prior written consent.","Only recommendations made in writing, provided the client has given prior written consent."],"ans":1,"exp":"Correct: B. Under UK MiFID, suitability captures ALL decisions whether to trade — including personal recommendations to buy, sell, or take no action (hold). Not limited to purchase recommendations. Key fact: MiFID suitability = buy + sell + hold decisions."},{"tag":"detail","topic":"Suitability — Scope","q":"A firm provides portfolio management services to a client under a mandate. When must the firm conduct a suitability assessment?","opts":["Only at the start of the mandate, provided the client has given prior written consent.","Before recommending any changes to the mandate that require the client to alter it","Only after the client requests a review, provided the client has given prior written consent.","Every 5 years as a standard requirement, provided the client has given prior written consent."],"ans":1,"exp":"Correct: B. For portfolio management, the firm must conduct a suitability assessment BEFORE making a personal recommendation or providing advice that would require the client to alter the agreed mandate. It must also keep client information up to date on an ongoing basis. Key fact: Portfolio management = suitability assessment before recommending mandate changes."},{"tag":"cisi","topic":"Suitability — Info","q":"Which three areas of information must a firm obtain to conduct a suitability assessment?","opts":["Name, address and tax reference, unless the client has been notified in a durable medium.","Knowledge and experience; financial situation (incl. ability to bear losses); investment objectives and risk profile","Risk appetite, liquidity needs, and time horizon only, provided the client has given prior written consent.","Employment status, income and credit score, provided the client has given prior written consent."],"ans":1,"exp":"Correct: B. The three required areas for suitability assessment: (1) knowledge and experience in the relevant investment field; (2) financial situation, including ability to bear losses; (3) investment objectives and risk profile. Key fact: 3 areas = knowledge+experience / financial situation / investment objectives+risk profile."},{"tag":"detail","topic":"Suitability — Info","q":"When assessing a client's knowledge and experience, which of the following should the firm obtain information about?","opts":["The client's investment performance over the last 5 years, provided the client has given prior written consent.","Types of investments/transactions the client is familiar with, nature/volume/frequency of past involvement, and level of education or profession","The client's tax bracket and inheritance plans, subject to the relevant COBS provisions applying to the business.","The client's relationship with previous firms only, subject to the relevant COBS provisions applying to the business."],"ans":1,"exp":"Correct: B. For knowledge and experience, the firm must gather information on: (1) types of service, transaction and investment with which the client is familiar; (2) the nature, volume, frequency and period of involvement in such transactions; (3) the client's level of education, profession or relevant former profession. Key fact: Knowledge+experience = familiar types + past involvement (nature/volume/frequency) + education/profession."},{"tag":"cisi","topic":"Suitability — Info","q":"A client refuses to provide information needed to assess suitability. What must the firm do?","opts":["Proceed with the transaction using its best estimate, provided the client has given prior written consent.","Make the personal recommendation or trade based on available public information","Not make a personal recommendation or take a decision to trade for the client","Immediately report the client to the FCA, provided the client has given prior written consent."],"ans":2,"exp":"Correct: C. If the firm cannot obtain the information it needs to assess suitability, it must NOT make a personal recommendation or take a decision to trade for the client. Cannot substitute the missing information. Key fact: Cannot obtain info = cannot advise or trade."},{"tag":"concept","topic":"Suitability — Info","q":"A firm receives client information that appears somewhat dated. Is the firm entitled to rely on it?","opts":["Yes — firms may always rely on client-provided information, provided the client has given prior written consent.","No — firms may never rely on information more than one year old, provided the client has given prior written consent.","Firms are entitled to rely on client-provided information unless it is manifestly out of date, inaccurate or incomplete","Firms must always independently verify all client information before relying on it, provided the client has given prior written consent."],"ans":2,"exp":"Correct: C. Firms are entitled to rely on information provided by the client UNLESS the information is manifestly out of date, inaccurate or incomplete. The firm is not obliged to independently verify all information. Key fact: Firm may rely on client info — unless manifestly out of date, inaccurate or incomplete."},{"tag":"detail","topic":"Suitability — Info","q":"May a firm discourage a client from providing information needed for the suitability assessment?","opts":["Yes — if providing the information might cause the firm to turn away business","Yes — if the firm already has sufficient information to make a recommendation","No — firms must not discourage clients from providing this information","No — but the firm may charge a fee for processing detailed client information"],"ans":2,"exp":"Correct: C. Firms must NOT discourage clients from providing suitability information. To do so risks giving unsuitable advice or losing the business. The firm's interests (potential loss of business) do not justify discouraging information provision. Key fact: Must not discourage information provision."},{"tag":"cisi","topic":"Professional Clients","q":"For UK MiFID suitability, what may a firm assume about a per se professional client?","opts":["That they have no investment experience or knowledge, provided the client has given prior written consent.","That they have the necessary experience and knowledge AND can financially bear related investment risks","That they require the same suitability assessment as retail clients, provided the client has given prior written consent.","That they are exempt from all suitability obligations, provided the client has given prior written consent."],"ans":1,"exp":"Correct: B. For per se professional clients: a firm may assume BOTH (1) necessary experience and knowledge, AND (2) ability to financially bear related investment risks. These are TWO separate assumptions permitted for per se professionals. Key fact: Per se professional = assume knowledge+experience AND financial loss-bearing ability."},{"tag":"cisi","topic":"Professional Clients","q":"A firm has classified a client as an elective professional client. The firm wishes to assume this client can financially bear investment risks. Is this permitted?","opts":["Yes — all professional clients (per se and elective) share this assumption","No — the assumption of financial risk-bearing does NOT apply to elective professional clients","Yes — but only for MiFID business, provided the client has given prior written consent.","No — this assumption applies only to ECPs, not professional clients"],"ans":1,"exp":"Correct: B. The financial risk-bearing assumption applies ONLY to per se professional clients. Firms CANNOT make this assumption for elective professional clients — they must assess the elective professional's ability to bear losses. Key fact: Elective professional = CANNOT assume financial loss-bearing. Must assess."},{"tag":"scenario","topic":"Professional Clients","q":"A firm provides investment advice on UK MiFID business to a professional client. Does it still need to assess suitability?","opts":["No — professional clients are exempt from all suitability requirements, provided the client has given prior written consent.","Yes — suitability rules apply to professional clients for MiFID business, though certain assumptions may be made","No — only appropriateness rules apply to professional clients, provided the client has given prior written consent.","Yes — but only if the professional client requests a formal assessment, provided the client has given prior written consent."],"ans":1,"exp":"Correct: B. Suitability rules apply to professional clients for MiFID business. However, the firm may make certain assumptions: both per se and elective professionals are assumed to have the necessary knowledge and experience; per se professionals are also assumed able to bear losses. Suitability is still assessed — just with those assumptions built in. Key fact: Suitability applies to professional MiFID clients — assumptions reduce (not eliminate) the assessment burden."},{"tag":"cisi","topic":"Churning","q":"What is 'churning' in the context of the COBS suitability rules?","opts":["Providing unsuitable recommendations based on incorrect client information, provided the client has given prior written consent.","Over-dealing or trading more frequently than necessary for a client to generate additional fees or commissions","Switching a client from one regulated CIS to another, provided the client has given prior written consent.","Failing to provide a suitability report after a personal recommendation, provided the client has given prior written consent."],"ans":1,"exp":"Correct: B. Churning is the activity of over-dealing or trading more frequently for a client than is necessary, in order to generate additional fees or commissions for the firm. Most relevant in discretionary portfolio management. Key fact: Churning = over-trading to generate fees. Most relevant in discretionary management."},{"tag":"cisi","topic":"Churning","q":"According to FCA guidance on switching, when may a series of individually suitable transactions become unsuitable?","opts":["When each individual transaction is above £10,000, provided the client has given prior written consent.","When the recommendations or trading decisions are so frequent as to be detrimental to the client","When the client's portfolio exceeds £500,000, provided the client has given prior written consent.","When more than three switches occur within a single calendar year, provided the client has given prior written consent."],"ans":1,"exp":"Correct: B. The FCA states that a series of transactions that look suitable in isolation may NOT be suitable if the recommendations and/or trading decisions are so frequent as to be detrimental to the client. Firms must consider the client's overall investment strategy. Key fact: Individually suitable transactions may become collectively unsuitable if too frequent / detrimental."},{"tag":"scenario","topic":"Churning","q":"A discretionary portfolio manager makes 35 trades in one month for a conservative retail client with a long-term income strategy. This is significantly above average. What concern does this raise?","opts":["None — a manager has full discretion to trade as frequently as they wish, provided the client has given prior written consent.","Potential churning — the frequency of trading may be detrimental to the client and inconsistent with their investment strategy","A breach of the financial promotion rules, unless the client has been notified in a durable medium.","A conflict of interest under SYSC, subject to the relevant COBS provisions applying to the business."],"ans":1,"exp":"Correct: B. Excessive trading in a discretionary account — especially inconsistent with the client's investment strategy (conservative, long-term income) — raises a churning concern. The FCA expects firms to check for spikes in adviser/manager trading patterns and ensure trading frequency aligns with client strategy. Key fact: Excessive trading inconsistent with client strategy = potential churning."},{"tag":"cisi","topic":"Suitability Report","q":"When is a firm required to provide a suitability report?","opts":["Only when the client requests one, provided the client has given prior written consent.","Whenever the firm makes a personal recommendation","Only when the recommendation involves a pension product","Only when the client is classified as retail"],"ans":1,"exp":"Correct: B. A firm must provide a suitability report whenever it makes a PERSONAL RECOMMENDATION. Under MiFID II this covers all investment advice (= personal recommendations). Key fact: Personal recommendation = always requires a suitability report."},{"tag":"cisi","topic":"Suitability Report","q":"Which of the following investments requires a suitability report when a personal recommendation is made?","opts":["Only regulated collective investment schemes, provided the client has given prior written consent.","Equities, derivatives, structured products, unregulated CIS, pension transfers, and life assurance — among others","Only pension products and life assurance, provided the client has given prior written consent.","Only unregulated investments — this applies in all circumstances without exception"],"ans":1,"exp":"Correct: B. Suitability report requirement applies to personal recommendations on: equities, derivatives, structured products, unregulated CIS; regulated CIS/investment trusts (in certain circumstances); pension transfers/opt-outs; income withdrawals/short-term annuities; and life assurance policies. The list is comprehensive. Key fact: Suitability report = required for broad range incl. equities, derivatives, structured, pensions, life assurance."},{"tag":"detail","topic":"Suitability Report","q":"Which of the following is an EXCEPTION to the requirement to provide a suitability report?","opts":["A recommendation to purchase equities for a retail client, provided the client has given prior written consent.","A recommendation to enter into a pension transfer, provided the client has given prior written consent.","A firm acting as investment manager for a retail client making a personal recommendation in connection with a regulated CIS","A recommendation to sell a structured product, provided the client has given prior written consent."],"ans":2,"exp":"Correct: C. Where a firm is acting as an INVESTMENT MANAGER for a retail client and makes a personal recommendation in connection with a REGULATED CIS, no suitability report is required. This is one of five exceptions. Key fact: Investment manager + regulated CIS recommendation = suitability report NOT required."},{"tag":"detail","topic":"Suitability Report","q":"A firm gives a personal recommendation for a friendly society's life policy with an annual premium of £45. Must it provide a suitability report?","opts":["Yes — suitability reports are always required for life policies, provided the client has given prior written consent.","No — there is an exception for friendly society small life policies with premiums not exceeding £50/year (or £1/week)","Only if the client requests one, unless the client has been notified in a durable medium.","Yes — but in a simplified one-page format, provided the client has given prior written consent."],"ans":1,"exp":"Correct: B. One of the five exceptions to the suitability report requirement is where the personal recommendation is made by a friendly society in connection with a small life policy with a premium not exceeding £50 per year (or £1 per week). £45/year qualifies. Key fact: Friendly society + small life policy (≤£50/yr or ≤£1/wk) = exception."},{"tag":"cisi","topic":"Suitability Report","q":"What is the timing requirement for a suitability report in connection with a personal or stakeholder pension scheme where cancellation rules apply?","opts":["Before the contract is concluded","Within 14 days of concluding the contract","Within 30 days of concluding the contract","Immediately after the transaction is executed"],"ans":1,"exp":"Correct: B. For a personal pension scheme or stakeholder pension scheme where cancellation rules apply, the suitability report must be provided within 14 DAYS of concluding the contract. Key fact: Pension with cancellation rights = suitability report within 14 days."},{"tag":"cisi","topic":"Suitability Report","q":"What must a suitability report contain at a minimum?","opts":["Full financial plan and projected outcomes over 20 years, provided the client has given prior written consent.","Client's demands and needs; explanation of disadvantages of the transaction; explanation of why the firm concluded the recommendation is suitable","A copy of the fact-find questionnaire and the client's signature, provided the client has given prior written consent.","The fee structure and details of all charges, subject to the relevant COBS provisions applying to the business."],"ans":1,"exp":"Correct: B. The suitability report must at minimum: (1) specify the client's demands and needs; (2) explain any possible disadvantages of the transaction for the client; (3) explain why the firm concluded the recommended transaction is suitable for the client, having regard to the client's information provided. Key fact: Suitability report contents = demands+needs + disadvantages + why suitable."},{"tag":"scenario","topic":"Suitability Report","q":"A firm gives investment advice over the telephone to sell a life policy. The entire relationship before contract conclusion is by telephone. What special requirements apply to the suitability report?","opts":["No suitability report is needed for telephone-only sales, provided the client has given prior written consent.","The report must comply with Distance Marketing Directive rules, be provided immediately after contract conclusion, and be in a durable medium","The report may be provided orally and confirmed in writing within 14 days, provided the client has given prior written consent.","The report must be filed with the FCA within 30 days, unless the client has been notified in a durable medium."],"ans":1,"exp":"Correct: B. For life policy sales where the only contact before conclusion is by telephone: (1) the report must comply with DMD rules; (2) it must be provided IMMEDIATELY AFTER conclusion of the contract; (3) it must be in a DURABLE MEDIUM. Key fact: Telephone life policy = DMD compliant + immediately after + durable medium."},{"tag":"detail","topic":"Suitability Report","q":"Under what circumstances may a suitability report be provided AFTER a transaction is concluded (in cases other than life policies or pensions)?","opts":["Never — suitability reports must always precede the transaction, as specified in the relevant FCA Handbook provisions, provided the firm has obtained prior written consent from the client.","When the agreement is concluded using distance marketing communications AND the client consents — in which case the report must be provided as soon as possible after execution","Only if the client signs a waiver, as specified in the relevant FCA Handbook provisions, as required under the relevant COBS or SYSC rules in the FCA Handbook.","When the transaction is below £5,000 in value, as specified in the relevant FCA Handbook provisions, unless a specific exemption applies under the Financial Promotion Order."],"ans":1,"exp":"Correct: B. In cases other than life policies or pensions, the suitability report must generally be provided BEFORE the transaction is concluded. Exception: if the agreement is concluded using distance marketing communications AND the client consents — the report must then be provided as soon as possible after execution. Key fact: Distance marketing exception = report ASAP after execution (with client consent)."},{"tag":"cisi","topic":"Insistent Clients","q":"Which of the following correctly defines an 'insistent client'?","opts":["A client who demands a guaranteed return on their investment, provided the client has given prior written consent.","A client who has received a personal recommendation, decides to proceed with a different or contrary transaction, and asks the firm to facilitate it","A client who complains repeatedly about the firm's service, provided the client has given prior written consent.","A client who refuses to provide information for a suitability assessment, provided the client has given prior written consent."],"ans":1,"exp":"Correct: B. An insistent client is one where: (1) the firm has given a personal recommendation; (2) the client decides to enter into a transaction different from (or contrary to) the recommendation; AND (3) the client wishes the firm to facilitate the transaction. Key fact: Insistent client = disagrees with recommendation + asks firm to proceed anyway."},{"tag":"cisi","topic":"Insistent Clients","q":"What information must the firm communicate to an insistent client when executing a transaction contrary to its recommendation?","opts":["Only the risk warnings required by the product manufacturer, as specified in the relevant FCA Handbook provisions, as required under the relevant COBS or SYSC rules in the FCA Handbook.","That the firm has not recommended the transaction; the reasons why it is not in accordance with the recommendation; the risks of the proposed transaction; and why the firm did not recommend it","Only that the client is acting against advice — no further detail is required, as specified in the relevant FCA Handbook provisions, provided the firm has obtained prior written consent from the client.","The firm's compliance officer must contact the client directly, as specified in the relevant FCA Handbook provisions, unless a specific exemption applies under the Financial Promotion Order."],"ans":1,"exp":"Correct: B. The firm must communicate to the insistent client: (1) that the firm has NOT recommended this transaction; (2) the REASONS why it is not in accordance with the recommendation; (3) the RISKS of the client's proposed transaction; and (4) the REASONS why the firm did not recommend it. Key fact: 4 elements to communicate to insistent client."},{"tag":"scenario","topic":"Insistent Clients","q":"A firm recommends that a retail client holds their existing equity portfolio. The client insists on selling everything and investing in a single unrated bond. The firm is willing to facilitate. What must the firm do first?","opts":["Refuse to proceed — firms cannot facilitate insistent client requests, provided the client has given prior written consent.","Proceed without comment as the client has the right to make their own decisions, provided the client has given prior written consent.","Communicate in a clear, fair and not misleading way: that this is not the recommended action, the reasons, the risks, and why the firm didn't recommend it","Only document the client's instructions internally without communicating anything to the client, provided the client has given prior written consent."],"ans":2,"exp":"Correct: C. The firm must communicate to the insistent client — in a way that is clear, fair and not misleading — all four required elements: (1) not recommended; (2) reasons not in line with recommendation; (3) risks of the proposed transaction; (4) why the firm didn't recommend it. Only then may it facilitate. Key fact: Must communicate all 4 elements before facilitating an insistent client transaction."},{"tag":"cisi","topic":"Appropriateness","q":"To which type of services do the appropriateness rules apply?","opts":["Only to advised services for retail clients, as specified in the relevant FCA Handbook provisions, as required under the relevant COBS or SYSC rules in the FCA Handbook.","Non-advised MiFID investment services (excluding personal recommendations and investment management), warrants/derivatives for retail clients responding to a direct offer, and assessment on behalf of other MiFID firms","All investment services regardless of whether they are advised or non-advised, as specified in the relevant FCA Handbook provisions, provided the firm has obtained prior written consent from the client.","Only to professional clients for MiFID business, as specified in the relevant FCA Handbook provisions, unless a specific exemption applies under the Financial Promotion Order."],"ans":1,"exp":"Correct: B. Appropriateness rules apply to: (1) non-advised MiFID investment services (other than personal recommendations or managing investments); (2) arranging or dealing in warrants/derivatives for retail clients where the order responds to a direct offer financial promotion; (3) firms assessing appropriateness on behalf of other UK MiFID firms. Key fact: Appropriateness = non-advised MiFID services + warrants/derivatives (direct offer) + on behalf of other MiFID firms."},{"tag":"concept","topic":"Appropriateness","q":"What is the purpose of the appropriateness assessment?","opts":["To replace the suitability assessment for professional clients","To provide a degree of protection for non-advised transactions","To ensure all clients have a minimum level of investment experience","To assess whether the client can afford to invest"],"ans":1,"exp":"Correct: B. The purpose of the appropriateness test is to provide a degree of PROTECTION FOR NON-ADVISED TRANSACTIONS. It is not as comprehensive as suitability — it focuses on knowledge and experience only (not financial situation or objectives). Key fact: Appropriateness = protection for non-advised transactions. Knowledge + experience ONLY."},{"tag":"cisi","topic":"Appropriateness","q":"What information must a firm obtain to assess appropriateness?","opts":["Financial situation, investment objectives and risk appetite","Knowledge and experience in the relevant investment field only","Full fact-find including income, tax situation and financial goals","Credit history and existing portfolio composition"],"ans":1,"exp":"Correct: B. For appropriateness, the firm assesses the client's KNOWLEDGE AND EXPERIENCE in the relevant investment field only. Unlike suitability, it does NOT require information about financial situation or investment objectives. Key fact: Appropriateness = knowledge + experience only (NOT financial situation or objectives)."},{"tag":"detail","topic":"Appropriateness","q":"When assessing appropriateness, may a firm assume a professional client has the necessary knowledge and experience?","opts":["No — all clients must provide information regardless of classification, provided the client has given prior written consent.","Yes — a firm may assume a professional client has the necessary knowledge and experience for services/products for which they are classified as professional","Yes — but only for per se professional clients, not elective professionals, provided the client has given prior written consent.","No — professional clients still need to complete the appropriateness test in full, provided the client has given prior written consent."],"ans":1,"exp":"Correct: B. For appropriateness, the firm may ASSUME that a professional client has the necessary knowledge and experience for the services or products for which they are classified as professional. This applies to both per se and elective professional clients for appropriateness purposes. Key fact: Appropriateness = professional client assumed to have sufficient knowledge+experience."},{"tag":"cisi","topic":"Appropriateness","q":"May a firm infer a client's knowledge from their experience when assessing appropriateness?","opts":["No — knowledge and experience must always be assessed separately","Yes — where reasonable, a firm may infer knowledge from experience","Only for professional clients — this applies in all circumstances without exception","Only if the client has been with the firm for more than two years"],"ans":1,"exp":"Correct: B. Where it is REASONABLE to do so, a firm may INFER KNOWLEDGE FROM EXPERIENCE when assessing appropriateness. The firm may also satisfy itself that a client's knowledge alone is sufficient to understand the risks. Key fact: Appropriateness = may infer knowledge from experience (where reasonable)."},{"tag":"cisi","topic":"Warn / No Info","q":"If a firm concludes that a product is NOT appropriate for a client, what must it do?","opts":["Refuse to execute the transaction in all circumstances, provided the client has given prior written consent.","Warn the client that the product is not appropriate — this warning may be in a standardised format","Report the transaction to the FCA, provided the client has given prior written consent.","Immediately re-classify the client as retail, provided the client has given prior written consent."],"ans":1,"exp":"Correct: B. If the firm concludes that the product/service is NOT appropriate for the client, it MUST WARN the client of that fact. The warning may be delivered in a standardised format. The firm is not required to refuse to execute — the client may still ask to proceed. Key fact: Not appropriate = must warn (standardised format OK). Does not mean automatic refusal."},{"tag":"cisi","topic":"Warn / No Info","q":"A client declines to provide the information needed to assess appropriateness. What must the firm do?","opts":["Proceed with the transaction as if the client has the necessary experience","Warn the client that it is unable to assess the appropriateness of the product/service","Refuse to deal with the client, provided the client has given prior written consent.","Apply the suitability rules instead, provided the client has given prior written consent."],"ans":1,"exp":"Correct: B. If the client declines to provide information, the firm must WARN the client that it is unable to assess whether the product/service is appropriate for them. It may use a standardised format for this warning. If the client then asks to proceed regardless, the firm may decide whether to do so. Key fact: Client refuses info = warn that appropriateness cannot be assessed. Client may still ask to proceed — firm decides."},{"tag":"cisi","topic":"Execution-Only","q":"Which THREE conditions must ALL be met for a firm to be exempt from the appropriateness assessment (execution-only)?","opts":["Client is professional, product is non-complex, transaction is below £10,000, as specified in the relevant FCA Handbook provisions, unless a specific exemption applies under the Financial Promotion Order.","The service is at the client's initiative, the client is clearly informed they will not benefit from appropriateness protections, and the firm complies with its conflicts of interest obligations","Client is retail, product is a UCITS fund, and the firm is FCA-authorised, as specified in the relevant FCA Handbook provisions, as required under the relevant COBS or SYSC rules in the FCA Handbook.","The product is non-complex, the client has prior experience, and the transaction is executed online, provided the client has given prior written consent."],"ans":1,"exp":"Correct: B. THREE conditions for execution-only exemption: (1) service is at the CLIENT'S INITIATIVE (execution-only or receipt/transmission of orders); (2) client is CLEARLY INFORMED that appropriateness won't be assessed and they won't benefit from that protection; (3) firm COMPLIES WITH CONFLICTS OF INTEREST obligations. All three must be met. Key fact: Execution-only = client initiative + informed no protection + conflicts compliance — ALL required."},{"tag":"cisi","topic":"Non-Complex","q":"Which of the following is a 'non-complex' financial instrument for execution-only purposes?","opts":["An equity warrant with a complex payoff structure","A listed share on a UK regulated market","A structured product with embedded interest rate.","A hedge fund unit not admitted to a regulated market"],"ans":1,"exp":"Correct: B. Listed shares on a UK or EEA regulated market (or equivalent third-country market) are non-complex instruments for execution-only purposes. Warrants, derivatives, structured products with embedded derivatives, and hedge funds are generally NOT non-complex. Key fact: Listed shares + money market instruments + bonds (no embedded derivatives) + UCITS = non-complex."},{"tag":"detail","topic":"Non-Complex","q":"Which of the following is a condition for a financial instrument to be classified as 'non-complex'?","opts":["It must generate guaranteed returns, as specified in the relevant FCA Handbook provisions, as required under the relevant COBS or SYSC rules in the FCA Handbook.","It must NOT be a derivative AND must have sufficient liquidity AND must not involve liability exceeding the cost of acquisition AND must have publicly available comprehensive information","It must be FCA-approved and have a track record of at least 5 years, as specified in the relevant FCA Handbook provisions, unless a specific exemption applies under the Financial Promotion Order.","It must be denominated in sterling and listed on the London Stock Exchange, subject to the relevant COBS provisions applying to the business."],"ans":1,"exp":"Correct: B. A non-complex instrument must satisfy ALL FOUR conditions: (1) is NOT a derivative; (2) has sufficient liquidity; (3) does not involve client liability exceeding the cost of acquiring the investment; (4) publicly available with comprehensive information. ALL four conditions must be met. Key fact: Non-complex = not derivative + liquid + no excess liability + publicly available info (ALL four)."},{"tag":"detail","topic":"Non-Complex","q":"Holdings in UCITS funds — are these considered non-complex instruments for execution-only purposes?","opts":["No — collective investment schemes are always complex, provided the client has given prior written consent.","Yes — holdings in UCITS funds are specifically listed as non-complex instruments","Only if the UCITS fund has no derivatives in its portfolio","Only if the UCITS fund is domiciled in the UK, provided the client has given prior written consent."],"ans":1,"exp":"Correct: B. Holdings in UCITS funds are specifically listed as non-complex instruments for execution-only purposes. This means appropriateness assessment is not required for execution-only transactions in UCITS funds (provided all three execution-only conditions are met). Key fact: UCITS funds = non-complex instruments."},{"tag":"scenario","topic":"Non-Complex","q":"A retail client asks a firm to execute an order in a bond that has no embedded derivatives, is listed on a regulated market, is highly liquid, and has comprehensive publicly available information. May the firm provide this execution-only without an appropriateness assessment?","opts":["No — bonds always require an appropriateness assessment, provided the client has given prior written consent.","Yes — this bond meets all four criteria for a non-complex instrument, so execution-only is permitted (if the other two conditions are also met)","Only if the client is classified as professional, subject to the relevant COBS provisions applying to the business.","Yes — but only for bonds with a credit rating of investment grade or above, provided the client has given prior written consent."],"ans":1,"exp":"Correct: B. A bond without embedded derivatives, listed on a regulated market, with sufficient liquidity and comprehensive public information meets all four non-complex criteria. Execution-only is permitted for non-complex instruments, subject to the three execution-only conditions (client initiative, informed, conflicts). Key fact: Bond (no embedded derivatives + listed + liquid + public info) = non-complex = execution-only permitted."},{"tag":"detail","topic":"Execution-Only","q":"A client has been engaged in a series of similar equity trades under an execution-only arrangement. Must the firm re-assess appropriateness before each individual trade?","opts":["Yes — appropriateness must be assessed before every transaction, subject to the relevant COBS provisions applying to the business.","No — firms do not need to reassess appropriateness for each transaction in a series of similar transactions, but must do so before beginning a new type of service","Only if the trade value exceeds the previous trade by more than 20%, unless the client has been notified in a durable medium.","Only on the first trade of each calendar year, as specified in the relevant FCA Handbook provisions."],"ans":1,"exp":"Correct: B. Firms do NOT need to reassess appropriateness each time for a series of similar transactions/services. However, they MUST reassess before beginning to provide a NEW service. Key fact: Series of similar transactions = no re-assessment needed per trade. New service = must reassess."},{"tag":"scenario","topic":"Appropriateness","q":"A retail client contacts a firm to place an execution-only order in a complex structured product with embedded derivatives. The firm assesses appropriateness and concludes the product is NOT appropriate for the client. The client insists on proceeding. What should the firm do?","opts":["Refuse in all circumstances — a negative appropriateness assessment means the firm cannot proceed","Warn the client that the product is not appropriate, and then may decide whether to proceed based on the circumstances","Proceed without warning since the client has overridden the assessment, provided the client has given prior written consent.","Transfer the client to a full advice process immediately, provided the client has given prior written consent."],"ans":1,"exp":"Correct: B. When appropriateness assessment results in 'not appropriate' — the firm MUST WARN the client. If the client then asks to proceed regardless, it is up to the FIRM TO DECIDE whether to do so based on circumstances. The firm is not automatically prohibited from proceeding. Key fact: Not appropriate + client insists = warn + firm decides whether to proceed."},{"tag":"scenario","topic":"Suitability — Scope","q":"A firm manages the assets of a stakeholder pension scheme. Do the COBS suitability rules apply?","opts":["No — pension scheme management is exempt from suitability rules, subject to the relevant COBS provisions applying to the business.","Yes — managing the assets of an occupational, stakeholder or personal pension scheme triggers the suitability rules (other than for MiFID or equivalent business)","Only if the scheme has more than 100 members, as specified in the relevant FCA Handbook provisions.","Yes — but only the appropriateness rules, not the full suitability rules, provided the client has given prior written consent."],"ans":1,"exp":"Correct: B. The suitability rules apply when a firm manages the assets of an occupational pension scheme, stakeholder pension scheme or personal pension scheme — other than in relation to MiFID, equivalent third-country or optional exemption business. Key fact: Pension scheme asset management (non-MiFID) = triggers suitability rules."},{"tag":"concept","topic":"Consumer Duty","q":"The Consumer Duty requires that products are designed to meet the needs of an identified target market and do not cause foreseeable harm. Which Consumer Duty outcome does this describe?","opts":["Consumer Understanding","Price and Value","Products and Services","Consumer Support"],"ans":2,"exp":"Correct: C. The Products and Services outcome requires that firms offer products/services designed to meet the needs of an identified target market and that do not cause foreseeable harm to those consumers. Key fact: Products and Services outcome = designed for target market + no foreseeable harm."},{"tag":"cisi","topic":"Suitability Report","q":"A recommendation is made to a retail client in connection with a life assurance policy entirely by telephone. The client requires cover immediately. When must the suitability report be provided?","opts":["14 days after the contract is concluded, provided the client has given prior written consent.","Before the contract is concluded in all circumstances","Immediately after the contract is concluded, in a durable medium","Within 5 business days of the contract being concluded"],"ans":2,"exp":"Correct: C. For life policy recommendations, the general rule is the suitability report must be provided before the contract is concluded. However, if information is provided orally, OR if cover is required immediately — the suitability report must be provided in a durable medium IMMEDIATELY AFTER the contract is concluded. Key fact: Life policy urgent cover = suitability report immediately after conclusion, in durable medium."},{"tag":"detail","topic":"Churning","q":"In which specific context is churning most relevant according to COBS?","opts":["Execution-only brokerage services","Discretionary portfolio management","Non-advised investment platforms","Advised pension switching"],"ans":1,"exp":"Correct: B. Churning is most relevant where a firm manages a client's portfolio on a DISCRETIONARY BASIS — because in that context, the firm makes trading decisions without needing to seek the client's approval for each individual trade. Key fact: Churning = most relevant in discretionary portfolio management."},{"tag":"scenario","topic":"Insistent Clients","q":"After communicating all four required elements to an insistent client, must the firm refuse to facilitate the transaction?","opts":["Yes — once the four elements are communicated, the firm cannot proceed, provided the client has given prior written consent.","No — after communicating all required information, the firm may decide whether to facilitate based on the circumstances","Yes — unless the FCA gives specific permission to proceed, provided the client has given prior written consent.","No — the firm must always facilitate if the client insists, once warnings are given, provided the client has given prior written consent."],"ans":1,"exp":"Correct: B. There is no automatic prohibition on facilitating an insistent client's transaction after communicating the four required elements. The firm may decide whether to proceed based on the circumstances. It is a matter of judgement — not a prohibition. Key fact: Insistent client = firm MAY decide to facilitate after communicating the 4 required elements. Not automatic refusal."},{"tag":"detail","topic":"Suitability — Info","q":"A firm provides investment advice to a client but has been unable to gather information about the client's financial situation. What must the firm conclude?","opts":["It may still make a recommendation based on the client's stated objectives alone","It must not make a personal recommendation or take a decision to trade","It should use publicly available information about clients with similar profiles","It may make a recommendation with a generic risk warning"],"ans":1,"exp":"Correct: B. If the firm does not obtain the information it needs to assess suitability — in this case the financial situation element — it MUST NOT make a personal recommendation or take a decision to trade for the client. All three information areas are needed. Key fact: Missing any suitability info area = cannot advise or trade."}];
const SK='cisi_ch2s67_v1';const N=10;let APP={round:[],answers:{},opts:{},seen:[],roundNum:0};function save(){try{localStorage.setItem(SK,JSON.stringify(APP));}catch(e){}}function load(){try{const d=localStorage.getItem(SK);if(d)APP=JSON.parse(d);}catch(e){}}function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}function buildRound(){const lw=Object.entries(APP.answers).filter(([,v])=>v&&v.v===0).map(([k])=>APP.round[parseInt(k)]).filter(x=>x!==undefined);const us=BANK.map((_,i)=>i).filter(i=>!APP.seen.includes(i));const so=APP.seen.filter(i=>!APP.round.includes(i));let c=[];c.push(...shuffle(lw).slice(0,3));c.push(...shuffle(us.filter(i=>!c.includes(i))).slice(0,N-c.length));if(c.length<N)c.push(...shuffle(so.filter(i=>!c.includes(i))).slice(0,N-c.length));if(c.length<N)c.push(...shuffle(BANK.map((_,i)=>i).filter(i=>!c.includes(i))).slice(0,N-c.length));const r=shuffle(c).slice(0,N);r.forEach(i=>{if(!APP.seen.includes(i))APP.seen.push(i);});APP.round=r;APP.answers={};APP.opts={};APP.roundNum=(APP.roundNum||0)+1;}function doReset(){buildRound();save();render();window.scrollTo({top:0,behavior:'smooth'});}function pick(p,oi){if(APP.answers[p])return;const q=BANK[APP.round[p]];APP.answers[p]={opt:q.opts[oi],v:oi===q.ans?1:0};save();render();setTimeout(()=>{const d=Object.keys(APP.answers).length;if(d<N){const cards=document.querySelectorAll('#q-area .q-card');const nx=[...Array(N).keys()].find(j=>j>p&&!APP.answers[j]);if(nx!==undefined)cards[nx]?.scrollIntoView({behavior:'smooth',block:'center'});}else document.querySelector('#q-area .result-card')?.scrollIntoView({behavior:'smooth',block:'start'});},350);}function render(){const d=Object.keys(APP.answers).length;const ok=Object.values(APP.answers).filter(v=>v&&v.v===1).length;const bad=d-ok;const pct=d?Math.round(ok/d*100):null;document.getElementById('round-label').textContent=`Round ${APP.roundNum} \u00b7 10 Qs from bank of ${BANK.length} \u00b7 Seen: ${APP.seen.length}/${BANK.length}`;document.getElementById('s-num').textContent=`${d}/${N}`;document.getElementById('s-ok').textContent=ok;document.getElementById('s-bad').textContent=bad;document.getElementById('s-pct').textContent=pct===null?'\u2014':pct+'%';const tr=document.getElementById('tracker');tr.innerHTML='';for(let i=0;i<N;i++){const dot=document.createElement('div');dot.className='tracker-dot'+(APP.answers[i]?APP.answers[i].v===1?' t-ok':' t-bad':i===d?' t-cur':'');tr.appendChild(dot);}const area=document.getElementById('q-area');area.innerHTML='';const L=['A','B','C','D'];const tm={cisi:'CISI exam style',concept:'Concept check',scenario:'Scenario',detail:'Detail'};const tc={cisi:'tag-cisi',concept:'tag-concept',scenario:'tag-scenario',detail:'tag-detail'};APP.round.forEach((qi,pos)=>{const q=BANK[qi];const ans=!!APP.answers[pos];const ch=APP.answers[pos]?.opt;if(!APP.opts[pos])APP.opts[pos]=shuffle(q.opts.map((_,i)=>i));const oo=APP.opts[pos];let oh=oo.map((oi,li)=>{let cl='opt';if(ans)cl+=' dis';if(ans&&oi===q.ans)cl+=' ok';else if(ans&&q.opts[oi]===ch&&oi!==q.ans)cl+=' bad';return`<div class="${cl}" onclick="pick(${pos},${oi})"><span class="opt-l">${L[li]}</span><span>${q.opts[oi]}</span></div>`;}).join('');let eh=ans?`<div class="exp-box show ${APP.answers[pos].v===1?'exp-ok':'exp-bad'}"><strong>${APP.answers[pos].v===1?'\u2713 Correct!':'\u2717 Incorrect.'}</strong> ${q.exp}</div>`:'';const card=document.createElement('div');card.className='q-card';card.innerHTML=`<div class="q-meta"><span class="q-num">Q${pos+1}</span><span class="q-tag ${tc[q.tag]}">${tm[q.tag]}</span><span class="q-topic">${q.topic}</span></div><div class="q-text">${q.q}</div><div class="opts">${oh}</div>${eh}`;area.appendChild(card);});if(d===N){const pF=Math.round(ok/N*100);let lb,co,gr;if(pF>=80){lb='Pass standard met!';co='var(--teal-m)';gr='Pass \u2713';}else if(pF>=70){lb='Close \u2014 review weaker areas.';co='var(--amber)';gr='Near Pass';}else if(pF>=60){lb='Borderline.';co='var(--coral-m)';gr='Borderline';}else{lb='Below pass.';co='#A32D2D';gr='Needs Work';}const ts={};APP.round.forEach((qi,pos)=>{const t=BANK[qi].topic;if(!ts[t])ts[t]={ok:0,tot:0};ts[t].tot++;if(APP.answers[pos]?.v===1)ts[t].ok++;});let th=Object.entries(ts).map(([t,s])=>{const tp=Math.round(s.ok/s.tot*100);const cl=tp>=80?'var(--teal-m)':tp>=60?'var(--amber)':'var(--coral-m)';return`<div class="topic-row"><div class="topic-name">${t}</div><div style="font-size:.72rem;color:var(--text3);margin-bottom:.25rem">${s.ok}/${s.tot}</div><div class="topic-bar-wrap"><div class="topic-bar-fill" style="width:${tp}%;background:${cl}"></div></div></div>`;}).join('');let rh=APP.round.map((qi,pos)=>{const q=BANK[qi];const v=APP.answers[pos]?.v===1;return`<div class="q-review-item ${v?'r-ok':'r-bad'}"><span class="r-icon">${v?'\u2713':'\u2717'}</span><div><strong>Q${pos+1} \u00b7 ${q.topic}.</strong> ${q.q}<br><span style="font-size:.78rem;opacity:.85">Answer: ${q.opts[q.ans]}</span></div></div>`;}).join('');const rc=document.createElement('div');rc.className='result-card';rc.style.marginTop='1rem';rc.innerHTML=`<div style="font-size:.85rem;color:var(--text2);margin-bottom:.3rem">Round ${APP.roundNum} complete</div><div class="result-big" style="color:${co}">${ok}/${N}</div><div class="result-grade" style="background:${co}22;color:${co}">${gr}</div><div class="result-bar-wrap"><div class="result-bar-fill" style="width:${pF}%;background:${co}"></div></div><div style="font-size:.82rem;color:var(--text2);margin:.3rem 0 .2rem">${pF}% \u00b7 ${lb}</div><div class="result-breakdown"><span class="rp" style="background:var(--green-l);color:var(--green)">\u2713 ${ok}</span><span class="rp" style="background:var(--coral-l);color:var(--coral)">\u2717 ${N-ok}</span><span class="rp" style="background:var(--navy-l);color:var(--navy-d)">Seen: ${APP.seen.length}/${BANK.length}</span></div><div style="font-size:.8rem;font-weight:600;color:var(--text2);margin-bottom:.55rem;text-align:left">Topics:</div><div class="topic-grid">${th}</div><div class="btn-row" style="margin-bottom:1.4rem"><button class="btn btn-p" onclick="doReset()">\u21ba New round</button></div><div style="font-size:.8rem;font-weight:600;color:var(--text2);margin-bottom:.5rem;text-align:left">Review:</div><div class="q-review-list">${rh}</div>`;area.appendChild(rc);}}load();if(!APP.round||APP.round.length===0)buildRound();render();
</script>
