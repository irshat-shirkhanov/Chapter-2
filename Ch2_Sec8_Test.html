em;text-align:center;border:1px solid var(--gray-m);box-shadow:var(--shadow)}.sc .n{font-size:1.38rem;font-weight:700;color:var(--teal);line-height:1}.sc .n-ok{color:var(--teal-m)}.sc .n-bad{color:var(--coral-m)}.sc .l{font-size:.67rem;color:var(--text3);margin-top:.18rem}.q-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:1.4rem 1.5rem;margin-bottom:1rem;border:1px solid rgba(0,0,0,.05)}.q-meta{display:flex;align-items:center;gap:.5rem;margin-bottom:.65rem;flex-wrap:wrap}.q-num{font-size:.68rem;font-weight:700;color:var(--teal);text-transform:uppercase;letter-spacing:.07em}.q-tag{font-size:.64rem;font-weight:700;padding:.15rem .48rem;border-radius:20px}.tag-cisi{background:#FEF3C7;color:#7C5A0A}.tag-concept{background:var(--purple-l);color:var(--purple-d)}.tag-scenario{background:var(--teal-l);color:var(--teal-d)}.tag-detail{background:var(--gray-l);color:var(--gray-d)}.q-topic{font-size:.64rem;color:var(--text3);margin-left:auto}.q-text{font-size:.93rem;font-weight:500;line-height:1.6;margin-bottom:.95rem;color:var(--text)}.opts{display:flex;flex-direction:column;gap:.42rem}.opt{display:flex;align-items:flex-start;gap:.65rem;padding:.68rem .95rem;border-radius:8px;border:1.5px solid var(--gray-m);cursor:pointer;font-size:.86rem;line-height:1.46;background:var(--card);transition:all .16s}.opt:hover:not(.dis){border-color:var(--teal);background:var(--teal-l)}.opt.ok{border-color:var(--teal-m);background:var(--green-l);color:var(--green)}.opt.bad{border-color:var(--coral-m);background:var(--coral-l);color:var(--coral)}.opt.dis{cursor:default}.opt-l{width:21px;height:21px;min-width:21px;border-radius:50%;background:#e2e8f0;display:flex;align-items:center;justify-content:center;font-size:.69rem;font-weight:700;color:var(--gray);margin-top:1px;flex-shrink:0}.opt.ok .opt-l{background:var(--teal-m);color:#fff}.opt.bad .opt-l{background:var(--coral-m);color:#fff}.exp-box{margin-top:.8rem;padding:.7rem 1rem;border-radius:8px;font-size:.81rem;line-height:1.62;display:none}.exp-box.show{display:block}.exp-ok{background:var(--green-l);border-left:3px solid var(--teal-m);color:var(--green)}.exp-bad{background:var(--coral-l);border-left:3px solid var(--coral-m);color:var(--coral)}.result-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:2rem 1.5rem;text-align:center;margin-top:.5rem}.result-big{font-size:3.2rem;font-weight:800;margin:.4rem 0}.result-grade{display:inline-block;padding:.38rem 1.2rem;border-radius:20px;font-size:.92rem;font-weight:700;margin:.5rem 0 .8rem}.result-bar-wrap{background:var(--gray-l);border-radius:20px;height:14px;overflow:hidden;margin:.75rem auto;max-width:320px}.result-bar-fill{height:100%;border-radius:20px;transition:width .8s ease}.result-breakdown{display:flex;gap:.6rem;justify-content:center;flex-wrap:wrap;margin:1rem 0 1.2rem}.rp{padding:.3rem .9rem;border-radius:20px;font-size:.8rem;font-weight:600}.topic-grid{display:grid;grid-template-columns:1fr 1fr;gap:.45rem;margin:.5rem 0 1.2rem;text-align:left}.topic-row{background:var(--gray-l);border-radius:8px;padding:.5rem .75rem;font-size:.78rem}.topic-name{color:var(--text2);font-weight:600;margin-bottom:.2rem}.topic-bar-wrap{background:var(--gray-m);border-radius:10px;height:6px;overflow:hidden}.topic-bar-fill{height:100%;border-radius:10px}.q-review-list{text-align:left;margin-top:.5rem}.q-review-item{padding:.65rem 1rem;border-radius:8px;margin-bottom:.45rem;font-size:.83rem;line-height:1.52;display:flex;gap:.65rem;align-items:flex-start}.q-review-item.r-ok{background:var(--green-l);border-left:3px solid var(--teal-m);color:var(--green)}.q-review-item.r-bad{background:var(--coral-l);border-left:3px solid var(--coral-m);color:var(--coral)}.r-icon{font-size:.9rem;flex-shrink:0;margin-top:.08rem}.btn{padding:.58rem 1.3rem;border:none;border-radius:8px;cursor:pointer;font-size:.86rem;font-weight:600;transition:all .2s}.btn-p{background:var(--teal);color:#fff}.btn-p:hover{background:var(--teal-d)}.btn-row{display:flex;gap:.65rem;flex-wrap:wrap;justify-content:center}</style>

<script>
const BANK=[{"tag":"cisi","topic":"Purpose","q":"What is the main purpose of the product disclosure requirements under COBS?","opts":["To prevent retail clients from investing in complex products, provided the client has given prior written consent.","To ensure clients are provided with sufficient and relevant information to make an informed investment decision","To require firms to recommend only the most suitable products, provided the client has given prior written consent.","To replace the suitability assessment for non-advised sales, provided the client has given prior written consent."],"ans":1,"exp":"Correct: B. The main purpose of product disclosure is to ensure clients are provided with SUFFICIENT AND RELEVANT information so they can decide whether to undertake an investment — whether recommended by a firm or based on their own research. Key fact: Product disclosure = sufficient + relevant info → informed decision."},{"tag":"cisi","topic":"KIID","q":"Which type of firm is required to produce a Key Investor Information Document (KIID)?","opts":["Any firm that sells investment products to retail clients","Authorised fund managers (AFMs) who manage UCITS schemes","Only firms carrying on MiFID business, provided the client has given prior written consent.","Any firm providing investment advice to retail clients"],"ans":1,"exp":"Correct: B. It is AUTHORISED FUND MANAGERS (AFMs) who MANAGE UCITS SCHEMES that are required to produce a KIID. Not all investment firms — specifically AFMs for UCITS. Key fact: KIID = required from AFMs managing UCITS schemes."},{"tag":"cisi","topic":"KIID","q":"Which of the following correctly describes the standard that a KIID must meet?","opts":["It must be approved by the FCA before distribution, provided the client has given prior written consent.","It must be fair, clear and not misleading, and consistent with the relevant parts of the scheme's prospectus","It must be independently audited annually, provided the client has given prior written consent.","It must be translated into all EU languages, provided the client has given prior written consent."],"ans":1,"exp":"Correct: B. A KIID must be fair, clear and not misleading AND consistent with the relevant parts of the scheme's prospectus. These are the two overarching quality standards for a KIID. Key fact: KIID = fair/clear/not misleading + consistent with prospectus."},{"tag":"cisi","topic":"KIID","q":"Which of the following is one of the five essential elements that must be included in a KIID?","opts":["The names and qualifications of the fund managers, provided the client has given prior written consent.","Identification of the scheme, investment objectives/policy, past performance/scenarios, costs and charges, and risk and reward profile","A full list of all underlying holdings in the portfolio, provided the client has given prior written consent.","The firm's complaints procedure and FCA registration number, provided the client has given prior written consent."],"ans":1,"exp":"Correct: B. The five KIID elements are: (a) identification of the scheme; (b) investment objectives and policy; (c) past performance or performance scenarios; (d) costs and charges; (e) risk and reward profile (including guidance and warnings on risks). Key fact: 5 elements = ID / objectives+policy / past performance / costs / risk+reward profile."},{"tag":"detail","topic":"KIID","q":"Which of the following is an exception to the KIID requirement?","opts":["Where the scheme has more than 10,000 investors, as specified in the relevant FCA Handbook provisions, as required under the relevant COBS or SYSC rules in the FCA Handbook.","Where another firm has agreed to prepare the KIID, where it is already provided in another document, or under specific rules for reinsurance/pure protection contracts","Where the AFM has been in operation for less than 3 years, as specified in the relevant FCA Handbook provisions, provided the firm has obtained prior written consent from the client.","Where the UCITS scheme is domiciled outside the UK, as specified in the relevant FCA Handbook provisions, unless a specific exemption applies under the Financial Promotion Order."],"ans":1,"exp":"Correct: B. Three exceptions to the KIID requirement: (1) another firm has agreed to prepare the document; (2) for certain schemes where sufficient information already exists in another document; (3) specific rules for reinsurance and pure protection insurance contracts. Key fact: 3 KIID exceptions: other firm agrees / already in another document / reinsurance or pure protection."},{"tag":"scenario","topic":"KIID","q":"A firm manages a UCITS scheme and is considering whether it needs to produce a KIID. A distribution partner has agreed to prepare the document on its behalf. Does the AFM still need to produce a KIID?","opts":["Yes — only the AFM can produce the KIID, provided the client has given prior written consent.","No — where another firm has agreed to prepare the KIID, the AFM is not required to produce one","Yes — but the AFM must review and approve the distribution partner's KIID","No — distribution partners always take responsibility for KIIDs, provided the client has given prior written consent."],"ans":1,"exp":"Correct: B. One of the three exceptions to the KIID requirement is where ANOTHER FIRM HAS AGREED to prepare the KIID. In that case, the AFM is not required to produce one itself. Key fact: KIID exception = another firm agrees to prepare it."},{"tag":"concept","topic":"KIID","q":"What is the purpose of the KIID for a UCITS scheme?","opts":["To replace the prospectus entirely, unless the client has been notified in a durable medium.","To enable investors to reasonably understand the nature and risks of the product and make informed investment decisions","To confirm the firm's compliance with MiFID II, provided the client has given prior written consent.","To satisfy the FCA's annual reporting requirements, provided the client has given prior written consent."],"ans":1,"exp":"Correct: B. The purpose of the KIID is to provide investors with information about the essential characteristics of the UCITS scheme, enabling them to reasonably understand the nature and risks of the product and make informed investment decisions. Key fact: KIID purpose = understand nature and risks → informed decision."},{"tag":"cisi","topic":"KFD","q":"For which of the following must a firm prepare a Key Features Document (KFD)?","opts":["Every investment product offered to any client, provided the client has given prior written consent.","Each packaged product, cash deposit ISA, cash deposit CTF, and a key features illustration per packaged product","Only personal pension schemes and life assurance products, provided the client has given prior written consent.","Only products with a value exceeding £10,000, provided the client has given prior written consent."],"ans":1,"exp":"Correct: B. A KFD must be prepared for: (1) each packaged product; (2) cash deposit ISA; (3) cash deposit Child Trust Fund (CTF); and (4) a key features illustration for each packaged product produced. Key fact: KFD required for: packaged products + cash deposit ISA + cash deposit CTF + key features illustration."},{"tag":"detail","topic":"KFD","q":"In addition to preparing KFDs, what information must firms provide to clients for whom they carry on MiFID business?","opts":["A full copy of the firm's compliance manual, provided the client has given prior written consent.","Particular information on the nature and risks of designated investments","A list of all investments held in the client's portfolio","Details of the firm's internal fee-sharing arrangements"],"ans":1,"exp":"Correct: B. Firms must provide particular information on the NATURE AND RISKS of designated investments to clients for whom they undertake MiFID business. They must also do this for retail clients in relation to certain other business. Key fact: MiFID business clients = nature + risks of designated investments must be disclosed."},{"tag":"cisi","topic":"PRIIPs","q":"What does the acronym 'PRIIPs' stand for?","opts":["Packaged Retail and Insurance-Based Investment Products","Professional Retail Investment and Insurance Products","Prescribed Retail Investment Information and Prospectus Standards","Protected Retail Investment Instruments and Products"],"ans":0,"exp":"Correct: A. PRIIPs = Packaged Retail and Insurance-based Investment Products. The PRIIPs Regulation introduced a Key Information Document (KID) for these products. Key fact: PRIIPs = Packaged Retail and Insurance-based Investment Products."},{"tag":"cisi","topic":"PRIIPs","q":"What is the key document that the PRIIPs Regulation introduced for retail investors?","opts":["The Key Investor Information Document (KIID)","The Key Information Document (KID)","The Packaged Product Disclosure Statement.","The Retail Investment Summary (RIS)"],"ans":1,"exp":"Correct: B. The PRIIPs Regulation introduced the KEY INFORMATION DOCUMENT (KID) — a short, consumer-friendly, standardised document. This is distinct from the KIID (which is for UCITS). Key fact: PRIIPs = KID (not KIID). UCITS = KIID."},{"tag":"cisi","topic":"PRIIPs","q":"What are the four categories of PRIIPs?","opts":["Shares, bonds, funds and derivatives, provided the client has given prior written consent.","Investment funds, insurance-based investment products, retail-structured securities, and structured term deposits","Equity ISAs, stocks and shares, pension products, and unit trusts, provided the client has given prior written consent.","Regulated CIS, unregulated CIS, pension annuities, and structured notes, provided the client has given prior written consent."],"ans":1,"exp":"Correct: B. The four PRIIPs categories are: (1) investment funds; (2) insurance-based investment products; (3) retail-structured securities; and (4) structured term deposits. Key fact: 4 PRIIPs categories = investment funds / insurance-based / retail-structured securities / structured term deposits."},{"tag":"detail","topic":"PRIIPs","q":"UCITS funds already have a KIID. Are they exempt from the PRIIPs KID requirement?","opts":["No — UCITS must produce both a KIID and a PRIIPs KID, provided the client has given prior written consent.","Yes — UCITS are subject to a five-year exemption period, which expires on 31 December 2026","Yes — UCITS are permanently exempt from PRIIPs requirements, provided the client has given prior written consent.","No — UCITS must transition to PRIIPs KID format immediately, provided the client has given prior written consent."],"ans":1,"exp":"Correct: B. UCITS already have their own KIID and KFD. They are subject to a FIVE-YEAR EXEMPTION PERIOD from PRIIPs, which expires on 31 DECEMBER 2026. Key fact: UCITS = exempt from PRIIPs until 31 Dec 2026."},{"tag":"cisi","topic":"PRIIPs","q":"Which of the following firms is required to comply with the PRIIPs Regulation?","opts":["Only firms that manufacture PRIIPs, provided the client has given prior written consent.","Only firms that sell PRIIPs directly to retail investors","Firms that manufacture PRIIPs AND firms that advise on or sell PRIIPs","Only FCA-authorised firms with a specific PRIIPs permission"],"ans":2,"exp":"Correct: C. The PRIIPs Regulation applies to firms that MANUFACTURE PRIIPs AND to firms that ADVISE ON OR SELL PRIIPs. Both categories are within scope. Key fact: PRIIPs applies to: manufacturers + advisers/sellers."},{"tag":"detail","topic":"PRIIPs","q":"A distributor makes changes to an existing PRIIP. Does the PRIIPs Regulation apply to it?","opts":["No — the regulation only applies to original manufacturers, provided the client has given prior written consent.","Yes — anyone who changes an existing PRIIP (such as a distributor) is treated as a manufacturer and must prepare a KID","No — distributors have separate, lighter-touch obligations, provided the client has given prior written consent.","Yes — but only if the changes are material, provided the client has given prior written consent."],"ans":1,"exp":"Correct: B. Under PRIIPs, a PRIIP manufacturer includes anyone who CHANGES an existing PRIIP — such as a distributor. They are therefore required to prepare a KID for each PRIIP they produce. Key fact: Changing a PRIIP (e.g. distributor) = treated as manufacturer = must prepare KID."},{"tag":"cisi","topic":"PRIIPs","q":"When must a KID be provided to a retail investor who is buying a PRIIP?","opts":["Within 14 days of the transaction being executed","In good time before any transaction is concluded","At the annual review meeting, provided the client has given prior written consent.","Only when the client specifically requests it"],"ans":1,"exp":"Correct: B. A person who advises on or sells a PRIIP to a retail investor must provide the KID IN GOOD TIME BEFORE any transaction is concluded. This is a pre-transaction disclosure requirement. Key fact: KID = must be provided in good time BEFORE the transaction is concluded."},{"tag":"cisi","topic":"PRIIPs — KID","q":"What is the maximum permitted length of a PRIIPs KID?","opts":["1 A4 page","2 A4 pages","3 A4 pages","5 A4 pages"],"ans":2,"exp":"Correct: C. A PRIIPs KID can be a maximum of THREE A4 pages. It is intended to be a short, consumer-friendly document. Key fact: PRIIPs KID = maximum 3 A4 pages."},{"tag":"cisi","topic":"PRIIPs — KID","q":"In what order must the sections of a PRIIPs KID be presented?","opts":["Any order chosen by the manufacturer, provided the client has given prior written consent.","A pre-determined sequence of sections as specified in the PRIIPs Regulation","Alphabetical order by section title, provided the client has given prior written consent.","Determined by the FCA on a product-by-product basis, provided the client has given prior written consent."],"ans":1,"exp":"Correct: B. The information in a PRIIPs KID must be presented in a PRE-DETERMINED SEQUENCE OF SECTIONS as specified in the Regulation. The order is fixed and cannot be changed by the manufacturer. Key fact: PRIIPs KID = pre-determined sequence of sections."},{"tag":"detail","topic":"PRIIPs — KID","q":"Which of the following is one of the seven required sections of a PRIIPs KID?","opts":["'What is the track record of this product?'","'What happens if [manufacturer name] is unable to pay out?'","'Who are the key personnel managing this product?'","'What are the tax implications for investors?'"],"ans":1,"exp":"Correct: B. The seven KID sections include: 'What happens if [manufacturer name] is unable to pay out?' — covering manufacturer insolvency risk. Other sections: What is this product? / What are the risks/return? / What are the costs? / How long to hold / early exit? / How to complain? / Other relevant information. Key fact: 7 sections including: product / risks+return / insolvency / costs / liquidity / complaints / other."},{"tag":"concept","topic":"PRIIPs — KID","q":"What is the aim of the PRIIPs Regulation's KID requirement?","opts":["To replace the prospectus for all investment products, provided the client has given prior written consent.","To help retail investors better understand and compare the key features, risks, rewards and costs of different PRIIPs","To ensure firms comply with MiFID II reporting obligations, provided the client has given prior written consent.","To standardise the length of all financial promotions, provided the client has given prior written consent."],"ans":1,"exp":"Correct: B. The aim of the PRIIPs KID is to help retail investors better UNDERSTAND AND COMPARE the key features, risks, rewards and costs of different PRIIPs — through a short, consumer-friendly document. Key fact: PRIIPs KID aim = understand + compare features/risks/rewards/costs."},{"tag":"detail","topic":"PRIIPs — KID","q":"Which body sets detailed rules on the content, calculation, review and timing of delivery of PRIIPs KIDs?","opts":["The FCA through its Handbook, provided the client has given prior written consent.","The Regulatory Technical Standards (RTSs)","HM Treasury through secondary legislation","The Financial Ombudsman Service"],"ans":1,"exp":"Correct: B. The Regulation outlines the layout of the KID, while the REGULATORY TECHNICAL STANDARDS (RTSs) contain detailed rules on: (1) content and presentation; (2) how to calculate certain information; (3) review, revision and republication; and (4) timing of delivery. Key fact: RTSs = detailed rules on PRIIPs KID content/calculation/review/timing."},{"tag":"scenario","topic":"PRIIPs","q":"A life insurance company manufactures a unit-linked insurance bond and distributes it to retail investors. Which documents must it produce?","opts":["A KIID only — this applies in all circumstances without exception","A PRIIPs KID, since it is an insurance-based investment product","A KFD only — this applies in all circumstances without exception","Both a KIID and a PRIIPs KID simultaneously, provided the client has given prior written consent."],"ans":1,"exp":"Correct: B. A unit-linked insurance bond is an INSURANCE-BASED INVESTMENT PRODUCT — one of the four PRIIPs categories. The manufacturer must produce a PRIIPs KID for it. A KIID is for UCITS; it does not apply here. Key fact: Insurance-based investment product = PRIIPs category = KID required."},{"tag":"cisi","topic":"Cancellation — Scope","q":"To which clients do the cancellation rights rules apply?","opts":["All clients including.","Retail customers only","Only clients who invest more.","Only clients who enter into."],"ans":1,"exp":"Correct: B. Cancellation rights must be provided to RETAIL CUSTOMERS. The rules apply to firms providing retail financial products based on designated investments or deposits, and to distance contracts with consumers. Key fact: Cancellation rights = retail customers only."},{"tag":"cisi","topic":"Cancellation — Scope","q":"The cancellation rules apply to which types of contracts?","opts":["All investment contracts regardless of how they were concluded, as specified in the relevant FCA Handbook provisions, provided the firm has obtained prior written consent from the client.","Firms providing retail financial products based on designated investments or deposits, and distance contracts with consumers relating to deposits or designated investments","Only contracts concluded by telephone, as specified in the relevant FCA Handbook provisions, as required under the relevant COBS or SYSC rules in the FCA Handbook.","Only advised transactions for retail clients, as specified in the relevant FCA Handbook provisions, unless a specific exemption applies under the Financial Promotion Order."],"ans":1,"exp":"Correct: B. The cancellation rules apply to: (1) firms providing retail financial products based on designated investments or deposits; and (2) firms entering into distance contracts with consumers relating to deposits or designated investments. Key fact: Cancellation = retail products (designated investments/deposits) + distance contracts (deposits/designated investments)."},{"tag":"cisi","topic":"Cancellation — Periods","q":"What is the cancellation period for a life assurance or pension product?","opts":["7 calendar days","14 calendar days","30 calendar days","60 calendar days"],"ans":2,"exp":"Correct: C. The cancellation period for LIFE AND PENSION PRODUCTS is 30 CALENDAR DAYS. This is the longest cancellation period — reflecting the long-term, complex nature of these products. Key fact: Life and pension products = 30 calendar days."},{"tag":"cisi","topic":"Cancellation — Periods","q":"What is the cancellation period for a cash deposit Individual Savings Account (ISA)?","opts":["7 calendar days","14 calendar days","21 calendar days","30 calendar days"],"ans":1,"exp":"Correct: B. The cancellation period for a CASH DEPOSIT ISA is 14 CALENDAR DAYS. Key fact: Cash deposit ISA = 14 calendar days."},{"tag":"cisi","topic":"Cancellation — Periods","q":"A retail client purchases an authorised unit trust (AUT) on an advised, non-distance basis. What is the cancellation period?","opts":["7 calendar days","14 calendar days","30 calendar days","No cancellation right."],"ans":1,"exp":"Correct: B. Non-life and pension products under an advised, non-distance contract have a cancellation period of 14 CALENDAR DAYS. An AUT is a non-life, non-pension product, so 14 days applies. Key fact: Non-life/pension, advised, non-distance = 14 calendar days."},{"tag":"detail","topic":"Cancellation — Periods","q":"A retail client purchases a structured product via an online platform (a distance contract). What is the cancellation period?","opts":["7 calendar days","14 calendar days","30 calendar days","No right to cancel."],"ans":1,"exp":"Correct: B. Non-life and pension products under DISTANCE CONTRACTS also carry a 14 calendar day cancellation period. Distance contracts do not have a longer period — it is the same 14 days. Key fact: Non-life/pension distance contracts = 14 calendar days (same as non-distance)."},{"tag":"cisi","topic":"Cancellation — Start","q":"From when does the cancellation period begin?","opts":["Always from the day the contract is signed, provided the client has given prior written consent.","From the later of: the day the contract is concluded, or the day the client receives the contractual information","From the day the first premium or contribution is paid, provided the client has given prior written consent.","From the date the firm issues the suitability report, provided the client has given prior written consent."],"ans":1,"exp":"Correct: B. The cancellation period starts from the LATER OF: (1) the day the contract is concluded; or (2) the day the client receives the contractual information. The client always gets the full period from whichever event happens later. Key fact: Cancellation period starts: later of contract conclusion OR receipt of contractual information."},{"tag":"scenario","topic":"Cancellation — Start","q":"A client signs a life insurance contract on 1 March but does not receive the policy documentation until 10 March. When does the 30-day cancellation period begin?","opts":["1 March — the date the contract was concluded, provided the client has given prior written consent.","10 March — the date the contractual information was received (the later date)","15 March — 5 business days after the documentation was received","1 March and 10 March simultaneously — whichever the client chooses"],"ans":1,"exp":"Correct: B. The cancellation period starts from the LATER of: (1) the day the contract is concluded (1 March); or (2) the day the client receives the contractual information (10 March). Since 10 March is later, the 30-day period begins on 10 March. Key fact: Start date = later of contract conclusion or receipt of contractual info."},{"tag":"cisi","topic":"Cancellation — Disclosure","q":"When must a firm notify the consumer of their cancellation rights?","opts":["Within 30 days of the contract being concluded, provided the client has given prior written consent.","In good time before the consumer is bound, or — where not possible — immediately after, in a durable medium","Only when the consumer specifically asks about cancellation, provided the client has given prior written consent.","Within 14 days of the first premium payment, provided the client has given prior written consent."],"ans":1,"exp":"Correct: B. Firms must inform consumers of their cancellation rights IN GOOD TIME BEFORE they are bound by the contract, or — where that is not possible — immediately after. This must be done in a DURABLE MEDIUM. Key fact: Cancellation disclosure = before bound (or immediately after if not possible) + durable medium."},{"tag":"cisi","topic":"Cancellation — Disclosure","q":"Which five pieces of information must a firm provide to a consumer regarding their cancellation rights?","opts":["Name, address, premium amount, policy number, and start date, unless the client has been notified in a durable medium.","Existence of right, its duration, conditions for exercising it, what happens if not exercised, and practical details including the address for notification","The firm's regulatory status, complaints procedure, compensation scheme membership, fee schedule, and policy terms","Risk warnings, past performance data, charges, alternatives considered, and reasons for recommendation, provided the client has given prior written consent."],"ans":1,"exp":"Correct: B. The five required elements of cancellation right disclosure are: (1) the EXISTENCE of the right; (2) its DURATION; (3) the CONDITIONS for exercising it (including any amounts payable); (4) what happens if they DO NOT exercise it; and (5) PRACTICAL DETAILS including the address for sending notification. Key fact: 5 elements: existence + duration + conditions (incl. costs) + if not exercised + how to exercise (incl. address)."},{"tag":"detail","topic":"Cancellation — Disclosure","q":"Must a firm provide cancellation right disclosures if the consumer is already receiving equivalent information under the COBS distance marketing or product information rules?","opts":["Yes — the disclosure must always be made regardless, subject to the relevant COBS provisions applying to the business.","No — a firm need not repeat the disclosure if equivalent information is already being provided under COBS distance marketing or product information rules","Yes — but only in summary form, as specified in the relevant FCA Handbook provisions, as required under the relevant COBS or SYSC rules in the FCA Handbook.","No — but the firm must obtain a written acknowledgement from the client confirming receipt of the information, unless a specific exemption applies under the Financial Promotion Order."],"ans":1,"exp":"Correct: B. A firm need NOT provide the cancellation right disclosure if the consumer is already receiving similar/equivalent information from it (or another person) under the COBS distance marketing disclosure rules or product information rules. Key fact: No duplication needed if equivalent info already provided under other COBS rules."},{"tag":"cisi","topic":"Cancellation — Exercise","q":"How must a consumer exercise their right to cancel?","opts":["By returning all product documentation to the firm","By notifying the firm of their decision to cancel","By contacting the FCA directly, provided the client has given prior written consent.","By asking their financial adviser to cancel on their behalf"],"ans":1,"exp":"Correct: B. To exercise the right to cancel, the consumer must NOTIFY THE FIRM. The notification is deemed timely if it is DISPATCHED (sent) before the cancellation deadline expires — not necessarily received before the deadline. Key fact: Cancellation = notify firm. Timely if dispatched (not necessarily received) before deadline."},{"tag":"cisi","topic":"Cancellation — Exercise","q":"Must a consumer give a reason for cancelling under the cancellation rules?","opts":["Yes — the reason must be provided in writing, provided the client has given prior written consent.","Yes — the firm may request a reason within 5 business days","No — the consumer does not need to give any reason for cancelling","Only if the product has been held for more than 7 days"],"ans":2,"exp":"Correct: C. The consumer does NOT need to give any reason for exercising their right to cancel. The right is unconditional — no justification is required. Key fact: No reason required to cancel."},{"tag":"cisi","topic":"Cancellation — Refund","q":"If a retail client exercises their right to cancel a collective investment scheme (e.g. a UCITS fund), what amount will they receive back?","opts":["Always the full amount originally invested, provided the client has given prior written consent.","The proceeds from the sale of their holding — which may be less than the amount invested due to market price movements","The amount invested plus a guaranteed minimum return, provided the client has given prior written consent.","The original amount invested, minus the firm's fees only, provided the client has given prior written consent."],"ans":1,"exp":"Correct: B. When a client exercises cancellation rights on a CIS (unit trust or UCITS fund), they receive back the PROCEEDS FROM THE SALE OF THEIR HOLDING. This will be impacted by price movements of the fund's underlying holdings — so they may receive less than the amount originally invested. Key fact: Cancellation of CIS = proceeds from sale of holding (not full amount). Market movements apply."},{"tag":"scenario","topic":"Cancellation — Refund","q":"A retail client invests £10,000 in a UCITS fund on 1 April and exercises their cancellation right on 12 April (within the 14-day period). The fund has fallen 5% in value. How much will the client receive back?","opts":["£10,000 — the full original investment is always refunded","£9,500 — the proceeds from selling the holding at current market value","£10,500 — the original investment plus a statutory interest addition","The client cannot cancel a UCITS fund investment once it has been made"],"ans":1,"exp":"Correct: B. When cancellation is exercised on a CIS/UCITS, the client receives the PROCEEDS FROM THE SALE OF THEIR HOLDING at current prices. If the fund has fallen 5%, £10,000 × 95% = £9,500 is returned. The client takes the market risk during the cancellation period. Key fact: Cancellation of CIS = current sale proceeds = may be less than invested if market moved adversely."},{"tag":"cisi","topic":"Cancellation — Records","q":"For how long must records relating to cancellation rights be retained for a life policy?","opts":["At least 1 year","At least 3 years","At least 5 years","Indefinitely"],"ans":2,"exp":"Correct: C. Records relating to life policies, pension contracts, personal pension schemes and stakeholder pension schemes must be retained for AT LEAST 5 YEARS. Key fact: Life policies + pension contracts = records retained ≥5 years."},{"tag":"cisi","topic":"Cancellation — Records","q":"For how long must records relating to pension transfers, pension opt-outs and FSAVCs be retained?","opts":["At least 3 years","At least 5 years","At least 10.","Indefinitely"],"ans":3,"exp":"Correct: D. Records relating to pension transfers, pension opt-outs and free-standing additional voluntary contributions (FSAVCs) must be retained INDEFINITELY. Key fact: Pension transfers / opt-outs / FSAVCs = records retained indefinitely."},{"tag":"cisi","topic":"Cancellation — Records","q":"A client cancels a contract for an authorised unit trust (a non-pension, non-life product). For how long must the firm retain the cancellation records?","opts":["At least 1 year","At least 3 years","At least 5 years","Indefinitely"],"ans":1,"exp":"Correct: B. For all other cases (i.e. those that are not life policies, pension contracts, or pension transfers/opt-outs/FSAVCs), records must be retained for AT LEAST 3 YEARS. Key fact: Other cancellation records (non-life, non-pension) = ≥3 years."},{"tag":"scenario","topic":"Cancellation — Records","q":"A firm holds records for a pension transfer completed 7 years ago, where the client has since moved abroad. May the firm destroy the records?","opts":["Yes — the 5-year retention period has been exceeded","No — pension transfer records must be retained indefinitely","Yes — once the client is no longer a UK resident, retention rules do not apply","No — the firm must first obtain FCA approval to destroy the records"],"ans":1,"exp":"Correct: B. Pension transfer records must be retained INDEFINITELY — there is no time limit after which they may be destroyed. The client's location is irrelevant. Key fact: Pension transfer records = indefinitely (no time limit applies)."},{"tag":"detail","topic":"Cancellation — Scope","q":"What is the legal effect when a consumer successfully exercises their right to cancel?","opts":["The contract is suspended pending.","The contract is terminated","The client is moved to a lower-risk.","The firm must rebate all charges."],"ans":1,"exp":"Correct: B. When a consumer exercises their right to cancel, the effect is that the CONTRACT IS TERMINATED. It is not suspended or modified — the contract comes to an end. Key fact: Exercising cancellation right = contract is terminated."},{"tag":"scenario","topic":"PRIIPs","q":"A retail investor is presented with a structured term deposit by their bank. Does the PRIIPs Regulation apply, and what document must be provided?","opts":["No — bank deposits are excluded from PRIIPs, provided the client has given prior written consent.","Yes — structured term deposits are one of the four PRIIPs categories; a KID must be provided in good time before the transaction","No — only insurance-based products fall within PRIIPs, provided the client has given prior written consent.","Yes — but only a KFD is required, not a KID, provided the client has given prior written consent."],"ans":1,"exp":"Correct: B. Structured term deposits are one of the four PRIIPs categories. The bank (as manufacturer/seller) must provide a KID IN GOOD TIME BEFORE the transaction is concluded. Key fact: Structured term deposits = PRIIPs category = KID required before transaction."},{"tag":"concept","topic":"PRIIPs","q":"For the purposes of the PRIIPs Regulation, which of the following correctly defines a 'retail client'?","opts":["Any individual investor regardless of wealth or sophistication, provided the client has given prior written consent.","Retail clients as defined in MiFID, OR customers under the IDD who would not qualify as professional clients under MiFID","Only clients with less than £500,000 in investable assets, provided the client has given prior written consent.","Any client who is not a financial professional, provided the client has given prior written consent."],"ans":1,"exp":"Correct: B. Under PRIIPs, 'retail client' means: (1) retail clients as defined in MiFID; OR (2) customers as referred to in the Insurance Distribution Directive (IDD) who would not qualify as professional clients under MiFID. Key fact: PRIIPs retail client = MiFID retail client OR IDD customer (non-professional)."},{"tag":"detail","topic":"KIID","q":"Which of the following correctly describes how a KIID should treat past performance information?","opts":["It may include any past performance data chosen by the AFM, provided the client has given prior written consent.","It must include either a presentation of past performance or, where relevant, performance scenarios — as one of the five mandatory KIID elements","It must show only the most recent 12 months of performance, provided the client has given prior written consent.","Past performance information is prohibited in a KIID, unless the client has been notified in a durable medium."],"ans":1,"exp":"Correct: B. One of the five mandatory KIID elements is: a PRESENTATION OF PAST PERFORMANCE, or where relevant, PERFORMANCE SCENARIOS. The approach (past performance vs. scenarios) depends on what is relevant for the specific scheme. Key fact: KIID = past performance OR performance scenarios (as appropriate)."},{"tag":"scenario","topic":"Cancellation — Periods","q":"A client buys a with-profits life endowment policy. What is the cancellation period and how is it characterised?","opts":["14 days — non-life product","30 days — life and pension product","No right to cancel, provided the client has given prior written consent.","7 days — insurance product"],"ans":1,"exp":"Correct: B. A life endowment policy is a LIFE PRODUCT. Life and pension products have a cancellation period of 30 CALENDAR DAYS — the longest of the cancellation periods. Key fact: Life products (including endowment policies) = 30 calendar days."},{"tag":"detail","topic":"PRIIPs — KID","q":"A PRIIPs manufacturer discovers that information in a published KID is now outdated. What do the Regulatory Technical Standards (RTSs) require?","opts":["Nothing — once published, a KID need not be updated, provided the client has given prior written consent.","The RTSs contain detailed rules on the review, revision and republication of the KID","The manufacturer must notify the FCA within 30 days, provided the client has given prior written consent.","The manufacturer must recall all copies of the KID from distributors"],"ans":1,"exp":"Correct: B. The Regulatory Technical Standards (RTSs) for PRIIPs contain detailed rules specifically on the REVIEW, REVISION AND REPUBLICATION of the KID — ensuring that KIDs are kept accurate and up to date. Key fact: RTSs cover: review + revision + republication of the KID."},{"tag":"cisi","topic":"PRIIPs","q":"Which of the following is NOT within the scope of the PRIIPs Regulation?","opts":["A structured term deposit offered by a bank","A unit-linked insurance bond offered by a life company","A listed share purchased directly on a stock exchange","An investment fund offering exposure to multiple underlying assets"],"ans":2,"exp":"Correct: C. A LISTED SHARE purchased directly on a stock exchange is not a PRIIP. PRIIPs are products that provide exposure to multiple underlying assets, accumulate capital over medium to long term, carry investment risk, and are packaged for retail investors. A direct share purchase is not a packaged product. Key fact: Direct listed shares = NOT a PRIIP. Investment funds, insurance products, structured securities, structured deposits = PRIIPs."},{"tag":"scenario","topic":"Cancellation — Disclosure","q":"A firm fails to inform a retail client of their cancellation right before the client is bound by a pension contract. When must the firm provide this disclosure?","opts":["Within 14 days of the contract being concluded","Immediately after the client is bound by the contract","Within 30 days of the client paying the first premium","The right to disclose is lost if not given before binding"],"ans":1,"exp":"Correct: B. Where it is not possible to provide the cancellation disclosure in good time before the consumer is bound, the firm must provide it IMMEDIATELY AFTER the consumer is bound by the contract. Key fact: Cannot disclose before = must disclose immediately after binding."},{"tag":"concept","topic":"Purpose","q":"The product disclosure requirements in Section 8 are designed to support clients making investment decisions. Which of the following is also covered by these rules?","opts":["Only recommended investments — this applies in all circumstances without exception","Both investments recommended by a firm AND investments the client researches and selects themselves","Only investments above a certain financial threshold, provided the client has given prior written consent.","Only investments in regulated products, provided the client has given prior written consent."],"ans":1,"exp":"Correct: B. Product disclosure rules are designed to ensure clients can make informed decisions whether undertaking investments recommended by a firm OR based on their own research. Both cases are covered. Key fact: Disclosure rules cover recommended AND self-directed investments."},{"tag":"detail","topic":"PRIIPs","q":"A firm provides investment advice to a retail investor about a PRIIP. Does it need to provide a KID even if it did not manufacture the PRIIP?","opts":["No — only the manufacturer needs to provide the KID, provided the client has given prior written consent.","Yes — a person who advises a retail investor on a PRIIP must provide a KID in good time before the transaction","Only if the client specifically requests the KID, provided the client has given prior written consent.","No — the distributor's obligation is limited to explaining the KID if asked, provided the client has given prior written consent."],"ans":1,"exp":"Correct: B. A person who ADVISES a retail investor on a PRIIP (not just manufactures/sells it) must provide the retail investor with a KID IN GOOD TIME BEFORE any transaction is concluded. This extends to advisers, not just manufacturers. Key fact: PRIIPs KID obligation = manufacturer + adviser + seller. All must ensure KID is provided before transaction."}];
const SK='cisi_ch2s8_v1';const N=10;let APP={round:[],answers:{},opts:{},seen:[],roundNum:0};function save(){try{localStorage.setItem(SK,JSON.stringify(APP));}catch(e){}}function load(){try{const d=localStorage.getItem(SK);if(d)APP=JSON.parse(d);}catch(e){}}function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}function buildRound(){const lw=Object.entries(APP.answers).filter(([,v])=>v&&v.v===0).map(([k])=>APP.round[parseInt(k)]).filter(x=>x!==undefined);const us=BANK.map((_,i)=>i).filter(i=>!APP.seen.includes(i));const so=APP.seen.filter(i=>!APP.round.includes(i));let c=[];c.push(...shuffle(lw).slice(0,3));c.push(...shuffle(us.filter(i=>!c.includes(i))).slice(0,N-c.length));if(c.length<N)c.push(...shuffle(so.filter(i=>!c.includes(i))).slice(0,N-c.length));if(c.length<N)c.push(...shuffle(BANK.map((_,i)=>i).filter(i=>!c.includes(i))).slice(0,N-c.length));const r=shuffle(c).slice(0,N);r.forEach(i=>{if(!APP.seen.includes(i))APP.seen.push(i);});APP.round=r;APP.answers={};APP.opts={};APP.roundNum=(APP.roundNum||0)+1;}function doReset(){buildRound();save();render();window.scrollTo({top:0,behavior:'smooth'});}function pick(p,oi){if(APP.answers[p])return;const q=BANK[APP.round[p]];APP.answers[p]={opt:q.opts[oi],v:oi===q.ans?1:0};save();render();setTimeout(()=>{const d=Object.keys(APP.answers).length;if(d<N){const cards=document.querySelectorAll('#q-area .q-card');const nx=[...Array(N).keys()].find(j=>j>p&&!APP.answers[j]);if(nx!==undefined)cards[nx]?.scrollIntoView({behavior:'smooth',block:'center'});}else document.querySelector('#q-area .result-card')?.scrollIntoView({behavior:'smooth',block:'start'});},350);}function render(){const d=Object.keys(APP.answers).length;const ok=Object.values(APP.answers).filter(v=>v&&v.v===1).length;const bad=d-ok;const pct=d?Math.round(ok/d*100):null;document.getElementById('round-label').textContent=`Round ${APP.roundNum} \u00b7 10 Qs from bank of ${BANK.length} \u00b7 Seen: ${APP.seen.length}/${BANK.length}`;document.getElementById('s-num').textContent=`${d}/${N}`;document.getElementById('s-ok').textContent=ok;document.getElementById('s-bad').textContent=bad;document.getElementById('s-pct').textContent=pct===null?'\u2014':pct+'%';const tr=document.getElementById('tracker');tr.innerHTML='';for(let i=0;i<N;i++){const dot=document.createElement('div');dot.className='tracker-dot'+(APP.answers[i]?APP.answers[i].v===1?' t-ok':' t-bad':i===d?' t-cur':'');tr.appendChild(dot);}const area=document.getElementById('q-area');area.innerHTML='';const L=['A','B','C','D'];const tm={cisi:'CISI exam style',concept:'Concept check',scenario:'Scenario',detail:'Detail'};const tc={cisi:'tag-cisi',concept:'tag-concept',scenario:'tag-scenario',detail:'tag-detail'};APP.round.forEach((qi,pos)=>{const q=BANK[qi];const ans=!!APP.answers[pos];const ch=APP.answers[pos]?.opt;if(!APP.opts[pos])APP.opts[pos]=shuffle(q.opts.map((_,i)=>i));const oo=APP.opts[pos];let oh=oo.map((oi,li)=>{let cl='opt';if(ans)cl+=' dis';if(ans&&oi===q.ans)cl+=' ok';else if(ans&&q.opts[oi]===ch&&oi!==q.ans)cl+=' bad';return`<div class="${cl}" onclick="pick(${pos},${oi})"><span class="opt-l">${L[li]}</span><span>${q.opts[oi]}</span></div>`;}).join('');let eh=ans?`<div class="exp-box show ${APP.answers[pos].v===1?'exp-ok':'exp-bad'}"><strong>${APP.answers[pos].v===1?'\u2713 Correct!':'\u2717 Incorrect.'}</strong> ${q.exp}</div>`:'';const card=document.createElement('div');card.className='q-card';card.innerHTML=`<div class="q-meta"><span class="q-num">Q${pos+1}</span><span class="q-tag ${tc[q.tag]}">${tm[q.tag]}</span><span class="q-topic">${q.topic}</span></div><div class="q-text">${q.q}</div><div class="opts">${oh}</div>${eh}`;area.appendChild(card);});if(d===N){const pF=Math.round(ok/N*100);let lb,co,gr;if(pF>=80){lb='Pass standard met!';co='var(--teal-m)';gr='Pass \u2713';}else if(pF>=70){lb='Close \u2014 review weaker areas.';co='var(--amber)';gr='Near Pass';}else if(pF>=60){lb='Borderline.';co='var(--coral-m)';gr='Borderline';}else{lb='Below pass.';co='#A32D2D';gr='Needs Work';}const ts={};APP.round.forEach((qi,pos)=>{const t=BANK[qi].topic;if(!ts[t])ts[t]={ok:0,tot:0};ts[t].tot++;if(APP.answers[pos]?.v===1)ts[t].ok++;});let th=Object.entries(ts).map(([t,s])=>{const tp=Math.round(s.ok/s.tot*100);const cl=tp>=80?'var(--teal-m)':tp>=60?'var(--amber)':'var(--coral-m)';return`<div class="topic-row"><div class="topic-name">${t}</div><div style="font-size:.72rem;color:var(--text3);margin-bottom:.25rem">${s.ok}/${s.tot}</div><div class="topic-bar-wrap"><div class="topic-bar-fill" style="width:${tp}%;background:${cl}"></div></div></div>`;}).join('');let rh=APP.round.map((qi,pos)=>{const q=BANK[qi];const v=APP.answers[pos]?.v===1;return`<div class="q-review-item ${v?'r-ok':'r-bad'}"><span class="r-icon">${v?'\u2713':'\u2717'}</span><div><strong>Q${pos+1} \u00b7 ${q.topic}.</strong> ${q.q}<br><span style="font-size:.78rem;opacity:.85">Answer: ${q.opts[q.ans]}</span></div></div>`;}).join('');const rc=document.createElement('div');rc.className='result-card';rc.style.marginTop='1rem';rc.innerHTML=`<div style="font-size:.85rem;color:var(--text2);margin-bottom:.3rem">Round ${APP.roundNum} complete</div><div class="result-big" style="color:${co}">${ok}/${N}</div><div class="result-grade" style="background:${co}22;color:${co}">${gr}</div><div class="result-bar-wrap"><div class="result-bar-fill" style="width:${pF}%;background:${co}"></div></div><div style="font-size:.82rem;color:var(--text2);margin:.3rem 0 .2rem">${pF}% \u00b7 ${lb}</div><div class="result-breakdown"><span class="rp" style="background:var(--green-l);color:var(--green)">\u2713 ${ok}</span><span class="rp" style="background:var(--coral-l);color:var(--coral)">\u2717 ${N-ok}</span><span class="rp" style="background:var(--navy-l);color:var(--navy-d)">Seen: ${APP.seen.length}/${BANK.length}</span></div><div style="font-size:.8rem;font-weight:600;color:var(--text2);margin-bottom:.55rem;text-align:left">Topics:</div><div class="topic-grid">${th}</div><div class="btn-row" style="margin-bottom:1.4rem"><button class="btn btn-p" onclick="doReset()">\u21ba New round</button></div><div style="font-size:.8rem;font-weight:600;color:var(--text2);margin-bottom:.5rem;text-align:left">Review:</div><div class="q-review-list">${rh}</div>`;area.appendChild(rc);}}load();if(!APP.round||APP.round.length===0)buildRound();render();
</script>
