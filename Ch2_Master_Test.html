act: Post-Brexit: UK branches of EEA firms = report to FCA + home regulator.", "section": "S12-13: Reporting"}, {"tag": "cisi", "topic": "Deal Confirmations", "q": "By when must a firm send a deal confirmation notice to a client after executing an order?", "opts": ["Within 3 business days of execution, as required under the relevant UK MiFIR, UK EMIR or COBS provisions.", "As soon as possible, but no later than the next business day", "On the same trading day as the execution, unless a specific exemption or deferral applies under the applicable regulations.", "Within 5 business days for MiFID business, provided that all relevant regulatory conditions are fully satisfied."], "ans": 1, "exp": "Correct: B. The firm must send the deal confirmation notice as soon as possible but NO LATER THAN THE NEXT BUSINESS DAY after execution. If confirmation is received from a third party, it must be passed on no later than the next business day after receipt. Key fact: Deal confirmation = no later than next business day.", "section": "S12-13: Reporting"}, {"tag": "detail", "topic": "Deal Confirmations", "q": "Which of the following is a required element of a deal confirmation notice?", "opts": ["The firm's annual revenue and regulatory capital ratios", "The execution venue where the transaction was executed", "The client's full investment portfolio composition", "The name of the compliance officer who authorised the trade"], "ans": 1, "exp": "Correct: B. Required elements of the confirmation notice include: firm identification; client name; trading day and time; type of order; EXECUTION VENUE; financial instrument; buy/sell indicator; unit price; total consideration; charges; exchange rate (if applicable); and client settlement responsibility. Key fact: Execution venue = one of 13 required elements in a deal confirmation.", "section": "S12-13: Reporting"}, {"tag": "cisi", "topic": "Deal Confirmations", "q": "For how long must a firm retain copies of deal confirmations for UK MiFID business?", "opts": ["At least 1 year from dispatch", "At least 3 years from dispatch", "At least 5 years from dispatch", "Indefinitely, with no time limit"], "ans": 2, "exp": "Correct: C. For UK MiFID BUSINESS, firms must retain copies of deal confirmations for AT LEAST FIVE YEARS from the date of dispatch. For other business, the minimum is 3 years. Key fact: Confirmations records: MiFID = ≥5 years; other = ≥3 years.", "section": "S12-13: Reporting"}, {"tag": "cisi", "topic": "Periodic Statements", "q": "What is the default minimum frequency for periodic statements provided to retail and professional clients?", "opts": ["Monthly", "Quarterly", "Semi-annually", "Annually"], "ans": 1, "exp": "Correct: B. By default, periodic statements must be provided AT LEAST QUARTERLY. Two exceptions exist: annual (deal-by-deal confirmations + no higher-risk investments); monthly (leveraged portfolio). Key fact: Default = at least quarterly.", "section": "S12-13: Reporting"}, {"tag": "cisi", "topic": "Periodic Statements", "q": "Under what circumstances may periodic statements be provided only annually (every 12 months)?", "opts": ["When all clients in the portfolio are professional clients rather than retail clients, provided that all relevant regulatory conditions are fully satisfied.", "When the client receives deal-by-deal confirmations AND certain higher-risk investments are excluded from the portfolio", "When the portfolio value is below a defined minimum threshold set by the firm, as required under the relevant UK MiFIR, UK EMIR or COBS provisions.", "When the client has been with the firm for more than 5 years without any complaints, unless a specific exemption or deferral applies under the applicable regulations."], "ans": 1, "exp": "Correct: B. Annual periodic statements are permitted when: (1) the client receives DEAL-BY-DEAL CONFIRMATIONS; AND (2) CERTAIN HIGHER-RISK INVESTMENTS are excluded from the portfolio. Both conditions must be met. Key fact: Annual statements = deal-by-deal confirmations + higher-risk investments excluded.", "section": "S12-13: Reporting"}, {"tag": "cisi", "topic": "Periodic Statements", "q": "How frequently must periodic statements be provided to a client whose portfolio has been authorised to be leveraged?", "opts": ["Quarterly", "Semi-annually", "Monthly", "Annually"], "ans": 2, "exp": "Correct: C. When a client has authorised their portfolio to be LEVERAGED, periodic statements must be provided MONTHLY. Key fact: Leveraged portfolio = monthly periodic statements.", "section": "S12-13: Reporting"}, {"tag": "cisi", "topic": "Periodic Statements", "q": "From what date is the 10% portfolio depreciation notification no longer required?", "opts": ["1 January 2023", "7 June 2023", "31 December 2022", "1 April 2024"], "ans": 1, "exp": "Correct: B. Following HM Treasury's Markets in Financial Instruments (Investor Reporting) (Amendment) Regulations 2022, from 7 JUNE 2023 firms are no longer required to provide the 10% depreciation notification to portfolio management clients. Key fact: 10% depreciation notification = abolished from 7 June 2023.", "section": "S12-13: Reporting"}, {"tag": "detail", "topic": "Periodic Statements", "q": "Which of the following is a required element of a periodic statement for a portfolio management client?", "opts": ["A list of all counterparties used during the reporting period, as required under the relevant UK MiFIR, UK EMIR or COBS provisions.", "The contents and valuation of the portfolio — including each investment and its value, cash balance at beginning and end of period, and performance", "The projected returns for the portfolio over the next 12 months, unless a specific exemption or deferral applies under the applicable regulations.", "The identities of all employees involved in managing the client's portfolio, provided that all relevant regulatory conditions are fully satisfied."], "ans": 1, "exp": "Correct: B. Required periodic statement elements include: firm name; client account name; PORTFOLIO CONTENTS AND VALUATION (each investment + value, cash balance start/end, performance); total charges itemised; benchmark comparison; dividends/interest received; corporate actions. Key fact: Portfolio contents + valuation (each holding, cash balance, performance) = required in periodic statements.", "section": "S12-13: Reporting"}, {"tag": "detail", "topic": "Periodic Statements", "q": "For how long must firms retain copies of periodic statements for non-MiFID business?", "opts": ["1 year", "3 years", "5 years", "10 years"], "ans": 1, "exp": "Correct: B. For NON-MiFID (other) business, periodic statements must be retained for AT LEAST THREE YEARS. For UK MiFID business, the retention period is at least five years. Key fact: Periodic statement records: MiFID = ≥5 years; other (non-MiFID) = ≥3 years.", "section": "S12-13: Reporting"}, {"tag": "cisi", "topic": "CASS", "q": "What is the primary purpose of the client money segregation requirement under CASS?", "opts": ["To enable the firm to calculate its own profit and loss separately from client funds", "To ensure that if the firm fails, client money cannot be used to repay the firm's creditors", "To prevent clients from withdrawing their money without prior notice to the firm", "To simplify the firm's regulatory reporting obligations to the FCA"], "ans": 1, "exp": "Correct: B. The key purpose of CASS client money segregation is to ensure that if the FIRM FAILS, client money CANNOT BE USED TO REPAY THE FIRM'S CREDITORS. Key fact: CASS segregation purpose = protect client money from firm's creditors in the event of firm failure.", "section": "S12-13: Reporting"}, {"tag": "cisi", "topic": "CASS", "q": "In what legal form must client money be held under CASS?", "opts": ["As a loan from the client to the firm, with a contractual right of repayment", "In trust — in a separately designated client money account — as a statutory trust under CASS 7.17.2R", "In the firm's general operating account, ring-fenced by internal accounting entries only", "As an investment in government bonds on behalf of the client"], "ans": 1, "exp": "Correct: B. Client money must be held IN TRUST — in a SEPARATELY DESIGNATED CLIENT MONEY ACCOUNT — as a STATUTORY TRUST created under CASS 7.17.2R. Key fact: Client money = statutory trust (CASS 7.17.2R) in separately designated client money account.", "section": "S12-13: Reporting"}, {"tag": "cisi", "topic": "CASS", "q": "When a UK client bank account is opened, within what period must the bank acknowledge the trust arrangement?", "opts": ["5 business days", "10 business days", "20 days", "30 days"], "ans": 2, "exp": "Correct: C. When a client bank account is opened (in the UK), the bank must acknowledge the trust arrangement within 20 DAYS. If the bank does not acknowledge in time, the firm must withdraw the money and deposit it elsewhere as soon as possible. Key fact: Bank must acknowledge trust within 20 days. Failure → move money elsewhere ASAP.", "section": "S12-13: Reporting"}, {"tag": "detail", "topic": "CASS", "q": "May a firm place client money in a client bank account before receiving the bank's signed acknowledgement letter?", "opts": ["Yes — client money may be placed immediately and the acknowledgement received within 20 days", "No — client money must NOT be placed in the account until the acknowledgement letter has been signed and returned to the firm", "Yes — but only for amounts below a de minimis threshold set by the FCA, as required under the relevant UK MiFIR, UK EMIR or COBS provisions.", "Yes — for professional client money only; retail client money must wait for acknowledgement"], "ans": 1, "exp": "Correct: B. The rules now prohibit the placement of client money into an account UNTIL the relevant ACKNOWLEDGEMENT LETTER HAS BEEN SIGNED AND RETURNED to the firm. This applies to all client bank accounts, not just UK accounts. Key fact: No client money in account until signed acknowledgement received.", "section": "S12-13: Reporting"}, {"tag": "cisi", "topic": "CASS", "q": "Which CASS chapter contains the custody rules that apply when a firm holds financial instruments of a client?", "opts": ["CASS 4", "CASS 5", "CASS 6", "CASS 7"], "ans": 2, "exp": "Correct: C. CASS 6 contains the CUSTODY RULES, which apply when a firm holds financial instruments of a client in the course of MiFID business, and when the firm is safeguarding and administering investments in the course of non-MiFID business. Key fact: CASS 6 = custody rules (financial instruments). CASS 7 = client money rules.", "section": "S12-13: Reporting"}, {"tag": "cisi", "topic": "CASS", "q": "Which of the following is an exemption from the CASS rules?", "opts": ["All regulated investment firms providing execution-only services, provided that all relevant regulatory conditions are fully satisfied.", "ICVCs, UCITS-qualifying schemes, and money held in a DvP transaction (unless settlement fails within 3 business days)", "Firms whose total client assets are below £1 million, unless a specific exemption or deferral applies under the applicable regulations.", "Investment firms authorised after a specified date, as required under the relevant UK MiFIR, UK EMIR or COBS provisions."], "ans": 1, "exp": "Correct: B. CASS exemptions include: ICVCs; UCITS-qualifying schemes; credit institutions (deposits as 'banker'); coins held for metal value; money in DvP transactions (unless settlement fails within 3 business days); money due to the firm; firm in own name by client agreement; and full ownership transfers for security purposes. Key fact: Key CASS exemptions = ICVCs + UCITS + DvP (<3 days) + credit institution as banker.", "section": "S12-13: Reporting"}, {"tag": "detail", "topic": "CASS", "q": "A client transfers full ownership of securities to a firm as collateral for a loan. Do the CASS custody rules apply to these securities?", "opts": ["Yes — all client assets held by a firm are subject to CASS regardless of ownership, provided that all relevant regulatory conditions are fully satisfied.", "No — CASS 6 and CASS 7 do not apply where a client transfers full ownership of assets to a firm for the purpose of securing or covering present or future obligations", "Yes — but only if the loan exceeds 12 months in duration, as required under the relevant UK MiFIR, UK EMIR or COBS provisions.", "No — but the firm must still register the assets in the client's name, unless a specific exemption or deferral applies under the applicable regulations."], "ans": 1, "exp": "Correct: B. CASS 6 (custody rules) and CASS 7 (client money rules) do NOT apply where a client TRANSFERS FULL OWNERSHIP of safe custody assets or client money to a firm for the purpose of SECURING OR COVERING present or future, actual, contingent or prospective obligations. Key fact: Full ownership transfer for security purposes = CASS exemption.", "section": "S12-13: Reporting"}, {"tag": "detail", "topic": "CASS", "q": "A firm holds financial instruments for a client. The client gives express consent for the firm to use those instruments for its own account. Is this permitted under CASS?", "opts": ["No — CASS prohibits a firm from ever using client assets on its own account under any circumstances", "Yes — client assets may be used on the firm's own account, but only with the client's express consent", "Yes — provided the firm notifies the FCA before using the client's assets", "No — only the client's cash (not securities) may be used by the firm with consent"], "ans": 1, "exp": "Correct: B. While firms must normally prevent client safe custody assets from being used on the firm's own account, this protection can be overridden with the client's EXPRESS CONSENT. Key fact: Client assets used on firm's own account = permitted only with client's EXPRESS CONSENT.", "section": "S12-13: Reporting"}, {"tag": "scenario", "topic": "Periodic Statements", "q": "An investment manager sends periodic statements to a retail client quarterly. The client then asks to receive individual deal confirmations for every trade. If the manager complies and higher-risk investments are excluded from the portfolio, can it now send statements annually?", "opts": ["No — quarterly is the minimum required regardless of whether deal-by-deal confirmations are sent", "Yes — if the client now receives deal-by-deal confirmations AND higher-risk investments are excluded, annual statements are permitted", "Only if the client signs a waiver of their right to quarterly statements, as required under the relevant UK MiFIR, UK EMIR or COBS provisions.", "No — the 12-month option is only available to professional clients, not retail clients, unless a specific exemption or deferral applies under the applicable regulations."], "ans": 1, "exp": "Correct: B. Annual periodic statements are permitted when: (1) the client receives DEAL-BY-DEAL CONFIRMATIONS (which the client has now requested); AND (2) certain HIGHER-RISK INVESTMENTS are EXCLUDED from the portfolio. Both conditions are met here. Key fact: Annual statements = deal-by-deal confirmations + higher-risk investments excluded from portfolio.", "section": "S12-13: Reporting"}, {"tag": "scenario", "topic": "CASS", "q": "A firm opens a client bank account at a UK bank. After 25 days, the bank has not yet sent back the signed acknowledgement letter. What must the firm do?", "opts": ["Continue to wait — the bank has 30 days to respond", "Withdraw the client money and deposit it with another bank as soon as possible", "Notify the FCA within 5 business days of the acknowledgement not being received", "Request a waiver from the FCA to continue holding money at the bank"], "ans": 1, "exp": "Correct: B. If the bank does NOT acknowledge the trust arrangement within 20 DAYS, the firm must WITHDRAW THE CLIENT MONEY and DEPOSIT IT WITH ANOTHER BANK as soon as possible. At 25 days without acknowledgement, the firm has already exceeded the 20-day deadline. Key fact: No acknowledgement within 20 days = withdraw money + deposit elsewhere ASAP.", "section": "S12-13: Reporting"}, {"tag": "scenario", "topic": "UK EMIR", "q": "A UK asset manager and a German bank are parties to a derivatives trade. Both are financial counterparties. Who must report under UK EMIR and EU EMIR respectively?", "opts": ["Only the UK asset manager reports — to the FCA under UK EMIR, unless a specific exemption or deferral applies under the applicable regulations.", "The UK asset manager reports under UK EMIR; the German bank reports under EU EMIR. Both must report, unless one reports on behalf of both by prior arrangement", "Both parties report under UK EMIR to the FCA, as required under the relevant UK MiFIR, UK EMIR or COBS provisions.", "Neither party is required to report as the trade involves both UK and EU counterparties, provided that all relevant regulatory conditions are fully satisfied."], "ans": 1, "exp": "Correct: B. UK counterparties report under UK EMIR; EU counterparties report under EU EMIR — even if one of them is not a financial institution. Both must report each trade, though by PRIOR ARRANGEMENT, one party may report on behalf of both. Key fact: UK = UK EMIR; EU = EU EMIR. Both report, or one by prior arrangement.", "section": "S12-13: Reporting"}, {"tag": "concept", "topic": "UK MiFIR", "q": "Why is trade reporting described as 'single-sided' while transaction reporting can be 'dual-sided'?", "opts": ["Because trade reporting uses only one data field, while transaction reporting uses multiple fields, unless a specific exemption or deferral applies under the applicable regulations.", "Because trade reporting only shows the reporting institution's side of the trade, while transaction reporting captures both UK financial counterparties to the transaction", "Because trade reporting is submitted once per day, while transaction reporting is submitted twice, as required under the relevant UK MiFIR, UK EMIR or COBS provisions.", "Because only one party to a trade is ever required to submit a trade report, while all parties must submit transaction reports"], "ans": 1, "exp": "Correct: B. TRADE REPORTING is SINGLE-SIDED — it only shows the REPORTING INSTITUTION'S side. TRANSACTION REPORTING can be DUAL-SIDED — both UK financial counterparties to a transaction may be in scope (i.e. both may need to report). Key fact: Trade reporting = single-sided. Transaction reporting = can be dual-sided (both UK counterparties).", "section": "S12-13: Reporting"}, {"tag": "concept", "topic": "CASS", "q": "Why must client money be held in a statutory trust rather than simply in a separate bank account under a contractual arrangement?", "opts": ["Because a contractual arrangement would be subject to different accounting treatment, unless a specific exemption or deferral applies under the applicable regulations.", "Because a statutory trust ensures that in the event of the firm's insolvency, the client money is protected from the firm's creditors — a contractual arrangement would not provide the same protection", "Because the FCA requires all client assets to be held in a specific legal form, as required under the relevant UK MiFIR, UK EMIR or COBS provisions.", "Because a trust enables the firm to earn interest on client money for its own benefit, provided that all relevant regulatory conditions are fully satisfied."], "ans": 1, "exp": "Correct: B. A STATUTORY TRUST (under CASS 7.17.2R) ensures that client money is LEGALLY PROTECTED from the firm's creditors in the event of insolvency — clients are beneficiaries of the trust and their money cannot be used to repay the firm's debts. A mere contractual arrangement would not provide the same protection. Key fact: Statutory trust = legally protects client money from firm's creditors in insolvency.", "section": "S12-13: Reporting"}, {"tag": "cisi", "topic": "COBS Scope", "q": "Which of the following activities is subject to COBS rules even when carried out from an overseas establishment?", "opts": ["Arranging insurance products for UK corporate clients", "Communicating or approving a financial promotion to a client in the UK", "Providing mortgage advice to clients in Australia", "Executing transactions on a non-UK regulated market"], "ans": 1, "exp": "Correct: B. COBS applies to a firm that carries on regulated activities, including communicating or approving financial promotions directed at clients in the UK, even where this is done from an overseas establishment. The geographical scope rule focuses on where the client is located and where the effect is felt, not just where the firm operates. Why others are wrong: (A) Insurance products are not designated investments under COBS. (C) Clients in Australia fall outside COBS geographic scope. (D) Executing on a non-UK market does not automatically engage COBS rules for a firm acting from overseas.", "section": "S1-2: COBS & ARs"}, {"tag": "concept", "topic": "COBS Structure", "q": "COBS is structured around which principle as its 'general application rule'?", "opts": ["The country of the regulator principle", "The home state principle", "The country-of-origin principle", "The location of business principle"], "ans": 1, "exp": "Correct: B. COBS is based on the 'home state principle' — in general, the rules of the member state (or jurisdiction) where the firm is authorised apply. For UK firms, COBS follows the UK home state principle. This determines which rulebook governs the firm's conduct. Why others are wrong: (A) and (C) are not the correct technical terms used. (D) 'Location of business' is not the governing principle in COBS.", "section": "S1-2: COBS & ARs"}, {"tag": "detail", "topic": "COBS Scope", "q": "COBS rules do NOT apply to which of the following?", "opts": ["A UK bank providing investment advice to a retail client in London", "A US bank providing execution services to a UK professional client from New York", "A UK-authorised firm providing portfolio management to a UK retail client", "A UK investment firm communicating a financial promotion to a UK retail client"], "ans": 1, "exp": "Correct: B. COBS does not generally apply to overseas firms not authorised by the FCA that are carrying out activities from outside the UK for UK clients — unless they are operating through a UK branch. A US bank providing services from New York without a UK branch or authorisation would not be subject to COBS. The other examples all involve UK-authorised firms or UK-based activities clearly within COBS scope.", "section": "S1-2: COBS & ARs"}, {"tag": "cisi", "topic": "AR Liability", "q": "Under FSMA, who bears ultimate regulatory liability for the conduct of an appointed representative (AR)?", "opts": ["The AR itself, as it acts in its own name", "The FCA, as supervisor of all financial services firms", "The principal firm that has appointed the AR", "The client, who chooses to deal with an AR"], "ans": 2, "exp": "Correct: C. Under FSMA, the principal firm is ultimately responsible for the conduct of its appointed representatives. This is a fundamental feature of the AR regime: the AR is exempt from FCA authorisation because the principal takes on regulatory responsibility. Why others are wrong: (A) ARs do not bear ultimate regulatory liability — that is borne by the principal. (B) The FCA supervises but does not bear liability for individual firm conduct. (D) Clients bear no regulatory responsibility.", "section": "S1-2: COBS & ARs"}, {"tag": "scenario", "topic": "AR Permissions", "q": "Firm A is an appointed representative of Principal B. Principal B holds permissions for investment advice and arranging deals, but not for discretionary management. Can Firm A carry out discretionary portfolio management under this arrangement?", "opts": ["Yes, because ARs can carry out any regulated activity on behalf of their principal", "Yes, provided the AR obtains a separate client agreement", "No, because ARs can only conduct activities within their principal's permissions", "No, because ARs are prohibited from all forms of portfolio management"], "ans": 2, "exp": "Correct: C. An AR can only carry on activities that the principal itself is permitted to carry on. Since Principal B does not hold permissions for discretionary management, Firm A (the AR) cannot conduct that activity under the AR arrangement. It would need to find a principal with the relevant permissions or seek its own authorisation. Why others are wrong: (A) is incorrect — ARs are strictly limited to the principal's permissions. (B) A separate client agreement does not create regulatory permissions. (D) is too absolute — ARs can do portfolio management if their principal has that permission.", "section": "S1-2: COBS & ARs"}, {"tag": "cisi", "topic": "ECP Definition", "q": "Which of the following is classified as a 'per se' eligible counterparty (ECP) under COBS?", "opts": ["A high-net-worth individual with investments exceeding £500,000", "A local authority that has passed the quantitative test", "A national government dealing in financial instruments", "A large company employing more than 250 staff"], "ans": 2, "exp": "Correct: C. National governments, central banks, and international organisations are classified as per se ECPs under COBS. They automatically qualify without needing to apply or meet any criteria. Why others are wrong: (A) High-net-worth individuals are retail clients by default unless they request and are granted elective professional client status. (B) Local authorities must meet specific tests to be reclassified above retail client — they are not per se ECPs. (D) Company size alone does not confer ECP status.", "section": "S3: Client Categories"}, {"tag": "detail", "topic": "Recategorisation", "q": "When a retail client has been upgraded to elective professional client status, who is responsible for keeping the firm informed if their circumstances change?", "opts": ["The FCA, through its supervisory reviews", "The principal firm, through periodic re-assessment", "The client themselves, who must notify the firm of material changes", "The third-party custodian holding the client's assets"], "ans": 2, "exp": "Correct: C. It is the professional client's own responsibility to keep the firm informed of changes in their circumstances that might affect their classification. If a firm subsequently becomes aware that a client no longer meets the criteria, it must take appropriate action — including recategorising them as retail if necessary. Why others are wrong: (A) The FCA does not monitor individual client classifications. (B) While firms should review periodically, the primary ongoing duty rests with the client. (D) Custodians have no role in client categorisation.", "section": "S3: Client Categories"}, {"tag": "scenario", "topic": "Protections Lost", "q": "A professional client requests reclassification as an eligible counterparty. Which of the following protections will they lose that they previously held as a professional client?", "opts": ["The right to receive information about the firm and its services", "The obligation on the firm to assess appropriateness for non-advised services", "Best execution obligations", "The right to communicate in their preferred language"], "ans": 2, "exp": "Correct: C. When a professional client upgrades to ECP status, they lose best execution protections among other things. The list of protections lost by ECPs (compared to professional clients) includes: client agreement, appropriateness, best execution, order handling, product governance, and disclosure on costs and charges. Why others are wrong: (A) Information about firm and services is lost when moving from retail to professional — this protection has already been reduced at the professional client level. (B) Appropriateness is also on the list but the question asks specifically about what is lost going from professional to ECP — appropriateness is also lost. In this set, best execution is the clearest additional loss. (D) Language preferences are a specific MiFID right not typically lost at ECP level.", "section": "S3: Client Categories"}, {"tag": "cisi", "topic": "Quantitative Test", "q": "Under the quantitative test for reclassifying a retail client as an elective professional client for MiFID business, which THREE of the following criteria apply?", "opts": ["The client has carried out at least ten significantly sized transactions per quarter over the last four quarters", "The client's portfolio exceeds €500,000 including cash and financial instruments", "The client has worked in the financial sector for at least one year in a relevant professional capacity", "The client has a net annual income exceeding £100,000"], "ans": 3, "exp": "Correct: D is NOT one of the criteria. The three quantitative criteria under MiFID are: (1) at least ten significantly sized transactions per quarter over the preceding four quarters; (2) financial portfolio exceeding €500,000; (3) at least one year of professional experience in the financial sector. Net annual income is not part of the quantitative test, though it may be relevant to a firm's general assessment. Note: in a real question, the candidate would select the THREE correct items — the income criterion (D) is the distractor.", "section": "S3: Client Categories"}, {"tag": "cisi", "topic": "Client Agreement Records", "q": "For how long must a firm retain client agreement records in the case of a pension transfer recommendation?", "opts": ["Five years from the date the agreement was entered into", "The duration of the client relationship", "For the life of the client", "Indefinitely"], "ans": 3, "exp": "Correct: D. For pension transfers, pension opt-outs and freestanding additional voluntary contributions (FAVCs), client agreement records must be kept indefinitely. This is an exception to the standard rule. The general rule is the longer of five years or the duration of the client relationship. Why others are wrong: (A) and (B) are the standard rules that do not apply to pension transfer cases. (C) For the life of the client is not the stated standard — indefinitely is the requirement.", "section": "S4: Agreements & Info"}, {"tag": "scenario", "topic": "Distance Communications", "q": "A firm concludes an agreement with a retail client entirely by telephone. The client requested this approach and consented. When may the firm provide the client agreement terms?", "opts": ["At least five business days before the agreement is concluded", "Immediately before the agreement is concluded", "Immediately after the client is bound by the agreement, in a durable medium", "Only after the FCA has confirmed the arrangement is acceptable"], "ans": 2, "exp": "Correct: C. Where the agreement is concluded using distance communications (such as by telephone) at the client's request and the firm complies with voice telephone communication rules, it may provide the client agreement terms immediately AFTER the client is bound. This is an exception to the standard rule, which requires provision in good time BEFORE the client is bound. Why others are wrong: (A) and (B) describe the standard 'good time before' requirement. (D) The FCA does not approve individual firm arrangements of this kind.", "section": "S4: Agreements & Info"}, {"tag": "detail", "topic": "Costs Disclosure", "q": "Under COBS, when disclosing costs and charges to a retail client, which of the following must always be itemised separately?", "opts": ["Third-party charges levied by exchanges", "Costs charged by the firm itself", "Taxes payable directly by the client to HMRC", "Costs of any research commissioned by the client"], "ans": 1, "exp": "Correct: B. Under COBS disclosure rules, costs charged by the firm itself must always be itemised separately in every case. This ensures clients can clearly identify what they are paying to the firm directly, as opposed to total costs that may include third-party or tax elements. Why others are wrong: (A) Exchange costs should be disclosed within the overall cost disclosure but are not specifically singled out as 'must always be itemised separately'. (C) Taxes paid directly to HMRC do not pass through the firm and are noted as possible additional costs. (D) Client-commissioned research costs fall outside the standard cost disclosure framework.", "section": "S4: Agreements & Info"}, {"tag": "cisi", "topic": "Financial Promotions Gateway", "q": "In 2023, the FCA introduced a 'gateway' for approving financial promotions. What does this gateway require?", "opts": ["All firms must register with the FCA before producing any financial promotions", "Only firms with specific FCA permission may approve financial promotions for third parties", "All financial promotions must be approved by the FCA directly before communication", "Only listed companies may approve financial promotions for unregulated entities"], "ans": 1, "exp": "Correct: B. From 2023, firms that wish to approve financial promotions for third parties (unauthorised persons) must obtain specific FCA permission to do so through the gateway. Previously, any authorised person could approve promotions for third parties. Now, firms without gateway permission can only approve their own promotions. Why others are wrong: (A) Firms do not need to register before producing their own promotions — only approving others' promotions triggers the gateway requirement. (C) The FCA does not approve individual promotions — firms do this with responsibility resting on them. (D) There is no such restriction limited to listed companies.", "section": "S5: Financial Promotions"}, {"tag": "detail", "topic": "Cryptoassets Promotions", "q": "Under the FCA's 2023 cryptoasset financial promotion rules, cryptoassets are classified as which type of investment for mass-marketing purposes?", "opts": ["Non Mass Market Investments (NMMI), banned from retail promotion", "Restricted Mass Market Investments (RMMI), permitted with restrictions", "Unrestricted Mass Market Investments, freely promotable", "Professional Investments, promotable only to professional clients"], "ans": 1, "exp": "Correct: B. The FCA classified cryptoassets as Restricted Mass Market Investments (RMMI), meaning they can be mass-marketed to retail consumers subject to certain restrictions including clear risk warnings, banning incentives to invest, a 24-hour cooling-off period, and appropriateness assessments. Why others are wrong: (A) NMMIs are banned from retail promotion entirely — cryptoassets are not in this category. (C) Unrestricted mass market investment is not the correct classification. (D) Cryptoassets can be promoted to retail investors, subject to restrictions.", "section": "S5: Financial Promotions"}, {"tag": "scenario", "topic": "Cold Calling Rules", "q": "A firm wishes to cold call a client with whom it has an existing relationship to discuss a regulated deposit product. Is this permitted under COBS?", "opts": ["No, cold calling is never permitted under COBS", "No, cold calling is only permitted for ECP business", "Yes, because the client has an existing relationship with the firm and would envisage receiving such a call", "Yes, because deposit products are not covered by COBS cold calling rules"], "ans": 2, "exp": "Correct: C. Cold calling IS permitted where the recipient has an existing client relationship with the firm and would expect or envisage receiving such a call. This is one of three permitted scenarios. The others are: where the call relates to a generally marketable packaged product (not a higher-volatility fund), or where it relates to readily realisable investments (excluding warrants). Why others are wrong: (A) Cold calling is not entirely prohibited. (B) ECP status is not required for cold calling. (D) Deposits are within the permitted category but it is the existing relationship that is the relevant condition here.", "section": "S5: Financial Promotions"}, {"tag": "cisi", "topic": "Past Performance", "q": "Under COBS rules, what is the minimum period that past performance information must cover?", "opts": ["Three years of complete 12-month periods", "The immediately preceding five years or the whole period for which the investment has been offered, showing complete 12-month periods", "Ten years of annual returns", "One full calendar year of trading history"], "ans": 1, "exp": "Correct: B. Past performance information must cover at least the immediately preceding five years — or, if the investment, index or service has been offered for less than five years, the whole period for which it has been offered. In any event, complete 12-month periods must be shown. Why others are wrong: (A) Three years is insufficient. (C) Ten years is not required. (D) One year is insufficient.", "section": "S5: Financial Promotions"}, {"tag": "detail", "topic": "Social Media Promotions", "q": "The FCA's finalised guidance on financial promotions via social media establishes that influencers who promote financial products without approval from an FCA-authorised firm could be:", "opts": ["Subject to a civil fine only, not criminal liability", "Committing a criminal offence", "Required to register as appointed representatives", "Subject only to a reputational warning from the FCA"], "ans": 1, "exp": "Correct: B. The FCA's guidance makes clear that influencers who promote financial products without the promotion having been communicated or approved by an FCA-authorised firm with the right permission could be committing a criminal offence under FSMA. Why others are wrong: (A) It is a criminal, not merely civil, matter. (C) Influencers do not need to register as ARs — the issue is whether they have proper approval for the promotion. (D) A reputational warning alone does not reflect the criminal liability dimension.", "section": "S5: Financial Promotions"}, {"tag": "cisi", "topic": "Consumer Duty", "q": "Under the Consumer Duty, which Principle takes precedence over Principles 6 and 7 for firms dealing with retail consumers?", "opts": ["Principle 1 (Integrity)", "Principle 9 (Customers: relationships of trust)", "Principle 11 (Relations with regulators)", "Principle 12 (Consumer Duty)"], "ans": 3, "exp": "Correct: D. For firms subject to the Consumer Duty, Principle 12 takes precedence over (and effectively supersedes) Principles 6 and 7 for retail consumer business. Principle 6 requires firms to pay due regard to the interests of customers and treat them fairly; Principle 7 requires clear communication. Principle 12 sets a higher standard requiring firms to act to deliver good outcomes for retail customers. Why others are wrong: (A) Principle 1 relates to integrity generally. (B) Principle 9 is not an FCA principle. (C) Principle 11 relates to regulatory relationships.", "section": "S6-7: Consumer Duty"}, {"tag": "scenario", "topic": "Consumer Duty Outcomes", "q": "A firm's online investment platform charges fees that are significantly higher than comparable platforms without any demonstrable additional benefit to retail clients. Which Consumer Duty outcome is most likely breached?", "opts": ["Products and Services — the product is not designed for the target market", "Price and Value — the price is not reasonable relative to the benefit", "Consumer Understanding — information is not communicated clearly", "Consumer Support — the firm is not providing adequate post-sale support"], "ans": 1, "exp": "Correct: B. The Price and Value outcome requires that the price paid by retail consumers must represent fair value — i.e., there must be a reasonable relationship between the price and the benefits delivered. Charging significantly more than comparable firms without any demonstrable additional benefit is a clear Price and Value issue. Why others are wrong: (A) The product itself is not described as being mis-designed. (C) No communication failure is described. (D) No support-related failure is described.", "section": "S6-7: Consumer Duty"}, {"tag": "detail", "topic": "FTOC", "q": "For firms that are NOT subject to the Consumer Duty, what framework applies to ensure fair treatment of customers?", "opts": ["The MiFID II conduct framework only", "The FCA's Fair Treatment of Customers (FTOC) initiative", "The FOS complaints resolution framework", "The Treating Customers Fairly (TCF) framework from 2006"], "ans": 1, "exp": "Correct: B. Firms that fall outside the scope of the Consumer Duty (e.g., those that do not deal with retail consumers, or where an exemption applies) remain subject to the FCA's Fair Treatment of Customers (FTOC) initiative. FTOC ensures these firms still meet standards of fairness in customer dealings. Why others are wrong: (A) MiFID II applies on the basis of investment services, not as a replacement for consumer protection obligations. (C) FOS handles complaints after the fact but is not a conduct framework. (D) 'TCF from 2006' is not the current designated name — the current initiative is FTOC.", "section": "S6-7: Consumer Duty"}, {"tag": "cisi", "topic": "KIID Timing", "q": "At what point must a UCITS KIID be provided to a retail investor?", "opts": ["Within five business days of the transaction being completed", "At the same time as or after the transaction is executed", "In good time before the investor is bound by any agreement or offer", "Only if the investor specifically requests it in writing"], "ans": 2, "exp": "Correct: C. A KIID for a UCITS must be provided in good time before the investor is bound by any contract or offer. This ensures the investor can read it before committing to the investment. Why others are wrong: (A) Post-transaction provision is not acceptable. (B) Simultaneous or after-transaction provision does not allow the investor to use the information to make an informed decision. (D) The KIID must always be provided proactively — it is not optional.", "section": "S8: Product Disclosure"}, {"tag": "detail", "topic": "Product Disclosure — PRIIPs", "q": "Which of the following correctly describes a 'Packaged Retail and Insurance-based Investment Product' (PRIIP)?", "opts": ["Any product sold to a retail client, including bank accounts and ISAs", "A product where the amount repayable to the retail investor is subject to fluctuations due to exposure to reference values or underlying assets", "A product sold by an insurance company only, regardless of structure", "A product that is approved by the FCA under the product governance rules"], "ans": 1, "exp": "Correct: B. A PRIIP is defined as a product where the return or amount repayable is subject to fluctuation because of exposure to reference values or the performance of one or more underlying assets, which the retail investor does not directly hold. The category covers a wide range of investment products beyond traditional securities — including structured products, some insurance products and investment funds. Why others are wrong: (A) Straightforward bank accounts and cash ISAs are not PRIIPs. (C) PRIIPs are not limited to insurance company products. (D) FCA approval under product governance is not the definition.", "section": "S8: Product Disclosure"}, {"tag": "scenario", "topic": "KIID Exceptions", "q": "An investor purchases shares directly on a regulated stock exchange through a firm acting as an execution-only broker. Must the firm provide a KIID?", "opts": ["Yes, for all equity purchases regardless of how they are made", "Yes, but only if the investor is a first-time buyer of that share", "No, because execution-only transactions on a regulated market are exempt from the KIID requirement", "No, because equities never require a KIID under any circumstances"], "ans": 2, "exp": "Correct: C. Execution-only transactions in securities traded on a regulated market or equivalent third-country market are exempt from the KIID requirement. The KIID requirement is primarily designed for packaged investment products such as UCITS funds, where the product structure is complex and risk/reward information is not self-evident from the nature of the product. Why others are wrong: (A) Not all equity purchases require a KIID. (B) There is no 'first-time buyer' exception. (D) Equities can require a KIID if sold in a packaged fund form, but direct share purchases on a regulated market are exempt.", "section": "S8: Product Disclosure"}, {"tag": "cisi", "topic": "Chinese Walls", "q": "In the context of managing conflicts of interest, what is a 'Chinese Wall'?", "opts": ["A regulatory barrier preventing firms from operating in China", "An information barrier designed to prevent confidential information from passing between different parts of a firm", "A prohibition on firms acting for both buyer and seller in a transaction", "An FCA rule requiring firms to disclose all conflicts to clients"], "ans": 1, "exp": "Correct: B. A Chinese Wall (information barrier) is an internal control mechanism used by firms to prevent the flow of material non-public or confidential information between different departments or business areas. For example, preventing a corporate finance team from sharing inside information with a trading desk. Why others are wrong: (A) There is no geographic regulatory barrier to operating in China. (C) Acting for both parties is a conflict but a Chinese wall is specifically an information barrier, not a transaction prohibition. (D) The Chinese wall is a preventative measure, not a disclosure obligation.", "section": "S9: Conflicts"}, {"tag": "detail", "topic": "Conflicts — Register", "q": "Under FCA rules, what must a firm do in relation to its conflicts of interest?", "opts": ["Eliminate all conflicts of interest before commencing business", "Maintain a conflicts of interest register and take all steps to manage and disclose conflicts", "Notify the FCA each time a conflict of interest is identified", "Allow clients to resolve conflicts between themselves"], "ans": 1, "exp": "Correct: B. Firms are required to identify and manage conflicts of interest, maintain a written conflicts of interest policy, and keep a register of conflicts. Where conflicts cannot be avoided or adequately managed, they must be disclosed to clients. Elimination of all conflicts is not required or realistic. Why others are wrong: (A) Complete elimination is not the regulatory standard — management and disclosure are. (C) Individual conflicts are not reported to the FCA each time they arise. (D) Clients are not responsible for resolving firm conflicts.", "section": "S9: Conflicts"}, {"tag": "scenario", "topic": "Conflicts — Gifts", "q": "A sales representative receives a gift worth £180 from a product provider. The firm's policy only permits gifts up to £100. Which obligation is most directly engaged?", "opts": ["The client money rules, as gifts may affect segregated assets", "The inducements rules, as the gift exceeds the firm's permitted threshold", "The financial promotion rules, as the provider is influencing communication", "The suitability rules, as the adviser may recommend the provider's products"], "ans": 1, "exp": "Correct: B. The inducements rules (COBS 2.3 / SYSC 10) are most directly engaged. Gifts and hospitality from third parties to individuals at a firm are subject to inducement controls to prevent conflicts of interest. Exceeding the firm's own gift policy threshold signals that the benefit may impair the firm's duty to act in the client's best interest. Why others are wrong: (A) Client money rules are about segregation of funds, not gifts. (C) Financial promotion rules govern communications to clients, not gifts to staff. (D) Suitability rules could be indirectly relevant but the direct rule is the inducements framework.", "section": "S9: Conflicts"}, {"tag": "cisi", "topic": "Suitability Report", "q": "A firm provides a personal recommendation to a retail client to purchase a unit trust. What must the suitability report contain as a minimum?", "opts": ["A comparison of at least three alternative investment products", "The client's demands and needs, any disadvantages, and why the firm concluded the recommendation is suitable", "A full risk warning document signed by the client", "The firm's commission structure and profit margin from the transaction"], "ans": 1, "exp": "Correct: B. The suitability report must at a minimum: (1) specify the client's demands and needs; (2) explain any possible disadvantages of the transaction for the client; and (3) explain why the firm concluded the recommended transaction is suitable for the client, having regard to the information provided by the client. Why others are wrong: (A) No requirement to compare three products — the focus is on justifying the specific recommendation. (C) While risk warnings may be included in the broader communication, they are not a specified minimum component of the suitability report. (D) Commission and profit are not required contents of the suitability report.", "section": "S10-11: Suitability"}, {"tag": "detail", "topic": "Churning", "q": "Which of the following best describes 'churning' in the context of investment management?", "opts": ["Switching a client between two products of identical risk profile", "Over-trading in a client's portfolio in order to generate additional fees or commissions for the firm", "Selling a client's investments without their knowledge or consent", "Recommending an investment without having first assessed the client's suitability"], "ans": 1, "exp": "Correct: B. Churning refers to the practice of over-dealing or trading more frequently for a client than is justified by the client's investment strategy, with the aim of generating additional fees or commissions for the firm. The FCA's suitability guidance addresses churning in the context of discretionary portfolio management. Why others are wrong: (A) Switching between similar products is not churning per se — it depends on whether the frequency of dealing is justified. (C) Unauthorised trading is a separate violation. (D) Failing to assess suitability is a suitability breach, not churning.", "section": "S10-11: Suitability"}, {"tag": "cisi", "topic": "Appropriateness", "q": "For which type of service is the appropriateness assessment required?", "opts": ["Personal recommendations to retail clients", "Non-advised (execution-only) transactions in complex products for retail and professional clients", "All transactions regardless of complexity or client type", "Only transactions in derivatives and structured products for retail clients"], "ans": 1, "exp": "Correct: B. The appropriateness assessment applies to non-advised (execution-only) business involving complex financial instruments. It is required for both retail and professional clients when a firm receives an order (or intends to initiate a transaction) on a non-advised basis in complex instruments. Why others are wrong: (A) Personal recommendations trigger suitability, not appropriateness. (C) Not all transactions require appropriateness — it only applies to complex products. (D) Appropriateness is not limited to derivatives and structured products, nor only to retail clients.", "section": "S10-11: Suitability"}, {"tag": "scenario", "topic": "Appropriateness — Warning", "q": "A retail client insists on purchasing a complex structured product even after the firm has determined that the product is not appropriate for them. What must the firm do?", "opts": ["Refuse the transaction in all circumstances — it cannot proceed", "Execute the transaction without comment since the client has given consent", "Warn the client that the product has been assessed as not appropriate and, if the client still wishes to proceed, the firm may execute", "Cancel the client's existing portfolio and reassess all holdings"], "ans": 2, "exp": "Correct: C. Where a firm has assessed that a product is not appropriate for a client and the client still wishes to proceed, the firm must warn the client clearly of this finding. The client may then choose to proceed at their own risk, and the firm may execute the transaction — but the warning must be given. Why others are wrong: (A) The transaction is not automatically prohibited — the firm can execute after warning. (B) Proceeding without comment would breach the appropriateness rules. (D) Cancelling the portfolio is not required or appropriate.", "section": "S10-11: Suitability"}, {"tag": "detail", "topic": "Minor Non-Monetary Benefits", "q": "Under the MiFID inducements rules, which of the following is an example of a permissible 'minor non-monetary benefit'?", "opts": ["A trip abroad to attend a product provider's annual conference including all expenses", "A cash rebate of £500 paid to a firm for meeting quarterly sales targets", "Generic product training or information materials provided by a third party at reasonable cost", "Discretionary bonus payments from a product provider linked to volumes sold"], "ans": 2, "exp": "Correct: C. Generic product training and information materials are recognised as permissible minor non-monetary benefits under MiFID inducement rules, provided they are of a scale and nature that is unlikely to impair the firm's compliance with its duty to act in the client's best interests and are capable of enhancing the quality of service to the client. Why others are wrong: (A) An all-expenses foreign trip is not a 'minor' benefit and is unlikely to meet the quality-enhancement test. (B) Cash rebates linked to sales are prohibited inducements. (D) Volume-linked payments from product providers are prohibited under MiFID rules.", "section": "S10-11: Suitability"}, {"tag": "cisi", "topic": "Transaction Reporting", "q": "Under UK MiFIR, transaction reports must be submitted to the FCA by the close of business on which day?", "opts": ["The same day as the transaction is executed (T+0)", "The trading day following the date of the transaction (T+1)", "Within three business days of execution (T+3)", "Within five business days of settlement"], "ans": 1, "exp": "Correct: B. Transaction reports under UK MiFIR must be submitted by the close of the working day following the transaction (T+1). This tight deadline enables the FCA's Transaction Monitoring Unit (TMU) to use the data quickly for surveillance purposes. Why others are wrong: (A) Same-day reporting (T+0) is not the required deadline. (C) T+3 is not the MiFIR deadline. (D) Settlement-based timing is not used for transaction reporting — the trade execution date triggers the clock.", "section": "S12-13: Reporting"}, {"tag": "detail", "topic": "Transaction Reporting — Scope", "q": "Which of the following transactions is NOT a reportable transaction under UK MiFIR?", "opts": ["An OTC derivative in a reportable instrument traded between two investment firms", "A share transaction on a regulated market", "A transaction in a government bond by a retail client", "A spot foreign exchange transaction"], "ans": 3, "exp": "Correct: D. Spot foreign exchange transactions are excluded from transaction reporting under UK MiFIR because spot FX is not a financial instrument under MiFID/MiFIR — it is a foreign exchange contract rather than a financial instrument. Why others are wrong: (A) OTC derivatives in reportable instruments are reportable. (B) Exchange-traded share transactions are reportable. (C) Government bonds are financial instruments and are reportable.", "section": "S12-13: Reporting"}, {"tag": "cisi", "topic": "Trade Reporting", "q": "What is the primary regulatory purpose of trade reporting (as distinct from transaction reporting) under the UK MiFIR transparency regime?", "opts": ["To detect market manipulation and insider dealing", "To ensure pre- and post-trade price transparency in equity and non-equity markets", "To assess firms' compliance with best execution requirements", "To calculate the size of investor compensation scheme levies"], "ans": 1, "exp": "Correct: B. Trade reporting (the transparency regime) aims to ensure pre- and post-trade price transparency — publishing data on quotes and executed prices in equity and non-equity markets. Transaction reporting, by contrast, serves a surveillance function to detect market abuse. Why others are wrong: (A) Detecting market abuse is the primary purpose of transaction reporting (a separate regime). (C) Best execution is monitored using execution quality data and client reporting — not the trade reporting regime. (D) Compensation levies are calculated by the FSCS, not through MiFIR trade reporting.", "section": "S12-13: Reporting"}, {"tag": "scenario", "topic": "ARM Reporting", "q": "A firm uses an Approved Reporting Mechanism (ARM) to submit its transaction reports to the FCA. The ARM submits a report with an error. Who is responsible for the accuracy of the submitted report?", "opts": ["The ARM, as the entity actually submitting to the FCA", "The FCA, as it accepted the report via the ARM", "The investment firm that is the originator of the reportable transaction", "The client on whose behalf the transaction was carried out"], "ans": 2, "exp": "Correct: C. The regulatory responsibility for the accuracy and completeness of transaction reports remains with the investment firm (the reporting firm) regardless of whether it uses an ARM to submit the data. Using an ARM does not transfer the firm's reporting obligations. Why others are wrong: (A) ARMs are technical service providers — they do not bear the regulatory obligation. (B) The FCA receiving a report does not transfer liability to it. (D) Clients have no role in transaction reporting obligations.", "section": "S12-13: Reporting"}];
const SK='cisi_ch2_master_v1';
const N=15;

let APP={round:[],answers:{},opts:{},seen:[],roundNum:0,activeSecs:['ALL'],sessStats:{}};

function save(){try{localStorage.setItem(SK,JSON.stringify(APP));}catch(e){}}
function load(){try{const d=localStorage.getItem(SK);if(d)APP=JSON.parse(d);}catch(e){}}

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

function getFilteredIndices(){
  if(APP.activeSecs.includes('ALL')) return BANK.map((_,i)=>i);
  return BANK.map((q,i)=>APP.activeSecs.includes(q.section)?i:-1).filter(i=>i>=0);
}

function buildRound(){
  const pool = getFilteredIndices();
  if(pool.length===0){alert('No questions match the selected sections.');return;}

  // Wrong answers from previous round (priority re-inclusion)
  const lw = Object.entries(APP.answers)
    .filter(([,v])=>v&&v.v===0)
    .map(([k])=>APP.round[parseInt(k)])
    .filter(x=>x!==undefined && pool.includes(x));

  const unseen = pool.filter(i=>!APP.seen.includes(i));

  // Proportional selection by section
  const secMap={};
  pool.forEach(i=>{
    const s=BANK[i].section;
    if(!secMap[s])secMap[s]=[];
    secMap[s].push(i);
  });
  const secs=Object.keys(secMap);
  const perSec=Math.max(1,Math.floor(N/secs.length));

  let candidates=[];
  // 1) Priority: wrong answers
  candidates.push(...shuffle(lw).slice(0,3));

  // 2) Proportional unseen
  const unseenBySec={};
  unseen.filter(i=>!candidates.includes(i)).forEach(i=>{
    const s=BANK[i].section;
    if(!unseenBySec[s])unseenBySec[s]=[];
    unseenBySec[s].push(i);
  });
  secs.forEach(s=>{
    if(unseenBySec[s]){
      candidates.push(...shuffle(unseenBySec[s]).slice(0,perSec));
    }
  });

  // 3) Fill up to N from pool
  const used=new Set(candidates);
  const remaining=shuffle(pool.filter(i=>!used.has(i)));
  while(candidates.length<N&&remaining.length>0) candidates.push(remaining.shift());

  // Final shuffle and slice
  const r=shuffle(candidates).slice(0,N);
  r.forEach(i=>{if(!APP.seen.includes(i))APP.seen.push(i);});
  APP.round=r;
  APP.answers={};
  APP.opts={};
  APP.roundNum=(APP.roundNum||0)+1;
}

function toggleSec(sec){
  if(sec==='ALL'){
    APP.activeSecs=['ALL'];
  } else {
    APP.activeSecs=APP.activeSecs.filter(s=>s!=='ALL');
    if(APP.activeSecs.includes(sec)){
      APP.activeSecs=APP.activeSecs.filter(s=>s!==sec);
      if(APP.activeSecs.length===0)APP.activeSecs=['ALL'];
    } else {
      APP.activeSecs.push(sec);
    }
  }
  updateFilterUI();
  buildRound();
  save();
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}

function updateFilterUI(){
  document.querySelectorAll('.sec-btn').forEach(btn=>{
    const s=btn.getAttribute('data-sec');
    btn.classList.toggle('sel',
      APP.activeSecs.includes('ALL') ? s==='ALL' : APP.activeSecs.includes(s)
    );
  });
}

function doReset(){buildRound();save();render();window.scrollTo({top:0,behavior:'smooth'});}

function pick(p,oi){
  if(APP.answers[p])return;
  const q=BANK[APP.round[p]];
  APP.answers[p]={opt:q.opts[oi],v:oi===q.ans?1:0};

  // Track section stats
  const sec=q.section;
  if(!APP.sessStats[sec])APP.sessStats[sec]={ok:0,tot:0};
  APP.sessStats[sec].tot++;
  if(oi===q.ans)APP.sessStats[sec].ok++;

  save();render();
  setTimeout(()=>{
    const d=Object.keys(APP.answers).length;
    if(d<N){
      const cards=document.querySelectorAll('#q-area .q-card');
      const nx=[...Array(N).keys()].find(j=>j>p&&!APP.answers[j]);
      if(nx!==undefined)cards[nx]?.scrollIntoView({behavior:'smooth',block:'center'});
    } else {
      document.querySelector('#q-area .result-card')?.scrollIntoView({behavior:'smooth',block:'start'});
    }
  },350);
}

function render(){
  const d=Object.keys(APP.answers).length;
  const ok=Object.values(APP.answers).filter(v=>v&&v.v===1).length;
  const bad=d-ok;
  const pct=d?Math.round(ok/d*100):null;
  const pool=getFilteredIndices();

  document.getElementById('round-label').textContent=
    `Round ${APP.roundNum} \u00b7 ${N} Qs \u00b7 Bank: ${pool.length} \u00b7 Seen: ${APP.seen.filter(i=>pool.includes(i)).length}/${pool.length}`;
  document.getElementById('s-num').textContent=`${d}/${N}`;
  document.getElementById('s-ok').textContent=ok;
  document.getElementById('s-bad').textContent=bad;
  document.getElementById('s-pct').textContent=pct===null?'\u2014':pct+'%';
  document.getElementById('s-seen').textContent=`${APP.seen.length}/480`;

  const tr=document.getElementById('tracker');
  tr.innerHTML='';
  for(let i=0;i<N;i++){
    const dot=document.createElement('div');
    dot.className='tracker-dot'+(APP.answers[i]?APP.answers[i].v===1?' t-ok':' t-bad':i===d?' t-cur':'');
    tr.appendChild(dot);
  }

  const area=document.getElementById('q-area');
  area.innerHTML='';
  const L=['A','B','C','D'];
  const tm={cisi:'CISI exam style',concept:'Concept check',scenario:'Scenario',detail:'Detail'};
  const tc={cisi:'tag-cisi',concept:'tag-concept',scenario:'tag-scenario',detail:'tag-detail'};

  APP.round.forEach((qi,pos)=>{
    const q=BANK[qi];
    const ans=!!APP.answers[pos];
    const ch=APP.answers[pos]?.opt;
    if(!APP.opts[pos])APP.opts[pos]=shuffle(q.opts.map((_,i)=>i));
    const oo=APP.opts[pos];

    let oh=oo.map((oi,li)=>{
      let cl='opt';
      if(ans)cl+=' dis';
      if(ans&&oi===q.ans)cl+=' ok';
      else if(ans&&q.opts[oi]===ch&&oi!==q.ans)cl+=' bad';
      return`<div class="${cl}" onclick="pick(${pos},${oi})"><span class="opt-l">${L[li]}</span><span>${q.opts[oi]}</span></div>`;
    }).join('');

    let eh=ans?`<div class="exp-box show ${APP.answers[pos].v===1?'exp-ok':'exp-bad'}"><strong>${APP.answers[pos].v===1?'\u2713 Correct!':'\u2717 Incorrect.'}</strong> ${q.exp}</div>`:'';

    const card=document.createElement('div');
    card.className='q-card';
    card.innerHTML=`
      <div class="q-meta">
        <span class="q-num">Q${pos+1}</span>
        <span class="q-tag ${tc[q.tag]||'tag-detail'}">${tm[q.tag]||q.tag}</span>
        <span class="q-section">${q.section||''}</span>
        <span class="q-topic">${q.topic}</span>
      </div>
      <div class="q-text">${q.q}</div>
      <div class="opts">${oh}</div>
      ${eh}`;
    area.appendChild(card);
  });

  if(d===N){
    const pF=Math.round(ok/N*100);
    let lb,co,gr;
    if(pF>=80){lb='Pass standard met!';co='var(--teal-m)';gr='Pass \u2713';}
    else if(pF>=70){lb='Close \u2014 review weaker areas.';co='var(--amber)';gr='Near Pass';}
    else if(pF>=60){lb='Borderline.';co='var(--coral-m)';gr='Borderline';}
    else{lb='Below pass \u2014 keep studying.';co='#A32D2D';gr='Needs Work';}

    // Section breakdown
    const ts={};
    APP.round.forEach((qi,pos)=>{
      const t=BANK[qi].section;
      if(!ts[t])ts[t]={ok:0,tot:0};
      ts[t].tot++;
      if(APP.answers[pos]?.v===1)ts[t].ok++;
    });

    // Cumulative session stats
    let cumulHtml='';
    if(Object.keys(APP.sessStats).length>0){
      const cItems=Object.entries(APP.sessStats).sort((a,b)=>a[0].localeCompare(b[0])).map(([s,d])=>{
        const tp=Math.round(d.ok/d.tot*100);
        const cl=tp>=80?'var(--teal-m)':tp>=60?'var(--amber)':'var(--coral-m)';
        return`<div class="op-item"><div class="op-name">${s}</div><div style="font-size:.68rem;color:var(--text3)">${d.ok}/${d.tot} (${tp}%)</div><div class="op-bar-wrap"><div class="op-bar-fill" style="width:${tp}%;background:${cl}"></div></div></div>`;
      }).join('');
      cumulHtml=`<div class="overall-progress" style="margin-top:.8rem;text-align:left"><div class="op-title">Cumulative Session Performance by Section</div><div class="op-grid">${cItems}</div></div>`;
    }

    let th=Object.entries(ts).map(([t,s])=>{
      const tp=Math.round(s.ok/s.tot*100);
      const cl=tp>=80?'var(--teal-m)':tp>=60?'var(--amber)':'var(--coral-m)';
      return`<div class="topic-row"><div class="topic-name">${t}</div><div style="font-size:.72rem;color:var(--text3);margin-bottom:.25rem">${s.ok}/${s.tot}</div><div class="topic-bar-wrap"><div class="topic-bar-fill" style="width:${tp}%;background:${cl}"></div></div></div>`;
    }).join('');

    let rh=APP.round.map((qi,pos)=>{
      const q=BANK[qi];
      const v=APP.answers[pos]?.v===1;
      return`<div class="q-review-item ${v?'r-ok':'r-bad'}"><span class="r-icon">${v?'\u2713':'\u2717'}</span><div><strong>Q${pos+1} \u00b7 ${q.section} \u00b7 ${q.topic}.</strong> ${q.q}<br><span style="font-size:.78rem;opacity:.85">Answer: ${q.opts[q.ans]}</span></div></div>`;
    }).join('');

    const rc=document.createElement('div');
    rc.className='result-card';
    rc.style.marginTop='1rem';
    rc.innerHTML=`
      <div style="font-size:.85rem;color:var(--text2);margin-bottom:.3rem">Round ${APP.roundNum} complete</div>
      <div class="result-big" style="color:${co}">${ok}/${N}</div>
      <div class="result-grade" style="background:${co}22;color:${co}">${gr}</div>
      <div class="result-bar-wrap"><div class="result-bar-fill" style="width:${pF}%;background:${co}"></div></div>
      <div style="font-size:.82rem;color:var(--text2);margin:.3rem 0 .2rem">${pF}% &nbsp;&middot;&nbsp; ${lb}</div>
      <div class="result-breakdown">
        <span class="rp" style="background:var(--green-l);color:var(--green)">\u2713 ${ok} correct</span>
        <span class="rp" style="background:var(--coral-l);color:var(--coral)">\u2717 ${N-ok} wrong</span>
        <span class="rp" style="background:var(--navy-l);color:var(--navy-d)">Seen: ${APP.seen.length}/480</span>
      </div>
      <div style="font-size:.8rem;font-weight:600;color:var(--text2);margin-bottom:.55rem;text-align:left">This round by section:</div>
      <div class="topic-grid">${th}</div>
      ${cumulHtml}
      <div class="btn-row" style="margin:1.2rem 0">
        <button class="btn btn-p" onclick="doReset()">\u21ba New round</button>
        <button class="btn" style="background:var(--navy);color:#fff" onclick="clearStats()">&#128465; Reset session stats</button>
      </div>
      <div style="font-size:.8rem;font-weight:600;color:var(--text2);margin-bottom:.5rem;text-align:left">Round review:</div>
      <div class="q-review-list">${rh}</div>`;
    area.appendChild(rc);
  }
}

function clearStats(){
  if(confirm('Reset all session cumulative stats?')){
    APP.sessStats={};
    APP.seen=[];
    save();
    doReset();
  }
}

load();
updateFilterUI();
if(!APP.round||APP.round.length===0)buildRound();
render();
</script>
</body>
</html>
