<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CISI UK Financial Regulation — Chapter 2 Master Exam Test</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#1E2761;--navy-l:#CADCFC;--navy-d:#12195F;
  --teal:#028090;--teal-l:#D6F0F3;--teal-d:#015E6A;--teal-m:#1D9E75;
  --amber:#B07D12;--amber-l:#FEF3C7;--amber-d:#7C5A0A;
  --coral:#993C1D;--coral-l:#FAECE7;--coral-m:#D85A30;
  --purple:#534AB7;--purple-l:#EEEDFE;--purple-d:#3C3489;
  --green-l:#E1F5EE;--green:#085041;
  --gray:#64748B;--gray-l:#F1F5F9;--gray-m:#CBD5E1;--gray-d:#334155;
  --bg:#F0F4F8;--card:#fff;--text:#1e293b;--text2:#475569;--text3:#94a3b8;
  --radius:12px;--shadow:0 2px 10px rgba(0,0,0,.09)
}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* HEADER */
.app-header{background:linear-gradient(135deg,var(--navy),var(--teal));padding:1.2rem 1.5rem .85rem;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.2)}
.header-top{display:flex;align-items:flex-start;justify-content:space-between;gap:.75rem}
.app-title{color:#fff;font-size:1.08rem;font-weight:700;line-height:1.3}
.app-sub{color:var(--navy-l);font-size:.72rem;margin-top:.18rem}
.header-btns{display:flex;gap:.45rem;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end}
.reset-btn{background:rgba(255,255,255,.16);border:1.5px solid rgba(255,255,255,.38);color:#fff;border-radius:7px;padding:.36rem .95rem;font-size:.76rem;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap}
.reset-btn:hover{background:rgba(255,255,255,.3)}
.filter-btn{background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.25);color:rgba(255,255,255,.85);border-radius:7px;padding:.36rem .75rem;font-size:.72rem;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap}
.filter-btn.active{background:rgba(255,255,255,.28);border-color:rgba(255,255,255,.6);color:#fff}
.filter-btn:hover{background:rgba(255,255,255,.22)}

/* SCREEN */
.screen{padding:1.4rem;max-width:820px;margin:0 auto}

/* ROUND PILL */
.round-pill{display:inline-flex;align-items:center;gap:.4rem;background:var(--navy);color:var(--navy-l);border-radius:7px;padding:.3rem .85rem;font-size:.73rem;font-weight:600;margin-bottom:1rem}

/* SECTION FILTER BAR */
.section-bar{display:flex;flex-wrap:wrap;gap:.35rem;margin-bottom:1rem;padding:.7rem .85rem;background:var(--card);border-radius:10px;border:1px solid var(--gray-m);box-shadow:var(--shadow)}
.section-bar-title{font-size:.68rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;width:100%;margin-bottom:.3rem}
.sec-btn{padding:.25rem .65rem;border-radius:20px;font-size:.69rem;font-weight:700;cursor:pointer;border:1.5px solid transparent;transition:all .15s;background:var(--gray-l);color:var(--gray-d)}
.sec-btn.sel{background:var(--navy);color:#fff;border-color:var(--navy-d)}
.sec-btn:hover:not(.sel){background:var(--teal-l);color:var(--teal-d);border-color:var(--teal)}

/* TRACKER */
.tracker{display:flex;gap:3px;margin-bottom:1.05rem}
.tracker-dot{flex:1;height:10px;border-radius:5px;background:var(--gray-m);transition:background .3s}
.tracker-dot.t-ok{background:var(--teal-m)}
.tracker-dot.t-bad{background:var(--coral-m)}
.tracker-dot.t-cur{background:var(--navy-l)}

/* SCORE BAR */
.score-bar{display:flex;gap:.65rem;margin-bottom:1rem}
.sc{flex:1;background:var(--card);border-radius:10px;padding:.58rem .75rem;text-align:center;border:1px solid var(--gray-m);box-shadow:var(--shadow)}
.sc .n{font-size:1.38rem;font-weight:700;color:var(--teal);line-height:1}
.sc .n-ok{color:var(--teal-m)}
.sc .n-bad{color:var(--coral-m)}
.sc .l{font-size:.67rem;color:var(--text3);margin-top:.18rem}

/* QUESTION CARD */
.q-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:1.4rem 1.5rem;margin-bottom:1rem;border:1px solid rgba(0,0,0,.05)}
.q-meta{display:flex;align-items:center;gap:.5rem;margin-bottom:.65rem;flex-wrap:wrap}
.q-num{font-size:.68rem;font-weight:700;color:var(--teal);text-transform:uppercase;letter-spacing:.07em}
.q-tag{font-size:.64rem;font-weight:700;padding:.15rem .48rem;border-radius:20px}
.tag-cisi{background:#FEF3C7;color:#7C5A0A}
.tag-concept{background:var(--purple-l);color:var(--purple-d)}
.tag-scenario{background:var(--teal-l);color:var(--teal-d)}
.tag-detail{background:var(--gray-l);color:var(--gray-d)}
.q-section{font-size:.62rem;font-weight:700;padding:.12rem .42rem;border-radius:20px;background:#E0F2F1;color:#00695C}
.q-topic{font-size:.64rem;color:var(--text3);margin-left:auto}
.q-text{font-size:.93rem;font-weight:500;line-height:1.6;margin-bottom:.95rem;color:var(--text)}

/* OPTIONS */
.opts{display:flex;flex-direction:column;gap:.42rem}
.opt{display:flex;align-items:flex-start;gap:.65rem;padding:.68rem .95rem;border-radius:8px;border:1.5px solid var(--gray-m);cursor:pointer;font-size:.86rem;line-height:1.46;background:var(--card);transition:all .16s}
.opt:hover:not(.dis){border-color:var(--teal);background:var(--teal-l)}
.opt.ok{border-color:var(--teal-m);background:var(--green-l);color:var(--green)}
.opt.bad{border-color:var(--coral-m);background:var(--coral-l);color:var(--coral)}
.opt.dis{cursor:default}
.opt-l{width:21px;height:21px;min-width:21px;border-radius:50%;background:#e2e8f0;display:flex;align-items:center;justify-content:center;font-size:.69rem;font-weight:700;color:var(--gray);margin-top:1px;flex-shrink:0}
.opt.ok .opt-l{background:var(--teal-m);color:#fff}
.opt.bad .opt-l{background:var(--coral-m);color:#fff}

/* EXPLANATION */
.exp-box{margin-top:.8rem;padding:.7rem 1rem;border-radius:8px;font-size:.81rem;line-height:1.62;display:none}
.exp-box.show{display:block}
.exp-ok{background:var(--green-l);border-left:3px solid var(--teal-m);color:var(--green)}
.exp-bad{background:var(--coral-l);border-left:3px solid var(--coral-m);color:var(--coral)}

/* RESULT */
.result-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:2rem 1.5rem;text-align:center;margin-top:.5rem}
.result-big{font-size:3.2rem;font-weight:800;margin:.4rem 0}
.result-grade{display:inline-block;padding:.38rem 1.2rem;border-radius:20px;font-size:.92rem;font-weight:700;margin:.5rem 0 .8rem}
.result-bar-wrap{background:var(--gray-l);border-radius:20px;height:14px;overflow:hidden;margin:.75rem auto;max-width:320px}
.result-bar-fill{height:100%;border-radius:20px;transition:width .8s ease}
.result-breakdown{display:flex;gap:.6rem;justify-content:center;flex-wrap:wrap;margin:1rem 0 1.2rem}
.rp{padding:.3rem .9rem;border-radius:20px;font-size:.8rem;font-weight:600}
.topic-grid{display:grid;grid-template-columns:1fr 1fr;gap:.45rem;margin:.5rem 0 1.2rem;text-align:left}
.topic-row{background:var(--gray-l);border-radius:8px;padding:.5rem .75rem;font-size:.78rem}
.topic-name{color:var(--text2);font-weight:600;margin-bottom:.2rem}
.topic-bar-wrap{background:var(--gray-m);border-radius:10px;height:6px;overflow:hidden}
.topic-bar-fill{height:100%;border-radius:10px}
.q-review-list{text-align:left;margin-top:.5rem}
.q-review-item{padding:.65rem 1rem;border-radius:8px;margin-bottom:.45rem;font-size:.83rem;line-height:1.52;display:flex;gap:.65rem;align-items:flex-start}
.q-review-item.r-ok{background:var(--green-l);border-left:3px solid var(--teal-m);color:var(--green)}
.q-review-item.r-bad{background:var(--coral-l);border-left:3px solid var(--coral-m);color:var(--coral)}
.r-icon{font-size:.9rem;flex-shrink:0;margin-top:.08rem}

/* STATS BAR */
.stats-wrap{background:var(--card);border-radius:10px;padding:.65rem 1rem;margin-bottom:1rem;border:1px solid var(--gray-m);box-shadow:var(--shadow);font-size:.76rem;color:var(--text2)}
.stats-row{display:flex;gap:1rem;flex-wrap:wrap;align-items:center}
.stat-item{display:flex;align-items:center;gap:.3rem}
.stat-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

/* BUTTONS */
.btn{padding:.58rem 1.3rem;border:none;border-radius:8px;cursor:pointer;font-size:.86rem;font-weight:600;transition:all .2s}
.btn-p{background:var(--teal);color:#fff}
.btn-p:hover{background:var(--teal-d)}
.btn-row{display:flex;gap:.65rem;flex-wrap:wrap;justify-content:center}

/* PROGRESS OVERALL */
.overall-progress{background:var(--card);border-radius:10px;padding:.8rem 1rem;margin-bottom:1rem;border:1px solid var(--gray-m);box-shadow:var(--shadow)}
.op-title{font-size:.7rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:.45rem}
.op-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:.35rem}
.op-item{font-size:.72rem;color:var(--text2)}
.op-name{font-weight:600;margin-bottom:.18rem}
.op-bar-wrap{background:var(--gray-m);border-radius:8px;height:5px;overflow:hidden}
.op-bar-fill{height:100%;border-radius:8px}

@media(max-width:520px){
  .topic-grid{grid-template-columns:1fr}
  .score-bar{gap:.35rem}
  .sc .n{font-size:1.1rem}
  .op-grid{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>
<div class="app-header">
  <div class="header-top">
    <div>
      <div class="app-title">CISI UK Financial Regulation — Chapter 2 Master Exam Test</div>
      <div class="app-sub">All Sections &nbsp;|&nbsp; 480-question bank &nbsp;|&nbsp; 15 Qs per round &nbsp;|&nbsp; Proportional mix across all Ch.2 syllabus areas</div>
    </div>
    <div class="header-btns">
      <button class="reset-btn" onclick="doReset()">&#8634; New round</button>
    </div>
  </div>
</div>

<div class="screen">
  <div id="filter-area" class="section-bar">
    <div class="section-bar-title">Filter by section (all selected = full mixed exam)</div>
    <button class="sec-btn sel" data-sec="ALL" onclick="toggleSec('ALL')">&#9733; All Sections</button>
    <button class="sec-btn" data-sec="S1-2: COBS &amp; ARs" onclick="toggleSec('S1-2: COBS &amp; ARs')">S1-2: COBS &amp; ARs</button>
    <button class="sec-btn" data-sec="S3: Client Categories" onclick="toggleSec('S3: Client Categories')">S3: Categories</button>
    <button class="sec-btn" data-sec="S4: Agreements &amp; Info" onclick="toggleSec('S4: Agreements &amp; Info')">S4: Agreements</button>
    <button class="sec-btn" data-sec="S5: Financial Promotions" onclick="toggleSec('S5: Financial Promotions')">S5: Promotions</button>
    <button class="sec-btn" data-sec="S6-7: Consumer Duty" onclick="toggleSec('S6-7: Consumer Duty')">S6-7: Consumer Duty</button>
    <button class="sec-btn" data-sec="S8: Product Disclosure" onclick="toggleSec('S8: Product Disclosure')">S8: Disclosure</button>
    <button class="sec-btn" data-sec="S9: Conflicts" onclick="toggleSec('S9: Conflicts')">S9: Conflicts</button>
    <button class="sec-btn" data-sec="S10-11: Suitability" onclick="toggleSec('S10-11: Suitability')">S10-11: Suitability</button>
    <button class="sec-btn" data-sec="S12-13: Reporting" onclick="toggleSec('S12-13: Reporting')">S12-13: Reporting</button>
  </div>

  <div class="round-pill" id="round-label">Round 1</div>
  <div class="tracker" id="tracker"></div>
  <div class="score-bar">
    <div class="sc"><div class="n" id="s-num">0/15</div><div class="l">Progress</div></div>
    <div class="sc"><div class="n n-ok" id="s-ok">0</div><div class="l">Correct</div></div>
    <div class="sc"><div class="n n-bad" id="s-bad">0</div><div class="l">Wrong</div></div>
    <div class="sc"><div class="n" id="s-pct">&mdash;</div><div class="l">Score</div></div>
    <div class="sc"><div class="n" id="s-seen" style="font-size:1rem">0/480</div><div class="l">Seen</div></div>
  </div>
  <div id="q-area"></div>
</div>

<script>
const BANK=[{"tag": "cisi", "topic": "COBS Purpose", "q": "The Conduct of Business Sourcebook (COBS) is contained within which block of the FCA Handbook?", "opts": ["The High Level Standards block", "The Business Standards block", "The Regulatory Processes block", "The Specialist Sourcebooks block"], "ans": 1, "exp": "Correct: B. COBS is contained within the Business Standards block of the FCA Handbook. This block also includes other sourcebooks such as CASS (Client Assets), SYSC (Senior Management Arrangements), and others that set out how firms should conduct their business. Why others are wrong: (A) High Level Standards includes PRIN (Principles), SYSC, and FIT — not COBS. (C) Regulatory Processes covers SUP (Supervision) and AUTH (Authorisation). (D) Specialist Sourcebooks cover specific sectors. Key fact: COBS = Business Standards block of FCA Handbook.", "section": "S1-2: COBS & ARs"}, {"tag": "concept", "topic": "COBS Purpose", "q": "Which of the following best describes the regulatory approach that COBS was designed to implement?", "opts": ["A prescriptive rules-based approach specifying exactly how firms must operate", "An outcomes-based approach focusing on results rather than compliance with detailed prescriptive rules", "A self-regulatory approach where firms set their own conduct standards without FCA oversight", "A principles-only approach with no detailed rules or guidance"], "ans": 1, "exp": "Correct: B. The aim of COBS is to move the regulatory approach towards a better focus on outcomes rather than compliance with detailed and prescriptive rules. It implemented the provisions of MiFID which are high-level standards for business conduct, without specifically prescribing HOW firms should achieve those standards. Firms have flexibility in choosing their methods. Why others are wrong: (A) This is the opposite of what COBS aims to achieve — COBS moved AWAY from prescriptive rules. (C) COBS is not self-regulatory — the FCA still sets and enforces the standards. (D) COBS contains both principles AND detailed rules — it is not principles-only. Key fact: COBS = outcomes-based approach. MiFID provisions = high-level, non-prescriptive standards.", "section": "S1-2: COBS & ARs"}, {"tag": "cisi", "topic": "COBS Purpose", "q": "Which of the following is TRUE about the scope of COBS?", "opts": ["COBS only applies to firms conducting MiFID business", "COBS applies only to firms dealing with retail clients", "COBS contains provisions for both MiFID and non-MiFID investment firms", "COBS only applies to deposit-taking institutions"], "ans": 2, "exp": "Correct: C. COBS contains provisions for firms conducting MiFID business AND also contains provisions for investment firms that are NOT subject to MiFID. This is an important point — COBS is not exclusively a MiFID sourcebook. It covers a wide range of investment business. Why others are wrong: (A) COBS covers non-MiFID firms too. (B) COBS applies to all client categories (retail, professional, and to some extent ECPs). (D) Deposit-takers are only partially subject to COBS (financial promotions and product info rules). Key fact: COBS = MiFID + non-MiFID investment firms. Broader scope than just MiFID.", "section": "S1-2: COBS & ARs"}, {"tag": "cisi", "topic": "Location Rule", "q": "The general application rule for COBS is based on which principle?", "opts": ["The type of financial instrument being traded", "The geographical location of the firm's establishment", "The size and revenue of the firm", "The client category (retail, professional, or ECP)"], "ans": 1, "exp": "Correct: B. The general application rule is based on geographical location. Firms are subject to COBS if they carry out specified activities from an establishment maintained by them (or their appointed representative) in the UK. Why others are wrong: (A) The instrument type is relevant to which specific COBS rules apply, but the general application rule is geographical. (C) Firm size does not determine COBS application. (D) Client category affects which specific rules apply, but the general rule is location-based. Key fact: COBS application = geographical location = where the firm has an establishment. This was tested as Q33 in the downloaded exam paper.", "section": "S1-2: COBS & ARs"}, {"tag": "scenario", "topic": "Location Rule", "q": "A bank based in Germany carries out a regulated activity with a client in the UK. Will COBS rules apply?", "opts": ["Only if the client holds UK nationality", "Only if the client is domiciled in the UK", "Yes — regardless of domicile or nationality, because the client is in the UK", "Only if the bank has a physical branch in the UK"], "ans": 2, "exp": "Correct: C. COBS generally applies to a firm which carries on business with a client IN THE UK from an establishment overseas (unless the overseas person meets certain exclusion criteria). It does not matter whether the client is a UK national or domiciled in the UK — what matters is that the client is in the UK. This was tested as Q33 in the downloaded exam paper (answer: B = regardless of domicile or nationality). Why others are wrong: (A) and (B) Nationality and domicile are not the determining factors — it is the client's location in the UK. (D) A firm does not need a UK branch for COBS to apply — serving a UK-based client from overseas is sufficient. Key fact: COBS applies to firms serving clients IN the UK, even from overseas.", "section": "S1-2: COBS & ARs"}, {"tag": "cisi", "topic": "Location Rule", "q": "Following Brexit, how are EEA firms operating a branch in the UK classified under COBS?", "opts": ["They retain their EEA passporting status and are exempt from COBS", "They are classified as 'third-country firms' when carrying on MiFID business within the UK", "They are automatically authorised as UK firms", "They must cease all operations in the UK"], "ans": 1, "exp": "Correct: B. Post-Brexit, EEA firms operating from a branch in the UK are classified as 'third-country firms' when carrying on MiFID business within the UK. The rules in COBS that are derived from MiFID apply to them in the same way as any other non-UK MiFID investment firm. They lost their passporting rights when the UK left the EU. Why others are wrong: (A) Passporting ended with Brexit — EEA firms lost this status. (C) They are not automatically UK firms — they need local authorisation. (D) They do not have to cease operations, but need appropriate authorisation. Key fact: Post-Brexit: EEA firms with UK branches = 'third-country firm' = COBS MiFID rules apply.", "section": "S1-2: COBS & ARs"}, {"tag": "detail", "topic": "Location Rule", "q": "Investment research and personal account dealing rules under COBS apply on which basis?", "opts": ["A host state basis — applying the rules of the country where the client is located", "A home state basis only — applying to UK firms regardless of where they conduct business", "An ECP basis — applying only when dealing with eligible counterparties", "A proportionality basis — larger firms face stricter requirements"], "ans": 1, "exp": "Correct: B. There is an exception to the geographical location rule for investment research and personal account dealing, where the COBS rules apply on a home state basis only. This means these rules apply to UK firms regardless of where they are conducting business — even from overseas offices. Why others are wrong: (A) Home state, not host state, is the basis. (C) This exception is not related to ECP status. (D) Proportionality is a general principle but not the basis for this specific exception. Key fact: Investment research + personal account dealing = HOME state basis = UK firms, wherever conducting business.", "section": "S1-2: COBS & ARs"}, {"tag": "cisi", "topic": "Location Rule", "q": "Which of the following is TRUE about the application of COBS after Brexit?", "opts": ["COBS still applies to MiFID business of a UK firm carried on from an EEA establishment", "COBS no longer applies to MiFID business of a UK MiFID firm carried on from an establishment in an EEA member state", "COBS was fully repealed after Brexit", "COBS now only applies to firms with exclusively UK-based clients"], "ans": 1, "exp": "Correct: B. Following Brexit, the COBS Handbook no longer applies to MiFID business of a UK MiFID firm carried on from an establishment in an EEA member state. Before Brexit, a UK firm's EEA branch would follow UK COBS rules; now that branch follows the local EEA country's rules instead. Why others are wrong: (A) This is explicitly no longer the case post-Brexit. (C) COBS was not repealed — it still applies within the UK. (D) COBS applies based on location, not exclusively to UK clients. Key fact: Post-Brexit: UK firm's EEA branch = no longer subject to UK COBS for MiFID business.", "section": "S1-2: COBS & ARs"}, {"tag": "cisi", "topic": "Activities", "q": "Which of the following activities are subject to COBS?", "opts": ["Only designated investment business", "Designated investment business, long-term insurance business (life policies), and accepting deposits (partially)", "All activities carried on by any FCA-authorised firm", "Only activities involving retail clients"], "ans": 1, "exp": "Correct: B. Three categories of activity are subject to COBS: (1) Designated investment business — the core scope. (2) Long-term insurance business in relation to life policies. (3) Accepting deposits — but only partially (e.g., financial promotion rules and product information rules). Why others are wrong: (A) COBS covers more than just designated investment business. (C) Not ALL activities of ALL authorised firms — specific activities are in scope. (D) COBS applies regardless of client category. Key fact: COBS = designated investment business + long-term insurance (life) + deposits (partial).", "section": "S1-2: COBS & ARs"}, {"tag": "concept", "topic": "Activities", "q": "Why are deposit-taking institutions only PARTIALLY subject to COBS?", "opts": ["Because deposits are not considered financial products", "Because deposit-takers are exempt from all FCA regulation", "Because only specific COBS rules apply to deposits, such as financial promotion rules and product information requirements", "Because deposit-takers are regulated exclusively by the PRA"], "ans": 2, "exp": "Correct: C. Deposit-taking (banks, building societies) is subject to COBS but only partially. The COBS rules that apply to deposits include financial promotion rules (how deposit products are marketed and promoted) and rules on preparing and providing product information. The full COBS conduct regime does not apply to simple deposit-taking. Why others are wrong: (A) Deposits ARE specified investments under the Regulated Activities Order. (B) Deposit-takers are NOT exempt from FCA regulation — they are dual-regulated. (D) Deposit-takers are dual-regulated (PRA for prudential, FCA for conduct). Key fact: Deposits = partially subject to COBS = financial promotions + product information rules.", "section": "S1-2: COBS & ARs"}, {"tag": "cisi", "topic": "ECP Disapplications", "q": "Which of the following COBS rules is disapplied for firms carrying on eligible counterparty (ECP) business?", "opts": ["Conflicts of interest (SYSC 10)", "Best execution (parts of COBS 11)", "The requirement to be authorised under FSMA", "The requirement to appoint a compliance officer"], "ans": 1, "exp": "Correct: B. Parts of COBS 11 (best execution and client order handling) are disapplied for ECP business. ECPs are sophisticated market participants who do not need the same protections as retail or professional clients. Why others are wrong: (A) Conflicts of interest rules (SYSC 10) STILL apply to ECP business — this is a key exam trap. This was tested as Q25 in the downloaded exam paper. (C) The requirement to be authorised applies regardless of client category. (D) Compliance officer requirements are separate from COBS disapplications. Key fact: ECP disapplications include COBS 11 (best execution) but NOT SYSC 10 (conflicts of interest). Conflicts ALWAYS apply.", "section": "S1-2: COBS & ARs"}, {"tag": "cisi", "topic": "ECP Disapplications", "q": "If a firm is carrying on activity on an eligible counterparty basis, which of the following rules STILL applies to them?", "opts": ["Best execution", "Client agreements", "Conflicts of interest", "Appropriateness assessment"], "ans": 2, "exp": "Correct: C. The conflicts of interest rules (SYSC 10) are applicable to ALL authorised/regulated firms, including those undertaking ECP business. This was specifically tested as Q25 in the downloaded exam paper (answer: C = conflicts of interest). Why others are wrong: (A) Best execution (parts of COBS 11) is disapplied for ECPs. (B) Client agreements (COBS 8A) are disapplied for ECPs. (D) Appropriateness (COBS 10) is disapplied for ECPs. Key fact: Conflicts of interest (SYSC 10) = ALWAYS applies, even for ECP business. Best execution, client agreements, appropriateness = disapplied for ECPs.", "section": "S1-2: COBS & ARs"}, {"tag": "detail", "topic": "ECP Disapplications", "q": "Which of the following COBS chapters is disapplied for eligible counterparty business?", "opts": ["COBS 2 (conduct obligations) — entirely", "COBS 10 (appropriateness requirements)", "COBS 9 (suitability requirements)", "COBS 3 (client categorisation rules)"], "ans": 1, "exp": "Correct: B. COBS 10 (appropriateness requirements for non-advised services) is fully disapplied for ECP business. ECPs do not need an appropriateness assessment because they are deemed sufficiently sophisticated. Why others are wrong: (A) Only PARTS of COBS 2 are disapplied — not the entire chapter. Specifically: inducements, agent as client, reliance on others. (C) COBS 9 (suitability) is not listed as a specific ECP disapplication — suitability applies when personal recommendations are made. (D) COBS 3 (client categorisation) is not disapplied — firms still need to categorise clients. Key fact: COBS 10 (appropriateness) = fully disapplied for ECPs. Parts of COBS 2, 4, 11, 12, 16 = also disapplied.", "section": "S1-2: COBS & ARs"}, {"tag": "scenario", "topic": "ECP Disapplications", "q": "An investment bank executes trades for LargeFund plc, classified as an eligible counterparty. The bank's compliance team asks which COBS rules they must still comply with. Which of the following is TRUE?", "opts": ["The bank does not need to comply with any COBS rules when dealing with an ECP", "The bank must comply with the conflicts of interest rules but not best execution or client order handling", "The bank must comply with best execution but not client agreements", "The bank must provide full suitability reports for every transaction"], "ans": 1, "exp": "Correct: B. When dealing with ECPs, the bank must still comply with conflicts of interest rules (SYSC 10), but many other COBS rules are disapplied — including best execution (parts of COBS 11), client order handling, client agreements (COBS 8A), and appropriateness (COBS 10). Why others are wrong: (A) Some rules DO still apply to ECP business, particularly conflicts of interest. (C) Best execution is disapplied, not client agreements — though actually BOTH are disapplied. (D) Suitability reports are required for personal recommendations to retail clients, not routine ECP transactions. Key fact: ECP = conflicts of interest STILL applies. Best execution, client agreements, appropriateness, client order handling = disapplied.", "section": "S1-2: COBS & ARs"}, {"tag": "cisi", "topic": "ECP Disapplications", "q": "Regulated market members do not need to comply with COBS 11.4 (client limit orders) in respect of:", "opts": ["All clients, regardless of their classification", "Each other, when dealing between themselves as market members", "Retail clients only, because retail protections apply separately", "Professional clients, because professional clients can waive this right"], "ans": 1, "exp": "Correct: B. Members and participants in a regulated market do not have to comply with COBS 11.4 (client limit orders) in respect of each other. However, they MUST comply when they are executing orders on a CLIENT'S behalf. This is a specific exemption for inter-member dealing on regulated markets. Why others are wrong: (A) The exemption only applies between market members, not for all clients. (C) It is not limited to retail clients. (D) Professional clients cannot simply waive COBS 11.4. Key fact: COBS 11.4 (client limit orders) = disapplied between regulated market members. Still applies when executing CLIENT orders.", "section": "S1-2: COBS & ARs"}, {"tag": "cisi", "topic": "ECP Disapplications", "q": "Much of COBS 4 is disapplied for ECP business. COBS 4 primarily deals with:", "opts": ["Prudential capital requirements for investment firms", "Communicating with clients, including the requirement for communications to be fair, clear and not misleading", "The segregation and protection of client money and assets", "The authorisation process for new firms applying for Part 4A permission"], "ans": 1, "exp": "Correct: B. COBS 4 deals with communicating with clients, including the overarching requirement that communications and financial promotions must be fair, clear and not misleading. Much of COBS 4 is disapplied for ECP business because ECPs are sophisticated market participants who do not need the same level of communication protection. Why others are wrong: (A) Prudential capital = GENPRU/MIFIDPRU/IPRU-INV, not COBS 4. (C) Client money/assets = CASS, not COBS 4. (D) Authorisation = Part 4A FSMA / SUP, not COBS 4. Key fact: COBS 4 = communications with clients + financial promotions + info disclosure. Disapplied for ECPs.", "section": "S1-2: COBS & ARs"}, {"tag": "cisi", "topic": "ECP Disapplications", "q": "COBS 16, which deals with reporting information to clients, is disapplied for ECP business. This means that:", "opts": ["Firms do not need to provide any information to ECPs at any time", "Firms are not required to send periodic statements or dealing confirmations to ECPs under the COBS regime", "ECPs cannot request any information about their transactions", "The FCA does not require any reporting for ECP transactions"], "ans": 1, "exp": "Correct: B. COBS 16 disapplication means firms are not required to send periodic statements or dealing confirmations to ECPs under the COBS regime. However, ECPs may still request information commercially, and other reporting obligations (e.g., transaction reporting under UK MiFIR) still apply. Why others are wrong: (A) Firms may still provide information commercially or under other obligations. (C) ECPs can contractually agree to receive information. (D) Transaction reporting to the FCA (UK MiFIR) is separate from COBS 16. Key fact: COBS 16 (reporting to clients) = disapplied for ECPs. But UK MiFIR transaction reporting to FCA = separate obligation, still applies.", "section": "S1-2: COBS & ARs"}, {"tag": "scenario", "topic": "COBS Application", "q": "GlobalInvest Ltd is a UK-authorised firm that carries on designated investment business from its London office for UK clients, and also has a branch in Paris serving French clients. Which of the following is TRUE about the application of COBS?", "opts": ["COBS applies to both the London and Paris operations equally", "COBS applies to the London operations but no longer applies to the Paris branch for MiFID business following Brexit", "COBS does not apply to the London operations because GlobalInvest also has an overseas branch", "COBS only applies if GlobalInvest's UK clients are retail clients"], "ans": 1, "exp": "Correct: B. COBS applies to GlobalInvest's London operations (UK firm, UK establishment, UK clients). However, following Brexit, COBS no longer applies to the MiFID business of a UK MiFID firm carried on from an establishment in an EEA member state (France). The Paris branch would follow French/EU conduct rules instead. Why others are wrong: (A) Post-Brexit, COBS does not apply equally to the Paris branch. (C) Having an overseas branch does not affect COBS application to the UK operations. (D) COBS applies regardless of client category. Key fact: UK establishment = COBS applies. EEA branch of UK firm = COBS no longer applies post-Brexit.", "section": "S1-2: COBS & ARs"}, {"tag": "cisi", "topic": "COBS Application", "q": "Which of the following is TRUE about the relationship between COBS and MiFID?", "opts": ["COBS replaced MiFID entirely and MiFID no longer has any relevance in the UK", "COBS implemented MiFID's conduct of business provisions into the FCA Handbook", "COBS and MiFID are completely separate and unrelated regulatory frameworks", "MiFID only applies to non-UK firms, while COBS applies to UK firms"], "ans": 1, "exp": "Correct: B. COBS implemented the provisions of MiFID which relate to conduct of business into the FCA Handbook. MiFID's requirements were transposed into COBS rules. Post-Brexit, the UK retained these rules as 'UK MiFID' (assimilated law). COBS remains the primary place in the FCA Handbook where these conduct rules are found. Why others are wrong: (A) COBS did not replace MiFID — it implemented MiFID's conduct provisions. MiFID still has relevance as 'UK MiFID'. (C) They are directly related — COBS implements MiFID provisions. (D) Both UK and non-UK firms can be subject to COBS. Key fact: COBS = implementation of MiFID conduct provisions into FCA Handbook. Also covers non-MiFID business.", "section": "S1-2: COBS & ARs"}, {"tag": "scenario", "topic": "ECP Disapplications", "q": "A firm classified a client as an eligible counterparty for the service of executing orders. The client now wants to receive investment advice from the same firm. Which of the following is TRUE?", "opts": ["The client remains an ECP for the investment advice service", "The client must be classified as a per se professional client for the investment advice service because investment advice is not ECP business", "The client must be reclassified as a retail client before receiving investment advice", "The firm cannot provide investment advice to a client who is also classified as an ECP"], "ans": 1, "exp": "Correct: B. ECP classification only applies to certain services: dealing on own account, execution of orders on behalf of clients, reception and transmission of orders, and directly related ancillary services. If the client wants investment advice (which is NOT an ECP-eligible service), they must be classified as a professional client for that service. This was tested as Q30 in the downloaded exam paper. Why others are wrong: (A) ECP status does not extend to investment advice — it is limited to specific services. (C) They do not need to become retail — they move to professional client. (D) The firm CAN provide advice, but under professional client rules. Key fact: ECP = only for dealing/execution/transmission. Investment advice = professional client classification required.", "section": "S1-2: COBS & ARs"}, {"tag": "cisi", "topic": "COBS Application", "q": "COBS 6, which deals with information on costs and charges and compensation information, is disapplied for ECP business. This means:", "opts": ["ECPs can never receive any cost information from firms", "ECPs must pay a premium to receive cost information", "Firms are not required under COBS to provide cost and charges disclosure or compensation scheme information to ECPs", "The FCA prohibits firms from disclosing costs to ECPs"], "ans": 2, "exp": "Correct: C. COBS 6 disapplication means firms are not required under COBS to provide the standard cost and charges disclosure or compensation scheme information to ECPs. However, ECPs can still commercially request this information, and the firm can provide it voluntarily. Why others are wrong: (A) ECPs can still receive information — it is just not mandatory under COBS. (B) There is no premium — it simply is not a regulatory requirement. (D) The FCA does not prohibit disclosure — it just does not require it for ECPs. Key fact: COBS 6 (costs/charges + compensation info) = not required for ECPs. Professional clients can also now opt out since MiFID Quick Fix 2021.", "section": "S1-2: COBS & ARs"}, {"tag": "cisi", "topic": "COBS & ARs", "q": "How do the COBS rules apply to appointed representatives (ARs)?", "opts": ["COBS rules apply directly to ARs as if they were authorised firms", "COBS rules apply to firms in relation to the relevant activities carried out for them by their ARs", "COBS rules do not apply to ARs or their principals in any way", "COBS rules only apply to ARs when they deal with retail clients"], "ans": 1, "exp": "Correct: B. The COBS rules apply to the principal FIRM in relation to the relevant activities carried out for them by their appointed representatives. The AR itself is not directly subject to COBS — it is the principal's responsibility to ensure compliance. Any business conducted by the AR for which the principal has accepted responsibility is treated as having been conducted by the principal. Why others are wrong: (A) ARs are exempt persons, not authorised firms — COBS applies through the principal. (C) COBS definitely applies — through the principal firm. (D) It applies regardless of client category. Key fact: COBS applies to ARs THROUGH the principal. AR's business = treated as principal's business.", "section": "S1-2: COBS & ARs"}, {"tag": "cisi", "topic": "AR Status", "q": "Which of the following correctly describes the legal status of an appointed representative under FSMA?", "opts": ["An authorised person with full Part 4A permissions", "An exempt person under Section 39 of FSMA that can carry out certain regulated activities under the umbrella of a principal firm", "A person who is exempt from all financial services regulation", "A person who holds their own independent regulatory permission from the PRA"], "ans": 1, "exp": "Correct: B. An AR is an exempt person under Section 39 of FSMA. They have entered into a contract with an authorised person (the principal) allowing them to conduct certain regulated activities. The principal accepts legal responsibility for those activities. Why others are wrong: (A) ARs do NOT have Part 4A permissions — they are exempt, not authorised. (C) They are not exempt from ALL regulation — they operate under specific rules through the principal. (D) ARs do not hold independent PRA permission. Key fact: AR = exempt person (s.39 FSMA). Not authorised — operates under principal's umbrella.", "section": "S1-2: COBS & ARs"}, {"tag": "concept", "topic": "Principal Responsibility", "q": "Which of the following is TRUE about the relationship between a principal firm and its appointed representative?", "opts": ["The AR bears sole legal responsibility for its own regulatory breaches", "Business conducted by the AR for which the principal has accepted responsibility is treated as having been conducted by the principal", "The principal is only responsible for the AR's activities if the FCA specifically directs it", "The AR must obtain separate FCA authorisation for each transaction it undertakes"], "ans": 1, "exp": "Correct: B. Any business conducted by the AR for which the principal has accepted responsibility is treated as having been conducted by the principal itself. This means if the AR breaches a rule, the principal firm is liable — the regulators will look to the principal for accountability. Why others are wrong: (A) The principal bears responsibility, not the AR alone. (C) The responsibility is automatic under the contract — not dependent on FCA direction. (D) ARs do not need separate authorisation — they are exempt persons. Key fact: AR's regulated business = principal's business. Principal = legally responsible for AR's conduct.", "section": "S1-2: COBS & ARs"}, {"tag": "cisi", "topic": "Principal Permissions", "q": "Which of the following must be TRUE about the principal firm's own regulatory permissions in relation to its AR?", "opts": ["The principal does not need any specific permissions as long as the AR is competent", "The principal must have the relevant permissions for the activities that the AR will carry out", "The principal only needs permission for dealing as principal, regardless of what the AR does", "The FCA grants special AR permissions that are separate from the principal's own permissions"], "ans": 1, "exp": "Correct: B. The principal itself must have the relevant permissions for the activity that is to be carried out by the appointed representative. For example, if the AR is going to advise on investments, the principal must itself have permission to advise on investments. Why others are wrong: (A) The principal MUST have specific permissions — it is not enough to be competent. (C) The permissions must match the specific activities the AR will conduct, not just dealing as principal. (D) There are no separate 'AR permissions' — the AR operates under the principal's existing permissions. Key fact: Principal must hold permissions matching AR's activities. No permission = AR cannot conduct that activity.", "section": "S1-2: COBS & ARs"}, {"tag": "cisi", "topic": "Financial Promotions", "q": "Under the COBS rules, which financial promotions communicated by appointed representatives are firms responsible for?", "opts": ["Only those promoting MiFID financial instruments", "Those which are published in the consumer press", "Those which relate to high-risk investments only", "All types of financial promotions"], "ans": 3, "exp": "Correct: D. Firms are responsible for ensuring that their appointed representatives comply with the COBS rules when they communicate ALL types of financial promotions. This was tested as Q26 in the downloaded exam paper (answer: D = all types of financial promotions). The FCA makes specific reference to this in COBS because, technically, a financial promotion communicated by an AR is an exempt promotion — but the principal remains responsible. Why others are wrong: (A) Not limited to MiFID instruments. (B) Not limited to consumer press. (C) Not limited to high-risk investments. Key fact: Principal responsible for ALL financial promotions by AR — not just some types. Exam Q26.", "section": "S1-2: COBS & ARs"}, {"tag": "scenario", "topic": "Financial Promotions", "q": "AR Solutions Ltd is an appointed representative of PrincipalCorp plc. AR Solutions sends a marketing email about a new investment product to retail clients. The email contains misleading claims about past performance. Who is responsible for this breach?", "opts": ["AR Solutions Ltd only, because it sent the email", "PrincipalCorp plc, because it is responsible for the content of financial promotions communicated by its AR", "The retail clients, because they should have verified the claims independently", "The FCA, because it should have pre-approved the promotion"], "ans": 1, "exp": "Correct: B. PrincipalCorp plc is responsible because COBS requires firms to ensure their ARs comply with the financial promotion rules (COBS 4). Although the AR communicated the promotion, the principal is legally responsible for the content. The promotion must be fair, clear and not misleading. Why others are wrong: (A) The principal bears responsibility, not just the AR. (C) Clients are not responsible for verifying misleading promotions — firms are responsible for accuracy. (D) The FCA does not pre-approve individual promotions. Key fact: Misleading AR promotion = principal's breach. Principal must ensure ALL AR promotions comply with COBS 4.", "section": "S1-2: COBS & ARs"}, {"tag": "concept", "topic": "Financial Promotions", "q": "A financial promotion communicated by an appointed representative is technically classified as:", "opts": ["A regulated promotion requiring FCA pre-approval", "An exempt promotion because the AR is an exempt person, not an authorised person", "An unapproved promotion that is illegal under FSMA", "A third-party promotion subject to the gateway rules"], "ans": 1, "exp": "Correct: B. A financial promotion communicated by an AR is technically an 'exempt promotion' because the AR is an exempt person under FSMA — not an authorised person. The financial promotion restriction in FSMA only applies to unauthorised persons who are NOT exempt. However, COBS specifically requires the principal firm to ensure the AR's promotions comply with COBS 4. Why others are wrong: (A) AR promotions do not require FCA pre-approval. (C) They are not illegal — they are exempt. (D) The gateway rules apply to authorised firms approving promotions for unauthorised third parties, not to ARs. Key fact: AR promotion = technically exempt. But COBS = principal MUST ensure compliance anyway.", "section": "S1-2: COBS & ARs"}, {"tag": "cisi", "topic": "AR Activities", "q": "Which of the following activities is an appointed representative NOT permitted to carry out?", "opts": ["Advising on investments", "Arranging deals in investments", "Dealing in investments as principal", "Advising on home finance transactions"], "ans": 2, "exp": "Correct: C. Appointed representatives are specifically NOT permitted to deal in investments as principal or manage investments. These activities are considered too high-risk to be conducted by exempt persons and require direct FCA authorisation. Why others are wrong: (A) Advising on investments IS a permitted AR activity. (B) Arranging deals IS a permitted AR activity. (D) Advising on home finance transactions IS a permitted AR activity. Key fact: ARs CANNOT: deal as principal + manage investments. These two activities require direct authorisation.", "section": "S1-2: COBS & ARs"}, {"tag": "cisi", "topic": "AR Activities", "q": "An appointed representative wishes to manage a client's investment portfolio on a discretionary basis. Which of the following is TRUE?", "opts": ["This is permitted as long as the principal has given written consent", "This is NOT permitted — managing investments is not an allowed AR activity and requires direct FCA authorisation", "This is permitted as long as the client is a professional client", "This is permitted if the AR has passed the relevant FCA examinations"], "ans": 1, "exp": "Correct: B. Managing investments is specifically NOT permitted for appointed representatives. This activity requires direct FCA authorisation. An AR wishing to manage investments would need to become authorised in its own right under Part 4A of FSMA. Why others are wrong: (A) Principal consent does not override the statutory restriction. (C) The client category is irrelevant — the activity itself is prohibited for ARs. (D) Examinations do not change the prohibition — it is a structural restriction. Key fact: Managing investments = PROHIBITED for ARs. No exceptions based on consent, client type, or qualifications.", "section": "S1-2: COBS & ARs"}, {"tag": "detail", "topic": "AR Activities", "q": "In which of the following circumstances may an appointed representative deal in investments as agent?", "opts": ["When dealing in any type of financial instrument", "Only when dealing in pure protection contracts or general insurance contracts", "Only when dealing in equities listed on a regulated market", "When dealing on behalf of professional clients only"], "ans": 1, "exp": "Correct: B. An AR may deal as agent, but ONLY in relation to pure protection contracts or general insurance contracts. This is a significant restriction — the AR cannot deal as agent in equities, bonds, derivatives, or other investment instruments. Why others are wrong: (A) Not any financial instrument — only pure protection/general insurance. (C) ARs cannot deal in equities as agent. (D) The restriction is by instrument type, not client type. Key fact: AR dealing as agent = ONLY pure protection + general insurance contracts. Not shares, bonds, or derivatives.", "section": "S1-2: COBS & ARs"}, {"tag": "cisi", "topic": "AR Activities", "q": "Which of the following is TRUE about an appointed representative's ability to hold consumer credit permissions?", "opts": ["An AR cannot hold any form of regulatory permission", "A firm can have limited permission for consumer credit AND also be an AR for other regulated non-consumer-credit activities", "Consumer credit activities are prohibited for all ARs", "An AR must surrender its consumer credit permission before becoming an AR"], "ans": 1, "exp": "Correct: B. The FCA confirmed under the Consumer Credit Regime that a firm can have limited permission for certain consumer credit activities AND also be an appointed representative for other regulated non-consumer-credit activities simultaneously. This dual status is specifically permitted. Why others are wrong: (A) ARs CAN hold limited permissions for consumer credit. (C) Consumer credit activities are NOT prohibited for ARs. (D) No need to surrender — dual status is permitted. Key fact: AR can simultaneously: hold limited consumer credit permission + be AR for other activities. Dual status allowed.", "section": "S1-2: COBS & ARs"}, {"tag": "cisi", "topic": "2022 Reforms", "q": "Under the FCA's 2022 reforms to the AR regime, how many days before a new AR appointment must the principal notify the FCA?", "opts": ["7 days", "14 days", "30 days", "60 days"], "ans": 2, "exp": "Correct: C. Principals must notify the FCA 30 days BEFORE a new AR appointment takes effect. This is one of the most commonly tested numbers for this section. The purpose is to give the FCA time to review and potentially challenge the appointment. Why others are wrong: (A) 7 days is too short. (B) 14 days is the cancellation period for many investment products, not the AR notification period. (D) 60 days is the timeframe within which principals had to provide information on EXISTING ARs when the rules first came into force. Key fact: 30 days = advance notification to FCA for NEW AR appointment. 60 days = deadline for existing AR information.", "section": "S1-2: COBS & ARs"}, {"tag": "detail", "topic": "2022 Reforms", "q": "Within how many days of the 2022 rules coming into force were principals required to provide information to the FCA on their existing appointed representatives?", "opts": ["14 days", "30 days", "60 days", "90 days"], "ans": 2, "exp": "Correct: C. Within 60 days of the rules coming into force, principals had to provide information on their existing ARs to the FCA. This was a one-off transitional requirement to bring existing arrangements into compliance with the new regime. Do not confuse with the 30-day advance notification for NEW appointments. Why others are wrong: (A) 14 days is too short. (B) 30 days is the advance notice for new appointments, not existing AR information. (D) 90 days is the Form A determination period, not related to AR rules. Key fact: 60 days = existing AR information to FCA. 30 days = new AR appointment notification. Different timeframes, different purposes.", "section": "S1-2: COBS & ARs"}, {"tag": "cisi", "topic": "2022 Reforms", "q": "Under the 2022 FCA reforms, principals must oversee their appointed representatives to what standard?", "opts": ["A standard appropriate to the size and complexity of the AR's business", "A comparable standard as if the ARs were direct employees of the principal", "A minimum standard set by the FCA in a published schedule of requirements", "Whatever standard the principal considers commercially reasonable"], "ans": 1, "exp": "Correct: B. Principals must oversee ARs to a comparable standard as if they were direct employees. This is a deliberately high bar set by the FCA — it means the same level of monitoring, supervision, and accountability that the principal would apply to its own staff. Why others are wrong: (A) While proportionality is a factor, the specific standard stated is 'comparable to direct employees'. (C) The FCA does not publish a minimum standard schedule — the benchmark is 'direct employees'. (D) 'Commercially reasonable' is too low a standard — the FCA requires the employee-equivalent benchmark. Key fact: Oversee ARs = comparable standard to DIRECT EMPLOYEES. Not just 'reasonable' — the employee benchmark.", "section": "S1-2: COBS & ARs"}, {"tag": "cisi", "topic": "2022 Reforms", "q": "Which of the following is a requirement for principals under the 2022 FCA reforms regarding their appointed representatives?", "opts": ["Principals must ensure all ARs hold a minimum qualification from the CISI", "Principals must prepare an annual self-assessment document reviewing their ARs' activities, business and senior management", "Principals must submit monthly financial reports on each AR to the FCA", "Principals must obtain FCA approval before the AR can communicate with any client"], "ans": 1, "exp": "Correct: B. Principals must conduct an annual review of their ARs' activities, business and senior management, and must prepare a self-assessment document. This ensures ongoing monitoring and accountability. Why others are wrong: (A) There is no blanket CISI qualification requirement for all ARs (though T&C rules may require specific qualifications). (C) Monthly financial reports to the FCA are not required. (D) FCA approval is not needed before each client communication. Key fact: Annual review + self-assessment document = ongoing obligation for principals regarding their ARs.", "section": "S1-2: COBS & ARs"}, {"tag": "scenario", "topic": "2022 Reforms", "q": "PrincipalBank plc discovers that its AR, AdviseNow Ltd, has been providing unsuitable advice to retail clients. Under the 2022 FCA reforms, what is PrincipalBank expected to do?", "opts": ["Wait for the FCA to investigate before taking any action", "Address the problem that is causing harm to consumers, with clarity on circumstances for terminating the AR relationship if necessary, and assist with orderly wind down", "Continue the AR relationship but increase the AR's fee to compensate for the additional risk", "Transfer all of the AR's clients to another AR within the same network"], "ans": 1, "exp": "Correct: B. Under the 2022 reforms, principals must address problems with their ARs that are causing, or have the potential to cause, harm to consumers or markets. The FCA expects principals to have clarity on the circumstances where they should terminate an AR relationship and assist with an orderly wind down. Why others are wrong: (A) Principals must act proactively, not wait for the FCA. (C) Increasing fees does not address the harm or the underlying conduct issue. (D) Simply transferring clients does not address the root cause. Key fact: Principals must: address harm proactively + know when to terminate + assist orderly wind down.", "section": "S1-2: COBS & ARs"}, {"tag": "cisi", "topic": "2022 Reforms", "q": "Which of the following was one of the FCA's stated outcomes sought from the 2022 AR regime reforms?", "opts": ["To eliminate the appointed representative model entirely within five years", "To ensure retail consumers can access better-quality information on principals and ARs and make good decisions", "To require all ARs to convert to fully authorised status by 2025", "To prohibit ARs from communicating any financial promotions"], "ans": 1, "exp": "Correct: B. One of the four outcomes sought by the FCA was that retail consumers can access better-quality information on principals and ARs and make good decisions when choosing products and services. The other three outcomes were: principals understanding responsibilities with stronger oversight; FCA ability to challenge firms; and principals addressing problems causing harm. Why others are wrong: (A) The FCA did not aim to eliminate the AR model. (C) No requirement to convert to authorised status. (D) ARs can still communicate promotions, but principals must ensure compliance. Key fact: FCA 4 outcomes: understand responsibilities + FCA can challenge + address harm + better consumer information.", "section": "S1-2: COBS & ARs"}, {"tag": "detail", "topic": "2022 Reforms", "q": "Under the 2022 reforms, principals must provide which types of data about their appointed representatives to the FCA?", "opts": ["Only the AR's registered address and company number", "Complaints data and revenue data on their ARs", "Only the AR's total number of employees", "Only the AR's latest audited financial statements"], "ans": 1, "exp": "Correct: B. Principals must provide complaints and revenue data on their ARs to the FCA. This enables the FCA to identify patterns of concern and challenge firms where ARs may be causing harm. Additionally, principals must provide information on the nature of regulated activities that the ARs undertake. Why others are wrong: (A) Address alone is insufficient — the FCA requires operational data. (C) Employee count alone is not what is required. (D) Audited financials are not the specific requirement. Key fact: Complaints data + revenue data on ARs = provided by principals to FCA. FCA also updates register with AR regulated activities.", "section": "S1-2: COBS & ARs"}, {"tag": "scenario", "topic": "AR Status", "q": "FCA rules and guidance do not apply directly to appointed representatives because they are not authorised persons. However, which of the following is TRUE?", "opts": ["ARs are completely outside the regulatory perimeter and face no regulatory consequences", "The regulators expect principals to conduct thorough reviews of the suitability and conduct of their ARs, and any AR business is treated as the principal's business", "ARs can choose whether or not to follow the FCA Handbook voluntarily", "The FCA cannot take any enforcement action in relation to AR conduct"], "ans": 1, "exp": "Correct: B. While FCA rules do not apply directly to ARs (because they are not authorised), the regulators expect principals to conduct thorough reviews of the suitability and conduct of their ARs. The exempt status that ARs enjoy comes at the price of ongoing supervision and monitoring by the principal. Any AR business for which the principal has accepted responsibility is treated as having been conducted by the principal. Why others are wrong: (A) ARs are within the perimeter — they operate under the principal's umbrella. (C) It is not voluntary — the principal must ensure compliance. (D) The FCA can take action against the principal for AR conduct failures. Key fact: AR exempt status = comes at price of principal's ongoing supervision and monitoring.", "section": "S1-2: COBS & ARs"}, {"tag": "cisi", "topic": "AR Activities", "q": "Certain persons within an appointed representative firm must be approved for controlled functions. These include:", "opts": ["All administrative staff and cleaners", "The governors (directors, partners) and individuals performing customer functions", "Only the AR's external auditor", "Only the AR's money laundering reporting officer"], "ans": 1, "exp": "Correct: B. Certain persons within the AR firm must be approved for controlled functions — namely, the governors (directors, partners) and individuals who will be performing customer functions. This ensures that key personnel within the AR meet fitness and propriety requirements. Why others are wrong: (A) Administrative staff and cleaners are ancillary staff — not subject to controlled functions. (C) The external auditor is not approved through the AR's controlled function process. (D) While the MLRO may need approval, the requirement extends beyond just the MLRO. Key fact: AR controlled functions = governors (directors/partners) + customer-facing individuals. Must be approved.", "section": "S1-2: COBS & ARs"}, {"tag": "cisi", "topic": "Categories", "q": "Under COBS, how many client categories exist?", "opts": ["Two: retail and professional", "Three: retail, professional and eligible counterparty", "Four: retail, professional, eligible counterparty and institutional", "Five including sophisticated investors"], "ans": 1, "exp": "Correct: B. COBS defines three client categories: retail (most protection), professional (per se or elective), and eligible counterparty/ECP (least protection). Why others wrong: (A) misses ECP. (C/D) 'institutional' and 'sophisticated' are not separate COBS categories. Key fact: 3 categories.", "section": "S3: Client Categories"}, {"tag": "concept", "topic": "Categories", "q": "Which of the following correctly defines a 'retail client' under COBS?", "opts": ["A client with a portfolio below £50,000", "Any client who is NOT a professional client or an eligible counterparty", "A natural person not employed in financial services", "A client with fewer than 5 years' investment experience"], "ans": 1, "exp": "Correct: B. Retail = residual/default category — anyone NOT professional or ECP. No portfolio, experience or employment test. If in doubt, firm must treat as retail. Key fact: Retail = NOT professional, NOT ECP.", "section": "S3: Client Categories"}, {"tag": "cisi", "topic": "Categories", "q": "The FCA Handbook term 'customer' covers which client types?", "opts": ["Only retail clients", "Only professional clients", "Both retail and professional clients", "Retail, professional and eligible counterparties"], "ans": 2, "exp": "Correct: C. 'Customer' = umbrella term covering retail + professional. ECPs are NOT included. This matters because some rules apply to 'customers' (retail+professional) while others apply only to 'clients' (all three). Key fact: Customer = retail + professional, excludes ECPs.", "section": "S3: Client Categories"}, {"tag": "detail", "topic": "Categories", "q": "Which of the following is TRUE about the COBS definition of 'client'?", "opts": ["It covers only natural persons receiving services from the firm", "It includes potential clients and persons to whom financial promotions are communicated", "It excludes clients of a firm's appointed representatives", "It only applies to persons who have signed a client agreement"], "ans": 1, "exp": "Correct: B. 'Client' = anyone to whom a firm provides, intends to provide, or has provided a service. Includes potential clients, persons communicated to under financial promotions, and AR clients (who are treated as clients of the principal). Key fact: Client includes potential clients and AR clients.", "section": "S3: Client Categories"}, {"tag": "cisi", "topic": "Categories", "q": "A firm provides both MiFID and non-MiFID services to a client. Which categorisation rules should it use?", "opts": ["Non-MiFID rules always take precedence", "MiFID rules, unless MiFID business is conducted separately", "Whichever gives the client more protection", "The firm may choose freely"], "ans": 1, "exp": "Correct: B. For mixed services, MiFID categorisation applies unless MiFID business is conducted separately from non-MiFID business. Key fact: Mix = MiFID rules (unless separately conducted).", "section": "S3: Client Categories"}, {"tag": "scenario", "topic": "Categories", "q": "A small UK company with net assets of £200,000 approaches an investment firm for advice on equity investments. How should the firm classify this client?", "opts": ["Per se professional — it is a company", "Eligible counterparty — it is a legal person", "Retail client — it does not meet any professional or ECP criteria", "The firm cannot accept a company as a client"], "ans": 2, "exp": "Correct: C. A small company not meeting the large undertaking thresholds and not being a regulated financial entity is classified as retail by default. Retail = anyone NOT professional or ECP. Key fact: Small companies can be retail clients.", "section": "S3: Client Categories"}, {"tag": "cisi", "topic": "Categories", "q": "Which of the following is TRUE about client categorisation under COBS?", "opts": ["Categorisation is optional for non-MiFID business", "Categorisation is required for firms carrying on designated investment business", "Only retail clients need to be formally categorised", "Categorisation only applies when providing investment advice"], "ans": 1, "exp": "Correct: B. Categorisation is required for all firms carrying on designated investment business, covering MiFID and non-MiFID services. Key fact: Categorisation = mandatory for designated investment business.", "section": "S3: Client Categories"}, {"tag": "detail", "topic": "Categories", "q": "Which of the following statements about client categories is NOT correct?", "opts": ["Retail clients receive the most regulatory protection", "ECPs receive the least regulatory protection", "A 'customer' includes ECPs under COBS terminology", "Professional clients may be per se or elective"], "ans": 2, "exp": "Correct: C. 'Customer' does NOT include ECPs — it covers only retail + professional. All other statements are correct. Key fact: Customer ≠ ECP. Exam trap: 'customer' is narrower than 'client'.", "section": "S3: Client Categories"}, {"tag": "cisi", "topic": "Per Se Professional", "q": "Which of the following is classified as a per se professional client?", "opts": ["Any individual with net worth exceeding £1 million", "An entity required to be authorised or regulated in financial markets", "Any UK-incorporated company", "A client who has passed the FCA's approved person exam"], "ans": 1, "exp": "Correct: B. Per se professionals include: credit institutions, investment firms, other authorised FIs, insurance companies, CIS/management companies, pension funds, commodity dealers, institutional investors. Key fact: Per se = regulated entities + large undertakings + governments.", "section": "S3: Client Categories"}, {"tag": "cisi", "topic": "Per Se Professional", "q": "For MiFID business, a large undertaking qualifies as per se professional if it meets ANY two of which three criteria?", "opts": ["Revenue >£10m, employees >500, market cap >£100m", "Balance sheet ≥€20m, net turnover ≥€40m, own funds ≥€2m", "Turnover >£5m, assets >£5m, employees >50", "Profit >€5m, share capital >€10m, debt ratio <50%"], "ans": 1, "exp": "Correct: B. MiFID large undertaking = any 2 of 3: (1) balance sheet ≥€20m; (2) net turnover ≥€40m; (3) own funds ≥€2m. Key fact: €20m / €40m / €2m = MiFID thresholds.", "section": "S3: Client Categories"}, {"tag": "scenario", "topic": "Per Se Professional", "q": "A commodity derivatives dealer opens an account with an investment firm. How should the dealer be classified?", "opts": ["Retail, because commodity dealers are not investment firms", "Per se professional, because commodity dealers are on the per se list", "Eligible counterparty for all services", "Must first pass the qualitative test"], "ans": 1, "exp": "Correct: B. Commodity/commodity derivatives dealers are specifically listed as per se professional clients. Exam Q27 confirmed: the dealer is an investment firm. Key fact: Commodity derivatives dealer = per se professional.", "section": "S3: Client Categories"}, {"tag": "detail", "topic": "Per Se Professional", "q": "For NON-MiFID business, which of the following qualifies as a large undertaking?", "opts": ["A company with called-up share capital or net assets of at least £5 million at any time in the past 2 years", "A company with annual profit exceeding £2 million", "A partnership with gross turnover exceeding £1 million", "Any company listed on AIM"], "ans": 0, "exp": "Correct: A. For non-MiFID, a large undertaking includes a company with called-up share capital or net assets ≥£5m (in past 2 years), or meeting 2 of 3: balance sheet €12.5m / turnover €25m / 250 employees. Key fact: Non-MiFID = £5m share capital/net assets.", "section": "S3: Client Categories"}, {"tag": "cisi", "topic": "Per Se Professional", "q": "Which of the following is TRUE about non-MiFID large undertaking tests?", "opts": ["They use the same €20m/€40m/€2m thresholds as MiFID", "A company meeting 2 of 3: €12.5m balance sheet, €25m turnover, 250 average employees qualifies", "Only companies with more than 500 employees qualify", "The tests are identical for partnerships and companies"], "ans": 1, "exp": "Correct: B. Non-MiFID alternative 2-of-3 test: balance sheet €12.5m / turnover €25m / 250 employees average. This differs from MiFID thresholds. Key fact: Non-MiFID 2-of-3 = €12.5m / €25m / 250 employees.", "section": "S3: Client Categories"}, {"tag": "detail", "topic": "Per Se Professional", "q": "A trustee of an occupational pension scheme can be classified as a per se professional client if the scheme has:", "opts": ["At least 20 members and £5 million in assets", "At least 50 members AND assets under management of at least £10 million", "Any number of members but assets exceeding £1 million", "At least 100 members regardless of asset size"], "ans": 1, "exp": "Correct: B. For non-MiFID: trustee of occupational/stakeholder/personal pension scheme = per se professional if ≥50 members AND ≥£10m assets (in past 2 years). Key fact: Pension scheme per se = ≥50 members + ≥£10m assets.", "section": "S3: Client Categories"}, {"tag": "cisi", "topic": "Per Se Professional", "q": "Which of the following is also included in the per se professional client list?", "opts": ["High-net-worth individuals with >€500,000 portfolio", "National or regional governments, central banks and supranational institutions", "All UK-listed companies regardless of size", "Family offices managing private wealth"], "ans": 1, "exp": "Correct: B. The per se list includes national/regional governments, certain public bodies, central banks, and international/supranational institutions. Key fact: Governments + central banks = per se professional.", "section": "S3: Client Categories"}, {"tag": "cisi", "topic": "ECP", "q": "Which of the following is TRUE about the ECP category compared to per se professional?", "opts": ["The lists are identical", "The ECP list is the same as per se professional but EXCLUDES large undertakings", "ECPs receive more protection than per se professionals", "Only banks can be ECPs"], "ans": 1, "exp": "Correct: B. ECP list = per se professional MINUS large undertakings. A large company meeting size tests is per se professional but NOT ECP. Key exam distinction. Key fact: ECP = per se - large undertakings.", "section": "S3: Client Categories"}, {"tag": "cisi", "topic": "ECP", "q": "ECP status applies to which of the following services?", "opts": ["All MiFID investment services including advice", "Only dealing on own account, execution of orders, reception/transmission and related ancillary services", "Only portfolio management services", "All services provided the client requests ECP treatment"], "ans": 1, "exp": "Correct: B. ECP business = dealing on own account, execution of orders, reception/transmission + directly related ancillary services. NOT advice, NOT portfolio management. Key fact: ECP = dealing + execution + transmission only.", "section": "S3: Client Categories"}, {"tag": "scenario", "topic": "ECP", "q": "An insurance company classified as an ECP asks a firm for investment advice. How should the firm classify this client for the advisory service?", "opts": ["As an ECP, because the client's overall status remains unchanged", "As a per se professional client for that service", "As a retail client, because advice requires maximum protection", "The firm must refuse to provide advice to an ECP"], "ans": 1, "exp": "Correct: B. If an ECP wants investment advice (not an ECP-eligible service), they must be classified as per se professional for that service. Exam Q30 tests this. Key fact: ECP for advice = becomes per se professional.", "section": "S3: Client Categories"}, {"tag": "detail", "topic": "ECP", "q": "Which of the following entities can be classified as an eligible counterparty?", "opts": ["A large manufacturing company meeting the MiFID size thresholds", "A credit institution such as a bank", "A high-net-worth individual with €5 million in assets", "A local authority managing its pension fund"], "ans": 1, "exp": "Correct: B. Banks/credit institutions are on the ECP list. Large undertakings = per se professional only, NOT ECP. Individuals and local authorities (retail by default) cannot be ECPs. Key fact: Banks = ECP. Large undertakings ≠ ECP.", "section": "S3: Client Categories"}, {"tag": "cisi", "topic": "ECP", "q": "Which of the following is NOT a consequence of being classified as an ECP?", "opts": ["The firm does not need to comply with best execution requirements", "The firm does not need to provide client agreements", "SYSC 10 conflicts of interest rules still apply to the firm", "The firm does not need to assess suitability"], "ans": 2, "exp": "Correct: C. SYSC 10 conflicts of interest rules STILL apply to all authorised firms, including when dealing with ECPs. Best execution, client agreements, and suitability rules are disapplied for ECP business. Key fact: Conflicts of interest (SYSC 10) = always applies, even for ECPs.", "section": "S3: Client Categories"}, {"tag": "scenario", "topic": "ECP", "q": "A firm that is a per se professional client and an undertaking (but NOT an institutional investor) requests to be treated as an ECP. Is this permitted?", "opts": ["No — only regulated entities can be ECPs", "Yes — any per se professional can request ECP treatment", "Yes — if it is an undertaking and a per se professional (excluding institutional investors), it can request elective ECP treatment", "No — elective ECP status does not exist"], "ans": 2, "exp": "Correct: C. Elective ECP: must be an undertaking AND per se professional (excluding those who are only professional because they are institutional investors), AND must request ECP treatment. Key fact: Elective ECP = undertaking + per se professional + request.", "section": "S3: Client Categories"}, {"tag": "cisi", "topic": "Elective Professional", "q": "The qualitative test for elective professional reclassification requires the firm to assess the client's:", "opts": ["Annual income and tax status", "Expertise, experience and knowledge — believing the client can make own investment decisions", "Portfolio size and trading history only", "Employment status and professional qualifications"], "ans": 1, "exp": "Correct: B. Qualitative test = firm assesses expertise, experience and knowledge and must believe the client CAN make their own investment decisions and understand the risks. Required for both MiFID and non-MiFID. Key fact: Qualitative = expertise + experience + knowledge → own decisions.", "section": "S3: Client Categories"}, {"tag": "cisi", "topic": "Elective Professional", "q": "For MiFID business, which of the following is one of the three quantitative test criteria for elective professional status?", "opts": ["Annual income exceeds €200,000", "Portfolio exceeds €500,000 (cash deposits and financial instruments)", "Client has held a bank account for at least 10 years", "Client has a university degree in finance"], "ans": 1, "exp": "Correct: B. Three criteria (must meet 2 of 3): (a) 10 transactions/quarter over past 4 quarters; (b) portfolio >€500,000 (cash + financial instruments); (c) ≥1 year in financial services in relevant position. Key fact: €500,000 = cash + financial instruments.", "section": "S3: Client Categories"}, {"tag": "detail", "topic": "Elective Professional", "q": "The €500,000 portfolio threshold for elective professional classification includes:", "opts": ["Only equities and bonds in a brokerage account", "Cash deposits and financial instruments", "Only financial instruments, excluding cash", "Property, vehicles and other physical assets"], "ans": 1, "exp": "Correct: B. €500,000 = cash deposits + financial instruments. Property and physical assets excluded. Key fact: Cash counts towards €500,000.", "section": "S3: Client Categories"}, {"tag": "scenario", "topic": "Elective Professional", "q": "Maria executed 12 transactions per quarter over the past year, has a portfolio of €300,000, and has 3 years as a compliance officer at a bank. Can she pass the MiFID quantitative test?", "opts": ["No — she meets none of the criteria", "No — she meets only 1 criterion", "Yes — she meets 2 of 3 criteria: transactions and financial services experience", "Yes — she meets all 3 criteria"], "ans": 2, "exp": "Correct: C. (a) 12 txns/quarter > 10 = PASS; (b) €300k < €500k = FAIL; (c) 3 years compliance at bank ≥ 1 year FS = PASS. 2 of 3 = sufficient. Key fact: Check each criterion carefully.", "section": "S3: Client Categories"}, {"tag": "scenario", "topic": "Elective Professional", "q": "James has a portfolio of €600,000 and worked as a financial analyst for 2 years, but only executed 3 transactions per quarter. Does he pass the MiFID quantitative test?", "opts": ["No — he fails on all three criteria", "No — he only meets 1 criterion (portfolio)", "Yes — he meets 2 of 3: portfolio and financial services experience", "Yes — he meets all 3 criteria"], "ans": 2, "exp": "Correct: C. (a) 3 txns/quarter < 10 = FAIL; (b) €600k > €500k = PASS; (c) 2 years analyst ≥ 1 year = PASS. 2 of 3 = pass. Key fact: Multiple combinations can satisfy the test.", "section": "S3: Client Categories"}, {"tag": "cisi", "topic": "Elective Professional", "q": "For non-MiFID business, which test(s) must a client pass to be reclassified as elective professional?", "opts": ["Both qualitative and quantitative tests, identical to MiFID", "Only the qualitative test — the quantitative test applies only to MiFID business", "Only the quantitative test", "No tests are required — the client simply requests reclassification"], "ans": 1, "exp": "Correct: B. For non-MiFID, only the qualitative test applies. The quantitative test (10 txns, €500k, 1yr FS) is a MiFID-specific requirement. Key fact: Non-MiFID = qualitative only. MiFID = qualitative + quantitative.", "section": "S3: Client Categories"}, {"tag": "detail", "topic": "Elective Professional", "q": "Whose responsibility is it to keep the firm updated about changes that may affect the client's elective professional classification?", "opts": ["The FCA must monitor and notify the firm", "The firm must conduct annual reassessments", "It is the client's responsibility to keep the firm updated", "The firm's compliance department must verify annually"], "ans": 2, "exp": "Correct: C. It is explicitly the client's responsibility to keep the firm up to date. If the firm becomes aware the client no longer meets the conditions, it must take appropriate action (potentially recategorise to retail). Key fact: Client's duty to update firm.", "section": "S3: Client Categories"}, {"tag": "cisi", "topic": "Elective Professional", "q": "In relation to non-MiFID business, which retail client is MOST likely suitable for reclassification as an elective professional?", "opts": ["A newly appointed trustee of a trust exceeding €500,000", "A client to whom the firm regularly sends non-mainstream investment promotions", "A client who recently inherited a sizeable portfolio", "The spouse of one of the firm's investment managers"], "ans": 1, "exp": "Correct: B. Exam Q28: if a firm considers a client sophisticated enough to receive non-mainstream investment promotions, they likely satisfy the qualitative test. Others show no investment expertise. Key fact: Sophistication to receive non-mainstream promos → likely passes qualitative test.", "section": "S3: Client Categories"}, {"tag": "cisi", "topic": "Written Process", "q": "Which of the following correctly describes the written process for reclassifying a retail client as elective professional?", "opts": ["The firm unilaterally changes classification and sends notification", "The client requests orally, firm warns in writing, client confirms by email", "Client requests in writing, firm gives written warning of lost protections, client confirms separately in writing", "The FCA must approve the reclassification"], "ans": 2, "exp": "Correct: C. Three-step process: (1) Client writes requesting reclassification + specifies services/products; (2) Firm gives clear written warning of protections lost; (3) Client confirms separately in writing awareness of consequences. Key fact: All steps must be in writing. All separate.", "section": "S3: Client Categories"}, {"tag": "scenario", "topic": "Written Process", "q": "A
