:.81rem;line-height:1.62;display:none}.exp-box.show{display:block}.exp-ok{background:var(--green-l);border-left:3px solid var(--teal-m);color:var(--green)}.exp-bad{background:var(--coral-l);border-left:3px solid var(--coral-m);color:var(--coral)}.result-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:2rem 1.5rem;text-align:center;margin-top:.5rem}.result-big{font-size:3.2rem;font-weight:800;margin:.4rem 0}.result-grade{display:inline-block;padding:.38rem 1.2rem;border-radius:20px;font-size:.92rem;font-weight:700;margin:.5rem 0 .8rem}.result-bar-wrap{background:var(--gray-l);border-radius:20px;height:14px;overflow:hidden;margin:.75rem auto;max-width:320px}.result-bar-fill{height:100%;border-radius:20px;transition:width .8s ease}.result-breakdown{display:flex;gap:.6rem;justify-content:center;flex-wrap:wrap;margin:1rem 0 1.2rem}.rp{padding:.3rem .9rem;border-radius:20px;font-size:.8rem;font-weight:600}.topic-grid{display:grid;grid-template-columns:1fr 1fr;gap:.45rem;margin:.5rem 0 1.2rem;text-align:left}.topic-row{background:var(--gray-l);border-radius:8px;padding:.5rem .75rem;font-size:.78rem}.topic-name{color:var(--text2);font-weight:600;margin-bottom:.2rem}.topic-bar-wrap{background:var(--gray-m);border-radius:10px;height:6px;overflow:hidden}.topic-bar-fill{height:100%;border-radius:10px}.q-review-list{text-align:left;margin-top:.5rem}.q-review-item{padding:.65rem 1rem;border-radius:8px;margin-bottom:.45rem;font-size:.83rem;line-height:1.52;display:flex;gap:.65rem;align-items:flex-start}.q-review-item.r-ok{background:var(--green-l);border-left:3px solid var(--teal-m);color:var(--green)}.q-review-item.r-bad{background:var(--coral-l);border-left:3px solid var(--coral-m);color:var(--coral)}.r-icon{font-size:.9rem;flex-shrink:0;margin-top:.08rem}.btn{padding:.58rem 1.3rem;border:none;border-radius:8px;cursor:pointer;font-size:.86rem;font-weight:600;transition:all .2s}.btn-p{background:var(--teal);color:#fff}.btn-p:hover{background:var(--teal-d)}.btn-row{display:flex;gap:.65rem;flex-wrap:wrap;justify-content:center}</style>

<script>
const BANK=[{"tag":"cisi","topic":"Conflicts — Principles","q":"Which FCA Principle specifically addresses conflicts of interest?","opts":["Principle 6","Principle 7","Principle 8","Principle 9"],"ans":2,"exp":"Correct: C. Principle 8 states: 'A firm must manage conflicts of interest fairly, both between itself and its customers and between a customer and another client.' Key fact: Conflicts of interest = Principle 8."},{"tag":"cisi","topic":"Conflicts — Principles","q":"In which FCA sourcebook are the detailed rules on conflicts of interest specified?","opts":["COBS","SYSC","MAR","PRIN"],"ans":1,"exp":"Correct: B. The detailed rules on conflicts of interest are specified in SYSC (Systems and Controls). They apply to common platform firms in respect of MiFID business and ancillary services, as well as to non-MiFID firms. Key fact: Conflicts of interest rules = SYSC."},{"tag":"cisi","topic":"Conflicts — Principles","q":"Which of the following correctly describes the two categories of relationship in which conflicts of interest must be managed?","opts":["Between the firm and the FCA, and between the firm and third parties, provided the client has given prior written consent.","Between the firm (including managers, employees, ARs and connected parties) and a client, AND between one client and another","Between retail clients and professional clients, and between ECPs and the firm, provided the client has given prior written consent.","Between the compliance function and front-office staff, and between the firm and regulators"],"ans":1,"exp":"Correct: B. Firms must identify, prevent and/or manage conflicts between: (1) the firm (including managers, employees, ARs/tied agents and connected parties) and a client; and (2) one client of the firm and another client. Key fact: 2 conflict relationships: firm v client + client v client."},{"tag":"detail","topic":"Conflicts — Principles","q":"Which of the following is NOT one of the five stated types of conflicts of interest that may arise?","opts":["Realising a financial gain at the expense of a client, provided the client has given prior written consent.","Having an incentive to favour one client over others, provided the client has given prior written consent.","Receiving inducements from someone other than the client above the standard fee","A client having a lower risk tolerance than the firm's standard product range"],"ans":3,"exp":"Correct: D. The five stated conflict types are: (1) financial gain/loss at client's expense; (2) interest in outcome distinct from client's; (3) incentive to favour one client; (4) carrying on the same business as the client; (5) receiving inducements from third parties above standard fees. Client risk tolerance mismatch is a suitability issue, not a conflict of interest type. Key fact: 5 conflict types — none relate to risk tolerance mismatch."},{"tag":"scenario","topic":"Conflicts — Principles","q":"An investment firm both manages portfolios and provides corporate finance advice. It has no procedures to separate these activities. Which obligation does this most likely breach?","opts":["The best execution obligation, regardless of the client category or type of business","The requirement to maintain effective organisational arrangements to prevent conflicts from adversely affecting clients","The obligation to provide suitability reports, provided the client has given prior written consent.","The requirement to categorise clients, provided the client has given prior written consent."],"ans":1,"exp":"Correct: B. Where a firm performs multiple roles (e.g. portfolio management and corporate finance), it must have effective organisational and administrative arrangements to prevent conflicts from adversely affecting clients. Without such arrangements, it breaches SYSC. Key fact: Firms must have effective organisational arrangements — not just a policy on paper."},{"tag":"cisi","topic":"Disclosure","q":"When should a firm disclose a conflict of interest to a client?","opts":["Immediately when the conflict is identified, regardless of whether it can be managed, provided the client has given prior written consent.","Only if the conflict leads to a financial loss for the client, provided the client has given prior written consent.","As a last resort, when internal arrangements are insufficient to prevent material damage to the client's interests — and before undertaking the business","Only after the transaction is complete, as specified in the relevant FCA Handbook provisions."],"ans":2,"exp":"Correct: C. Disclosure is a LAST RESORT. It is used only when the firm's internal controls (preventing and managing conflicts) are insufficient to ensure, with reasonable confidence, that the risk of material damage to the client's interests will be prevented. Key fact: Disclosure = last resort, before undertaking the business."},{"tag":"cisi","topic":"Disclosure","q":"In what form must a conflict of interest disclosure be made to a client?","opts":["Verbally at the time of the transaction, provided the client has given prior written consent.","In a durable medium, with sufficient detail to enable the client to make an informed decision","In the firm's annual report — this applies in all circumstances without exception","By email only, with FCA in copy, provided the client has given prior written consent."],"ans":1,"exp":"Correct: B. Conflict disclosure must be: (1) in a DURABLE MEDIUM; (2) in SUFFICIENT DETAIL taking into account the nature of the client; (3) such that it ENABLES AN INFORMED DECISION with respect to the service in which the conflict arises. Key fact: Disclosure = durable medium + sufficient detail + informed decision."},{"tag":"detail","topic":"Disclosure","q":"Does disclosing a conflict of interest exempt a firm from maintaining effective organisational arrangements to manage conflicts?","opts":["Yes — disclosure satisfies all conflict management obligations, provided the client has given prior written consent.","No — disclosure does not exempt firms from the obligation to maintain and operate effective organisational and administrative arrangements","Yes — but only for MiFID business, as specified in the relevant FCA Handbook provisions.","No — but the firm may reduce the frequency of its conflict management reviews once it has disclosed"],"ans":1,"exp":"Correct: B. Disclosure does NOT exempt firms from the obligation to maintain effective organisational and administrative arrangements under SYSC 10.1.3. Over-reliance on disclosure without adequate management of conflicts is not permitted. Key fact: Disclosure ≠ substitute for organisational arrangements. Both are required."},{"tag":"scenario","topic":"Disclosure","q":"A firm identifies a conflict but decides it can manage it through internal procedures. Must it disclose the conflict to the client?","opts":["Yes — all identified conflicts must always be disclosed to clients, provided the client has given prior written consent.","No — disclosure is only required when the firm's arrangements are insufficient to prevent material damage to the client's interests","Yes — unless the FCA has granted a specific exemption, provided the client has given prior written consent.","No — conflicts only need to be recorded internally, never disclosed, provided the client has given prior written consent."],"ans":1,"exp":"Correct: B. If the firm CAN manage the conflict through internal arrangements with reasonable confidence that material damage to the client's interests will be prevented, disclosure to the client is NOT required. Disclosure is triggered only when internal controls are INSUFFICIENT. Key fact: Manageable conflict = no disclosure needed. Only disclose when arrangements are insufficient."},{"tag":"cisi","topic":"Conflicts Policy","q":"Which of the following must a firm's written conflicts of interest policy include?","opts":["A list of all clients and their known conflicts, provided the client has given prior written consent.","Circumstances giving rise to conflicts AND the processes and procedures for preventing/managing them","Only the circumstances that may give rise to conflicts, not the management procedures","The FCA's model conflicts policy as published on its website, provided the client has given prior written consent."],"ans":1,"exp":"Correct: B. The conflicts policy must include: (1) circumstances that may give rise to a conflict (with particular attention to multi-role scenarios); and (2) the processes and procedures for preventing and/or managing such conflicts. Key fact: Policy = circumstances + processes/procedures."},{"tag":"detail","topic":"Conflicts Policy","q":"A firm is part of a larger group. What additional obligation applies to its conflicts of interest policy?","opts":["The policy must be jointly approved by all group members, provided the client has given prior written consent.","The policy must take into account potential conflicts arising from the structure and business activities of other members of the group","The parent company's policy automatically applies to all group members, provided the client has given prior written consent.","The policy must be submitted to the FCA for group-level approval, provided the client has given prior written consent."],"ans":1,"exp":"Correct: B. If the firm is a member of a larger group, the conflicts policy must take into account any potential conflicts arising from the STRUCTURE AND/OR BUSINESS ACTIVITIES of other group members. Key fact: Group member = policy must cover group-level conflicts."},{"tag":"detail","topic":"Conflicts Policy","q":"Which of the following is one of the five procedures that a firm's conflicts policy must cover?","opts":["A commitment to provide all clients with identical advice, provided the client has given prior written consent.","Separate supervision of persons engaged in activities for different clients whose interests may conflict","Elimination of all variable pay structures, provided the client has given prior written consent.","Annual FCA notification of all identified conflicts, provided the client has given prior written consent."],"ans":1,"exp":"Correct: B. The five required procedures in the conflicts policy are: (1) control of information; (2) separate supervision of conflicted-activity persons; (3) removal of direct link between conflicting activities and remuneration; (4) measures to prevent inappropriate influence; (5) measures to control involvement in conflicting activities. Key fact: 5 procedures — separate supervision is one of them."},{"tag":"cisi","topic":"Conflicts Policy","q":"What must firms provide to retail clients and potential retail clients in relation to their conflicts of interest policy?","opts":["The full text of the conflicts policy document","A description of the conflicts of interest policy","A summary of all conflicts identified in the previous 12 months","A signed confirmation that no conflicts currently exist"],"ans":1,"exp":"Correct: B. Firms must provide retail clients and potential retail clients with a DESCRIPTION of the conflicts of interest policy. The full policy need not be provided proactively — but further details must be available on request. Key fact: Retail clients (and potential) = must receive description of conflicts policy."},{"tag":"cisi","topic":"Information Barriers","q":"What is an 'information barrier' (also known as a 'Chinese wall')?","opts":["A firewall that prevents unauthorised access to the firm's IT systems, provided the client has given prior written consent.","An arrangement whereby information held by an employee in one part of the business is withheld from (or not used by) people in another part of the business","A contractual clause preventing clients from sharing proprietary research, provided the client has given prior written consent.","A legal agreement between competing firms not to share client data, provided the client has given prior written consent."],"ans":1,"exp":"Correct: B. An information barrier is an arrangement whereby information held by an employee in ONE PART of the business is WITHHELD FROM — or, if that is not possible, at least NOT USED BY — people in another part of the business. Key fact: Information barrier = withhold OR not use across business units."},{"tag":"cisi","topic":"Information Barriers","q":"What condition must be met for a firm to permit employees in one part of the business to withhold information from those in another part?","opts":["The firm must have FCA approval for each instance of the information barrier, provided the client has given prior written consent.","At least one of those parts of the business must be carrying on regulated activities or an activity connected with a regulated activity","The information must relate to a transaction above £1 million in value, provided the client has given prior written consent.","Both parts of the business must be FCA-authorised separately, provided the client has given prior written consent."],"ans":1,"exp":"Correct: B. Employees may withhold information across a barrier only to the extent that AT LEAST ONE of those parts of the business is carrying on REGULATED ACTIVITIES (or an activity carried on in connection with a regulated activity). Key fact: Information barrier condition: at least one side = regulated activities."},{"tag":"detail","topic":"Information Barriers","q":"What ongoing obligations apply once a firm has established an information barrier?","opts":["None — once established, the barrier is self-sufficient, provided the client has given prior written consent.","The firm must take reasonable steps to ensure the arrangements remain effective and are adequately monitored","The barrier must be reviewed and renewed by the FCA every three years, provided the client has given prior written consent.","The firm must notify all clients that an information barrier is in place, provided the client has given prior written consent."],"ans":1,"exp":"Correct: B. The firm must take REASONABLE STEPS to ensure information barrier arrangements: (1) remain EFFECTIVE; and (2) are ADEQUATELY MONITORED. This is an ongoing obligation. Key fact: Information barriers = must be effective + adequately monitored (ongoing)."},{"tag":"scenario","topic":"Information Barriers","q":"A corporate finance team at a firm has knowledge of an upcoming acquisition for Company X. The firm's equity research team is unaware of this. The firm cannot share this information with clients. Is this a failure of its duty to clients?","opts":["Yes — clients must always receive all material information the firm holds, unless the client has been notified in a durable medium.","No — the information barrier is designed precisely to prevent this cross-firm flow, and the inability to pass this information to clients is NOT considered a failure of duty","Yes — but only if the information would have benefited the client, subject to the relevant COBS provisions applying to the business.","No — but the firm must document why it could not share the information with each affected client, provided the client has given prior written consent."],"ans":1,"exp":"Correct: B. The inability to pass information across an information barrier to clients is explicitly NOT seen as a failure of duty to those clients. The barrier exists to prevent sensitive information (such as M&A plans) from influencing research or market-making activities. Key fact: Cannot pass info across barrier ≠ failure of duty to clients."},{"tag":"cisi","topic":"Investment Research","q":"Which of the following correctly defines 'investment research' under COBS?","opts":["Any communication made to a client about an investment product, as specified in the relevant FCA Handbook provisions, as required under the relevant COBS or SYSC rules in the FCA Handbook.","Information recommending or suggesting an investment strategy (including opinion on current/future value or price), intended for public distribution, labelled as investment research and presented as objective or independent","Short-term trade ideas or strategies provided exclusively to one named client, as specified in the relevant FCA Handbook provisions, provided the firm has obtained prior written consent from the client.","Any research produced by a firm's compliance department for internal use, as specified in the relevant FCA Handbook provisions, unless a specific exemption applies under the Financial Promotion Order."],"ans":1,"exp":"Correct: B. Investment research is: (1) information recommending or suggesting an investment strategy (including opinion on value/price); (2) intended for PUBLIC distribution; (3) clearly labelled as investment research; (4) presented as objective or independent. It must NOT be presented as a personal recommendation. Key fact: Investment research = for public + labelled + objective/independent + NOT personal recommendation."},{"tag":"cisi","topic":"Investment Research","q":"What is the key distinction between investment research and investment recommendations under UK MAR?","opts":["Investment research is for retail clients; recommendations are for professional clients only, as specified in the relevant FCA Handbook provisions, provided the firm has obtained prior written consent from the client.","Investment research is intended for public distribution and must be objective/independent; investment recommendations (under UK MAR) relate to short-term trade ideas or strategies provided to one or more specific clients","Investment research requires FCA pre-approval; recommendations do not, as specified in the relevant FCA Handbook provisions, unless a specific exemption applies under the Financial Promotion Order.","There is no meaningful distinction — they are interchangeable terms, as specified in the relevant FCA Handbook provisions, as required under the relevant COBS or SYSC rules in the FCA Handbook."],"ans":1,"exp":"Correct: B. Investment RESEARCH = for public distribution, objective/independent. Investment RECOMMENDATIONS (under UK MAR) = short-term trade ideas or trading strategies provided to one or more CLIENTS of firms. Key fact: Research = public, objective. MAR recommendations = clients, short-term trade ideas."},{"tag":"cisi","topic":"Dealing Ahead","q":"What does the 'dealing ahead' prohibition prevent financial analysts from doing?","opts":["Executing trades on behalf of clients before receiving full payment, subject to the relevant COBS provisions applying to the business.","Undertaking personal transactions (or trading for others) using knowledge of unpublished research content — until recipients have had a reasonable opportunity to act on it","Providing research to clients outside normal business hours, as specified in the relevant FCA Handbook provisions, unless a specific exemption applies under the Financial Promotion Order.","Executing client orders before receiving FCA approval, as specified in the relevant FCA Handbook provisions, as required under the relevant COBS or SYSC rules in the FCA Handbook."],"ans":1,"exp":"Correct: B. The dealing ahead prohibition prevents financial analysts (and other relevant persons) from undertaking personal transactions or trading for others using knowledge of research that is not yet available to clients/public — until those recipients have had a REASONABLE OPPORTUNITY TO ACT on the research. Key fact: Dealing ahead = banned — no personal trades until clients have reasonable opportunity to act."},{"tag":"detail","topic":"Dealing Ahead","q":"Which of the following is an exception to the dealing-ahead prohibition for financial analysts?","opts":["If the analyst's personal portfolio is worth less than £50,000, provided the client has given prior written consent.","Receipt of an instruction from an execution-only client, or a market maker acting in good faith","If the trade is disclosed to the compliance officer within 24 hours","If the analyst has been with the firm for less than one year, provided the client has given prior written consent."],"ans":1,"exp":"Correct: B. Two exceptions to the dealing-ahead prohibition: (1) receipt of an instruction from an EXECUTION-ONLY CLIENT; (2) a MARKET MAKER acting in good faith. Key fact: Dealing ahead exceptions = execution-only client instruction + market maker (good faith)."},{"tag":"cisi","topic":"Dealing Ahead","q":"Even outside the context of dealing ahead, what additional restriction applies to analysts wishing to make personal account transactions in investments covered by their research?","opts":["No restriction — personal account transactions are always permitted, as specified in the relevant FCA Handbook provisions, as required under the relevant COBS or SYSC rules in the FCA Handbook.","Analysts may never make personal account transactions in any investment, as specified in the relevant FCA Handbook provisions, unless a specific exemption applies under the Financial Promotion Order.","They may not make personal account transactions in the investments covered by their research WITHOUT prior approval from the firm's compliance or legal department — and then only in exceptional circumstances","They must wait 30 days after publication before making personal transactions, as specified in the relevant FCA Handbook provisions, provided the firm has obtained prior written consent from the client."],"ans":2,"exp":"Correct: C. In addition to the dealing-ahead prohibition, analysts must NOT make personal account transactions in the investments their research covers WITHOUT PRIOR COMPLIANCE/LEGAL APPROVAL — and then only in EXCEPTIONAL CIRCUMSTANCES. Key fact: Personal account transactions on research subjects = prior compliance approval required + exceptional circumstances only."},{"tag":"detail","topic":"Dealing Ahead","q":"May a financial analyst accept benefits from an issuer whose securities they are covering in their research?","opts":["Yes — issuers may provide reasonable hospitality to analysts, provided the client has given prior written consent.","No — analysts must not accept inducements from those with a material interest in the subject matter of the research","Yes — if disclosed to compliance within 5 business days, provided the client has given prior written consent.","No — but only if the benefit exceeds £100 in value, provided the client has given prior written consent."],"ans":1,"exp":"Correct: B. Analysts must NOT accept INDUCEMENTS from those with a material interest in the subject matter of the research. This is one of the key dealing-ahead prevention measures. Key fact: Research analysts = cannot accept inducements from interested parties (issuers etc.)."},{"tag":"cisi","topic":"Dealing Ahead","q":"May an analyst promise an issuer favourable coverage in exchange for cooperation with the research process?","opts":["Yes — this is standard practice in research departments","No — firms and analysts must not promise issuers favourable research coverage","Yes — if disclosed to compliance, provided the client has given prior written consent.","Yes — if the issuer provides access to management for interviews"],"ans":1,"exp":"Correct: B. Analysts (and firms) must NOT promise issuers FAVOURABLE RESEARCH COVERAGE. This is one of the specific prohibitions in the investment research conflict measures. Key fact: Cannot promise issuers favourable research coverage."},{"tag":"scenario","topic":"Dealing Ahead","q":"A firm produces investment research. An analyst completes a draft report with a 'Buy' recommendation. A portfolio manager at the same firm reads the draft to decide whether to buy the stock before publication. Is this permitted?","opts":["Yes — portfolio managers routinely review drafts before publication, provided the client has given prior written consent.","No — only financial analysts may review a draft that includes a recommendation or target price, except for legal compliance verification purposes","Yes — as long as the portfolio manager does not trade immediately, provided the client has given prior written consent.","No — but only if the recommendation is for a listed company, provided the client has given prior written consent."],"ans":1,"exp":"Correct: B. If a draft investment research report includes a recommendation or target price, only FINANCIAL ANALYSTS may review it — except for the purpose of verifying compliance with legal obligations. Portfolio managers must not access draft research containing recommendations before publication. Key fact: Draft with recommendation/target price = financial analysts only (plus compliance verification)."},{"tag":"cisi","topic":"Third-Party Research","q":"Under what conditions is a firm exempt from the conflicts of interest rules when disseminating third-party investment research?","opts":["If the research has been reviewed and approved by the FCA, as specified in the relevant FCA Handbook provisions, as required under the relevant COBS or SYSC rules in the FCA Handbook.","If the third party is not in the same group, the firm does not substantially amend it, does not hold itself out as having produced it, and verifies the producer is subject to equivalent requirements","If the research is distributed only to professional clients, as specified in the relevant FCA Handbook provisions, unless a specific exemption applies under the Financial Promotion Order.","If the firm publishes a disclaimer stating the research is from a third party, as specified in the relevant FCA Handbook provisions, provided the firm has obtained prior written consent from the client."],"ans":1,"exp":"Correct: B. A firm disseminating (not producing) third-party research is exempt from the conflicts/research rules if ALL FOUR conditions are met: (1) producer not in same group; (2) firm does not substantially amend the research; (3) firm does not hold itself out as having produced it; (4) firm verifies the producer is subject to the same conflicts/research requirements. Key fact: Disseminating exemption = 4 conditions: not same group + no substantial amendment + not held out as own + producer subject to same rules."},{"tag":"cisi","topic":"Non-Independent Research","q":"How is non-independent research (research not presented as objective or independent) treated under COBS?","opts":["It is treated as investment research and is subject to the research rules","It is treated as a marketing communication and is subject to COBS 4","It is prohibited entirely and may not be produced","It is subject to the suitability rules rather than the conflicts rules"],"ans":1,"exp":"Correct: B. Non-independent research — not presented as objective or independent — is treated as a MARKETING COMMUNICATION and the rules of COBS 4 apply. Key fact: Non-independent research = marketing communication = COBS 4 applies."},{"tag":"detail","topic":"Non-Independent Research","q":"What two statements must appear in non-independent research?","opts":["The firm's regulatory capital and the lead analyst's qualifications, as specified in the relevant FCA Handbook provisions, as required under the relevant COBS or SYSC rules in the FCA Handbook.","(1) It is clearly identified as a marketing communication; and (2) a clear and prominent statement that it has not been prepared in accordance with independence requirements and is not subject to dealing-ahead prohibitions","Only a disclaimer that the views expressed are those of the author alone, as specified in the relevant FCA Handbook provisions, provided the firm has obtained prior written consent from the client.","The FCA's standard risk warning and a conflicts of interest declaration, as specified in the relevant FCA Handbook provisions, unless a specific exemption applies under the Financial Promotion Order."],"ans":1,"exp":"Correct: B. Non-independent research must: (1) be CLEARLY IDENTIFIED AS A MARKETING COMMUNICATION; and (2) contain a CLEAR AND PROMINENT STATEMENT that it has not been prepared in accordance with independence requirements and is NOT subject to the dealing-ahead prohibitions. Key fact: Non-independent = marketing communication statement + not independent + not subject to dealing-ahead prohibitions."},{"tag":"cisi","topic":"Research Standards","q":"Which of the following must be published quarterly in relation to research recommendations?","opts":["The total number of research reports produced during the quarter, as specified in the relevant FCA Handbook provisions, as required under the relevant COBS or SYSC rules in the FCA Handbook.","The proportion of buy, hold and sell recommendations published during the quarter, and the proportion of issuers in each category who received material investment banking services in the previous 12 months","The names of all analysts who produced recommendations during the quarter, as specified in the relevant FCA Handbook provisions, provided the firm has obtained prior written consent from the client.","The total value of fees received from issuers covered in research, as specified in the relevant FCA Handbook provisions, unless a specific exemption applies under the Financial Promotion Order."],"ans":1,"exp":"Correct: B. Firms must publish QUARTERLY: (1) the proportion of research recommendations that are buy, hold and sell; and (2) the proportion of investments in each category issued by issuers to which the firm supplied material investment banking services during the previous 12 months. Key fact: Quarterly disclosure = buy/hold/sell proportions + investment banking service issuers (past 12 months)."},{"tag":"detail","topic":"Research Standards","q":"When disseminating a third party's research recommendation, a firm materially amends the recommendation changing it from 'buy' to 'sell'. What must the firm do?","opts":["Attribute the change to the original producer and take no further action, as specified in the relevant FCA Handbook provisions, unless a specific exemption applies under the Financial Promotion Order.","Describe the alterations made and comply with the disclosure rules on time horizons as though it had produced the recommendation itself, and maintain a written policy directing recipients to the original producer","Simply add a disclaimer that the recommendation has been modified, as specified in the relevant FCA Handbook provisions, as required under the relevant COBS or SYSC rules in the FCA Handbook.","Withdraw the recommendation and produce its own independent research instead, as specified in the relevant FCA Handbook provisions, provided the firm has obtained prior written consent from the client."],"ans":1,"exp":"Correct: B. If a firm materially amends a third-party recommendation (especially a change of direction, e.g. buy to sell), it must: (1) describe the alterations made; (2) comply with the time horizon disclosure rules as though it had produced the recommendation; AND (3) maintain a written policy directing recipients to the original producer, original recommendation and third party's disclosures. Key fact: Material amendment of third-party recommendation = describe alterations + comply with disclosure rules + policy to direct recipients to original."},{"tag":"cisi","topic":"Inducements","q":"To which clients do the inducements rules apply?","opts":["All clients including ECPs — this applies in all circumstances without exception","Professional clients and retail clients only — ECP business is excluded","Retail clients only, as professional clients and ECPs are excluded","Only clients receiving independent advice or portfolio management"],"ans":1,"exp":"Correct: B. The inducements rules apply to professional clients and retail clients. ECP BUSINESS IS EXCLUDED from the detailed inducement provisions. Key fact: Inducements = professional + retail clients. ECP business = excluded."},{"tag":"cisi","topic":"Inducements","q":"For MiFID business, which of the following is a permissible fee, commission or non-monetary benefit?","opts":["A payment from a third party solely designed to increase the firm's revenues","A fee paid by or to the client or someone acting on their behalf (e.g. a management fee)","A kickback paid by a product provider in return for placing its products with clients","Any payment received before the provision of the service, provided the client has given prior written consent."],"ans":1,"exp":"Correct: B. For MiFID business, the three permissible categories are: (1) fees/commissions paid to or BY THE CLIENT or on their behalf (e.g. management fees); (2) proper fees necessary for the service that cannot by nature give rise to conflicts (custody, legal, settlement); (3) fees/commissions paid to or by a THIRD PARTY meeting the three conditions. Key fact: 3 permissible categories: client / proper necessary fees / qualifying third-party payments."},{"tag":"cisi","topic":"Inducements","q":"For a third-party payment to be permissible under MiFID inducement rules, which THREE conditions must be met?","opts":["The payment must not exceed £500, must be in cash only, and must be reported to the FCA, as specified in the relevant FCA Handbook provisions, as required under the relevant COBS or SYSC rules in the FCA Handbook.","It must not impair compliance with the firm's duty to act in the client's best interests; must be designed to enhance the quality of service; and must be disclosed in accordance with set standards prior to provision of the service","The recipient must be an authorised firm, the payment must be documented, and the client must consent in writing, subject to the relevant COBS provisions applying to the business.","The amount must be proportionate to the service, approved by the compliance officer, and paid annually, as specified in the relevant FCA Handbook provisions, unless a specific exemption applies under the Financial Promotion Order."],"ans":1,"exp":"Correct: B. Third-party payments are permissible only if ALL THREE conditions are met: (1) do NOT impair the firm's duty to act in client's best interests; (2) DESIGNED TO ENHANCE the quality of service; (3) DISCLOSED in accordance with set standards PRIOR to provision of the service. Key fact: Third-party payments: 3 conditions = not impair + enhance quality + disclosed before service."},{"tag":"detail","topic":"Inducements","q":"How may a firm satisfy its disclosure obligations regarding permissible inducements?","opts":["By providing a full written breakdown of all payments before every transaction, provided the client has given prior written consent.","By disclosing essential arrangements in summary form, undertaking to provide further details on request, and actually providing those details on request","By including a standard disclosure clause in the client agreement, with no further action required, provided the client has given prior written consent.","By submitting annual disclosure returns to the FCA, subject to the relevant COBS provisions applying to the business."],"ans":1,"exp":"Correct: B. Firms satisfy disclosure obligations by: (1) disclosing the ESSENTIAL ARRANGEMENTS in SUMMARY FORM; (2) UNDERTAKING to provide further details on request; and (3) ACTUALLY PROVIDING those details on request. Key fact: Inducement disclosure = summary + offer further details + provide on request."},{"tag":"detail","topic":"Inducements","q":"For non-MiFID firms, which of the three inducement tests applies to third-party payments?","opts":["Only the enhancement of quality test, provided the client has given prior written consent.","Only the prior disclosure test, provided the client has given prior written consent.","Only the 'does not impair compliance with the firm's duty to act in the client's best interests' test","All three tests apply equally to non-MiFID firms, provided the client has given prior written consent."],"ans":2,"exp":"Correct: C. For non-MiFID firms, only the 'DOES NOT IMPAIR COMPLIANCE' test applies to third-party payments. The other two tests — disclosure and enhancement of quality — do NOT apply to non-MiFID firms. Exception: retail non-MiFID business for packaged products is subject to the disclosure requirements. Key fact: Non-MiFID = only 'not impair' test. Not disclosure or enhancement tests."},{"tag":"cisi","topic":"Minor Non-Monetary","q":"Which of the following correctly describes a 'minor non-monetary benefit' that is permissible even for independent advice and portfolio management services?","opts":["Any benefit valued at less than £500, as specified in the relevant FCA Handbook provisions, as required under the relevant COBS or SYSC rules in the FCA Handbook.","A benefit that is clearly disclosed, capable of enhancing service quality, cannot impair the duty to act in the client's best interests, and is reasonable and proportionate","Any non-cash benefit provided by a third party, as specified in the relevant FCA Handbook provisions, unless a specific exemption applies under the Financial Promotion Order.","A benefit provided exclusively to professional clients, as specified in the relevant FCA Handbook provisions, provided the firm has obtained prior written consent from the client."],"ans":1,"exp":"Correct: B. A minor non-monetary benefit must be: (1) CLEARLY DISCLOSED before the service; (2) CAPABLE OF ENHANCING the quality of service; (3) of a scale/nature that it CANNOT IMPAIR the duty to act in the client's best interests; and (4) REASONABLE, PROPORTIONATE and unlikely to influence the firm's behaviour detrimentally. Key fact: Minor non-monetary benefit = disclosed + enhances quality + cannot impair duty + proportionate."},{"tag":"cisi","topic":"Minor Non-Monetary","q":"Which of the following is an example of a qualifying minor non-monetary benefit?","opts":["A holiday paid for by a product provider for the firm's top-selling advisers, provided the client has given prior written consent.","Participation in a conference, seminar or training event on the benefits and features of a specific financial instrument","Cash bonuses paid by a fund manager to advisers who recommend its products, provided the client has given prior written consent.","A new laptop provided by a platform to the firm for exclusive use in promoting its products"],"ans":1,"exp":"Correct: B. Qualifying minor non-monetary benefits include: participation in conferences, seminars and training events on benefits/features of specific financial instruments or services. The other options are clearly incentives that would impair the duty to act in the client's best interests. Key fact: Conference/seminar/training = qualifying minor non-monetary benefit."},{"tag":"detail","topic":"Minor Non-Monetary","q":"A fund manager provides food and drinks to advisers at a business meeting. Is this a permissible minor non-monetary benefit?","opts":["No — any hospitality from product providers is prohibited, as specified in the relevant FCA Handbook provisions, unless a specific exemption applies under the Financial Promotion Order.","Yes — hospitality of a reasonable de minimis value, such as food and drink during a business meeting or conference, qualifies as a permissible minor non-monetary benefit","Only if the cost is below £25 per person, as specified in the relevant FCA Handbook provisions, as required under the relevant COBS or SYSC rules in the FCA Handbook.","Yes — but only if the meeting is held at the fund manager's own premises, unless the client has been notified in a durable medium."],"ans":1,"exp":"Correct: B. Hospitality of a REASONABLE DE MINIMIS VALUE — such as food and drink during a BUSINESS MEETING or a conference, seminar or training event — qualifies as a permissible minor non-monetary benefit. Key fact: Food and drink at business meetings/conferences = permissible minor non-monetary benefit (reasonable de minimis value)."},{"tag":"cisi","topic":"Research Payment","q":"How may an in-scope firm pay for investment research it receives?","opts":["From any account at the firm's discretion, provided the client has given prior written consent.","Either directly from its own resources, or from a Research Payment Account (RPA) funded by a specific charge to clients","By embedding research costs within execution commissions with no separate disclosure","From client assets held in custody, without any specific charge, provided the client has given prior written consent."],"ans":1,"exp":"Correct: B. In-scope firms may only receive research if they pay for it using one of TWO methods: (1) DIRECTLY FROM OWN RESOURCES; or (2) from a RESEARCH PAYMENT ACCOUNT (RPA) funded by a specific research charge to clients. Key fact: Research payment: 2 methods = own resources OR RPA (client-funded)."},{"tag":"cisi","topic":"Research Payment","q":"What is the market capitalisation threshold for the SME research exemption introduced in 2022?","opts":["Less than £50 million","Less than £100 million","Less than £200 million","Less than £500 million"],"ans":2,"exp":"Correct: C. Research on companies with a market capitalisation of LESS THAN £200 MILLION is exempt under the SME research exemption — meaning UK-based fund managers do not have to pay for this research. Key fact: SME research exemption = companies with market cap < £200 million."},{"tag":"detail","topic":"Research Payment","q":"Under the 2022 FCA exemptions, is macro-economic research exempt from the research payment rules?","opts":["Yes — macro-economic research is always exempt as it is generic information, provided the client has given prior written consent.","No — macro-economic research does NOT qualify as 'FICC' research and UK asset managers must continue to pay for it","Yes — if it is provided by an independent research provider, provided the client has given prior written consent.","No — but it can be received free of charge if made openly available to the public"],"ans":1,"exp":"Correct: B. The FCA's rules mean that UK asset managers must continue to PAY FOR macro-economic research — it does NOT meet the definition of 'FICC' research (which is based on underlying financial instruments, not concerning an investment strategy primarily relating to FICC instruments). Key fact: Macro-economic research = NOT exempt (must be paid for)."},{"tag":"cisi","topic":"Research Payment","q":"Which of the following is NOT considered to be 'research' for the purposes of the Research Payment Account (RPA)?","opts":["Analysis of equity valuations based on company fundamentals","A report on the outlook for a specific sector, provided the client has given prior written consent.","Seminar fees, corporate access services, and order/execution management services","Reports on currency movements for portfolio management purposes"],"ans":2,"exp":"Correct: C. The FCA does NOT consider the following to constitute research for RPA purposes: post-trade analytics; price feeds or historical price data (unanalysed); SEMINAR FEES; CORPORATE ACCESS SERVICES; ORDER AND EXECUTION MANAGEMENT SERVICES; administration of an RPA. Key fact: Not research for RPA = seminar fees + corporate access + order/execution management + RPA administration."},{"tag":"cisi","topic":"Research Payment","q":"From August 2024, what additional flexibility was granted to UK buy-side firms regarding research payments?","opts":["They may receive all research free of charge from any provider, provided the client has given prior written consent.","They are permitted to bundle payments for third-party research and execution services, subject to relevant requirements","They are no longer required to maintain a Research Payment Account, provided the client has given prior written consent.","They may pay for research in any currency without conversion restrictions, provided the client has given prior written consent."],"ans":1,"exp":"Correct: B. From AUGUST 2024, UK buy-side firms (asset managers, pension schemes and fund managers) may BUNDLE payments for third-party research and execution services, provided they meet the relevant requirements around execution and research costs. Key fact: Aug 2024 = bundled research + execution payments permitted for buy-side firms."},{"tag":"scenario","topic":"Research Payment","q":"A firm provides portfolio management services to retail and professional clients. It receives research from an external provider. Which research payment method may it use?","opts":["It may receive the research free of charge as a minor non-monetary benefit","It must pay either directly from its own resources or from an RPA funded by a specific client charge","It may pay through execution commissions without separate disclosure, provided the client has given prior written consent.","Any payment method is permissible provided it is documented, provided the client has given prior written consent."],"ans":1,"exp":"Correct: B. A firm providing portfolio management services (or independent/restricted advice) to retail/professional clients is an 'in-scope' firm. It must pay for research either: (1) from its OWN RESOURCES; or (2) from an RPA funded by a SPECIFIC RESEARCH CHARGE to clients. Key fact: Portfolio management firm receiving research = must pay via own resources or RPA."},{"tag":"scenario","topic":"Conflicts — Principles","q":"A firm's remuneration structure for advisers is entirely variable, based solely on sales volumes. Which conflict of interest risk does the FCA specifically highlight?","opts":["No concern — variable pay is standard practice in the industry, provided the client has given prior written consent.","100% variable pay based on sales increases the risk of misselling and increases the difficulty of managing this risk","Variable pay only creates conflicts for ECPs, not retail clients, provided the client has given prior written consent.","This structure is only a concern if advisers receive more than £100,000 per year, provided the client has given prior written consent."],"ans":1,"exp":"Correct: B. The FCA specifically identifies that remuneration which is effectively 100% VARIABLE PAY BASED ON SALES increases the RISK OF MISSELLING and increases the DIFFICULTY OF MANAGING this risk. Key fact: 100% variable pay = increased misselling risk + harder to manage (FCA-identified concern)."},{"tag":"concept","topic":"Information Barriers","q":"What is the purpose of an information barrier in the context of a firm that has both a corporate finance arm and an equity research arm?","opts":["To prevent the research arm from publishing negative recommendations about corporate finance clients, unless the client has been notified in a durable medium.","To isolate those who make investment decisions from those privy to confidential information that could influence the decision process — preventing sensitive information from flowing into the market prematurely","To prevent the corporate finance arm from knowing about the research arm's client base, as specified in the relevant FCA Handbook provisions, unless a specific exemption applies under the Financial Promotion Order.","To allow the firm to trade on inside information before it is made public, as specified in the relevant FCA Handbook provisions, as required under the relevant COBS or SYSC rules in the FCA Handbook."],"ans":1,"exp":"Correct: B. The purpose of an information barrier between corporate finance and research/market-making is to ISOLATE investment decision-makers from those who have access to CONFIDENTIAL INFORMATION (e.g. M&A plans) that could influence the investment process — preventing premature release of sensitive information. Key fact: Information barrier purpose = isolate decision-makers from confidential info holders. Prevent premature market release."},{"tag":"detail","topic":"Conflicts Policy","q":"A firm's corporate finance department is managing a new securities offering. What specific additional content must the conflicts policy address for this activity?","opts":["The names of all clients who might purchase the securities, as specified in the relevant FCA Handbook provisions, unless a specific exemption applies under the Financial Promotion Order.","The offering process — including whether the firm might place securities with its own investment clients or proprietary book — and specific arrangements for allocation and pricing","The credit rating of the issuer and the underwriting fee structure, as specified in the relevant FCA Handbook provisions, provided the firm has obtained prior written consent from the client.","Only the disclosure arrangements to be made to the FCA, as specified in the relevant FCA Handbook provisions, as required under the relevant COBS or SYSC rules in the FCA Handbook."],"ans":1,"exp":"Correct: B. For corporate finance firms managing a securities offering, the conflicts policy must specifically address: (1) the OFFERING PROCESS (including whether the firm places securities with investment clients or proprietary book); and (2) specific detail on ALLOCATION AND PRICING arrangements. Key fact: Corporate finance offering = policy must cover offering process + allocation + pricing."},{"tag":"cisi","topic":"Conflicts — Principles","q":"Which of the following is a required step for firms in managing conflicts of interest for externally facing investment research?","opts":["Seek FCA pre-approval for all externally distributed research, provided the client has given prior written consent.","Have appropriate information systems and controls, and barriers to stop research information from flowing to the rest of the firm's business","Ensure all research is co-authored by an independent external party, provided the client has given prior written consent.","Distribute research only to professional clients to limit conflict exposure, provided the client has given prior written consent."],"ans":1,"exp":"Correct: B. For firms producing externally facing investment research, they must have appropriate information systems and CONTROLS IN PLACE, and BARRIERS to stop information from research activities flowing to the rest of the firm's business. Key fact: External research production = info systems + controls + barriers to prevent internal flow."},{"tag":"detail","topic":"Inducements","q":"Must firms keep records of inducement payments for UK MiFID business?","opts":["No — only disclosure to clients is required, provided the client has given prior written consent.","Yes — firms must keep full records of payments and benefits made to other firms for all UK MiFID business","Only if the payments exceed £1,000 per transaction, provided the client has given prior written consent.","Only for inducements received, not those paid to other firms, provided the client has given prior written consent."],"ans":1,"exp":"Correct: B. Firms must keep FULL RECORDS of such payments/benefits made to other firms for ALL UK MiFID business. Record-keeping is a standalone obligation separate from disclosure. Key fact: Inducements UK MiFID = full records required of all payments/benefits to other firms."},{"tag":"scenario","topic":"Minor Non-Monetary","q":"A third-party fund manager provides a firm's advisers with detailed written analysis of specific client portfolios and model investment strategies. Does this qualify as a minor non-monetary benefit?","opts":["No — written materials from fund managers are always prohibited, unless the client has been notified in a durable medium.","Yes — information or documentation relating to a financial instrument or investment service (generic or personalised) is a qualifying minor non-monetary benefit","Only if the total value is below £100, as specified in the relevant FCA Handbook provisions, as required under the relevant COBS or SYSC rules in the FCA Handbook.","No — only verbal communications from third parties are permitted, unless the client has been notified in a durable medium."],"ans":1,"exp":"Correct: B. One qualifying example of a minor non-monetary benefit is: information or documentation relating to a financial instrument or an investment service, that is GENERIC IN NATURE or PERSONALISED to reflect the circumstances of an individual client. Key fact: Generic or personalised investment info/documentation = qualifying minor non-monetary benefit."},{"tag":"detail","topic":"Research Standards","q":"When must a firm disclose whether a research recommendation has been disclosed to the issuer and amended prior to dissemination?","opts":["Only if the issuer is a FTSE 100 company, as specified in the relevant FCA Handbook provisions, as required under the relevant COBS or SYSC rules in the FCA Handbook.","As part of the fair presentation requirements — material sources must be indicated, including whether the recommendation was disclosed to the issuer and amended before dissemination","Only if the research is distributed to more than 100 clients, as specified in the relevant FCA Handbook provisions, provided the firm has obtained prior written consent from the client.","Never — this information is commercially sensitive, as specified in the relevant FCA Handbook provisions, unless a specific exemption applies under the Financial Promotion Order."],"ans":1,"exp":"Correct: B. As part of FAIR PRESENTATION requirements, firms must indicate MATERIAL SOURCES — including whether the recommendation was DISCLOSED TO THE ISSUER and AMENDED PRIOR TO DISSEMINATION. This ensures transparency about issuer influence. Key fact: Fair presentation = disclose whether recommendation was shown to issuer and amended before release."},{"tag":"scenario","topic":"Disclosure","q":"A firm identifies a conflict where a portfolio manager holds personal shares in a company whose stock it is about to recommend to clients. The firm has no procedure to manage this conflict. What must it do?","opts":["Proceed without disclosure as the manager's personal holdings are private, provided the client has given prior written consent.","Clearly disclose the general nature and source of the conflict to the client BEFORE undertaking business, in a durable medium with sufficient detail","Report the conflict to the FCA and await clearance, subject to the relevant COBS provisions applying to the business.","Postpone the recommendation until the manager has divested the personal holdings, provided the client has given prior written consent."],"ans":1,"exp":"Correct: B. When internal arrangements are insufficient to manage a conflict (here, no procedure exists), the firm must CLEARLY DISCLOSE the general nature and/or source of the conflict to the client BEFORE undertaking business. Disclosure must be in a DURABLE MEDIUM with SUFFICIENT DETAIL. Key fact: Unmanageable conflict = must disclose before undertaking business. Durable medium + sufficient detail."},{"tag":"cisi","topic":"Research Payment","q":"Which firms are NOT subject to the research payment rules (i.e. may receive research from UK-regulated producers free of charge)?","opts":["All UK asset managers, regardless of client type, provided the client has given prior written consent.","Non-UK regulated bodies that produce research, and firms located outside the UK that consume research","Any firm providing execution-only services, provided the client has given prior written consent.","Firms whose research budgets are below £500,000 annually, provided the client has given prior written consent."],"ans":1,"exp":"Correct: B. The research payment provisions (requiring separately identifiable charges for research) do NOT apply to: (1) NON-UK REGULATED BODIES that PRODUCE research; and (2) FIRMS LOCATED OUTSIDE THE UK that CONSUME research. Key fact: Research payment rules exempt: non-UK producers + non-UK consuming firms."}];
const SK='cisi_ch2s9_v1';const N=10;let APP={round:[],answers:{},opts:{},seen:[],roundNum:0};function save(){try{localStorage.setItem(SK,JSON.stringify(APP));}catch(e){}}function load(){try{const d=localStorage.getItem(SK);if(d)APP=JSON.parse(d);}catch(e){}}function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}function buildRound(){const lw=Object.entries(APP.answers).filter(([,v])=>v&&v.v===0).map(([k])=>APP.round[parseInt(k)]).filter(x=>x!==undefined);const us=BANK.map((_,i)=>i).filter(i=>!APP.seen.includes(i));const so=APP.seen.filter(i=>!APP.round.includes(i));let c=[];c.push(...shuffle(lw).slice(0,3));c.push(...shuffle(us.filter(i=>!c.includes(i))).slice(0,N-c.length));if(c.length<N)c.push(...shuffle(so.filter(i=>!c.includes(i))).slice(0,N-c.length));if(c.length<N)c.push(...shuffle(BANK.map((_,i)=>i).filter(i=>!c.includes(i))).slice(0,N-c.length));const r=shuffle(c).slice(0,N);r.forEach(i=>{if(!APP.seen.includes(i))APP.seen.push(i);});APP.round=r;APP.answers={};APP.opts={};APP.roundNum=(APP.roundNum||0)+1;}function doReset(){buildRound();save();render();window.scrollTo({top:0,behavior:'smooth'});}function pick(p,oi){if(APP.answers[p])return;const q=BANK[APP.round[p]];APP.answers[p]={opt:q.opts[oi],v:oi===q.ans?1:0};save();render();setTimeout(()=>{const d=Object.keys(APP.answers).length;if(d<N){const cards=document.querySelectorAll('#q-area .q-card');const nx=[...Array(N).keys()].find(j=>j>p&&!APP.answers[j]);if(nx!==undefined)cards[nx]?.scrollIntoView({behavior:'smooth',block:'center'});}else document.querySelector('#q-area .result-card')?.scrollIntoView({behavior:'smooth',block:'start'});},350);}function render(){const d=Object.keys(APP.answers).length;const ok=Object.values(APP.answers).filter(v=>v&&v.v===1).length;const bad=d-ok;const pct=d?Math.round(ok/d*100):null;document.getElementById('round-label').textContent=`Round ${APP.roundNum} \u00b7 10 Qs from bank of ${BANK.length} \u00b7 Seen: ${APP.seen.length}/${BANK.length}`;document.getElementById('s-num').textContent=`${d}/${N}`;document.getElementById('s-ok').textContent=ok;document.getElementById('s-bad').textContent=bad;document.getElementById('s-pct').textContent=pct===null?'\u2014':pct+'%';const tr=document.getElementById('tracker');tr.innerHTML='';for(let i=0;i<N;i++){const dot=document.createElement('div');dot.className='tracker-dot'+(APP.answers[i]?APP.answers[i].v===1?' t-ok':' t-bad':i===d?' t-cur':'');tr.appendChild(dot);}const area=document.getElementById('q-area');area.innerHTML='';const L=['A','B','C','D'];const tm={cisi:'CISI exam style',concept:'Concept check',scenario:'Scenario',detail:'Detail'};const tc={cisi:'tag-cisi',concept:'tag-concept',scenario:'tag-scenario',detail:'tag-detail'};APP.round.forEach((qi,pos)=>{const q=BANK[qi];const ans=!!APP.answers[pos];const ch=APP.answers[pos]?.opt;if(!APP.opts[pos])APP.opts[pos]=shuffle(q.opts.map((_,i)=>i));const oo=APP.opts[pos];let oh=oo.map((oi,li)=>{let cl='opt';if(ans)cl+=' dis';if(ans&&oi===q.ans)cl+=' ok';else if(ans&&q.opts[oi]===ch&&oi!==q.ans)cl+=' bad';return`<div class="${cl}" onclick="pick(${pos},${oi})"><span class="opt-l">${L[li]}</span><span>${q.opts[oi]}</span></div>`;}).join('');let eh=ans?`<div class="exp-box show ${APP.answers[pos].v===1?'exp-ok':'exp-bad'}"><strong>${APP.answers[pos].v===1?'\u2713 Correct!':'\u2717 Incorrect.'}</strong> ${q.exp}</div>`:'';const card=document.createElement('div');card.className='q-card';card.innerHTML=`<div class="q-meta"><span class="q-num">Q${pos+1}</span><span class="q-tag ${tc[q.tag]}">${tm[q.tag]}</span><span class="q-topic">${q.topic}</span></div><div class="q-text">${q.q}</div><div class="opts">${oh}</div>${eh}`;area.appendChild(card);});if(d===N){const pF=Math.round(ok/N*100);let lb,co,gr;if(pF>=80){lb='Pass standard met!';co='var(--teal-m)';gr='Pass \u2713';}else if(pF>=70){lb='Close \u2014 review weaker areas.';co='var(--amber)';gr='Near Pass';}else if(pF>=60){lb='Borderline.';co='var(--coral-m)';gr='Borderline';}else{lb='Below pass.';co='#A32D2D';gr='Needs Work';}const ts={};APP.round.forEach((qi,pos)=>{const t=BANK[qi].topic;if(!ts[t])ts[t]={ok:0,tot:0};ts[t].tot++;if(APP.answers[pos]?.v===1)ts[t].ok++;});let th=Object.entries(ts).map(([t,s])=>{const tp=Math.round(s.ok/s.tot*100);const cl=tp>=80?'var(--teal-m)':tp>=60?'var(--amber)':'var(--coral-m)';return`<div class="topic-row"><div class="topic-name">${t}</div><div style="font-size:.72rem;color:var(--text3);margin-bottom:.25rem">${s.ok}/${s.tot}</div><div class="topic-bar-wrap"><div class="topic-bar-fill" style="width:${tp}%;background:${cl}"></div></div></div>`;}).join('');let rh=APP.round.map((qi,pos)=>{const q=BANK[qi];const v=APP.answers[pos]?.v===1;return`<div class="q-review-item ${v?'r-ok':'r-bad'}"><span class="r-icon">${v?'\u2713':'\u2717'}</span><div><strong>Q${pos+1} \u00b7 ${q.topic}.</strong> ${q.q}<br><span style="font-size:.78rem;opacity:.85">Answer: ${q.opts[q.ans]}</span></div></div>`;}).join('');const rc=document.createElement('div');rc.className='result-card';rc.style.marginTop='1rem';rc.innerHTML=`<div style="font-size:.85rem;color:var(--text2);margin-bottom:.3rem">Round ${APP.roundNum} complete</div><div class="result-big" style="color:${co}">${ok}/${N}</div><div class="result-grade" style="background:${co}22;color:${co}">${gr}</div><div class="result-bar-wrap"><div class="result-bar-fill" style="width:${pF}%;background:${co}"></div></div><div style="font-size:.82rem;color:var(--text2);margin:.3rem 0 .2rem">${pF}% \u00b7 ${lb}</div><div class="result-breakdown"><span class="rp" style="background:var(--green-l);color:var(--green)">\u2713 ${ok}</span><span class="rp" style="background:var(--coral-l);color:var(--coral)">\u2717 ${N-ok}</span><span class="rp" style="background:var(--navy-l);color:var(--navy-d)">Seen: ${APP.seen.length}/${BANK.length}</span></div><div style="font-size:.8rem;font-weight:600;color:var(--text2);margin-bottom:.55rem;text-align:left">Topics:</div><div class="topic-grid">${th}</div><div class="btn-row" style="margin-bottom:1.4rem"><button class="btn btn-p" onclick="doReset()">\u21ba New round</button></div><div style="font-size:.8rem;font-weight:600;color:var(--text2);margin-bottom:.5rem;text-align:left">Review:</div><div class="q-review-list">${rh}</div>`;area.appendChild(rc);}}load();if(!APP.round||APP.round.length===0)buildRound();render();
</script>
