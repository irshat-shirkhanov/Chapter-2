<style>*{box-sizing:border-box;margin:0;padding:0}:root{--navy:#1E2761;--navy-l:#CADCFC;--navy-d:#12195F;--teal:#028090;--teal-l:#D6F0F3;--teal-d:#015E6A;--teal-m:#1D9E75;--amber:#B07D12;--amber-l:#FEF3C7;--amber-d:#7C5A0A;--coral:#993C1D;--coral-l:#FAECE7;--coral-m:#D85A30;--purple:#534AB7;--purple-l:#EEEDFE;--purple-d:#3C3489;--green-l:#E1F5EE;--green:#085041;--gray:#64748B;--gray-l:#F1F5F9;--gray-m:#CBD5E1;--gray-d:#334155;--bg:#F0F4F8;--card:#fff;--text:#1e293b;--text2:#475569;--text3:#94a3b8;--radius:12px;--shadow:0 2px 10px rgba(0,0,0,.09)}body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}.app-header{background:linear-gradient(135deg,var(--navy),var(--teal));padding:1.2rem 1.5rem .85rem;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.2)}.header-top{display:flex;align-items:flex-start;justify-content:space-between;gap:.75rem}.app-title{color:#fff;font-size:1.08rem;font-weight:700;line-height:1.3}.app-sub{color:var(--navy-l);font-size:.72rem;margin-top:.18rem}.reset-btn{background:rgba(255,255,255,.16);border:1.5px solid rgba(255,255,255,.38);color:#fff;border-radius:7px;padding:.36rem .95rem;font-size:.76rem;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap;flex-shrink:0}.reset-btn:hover{background:rgba(255,255,255,.3)}.screen{padding:1.4rem;max-width:820px;margin:0 auto}.round-pill{display:inline-flex;align-items:center;gap:.4rem;background:var(--navy);color:var(--navy-l);border-radius:7px;padding:.3rem .85rem;font-size:.73rem;font-weight:600;margin-bottom:1rem}.tracker{display:flex;gap:3px;margin-bottom:1.05rem}.tracker-dot{flex:1;height:10px;border-radius:5px;background:var(--gray-m);transition:background .3s}.tracker-dot.t-ok{background:var(--teal-m)}.tracker-dot.t-bad{background:var(--coral-m)}.tracker-dot.t-cur{background:var(--navy-l)}.score-bar{display:flex;gap:.65rem;margin-bottom:1rem}.sc{flex:1;background:var(--card);border-radius:10px;padding:.58rem .75rem;text-align:center;border:1px solid var(--gray-m);box-shadow:var(--shadow)}.sc .n{font-size:1.38rem;font-weight:700;color:var(--teal);line-height:1}.sc .n-ok{color:var(--teal-m)}.sc .n-bad{color:var(--coral-m)}.sc .l{font-size:.67rem;color:var(--text3);margin-top:.18rem}.q-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:1.4rem 1.5rem;margin-bottom:1rem;border:1px solid rgba(0,0,0,.05)}.q-meta{display:flex;align-items:center;gap:.5rem;margin-bottom:.65rem;flex-wrap:wrap}.q-num{font-size:.68rem;font-weight:700;color:var(--teal);text-transform:uppercase;letter-spacing:.07em}.q-tag{font-size:.64rem;font-weight:700;padding:.15rem .48rem;border-radius:20px}.tag-cisi{background:#FEF3C7;color:#7C5A0A}.tag-concept{background:var(--purple-l);color:var(--purple-d)}.tag-scenario{background:var(--teal-l);color:var(--teal-d)}.tag-detail{background:var(--gray-l);color:var(--gray-d)}.q-topic{font-size:.64rem;color:var(--text3);margin-left:auto}.q-text{font-size:.93rem;font-weight:500;line-height:1.6;margin-bottom:.95rem;color:var(--text)}.opts{display:flex;flex-direction:column;gap:.42rem}.opt{display:flex;align-items:flex-start;gap:.65rem;padding:.68rem .95rem;border-radius:8px;border:1.5px solid var(--gray-m);cursor:pointer;font-size:.86rem;line-height:1.46;background:var(--card);transition:all .16s}.opt:hover:not(.dis){border-color:var(--teal);background:var(--teal-l)}.opt.ok{border-color:var(--teal-m);background:var(--green-l);color:var(--green)}.opt.bad{border-color:var(--coral-m);background:var(--coral-l);color:var(--coral)}.opt.dis{cursor:default}.opt-l{width:21px;height:21px;min-width:21px;border-radius:50%;background:#e2e8f0;display:flex;align-items:center;justify-content:center;font-size:.69rem;font-weight:700;color:var(--gray);margin-top:1px;flex-shrink:0}.opt.ok .opt-l{background:var(--teal-m);color:#fff}.opt.bad .opt-l{background:var(--coral-m);color:#fff}.exp-box{margin-top:.8rem;padding:.7rem 1rem;border-radius:8px;font-size:.81rem;line-height:1.62;display:none}.exp-box.show{display:block}.exp-ok{background:var(--green-l);border-left:3px solid var(--teal-m);color:var(--green)}.exp-bad{background:var(--coral-l);border-left:3px solid var(--coral-m);color:var(--coral)}.result-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:2rem 1.5rem;text-align:center;margin-top:.5rem}.result-big{font-size:3.2rem;font-weight:800;margin:.4rem 0}.result-grade{display:inline-block;padding:.38rem 1.2rem;border-radius:20px;font-size:.92rem;font-weight:700;margin:.5rem 0 .8rem}.result-bar-wrap{background:var(--gray-l);border-radius:20px;height:14px;overflow:hidden;margin:.75rem auto;max-width:320px}.result-bar-fill{height:100%;border-radius:20px;transition:width .8s ease}.result-breakdown{display:flex;gap:.6rem;justify-content:center;flex-wrap:wrap;margin:1rem 0 1.2rem}.rp{padding:.3rem .9rem;border-radius:20px;font-size:.8rem;font-weight:600}.topic-grid{display:grid;grid-template-columns:1fr 1fr;gap:.45rem;margin:.5rem 0 1.2rem;text-align:left}.topic-row{background:var(--gray-l);border-radius:8px;padding:.5rem .75rem;font-size:.78rem}.topic-name{color:var(--text2);font-weight:600;margin-bottom:.2rem}.topic-bar-wrap{background:var(--gray-m);border-radius:10px;height:6px;overflow:hidden}.topic-bar-fill{height:100%;border-radius:10px}.q-review-list{text-align:left;margin-top:.5rem}.q-review-item{padding:.65rem 1rem;border-radius:8px;margin-bottom:.45rem;font-size:.83rem;line-height:1.52;display:flex;gap:.65rem;align-items:flex-start}.q-review-item.r-ok{background:var(--green-l);border-left:3px solid var(--teal-m);color:var(--green)}.q-review-item.r-bad{background:var(--coral-l);border-left:3px solid var(--coral-m);color:var(--coral)}.r-icon{font-size:.9rem;flex-shrink:0;margin-top:.08rem}.btn{padding:.58rem 1.3rem;border:none;border-radius:8px;cursor:pointer;font-size:.86rem;font-weight:600;transition:all .2s}.btn-p{background:var(--teal);color:#fff}.btn-p:hover{background:var(--teal-d)}.btn-row{display:flex;gap:.65rem;flex-wrap:wrap;justify-content:center}</style>

<div class="app-header"><div class="header-top"><div><div class="app-title">CISI UK Financial Regulation — Chapter 2, Section 3</div><div class="app-sub">Client Categorisation: Retail • Professional (Per Se / Elective) • ECP • Agent Rules • Local Authorities &nbsp;|&nbsp; Syllabus 2.3 &nbsp;|&nbsp; 10 Qs per round &nbsp;|&nbsp; Bank: 57 questions</div></div><button class="reset-btn" onclick="doReset()">&#8634; New round</button></div></div>
<div class="screen"><div class="round-pill" id="round-label">Round 1</div><div class="tracker" id="tracker"></div><div class="score-bar"><div class="sc"><div class="n" id="s-num">0/10</div><div class="l">Progress</div></div><div class="sc"><div class="n n-ok" id="s-ok">0</div><div class="l">Correct</div></div><div class="sc"><div class="n n-bad" id="s-bad">0</div><div class="l">Wrong</div></div><div class="sc"><div class="n" id="s-pct">&mdash;</div><div class="l">Score</div></div></div><div id="q-area"></div></div>
<script>
const BANK=[
{"tag":"cisi","topic":"Categories","q":"Under COBS, how many client categories exist?","opts":["Two: retail and professional","Three: retail, professional and eligible counterparty","Four: retail, professional, eligible counterparty and institutional","Five including sophisticated investors"],"ans":1,"exp":"Correct: B. COBS defines three client categories: retail (most protection), professional (per se or elective), and eligible counterparty/ECP (least protection). Why others wrong: (A) misses ECP. (C/D) 'institutional' and 'sophisticated' are not separate COBS categories. Key fact: 3 categories."},
{"tag":"concept","topic":"Categories","q":"Which of the following correctly defines a 'retail client' under COBS?","opts":["A client with a portfolio below \u00a350,000","Any client who is NOT a professional client or an eligible counterparty","A natural person not employed in financial services","A client with fewer than 5 years' investment experience"],"ans":1,"exp":"Correct: B. Retail = residual/default category \u2014 anyone NOT professional or ECP. No portfolio, experience or employment test. If in doubt, firm must treat as retail. Key fact: Retail = NOT professional, NOT ECP."},
{"tag":"cisi","topic":"Categories","q":"The FCA Handbook term 'customer' covers which client types?","opts":["Only retail clients","Only professional clients","Both retail and professional clients","Retail, professional and eligible counterparties"],"ans":2,"exp":"Correct: C. 'Customer' = umbrella term covering retail + professional. ECPs are NOT included. This matters because some rules apply to 'customers' (retail+professional) while others apply only to 'clients' (all three). Key fact: Customer = retail + professional, excludes ECPs."},
{"tag":"detail","topic":"Categories","q":"Which of the following is TRUE about the COBS definition of 'client'?","opts":["It covers only natural persons receiving services from the firm","It includes potential clients and persons to whom financial promotions are communicated","It excludes clients of a firm's appointed representatives","It only applies to persons who have signed a client agreement"],"ans":1,"exp":"Correct: B. 'Client' = anyone to whom a firm provides, intends to provide, or has provided a service. Includes potential clients, persons communicated to under financial promotions, and AR clients (who are treated as clients of the principal). Key fact: Client includes potential clients and AR clients."},
{"tag":"cisi","topic":"Categories","q":"A firm provides both MiFID and non-MiFID services to a client. Which categorisation rules should it use?","opts":["Non-MiFID rules always take precedence","MiFID rules, unless MiFID business is conducted separately","Whichever gives the client more protection","The firm may choose freely"],"ans":1,"exp":"Correct: B. For mixed services, MiFID categorisation applies unless MiFID business is conducted separately from non-MiFID business. Key fact: Mix = MiFID rules (unless separately conducted)."},
{"tag":"scenario","topic":"Categories","q":"A small UK company with net assets of \u00a3200,000 approaches an investment firm for advice on equity investments. How should the firm classify this client?","opts":["Per se professional \u2014 it is a company","Eligible counterparty \u2014 it is a legal person","Retail client \u2014 it does not meet any professional or ECP criteria","The firm cannot accept a company as a client"],"ans":2,"exp":"Correct: C. A small company not meeting the large undertaking thresholds and not being a regulated financial entity is classified as retail by default. Retail = anyone NOT professional or ECP. Key fact: Small companies can be retail clients."},
{"tag":"cisi","topic":"Categories","q":"Which of the following is TRUE about client categorisation under COBS?","opts":["Categorisation is optional for non-MiFID business","Categorisation is required for firms carrying on designated investment business","Only retail clients need to be formally categorised","Categorisation only applies when providing investment advice"],"ans":1,"exp":"Correct: B. Categorisation is required for all firms carrying on designated investment business, covering MiFID and non-MiFID services. Key fact: Categorisation = mandatory for designated investment business."},
{"tag":"detail","topic":"Categories","q":"Which of the following statements about client categories is NOT correct?","opts":["Retail clients receive the most regulatory protection","ECPs receive the least regulatory protection","A 'customer' includes ECPs under COBS terminology","Professional clients may be per se or elective"],"ans":2,"exp":"Correct: C. 'Customer' does NOT include ECPs \u2014 it covers only retail + professional. All other statements are correct. Key fact: Customer \u2260 ECP. Exam trap: 'customer' is narrower than 'client'."},
{"tag":"cisi","topic":"Per Se Professional","q":"Which of the following is classified as a per se professional client?","opts":["Any individual with net worth exceeding \u00a31 million","An entity required to be authorised or regulated in financial markets","Any UK-incorporated company","A client who has passed the FCA's approved person exam"],"ans":1,"exp":"Correct: B. Per se professionals include: credit institutions, investment firms, other authorised FIs, insurance companies, CIS/management companies, pension funds, commodity dealers, institutional investors. Key fact: Per se = regulated entities + large undertakings + governments."},
{"tag":"cisi","topic":"Per Se Professional","q":"For MiFID business, a large undertaking qualifies as per se professional if it meets ANY two of which three criteria?","opts":["Revenue >\u00a310m, employees >500, market cap >\u00a3100m","Balance sheet \u2265\u20ac20m, net turnover \u2265\u20ac40m, own funds \u2265\u20ac2m","Turnover >\u00a35m, assets >\u00a35m, employees >50","Profit >\u20ac5m, share capital >\u20ac10m, debt ratio <50%"],"ans":1,"exp":"Correct: B. MiFID large undertaking = any 2 of 3: (1) balance sheet \u2265\u20ac20m; (2) net turnover \u2265\u20ac40m; (3) own funds \u2265\u20ac2m. Key fact: \u20ac20m / \u20ac40m / \u20ac2m = MiFID thresholds."},
{"tag":"scenario","topic":"Per Se Professional","q":"A commodity derivatives dealer opens an account with an investment firm. How should the dealer be classified?","opts":["Retail, because commodity dealers are not investment firms","Per se professional, because commodity dealers are on the per se list","Eligible counterparty for all services","Must first pass the qualitative test"],"ans":1,"exp":"Correct: B. Commodity/commodity derivatives dealers are specifically listed as per se professional clients. Exam Q27 confirmed: the dealer is an investment firm. Key fact: Commodity derivatives dealer = per se professional."},
{"tag":"detail","topic":"Per Se Professional","q":"For NON-MiFID business, which of the following qualifies as a large undertaking?","opts":["A company with called-up share capital or net assets of at least \u00a35 million at any time in the past 2 years","A company with annual profit exceeding \u00a32 million","A partnership with gross turnover exceeding \u00a31 million","Any company listed on AIM"],"ans":0,"exp":"Correct: A. For non-MiFID, a large undertaking includes a company with called-up share capital or net assets \u2265\u00a35m (in past 2 years), or meeting 2 of 3: balance sheet \u20ac12.5m / turnover \u20ac25m / 250 employees. Key fact: Non-MiFID = \u00a35m share capital/net assets."},
{"tag":"cisi","topic":"Per Se Professional","q":"Which of the following is TRUE about non-MiFID large undertaking tests?","opts":["They use the same \u20ac20m/\u20ac40m/\u20ac2m thresholds as MiFID","A company meeting 2 of 3: \u20ac12.5m balance sheet, \u20ac25m turnover, 250 average employees qualifies","Only companies with more than 500 employees qualify","The tests are identical for partnerships and companies"],"ans":1,"exp":"Correct: B. Non-MiFID alternative 2-of-3 test: balance sheet \u20ac12.5m / turnover \u20ac25m / 250 employees average. This differs from MiFID thresholds. Key fact: Non-MiFID 2-of-3 = \u20ac12.5m / \u20ac25m / 250 employees."},
{"tag":"detail","topic":"Per Se Professional","q":"A trustee of an occupational pension scheme can be classified as a per se professional client if the scheme has:","opts":["At least 20 members and \u00a35 million in assets","At least 50 members AND assets under management of at least \u00a310 million","Any number of members but assets exceeding \u00a31 million","At least 100 members regardless of asset size"],"ans":1,"exp":"Correct: B. For non-MiFID: trustee of occupational/stakeholder/personal pension scheme = per se professional if \u226550 members AND \u2265\u00a310m assets (in past 2 years). Key fact: Pension scheme per se = \u226550 members + \u2265\u00a310m assets."},
{"tag":"cisi","topic":"Per Se Professional","q":"Which of the following is also included in the per se professional client list?","opts":["High-net-worth individuals with >\u20ac500,000 portfolio","National or regional governments, central banks and supranational institutions","All UK-listed companies regardless of size","Family offices managing private wealth"],"ans":1,"exp":"Correct: B. The per se list includes national/regional governments, certain public bodies, central banks, and international/supranational institutions. Key fact: Governments + central banks = per se professional."},
{"tag":"cisi","topic":"ECP","q":"Which of the following is TRUE about the ECP category compared to per se professional?","opts":["The lists are identical","The ECP list is the same as per se professional but EXCLUDES large undertakings","ECPs receive more protection than per se professionals","Only banks can be ECPs"],"ans":1,"exp":"Correct: B. ECP list = per se professional MINUS large undertakings. A large company meeting size tests is per se professional but NOT ECP. Key exam distinction. Key fact: ECP = per se - large undertakings."},
{"tag":"cisi","topic":"ECP","q":"ECP status applies to which of the following services?","opts":["All MiFID investment services including advice","Only dealing on own account, execution of orders, reception/transmission and related ancillary services","Only portfolio management services","All services provided the client requests ECP treatment"],"ans":1,"exp":"Correct: B. ECP business = dealing on own account, execution of orders, reception/transmission + directly related ancillary services. NOT advice, NOT portfolio management. Key fact: ECP = dealing + execution + transmission only."},
{"tag":"scenario","topic":"ECP","q":"An insurance company classified as an ECP asks a firm for investment advice. How should the firm classify this client for the advisory service?","opts":["As an ECP, because the client's overall status remains unchanged","As a per se professional client for that service","As a retail client, because advice requires maximum protection","The firm must refuse to provide advice to an ECP"],"ans":1,"exp":"Correct: B. If an ECP wants investment advice (not an ECP-eligible service), they must be classified as per se professional for that service. Exam Q30 tests this. Key fact: ECP for advice = becomes per se professional."},
{"tag":"detail","topic":"ECP","q":"Which of the following entities can be classified as an eligible counterparty?","opts":["A large manufacturing company meeting the MiFID size thresholds","A credit institution such as a bank","A high-net-worth individual with \u20ac5 million in assets","A local authority managing its pension fund"],"ans":1,"exp":"Correct: B. Banks/credit institutions are on the ECP list. Large undertakings = per se professional only, NOT ECP. Individuals and local authorities (retail by default) cannot be ECPs. Key fact: Banks = ECP. Large undertakings \u2260 ECP."},
{"tag":"cisi","topic":"ECP","q":"Which of the following is NOT a consequence of being classified as an ECP?","opts":["The firm does not need to comply with best execution requirements","The firm does not need to provide client agreements","SYSC 10 conflicts of interest rules still apply to the firm","The firm does not need to assess suitability"],"ans":2,"exp":"Correct: C. SYSC 10 conflicts of interest rules STILL apply to all authorised firms, including when dealing with ECPs. Best execution, client agreements, and suitability rules are disapplied for ECP business. Key fact: Conflicts of interest (SYSC 10) = always applies, even for ECPs."},
{"tag":"scenario","topic":"ECP","q":"A firm that is a per se professional client and an undertaking (but NOT an institutional investor) requests to be treated as an ECP. Is this permitted?","opts":["No \u2014 only regulated entities can be ECPs","Yes \u2014 any per se professional can request ECP treatment","Yes \u2014 if it is an undertaking and a per se professional (excluding institutional investors), it can request elective ECP treatment","No \u2014 elective ECP status does not exist"],"ans":2,"exp":"Correct: C. Elective ECP: must be an undertaking AND per se professional (excluding those who are only professional because they are institutional investors), AND must request ECP treatment. Key fact: Elective ECP = undertaking + per se professional + request."},
{"tag":"cisi","topic":"Elective Professional","q":"The qualitative test for elective professional reclassification requires the firm to assess the client's:","opts":["Annual income and tax status","Expertise, experience and knowledge \u2014 believing the client can make own investment decisions","Portfolio size and trading history only","Employment status and professional qualifications"],"ans":1,"exp":"Correct: B. Qualitative test = firm assesses expertise, experience and knowledge and must believe the client CAN make their own investment decisions and understand the risks. Required for both MiFID and non-MiFID. Key fact: Qualitative = expertise + experience + knowledge \u2192 own decisions."},
{"tag":"cisi","topic":"Elective Professional","q":"For MiFID business, which of the following is one of the three quantitative test criteria for elective professional status?","opts":["Annual income exceeds \u20ac200,000","Portfolio exceeds \u20ac500,000 (cash deposits and financial instruments)","Client has held a bank account for at least 10 years","Client has a university degree in finance"],"ans":1,"exp":"Correct: B. Three criteria (must meet 2 of 3): (a) 10 transactions/quarter over past 4 quarters; (b) portfolio >\u20ac500,000 (cash + financial instruments); (c) \u22651 year in financial services in relevant position. Key fact: \u20ac500,000 = cash + financial instruments."},
{"tag":"detail","topic":"Elective Professional","q":"The \u20ac500,000 portfolio threshold for elective professional classification includes:","opts":["Only equities and bonds in a brokerage account","Cash deposits and financial instruments","Only financial instruments, excluding cash","Property, vehicles and other physical assets"],"ans":1,"exp":"Correct: B. \u20ac500,000 = cash deposits + financial instruments. Property and physical assets excluded. Key fact: Cash counts towards \u20ac500,000."},
{"tag":"scenario","topic":"Elective Professional","q":"Maria executed 12 transactions per quarter over the past year, has a portfolio of \u20ac300,000, and has 3 years as a compliance officer at a bank. Can she pass the MiFID quantitative test?","opts":["No \u2014 she meets none of the criteria","No \u2014 she meets only 1 criterion","Yes \u2014 she meets 2 of 3 criteria: transactions and financial services experience","Yes \u2014 she meets all 3 criteria"],"ans":2,"exp":"Correct: C. (a) 12 txns/quarter > 10 = PASS; (b) \u20ac300k < \u20ac500k = FAIL; (c) 3 years compliance at bank \u2265 1 year FS = PASS. 2 of 3 = sufficient. Key fact: Check each criterion carefully."},
{"tag":"scenario","topic":"Elective Professional","q":"James has a portfolio of \u20ac600,000 and worked as a financial analyst for 2 years, but only executed 3 transactions per quarter. Does he pass the MiFID quantitative test?","opts":["No \u2014 he fails on all three criteria","No \u2014 he only meets 1 criterion (portfolio)","Yes \u2014 he meets 2 of 3: portfolio and financial services experience","Yes \u2014 he meets all 3 criteria"],"ans":2,"exp":"Correct: C. (a) 3 txns/quarter < 10 = FAIL; (b) \u20ac600k > \u20ac500k = PASS; (c) 2 years analyst \u2265 1 year = PASS. 2 of 3 = pass. Key fact: Multiple combinations can satisfy the test."},
{"tag":"cisi","topic":"Elective Professional","q":"For non-MiFID business, which test(s) must a client pass to be reclassified as elective professional?","opts":["Both qualitative and quantitative tests, identical to MiFID","Only the qualitative test \u2014 the quantitative test applies only to MiFID business","Only the quantitative test","No tests are required \u2014 the client simply requests reclassification"],"ans":1,"exp":"Correct: B. For non-MiFID, only the qualitative test applies. The quantitative test (10 txns, \u20ac500k, 1yr FS) is a MiFID-specific requirement. Key fact: Non-MiFID = qualitative only. MiFID = qualitative + quantitative."},
{"tag":"detail","topic":"Elective Professional","q":"Whose responsibility is it to keep the firm updated about changes that may affect the client's elective professional classification?","opts":["The FCA must monitor and notify the firm","The firm must conduct annual reassessments","It is the client's responsibility to keep the firm updated","The firm's compliance department must verify annually"],"ans":2,"exp":"Correct: C. It is explicitly the client's responsibility to keep the firm up to date. If the firm becomes aware the client no longer meets the conditions, it must take appropriate action (potentially recategorise to retail). Key fact: Client's duty to update firm."},
{"tag":"cisi","topic":"Elective Professional","q":"In relation to non-MiFID business, which retail client is MOST likely suitable for reclassification as an elective professional?","opts":["A newly appointed trustee of a trust exceeding \u20ac500,000","A client to whom the firm regularly sends non-mainstream investment promotions","A client who recently inherited a sizeable portfolio","The spouse of one of the firm's investment managers"],"ans":1,"exp":"Correct: B. Exam Q28: if a firm considers a client sophisticated enough to receive non-mainstream investment promotions, they likely satisfy the qualitative test. Others show no investment expertise. Key fact: Sophistication to receive non-mainstream promos \u2192 likely passes qualitative test."},
{"tag":"cisi","topic":"Written Process","q":"Which of the following correctly describes the written process for reclassifying a retail client as elective professional?","opts":["The firm unilaterally changes classification and sends notification","The client requests orally, firm warns in writing, client confirms by email","Client requests in writing, firm gives written warning of lost protections, client confirms separately in writing","The FCA must approve the reclassification"],"ans":2,"exp":"Correct: C. Three-step process: (1) Client writes requesting reclassification + specifies services/products; (2) Firm gives clear written warning of protections lost; (3) Client confirms separately in writing awareness of consequences. Key fact: All steps must be in writing. All separate."},
{"tag":"scenario","topic":"Written Process","q":"A retail client phones a MiFID firm to request professional reclassification. The firm verbally explains the protections that will be lost. The client says 'I understand and agree.' Is the reclassification valid?","opts":["Yes \u2014 oral confirmation is sufficient for MiFID business","Yes \u2014 as long as the firm makes a file note of the conversation","No \u2014 the client must put the request in writing and confirm awareness of consequences separately in writing","No \u2014 but only because the firm should have sent a letter first"],"ans":2,"exp":"Correct: C. All three steps must be in writing: client's request, firm's warning, AND client's separate written confirmation. Oral communication is not sufficient. Key fact: Writing required at every step."},
{"tag":"detail","topic":"Written Process","q":"When reclassifying a client, the client's written request must specify:","opts":["Only the client's name and account number","The services and/or products to which the reclassification will apply","The reasons why the client believes they qualify as professional","The names of all investments the client intends to purchase"],"ans":1,"exp":"Correct: B. The client must specify the services and/or products the reclassification applies to. The firm may reclassify generally or for specific services only. Key fact: Request must specify which services/products."},
{"tag":"cisi","topic":"Protections Lost","q":"When a retail client becomes an elective professional, which of the following protections do they LOSE?","opts":["Only periodic statements","Only financial promotion rules","Access to FOS and FSCS, plus suitability, appropriateness, and many other protections","Only the right to a client agreement"],"ans":2,"exp":"Correct: C. Major loss: suitability, appropriateness, FOS/FSCS access, communications rules, reporting, exclusion of liability, client money (some), Share Trading Obligation. Very significant reduction. Key fact: Retail\u2192professional loses FOS/FSCS, suitability, appropriateness + more."},
{"tag":"detail","topic":"Protections Lost","q":"Which of the following is a protection LOST when a retail client becomes an elective professional?","opts":["The right to have a conflicts of interest policy in place","The right to investor compensation through FOS and FSCS","The right to be treated by an authorised firm","The right to have the firm regulated by the FCA"],"ans":1,"exp":"Correct: B. FOS and FSCS access is specifically listed as a protection lost on reclassification from retail to professional. Conflicts rules (SYSC 10) still apply to all firms. Key fact: FOS/FSCS lost = critical consequence."},
{"tag":"cisi","topic":"Protections Lost","q":"When a professional client becomes an elective ECP, which protections do they lose?","opts":["Consumer Duty cross-cutting rules","Best execution, order handling, client agreement, appropriateness, product governance, cost disclosure and package products","Access to the Financial Policy Committee","The right to hold a bank account"],"ans":1,"exp":"Correct: B. Professional\u2192ECP loses: client agreement, appropriateness, best execution, order handling, product governance, disclosure on instruments/costs/remuneration, package products. Key fact: Prof\u2192ECP: loses best execution + order handling + client agreement."},
{"tag":"detail","topic":"Protections Lost","q":"Which of the following protections is NOT lost when a retail client is reclassified as an elective professional?","opts":["Suitability requirements","Appropriateness requirements","Conflicts of interest rules under SYSC 10","Access to the Financial Ombudsman Service"],"ans":2,"exp":"Correct: C. SYSC 10 conflicts of interest rules apply to ALL firms for ALL client types, including ECPs. They are never disapplied. Suitability, appropriateness and FOS access are all lost. Key fact: Conflicts of interest = ALWAYS applies."},
{"tag":"scenario","topic":"Protections Lost","q":"A wealthy individual is reclassified from retail to elective professional. Their investment subsequently suffers a significant loss due to unsuitable advice. Can they complain to the FOS?","opts":["Yes \u2014 FOS access is available to all clients of authorised firms","No \u2014 access to FOS is one of the protections lost when reclassified as professional","Yes \u2014 but only if the loss exceeds \u00a385,000","No \u2014 but they can complain to the PRA instead"],"ans":1,"exp":"Correct: B. FOS/FSCS access is explicitly listed as a protection lost when retail\u2192professional. The client accepted this risk through the written process. They retain the right to take civil action. Key fact: Professional clients generally cannot access FOS."},
{"tag":"cisi","topic":"Agents","q":"Under COBS, if a firm knows that A is acting as agent for B, who should the firm treat as its client?","opts":["B, because B is the ultimate beneficiary","A \u2014 the default rule is to treat the agent as the client","Both A and B equally","Neither \u2014 the firm should decline services"],"ans":1,"exp":"Correct: B. Default COBS rule: if firm knows A acts as agent for B \u2192 treat A as client. Two exceptions: (1) written agreement to treat B; (2) A mainly to reduce duties to B \u2192 B is client. Key fact: Agent = client (default)."},
{"tag":"detail","topic":"Agents","q":"Under which circumstance must B be treated as the client despite A acting as agent?","opts":["When B is a larger company than A","When the involvement of A is mainly to reduce the firm's duties to B","When A and B are in the same corporate group","When B has a higher credit rating"],"ans":1,"exp":"Correct: B. Anti-avoidance provision: if A is mainly involved to reduce the firm's duties to B, then B is the client regardless of any agreement. Prevents firms using intermediaries to circumvent client protection. Key fact: Agent inserted to reduce duties \u2192 principal is client anyway."},
{"tag":"scenario","topic":"Agents","q":"A hedge fund (A) places orders through a shell company (B) to avoid triggering certain COBS protections. The firm knows B mainly exists to reduce duties owed to A. Who is the client?","opts":["B, because it placed the orders","A, because B was mainly involved to reduce the firm's duties to A","Both A and B on a joint basis","The firm can choose whichever it prefers"],"ans":1,"exp":"Correct: B. Wait \u2014 re-reading the question: A places orders through B. Actually in COBS, if A is the agent for B... Let me correct: The anti-avoidance rule says if the intermediary's involvement is mainly to reduce duties to the end client, the end client (here A, the hedge fund) is treated as the client. Key fact: Cannot use intermediaries to avoid obligations."},
{"tag":"cisi","topic":"Agents","q":"A firm agrees in writing with agent A to treat principal B as the client instead of A. Is this permitted?","opts":["No \u2014 the agent must always be treated as the client","Yes \u2014 a written agreement to treat B as the client is one of the two exceptions to the default rule","Yes \u2014 but only if B is a professional client","No \u2014 only the FCA can approve changes to the default agent rule"],"ans":1,"exp":"Correct: B. Exception 1 to the default rule: the firm agrees in writing with A to treat B as client. This is explicitly permitted under COBS. Key fact: Written agreement = valid exception to agent-as-client rule."},
{"tag":"cisi","topic":"Local Authorities","q":"Under MiFID II, local authorities must be classified by default as:","opts":["Per se professional clients","Eligible counterparties","Retail clients","Elective professional clients"],"ans":2,"exp":"Correct: C. MiFID II specifically changed this \u2014 local authorities must now be retail by default. Previously they could be professional. Can only be reclassified as elective professional with special tests. Key fact: Local authorities = RETAIL by default (MiFID II change)."},
{"tag":"detail","topic":"Local Authorities","q":"What is the portfolio threshold for a local authority to qualify as an elective professional?","opts":["\u20ac500,000 \u2014 same as other retail clients","\u20ac1,000,000","\u00a310,000,000","\u00a35,000,000"],"ans":2,"exp":"Correct: C. Local authorities have a MUCH higher threshold: \u00a310 million (in GBP, not EUR), compared to \u20ac500,000 for other clients. Plus they must meet one of three additional criteria. Key fact: Local authority = \u00a310m (not \u20ac500k). Much higher bar."},
{"tag":"cisi","topic":"Local Authorities","q":"In addition to a portfolio exceeding \u00a310 million, a local authority must meet which of the following to qualify as elective professional?","opts":["It must have more than 50,000 residents","10 transactions/quarter, OR person with 1 year FS experience, OR be an LGPS administering authority","It must obtain FCA written approval","It must have an investment committee with at least 3 qualified members"],"ans":1,"exp":"Correct: B. \u00a310m portfolio AND one of: (a) 10 txns/quarter over 4 quarters; (b) person authorised to trade has \u22651 year FS experience; (c) administering authority of the Local Government Pension Scheme (LGPS). Key fact: LGPS route = special path for local authorities."},
{"tag":"scenario","topic":"Local Authorities","q":"A local authority with a \u00a312 million portfolio and an LGPS administering role wishes to be classified as elective professional. Does it meet the quantitative test?","opts":["No \u2014 local authorities can never be professional clients","Yes \u2014 it meets both requirements: portfolio >\u00a310m and LGPS administering authority","No \u2014 LGPS does not count as a qualifying criterion","Yes \u2014 but only for non-MiFID business"],"ans":1,"exp":"Correct: B. Portfolio \u00a312m > \u00a310m threshold = PASS. LGPS administering authority = qualifies as one of the three alternative criteria. The authority also needs to pass the qualitative test. Key fact: LGPS administering authority = valid route to elective professional."},
{"tag":"cisi","topic":"Notifications","q":"When must a firm notify a new client of their classification?","opts":["Within 30 days of the first transaction","Within 14 days of opening the account","Before services are provided","Only when the client specifically asks"],"ans":2,"exp":"Correct: C. New clients must be notified of classification BEFORE services are provided. Must also be advised of right to request recategorisation and any limits on protections. Proactive obligation. Key fact: Notification = BEFORE services. Includes right to recategorise."},
{"tag":"detail","topic":"Notifications","q":"Which of the following is TRUE about a firm's client categorisation records?","opts":["Records need only be kept for 1 year","Firms must have written internal policies for categorisation and retain records for the relevant period after ceasing business","Records are only required for retail clients","The FCA maintains categorisation records on behalf of firms"],"ans":1,"exp":"Correct: B. Firms must: (1) have written internal policies for categorisation; (2) record each notice and agreement; (3) retain records for relevant period after ceasing business with clients. Key fact: Written policies + records + retain after ceasing business."},
{"tag":"cisi","topic":"Notifications","q":"A client has been notified of their classification as a professional client. What ADDITIONAL information must the firm provide before services begin?","opts":["The firm's annual report and financial statements","The client's right to request recategorisation and any limits on protections arising from their classification","A summary of all COBS rules that apply","The names of all other professional clients of the firm"],"ans":1,"exp":"Correct: B. Before services: firm must advise of (1) right to request different categorisation; (2) any limits on protections resulting from current classification. Key fact: Right to recategorise + protection limits = must be communicated."},
{"tag":"cisi","topic":"Recategorisation","q":"Which of the following is TRUE about recategorising clients to a HIGHER level of protection?","opts":["Only the FCA can recategorise clients upward","Firms must allow professional clients and ECPs to request higher protection","Clients can never be recategorised once classified","Only retail clients can request changes"],"ans":1,"exp":"Correct: B. Professional\u2192retail and ECP\u2192professional/retail are both permitted. Firms can also initiate this themselves for per se professionals and per se ECPs. Key fact: Upward recategorisation = always available on request."},
{"tag":"detail","topic":"Recategorisation","q":"A firm classifies Client X as retail for equities but elective professional for derivatives. Is this permitted?","opts":["No \u2014 a firm must use a single classification for all instruments","Yes \u2014 different classifications for different instruments are permitted","No \u2014 only the FCA can approve split classifications","Yes \u2014 but only for per se professional clients"],"ans":1,"exp":"Correct: B. A firm CAN classify clients differently for different instruments. However, this creates complex internal arrangements, which is why most firms classify once for all instruments. Key fact: Different instruments = different classification permitted."},
{"tag":"cisi","topic":"Recategorisation","q":"Recategorisation to a higher or lower level of protection can be carried out:","opts":["Only on a general basis covering all services","Only for specific individual transactions","On either a general basis or for specific transactions","Only with FCA pre-approval"],"ans":2,"exp":"Correct: C. Recategorisation may be general (all business) or specific (single transaction). Firm can classify differently for different instruments. Key fact: General or per-transaction = both valid."},
{"tag":"scenario","topic":"Recategorisation","q":"A firm discovers that an elective professional client no longer meets the required conditions. What must the firm do?","opts":["Nothing \u2014 once classified, the status is permanent","Take appropriate action, which may include recategorising the client as retail and notifying them","Report the client to the FCA immediately","Wait until the client requests a change"],"ans":0,"exp":"Correct: B. If a firm becomes aware that a client no longer fulfils elective professional conditions, it must take appropriate action. If this means recategorising to retail, the firm must notify the client. Key fact: Firm must act if conditions no longer met."},
{"tag":"cisi","topic":"Reliance","q":"For MiFID business, if a firm relies on client information from a third-party MiFID firm, who is responsible for the accuracy of that information?","opts":["The receiving firm","The third-party firm retains responsibility for completeness and accuracy","The client","The FCA"],"ans":1,"exp":"Correct: B. Third-party MiFID firm retains responsibility for completeness, accuracy, and appropriateness of recommendations. Receiving firm takes responsibility for concluding transactions. Key fact: Third party = accuracy. Receiving firm = transactions."},
{"tag":"detail","topic":"Reliance","q":"For non-MiFID business, when is it reasonable for a firm to rely on information from another party?","opts":["Only when the information comes from the FCA","When it is in writing from an unconnected authorised or professional person","When it comes from any financial services firm","It is never reasonable to rely on third-party information"],"ans":1,"exp":"Correct: B. Non-MiFID: reasonable to rely on WRITTEN information from an UNCONNECTED authorised or professional person, unless firm is aware of grounds to question accuracy. Key fact: Non-MiFID reliance = written + unconnected + authorised/professional."},
{"tag":"cisi","topic":"Reliance","q":"Under MiFID reliance rules, the receiving firm takes responsibility for:","opts":["The accuracy of client information relayed by the third party","The completeness of the third party's recommendations","Concluding the services or transactions based on the relayed information","Verifying the third party's regulatory status annually"],"ans":2,"exp":"Correct: C. Clear split: third party = responsible for info accuracy/completeness + recommendation appropriateness. Receiving firm = responsible for concluding services/transactions. Key fact: Receiving firm \u2192 concludes transactions."},
{"tag":"cisi","topic":"Per Se vs Elective","q":"When assessing suitability, a firm can assume that a per se professional client can financially bear related investment risks. Can the same assumption be made for an elective professional?","opts":["Yes \u2014 both types are treated identically for suitability","No \u2014 firms CANNOT make this assumption for elective professional clients","Yes \u2014 but only for non-MiFID business","No \u2014 suitability rules do not apply to any professional clients"],"ans":1,"exp":"Correct: B. Per se professional: firm may ASSUME ability to bear risks. Elective professional: firm CANNOT make this assumption \u2014 must still assess. Exam Q75 tests this. Key fact: Per se = assumed risk-bearing. Elective = must assess."},
{"tag":"detail","topic":"Per Se vs Elective","q":"Which of the following is TRUE regarding a firm's assessment of professional clients' knowledge and experience?","opts":["Firms must conduct full knowledge assessments for all professional clients","A firm may assume both per se and elective professional clients have necessary experience and knowledge in the relevant area","Elective professionals are assumed to have more knowledge than per se professionals","Knowledge assumptions only apply to retail clients"],"ans":1,"exp":"Correct: B. For BOTH per se and elective professionals, firm may assume necessary experience and knowledge. The difference is only for FINANCIAL loss-bearing capacity (per se only). Key fact: Knowledge/experience = assumed for both. Loss-bearing = per se only."},
];
const SK='cisi_ch2s3_v5';const N=10;let APP={round:[],answers:{},opts:{},seen:[],roundNum:0};function save(){try{localStorage.setItem(SK,JSON.stringify(APP));}catch(e){}}function load(){try{const d=localStorage.getItem(SK);if(d)APP=JSON.parse(d);}catch(e){}}function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}function buildRound(){const lw=Object.entries(APP.answers).filter(([,v])=>v&&v.v===0).map(([k])=>APP.round[parseInt(k)]).filter(x=>x!==undefined);const us=BANK.map((_,i)=>i).filter(i=>!APP.seen.includes(i));const so=APP.seen.filter(i=>!APP.round.includes(i));let c=[];c.push(...shuffle(lw).slice(0,3));c.push(...shuffle(us.filter(i=>!c.includes(i))).slice(0,N-c.length));if(c.length<N)c.push(...shuffle(so.filter(i=>!c.includes(i))).slice(0,N-c.length));if(c.length<N)c.push(...shuffle(BANK.map((_,i)=>i).filter(i=>!c.includes(i))).slice(0,N-c.length));const r=shuffle(c).slice(0,N);r.forEach(i=>{if(!APP.seen.includes(i))APP.seen.push(i);});APP.round=r;APP.answers={};APP.opts={};APP.roundNum=(APP.roundNum||0)+1;}function doReset(){buildRound();save();render();window.scrollTo({top:0,behavior:'smooth'});}function pick(p,oi){if(APP.answers[p])return;const q=BANK[APP.round[p]];APP.answers[p]={opt:q.opts[oi],v:oi===q.ans?1:0};save();render();setTimeout(()=>{const d=Object.keys(APP.answers).length;if(d<N){const cards=document.querySelectorAll('#q-area .q-card');const nx=[...Array(N).keys()].find(j=>j>p&&!APP.answers[j]);if(nx!==undefined)cards[nx]?.scrollIntoView({behavior:'smooth',block:'center'});}else document.querySelector('#q-area .result-card')?.scrollIntoView({behavior:'smooth',block:'start'});},350);}function render(){const d=Object.keys(APP.answers).length;const ok=Object.values(APP.answers).filter(v=>v&&v.v===1).length;const bad=d-ok;const pct=d?Math.round(ok/d*100):null;document.getElementById('round-label').textContent=`Round ${APP.roundNum} \u00b7 10 Qs from bank of ${BANK.length} \u00b7 Seen: ${APP.seen.length}/${BANK.length}`;document.getElementById('s-num').textContent=`${d}/${N}`;document.getElementById('s-ok').textContent=ok;document.getElementById('s-bad').textContent=bad;document.getElementById('s-pct').textContent=pct===null?'\u2014':pct+'%';const tr=document.getElementById('tracker');tr.innerHTML='';for(let i=0;i<N;i++){const dot=document.createElement('div');dot.className='tracker-dot'+(APP.answers[i]?APP.answers[i].v===1?' t-ok':' t-bad':i===d?' t-cur':'');tr.appendChild(dot);}const area=document.getElementById('q-area');area.innerHTML='';const L=['A','B','C','D'];const tm={cisi:'CISI exam style',concept:'Concept check',scenario:'Scenario',detail:'Detail'};const tc={cisi:'tag-cisi',concept:'tag-concept',scenario:'tag-scenario',detail:'tag-detail'};APP.round.forEach((qi,pos)=>{const q=BANK[qi];const ans=!!APP.answers[pos];const ch=APP.answers[pos]?.opt;if(!APP.opts[pos])APP.opts[pos]=shuffle(q.opts.map((_,i)=>i));const oo=APP.opts[pos];let oh=oo.map((oi,li)=>{let cl='opt';if(ans)cl+=' dis';if(ans&&oi===q.ans)cl+=' ok';else if(ans&&q.opts[oi]===ch&&oi!==q.ans)cl+=' bad';return`<div class="${cl}" onclick="pick(${pos},${oi})"><span class="opt-l">${L[li]}</span><span>${q.opts[oi]}</span></div>`;}).join('');let eh=ans?`<div class="exp-box show ${APP.answers[pos].v===1?'exp-ok':'exp-bad'}"><strong>${APP.answers[pos].v===1?'\u2713 Correct!':'\u2717 Incorrect.'}</strong> ${q.exp}</div>`:'';const card=document.createElement('div');card.className='q-card';card.innerHTML=`<div class="q-meta"><span class="q-num">Q${pos+1}</span><span class="q-tag ${tc[q.tag]}">${tm[q.tag]}</span><span class="q-topic">${q.topic}</span></div><div class="q-text">${q.q}</div><div class="opts">${oh}</div>${eh}`;area.appendChild(card);});if(d===N){const pF=Math.round(ok/N*100);let lb,co,gr;if(pF>=80){lb='Pass standard met!';co='var(--teal-m)';gr='Pass \u2713';}else if(pF>=70){lb='Close \u2014 review weaker areas.';co='var(--amber)';gr='Near Pass';}else if(pF>=60){lb='Borderline.';co='var(--coral-m)';gr='Borderline';}else{lb='Below pass.';co='#A32D2D';gr='Needs Work';}const ts={};APP.round.forEach((qi,pos)=>{const t=BANK[qi].topic;if(!ts[t])ts[t]={ok:0,tot:0};ts[t].tot++;if(APP.answers[pos]?.v===1)ts[t].ok++;});let th=Object.entries(ts).map(([t,s])=>{const tp=Math.round(s.ok/s.tot*100);const cl=tp>=80?'var(--teal-m)':tp>=60?'var(--amber)':'var(--coral-m)';return`<div class="topic-row"><div class="topic-name">${t}</div><div style="font-size:.72rem;color:var(--text3);margin-bottom:.25rem">${s.ok}/${s.tot}</div><div class="topic-bar-wrap"><div class="topic-bar-fill" style="width:${tp}%;background:${cl}"></div></div></div>`;}).join('');let rh=APP.round.map((qi,pos)=>{const q=BANK[qi];const v=APP.answers[pos]?.v===1;return`<div class="q-review-item ${v?'r-ok':'r-bad'}"><span class="r-icon">${v?'\u2713':'\u2717'}</span><div><strong>Q${pos+1} \u00b7 ${q.topic}.</strong> ${q.q}<br><span style="font-size:.78rem;opacity:.85">Answer: ${q.opts[q.ans]}</span></div></div>`;}).join('');const rc=document.createElement('div');rc.className='result-card';rc.style.marginTop='1rem';rc.innerHTML=`<div style="font-size:.85rem;color:var(--text2);margin-bottom:.3rem">Round ${APP.roundNum} complete</div><div class="result-big" style="color:${co}">${ok}/${N}</div><div class="result-grade" style="background:${co}22;color:${co}">${gr}</div><div class="result-bar-wrap"><div class="result-bar-fill" style="width:${pF}%;background:${co}"></div></div><div style="font-size:.82rem;color:var(--text2);margin:.3rem 0 .2rem">${pF}% \u00b7 ${lb}</div><div class="result-breakdown"><span class="rp" style="background:var(--green-l);color:var(--green)">\u2713 ${ok}</span><span class="rp" style="background:var(--coral-l);color:var(--coral)">\u2717 ${N-ok}</span><span class="rp" style="background:var(--navy-l);color:var(--navy-d)">Seen: ${APP.seen.length}/${BANK.length}</span></div><div style="font-size:.8rem;font-weight:600;color:var(--text2);margin-bottom:.55rem;text-align:left">Topics:</div><div class="topic-grid">${th}</div><div class="btn-row" style="margin-bottom:1.4rem"><button class="btn btn-p" onclick="doReset()">\u21ba New round</button></div><div style="font-size:.8rem;font-weight:600;color:var(--text2);margin-bottom:.5rem;text-align:left">Review:</div><div class="q-review-list">${rh}</div>`;area.appendChild(rc);}}load();if(!APP.round||APP.round.length===0)buildRound();render();

</script>
