<style>*{box-sizing:border-box;margin:0;padding:0}:root{--navy:#1E2761;--navy-l:#CADCFC;--navy-d:#12195F;--teal:#028090;--teal-l:#D6F0F3;--teal-d:#015E6A;--teal-m:#1D9E75;--amber:#B07D12;--amber-l:#FEF3C7;--amber-d:#7C5A0A;--coral:#993C1D;--coral-l:#FAECE7;--coral-m:#D85A30;--purple:#534AB7;--purple-l:#EEEDFE;--purple-d:#3C3489;--green-l:#E1F5EE;--green:#085041;--gray:#64748B;--gray-l:#F1F5F9;--gray-m:#CBD5E1;--gray-d:#334155;--bg:#F0F4F8;--card:#fff;--text:#1e293b;--text2:#475569;--text3:#94a3b8;--radius:12px;--shadow:0 2px 10px rgba(0,0,0,.09)}body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}.app-header{background:linear-gradient(135deg,var(--navy),var(--teal));padding:1.2rem 1.5rem .85rem;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.2)}.header-top{display:flex;align-items:flex-start;justify-content:space-between;gap:.75rem}.app-title{color:#fff;font-size:1.08rem;font-weight:700;line-height:1.3}.app-sub{color:var(--navy-l);font-size:.72rem;margin-top:.18rem}.reset-btn{background:rgba(255,255,255,.16);border:1.5px solid rgba(255,255,255,.38);color:#fff;border-radius:7px;padding:.36rem .95rem;font-size:.76rem;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap;flex-shrink:0}.reset-btn:hover{background:rgba(255,255,255,.3)}.screen{padding:1.4rem;max-width:820px;margin:0 auto}.round-pill{display:inline-flex;align-items:center;gap:.4rem;background:var(--navy);color:var(--navy-l);border-radius:7px;padding:.3rem .85rem;font-size:.73rem;font-weight:600;margin-bottom:1rem}.tracker{display:flex;gap:3px;margin-bottom:1.05rem}.tracker-dot{flex:1;height:10px;border-radius:5px;background:var(--gray-m);transition:background .3s}.tracker-dot.t-ok{background:var(--teal-m)}.tracker-dot.t-bad{background:var(--coral-m)}.tracker-dot.t-cur{background:var(--navy-l)}.score-bar{display:flex;gap:.65rem;margin-bottom:1rem}.sc{flex:1;background:var(--card);border-radius:10px;padding:.58rem .75rem;text-align:center;border:1px solid var(--gray-m);box-shadow:var(--shadow)}.sc .n{font-size:1.38rem;font-weight:700;color:var(--teal);line-height:1}.sc .n-ok{color:var(--teal-m)}.sc .n-bad{color:var(--coral-m)}.sc .l{font-size:.67rem;color:var(--text3);margin-top:.18rem}.q-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:1.4rem 1.5rem;margin-bottom:1rem;border:1px solid rgba(0,0,0,.05)}.q-meta{display:flex;align-items:center;gap:.5rem;margin-bottom:.65rem;flex-wrap:wrap}.q-num{font-size:.68rem;font-weight:700;color:var(--teal);text-transform:uppercase;letter-spacing:.07em}.q-tag{font-size:.64rem;font-weight:700;padding:.15rem .48rem;border-radius:20px}.tag-cisi{background:#FEF3C7;color:#7C5A0A}.tag-concept{background:var(--purple-l);color:var(--purple-d)}.tag-scenario{background:var(--teal-l);color:var(--teal-d)}.tag-detail{background:var(--gray-l);color:var(--gray-d)}.q-topic{font-size:.64rem;color:var(--text3);margin-left:auto}.q-text{font-size:.93rem;font-weight:500;line-height:1.6;margin-bottom:.95rem;color:var(--text)}.opts{display:flex;flex-direction:column;gap:.42rem}.opt{display:flex;align-items:flex-start;gap:.65rem;padding:.68rem .95rem;border-radius:8px;border:1.5px solid var(--gray-m);cursor:pointer;font-size:.86rem;line-height:1.46;background:var(--card);transition:all .16s}.opt:hover:not(.dis){border-color:var(--teal);background:var(--teal-l)}.opt.ok{border-color:var(--teal-m);background:var(--green-l);color:var(--green)}.opt.bad{border-color:var(--coral-m);background:var(--coral-l);color:var(--coral)}.opt.dis{cursor:default}.opt-l{width:21px;height:21px;min-width:21px;border-radius:50%;background:#e2e8f0;display:flex;align-items:center;justify-content:center;font-size:.69rem;font-weight:700;color:var(--gray);margin-top:1px;flex-shrink:0}.opt.ok .opt-l{background:var(--teal-m);color:#fff}.opt.bad .opt-l{background:var(--coral-m);color:#fff}.exp-box{margin-top:.8rem;padding:.7rem 1rem;border-radius:8px;font-size:.81rem;line-height:1.62;display:none}.exp-box.show{display:block}.exp-ok{background:var(--green-l);border-left:3px solid var(--teal-m);color:var(--green)}.exp-bad{background:var(--coral-l);border-left:3px solid var(--coral-m);color:var(--coral)}.result-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:2rem 1.5rem;text-align:center;margin-top:.5rem}.result-big{font-size:3.2rem;font-weight:800;margin:.4rem 0}.result-grade{display:inline-block;padding:.38rem 1.2rem;border-radius:20px;font-size:.92rem;font-weight:700;margin:.5rem 0 .8rem}.result-bar-wrap{background:var(--gray-l);border-radius:20px;height:14px;overflow:hidden;margin:.75rem auto;max-width:320px}.result-bar-fill{height:100%;border-radius:20px;transition:width .8s ease}.result-breakdown{display:flex;gap:.6rem;justify-content:center;flex-wrap:wrap;margin:1rem 0 1.2rem}.rp{padding:.3rem .9rem;border-radius:20px;font-size:.8rem;font-weight:600}.topic-grid{display:grid;grid-template-columns:1fr 1fr;gap:.45rem;margin:.5rem 0 1.2rem;text-align:left}.topic-row{background:var(--gray-l);border-radius:8px;padding:.5rem .75rem;font-size:.78rem}.topic-name{color:var(--text2);font-weight:600;margin-bottom:.2rem}.topic-bar-wrap{background:var(--gray-m);border-radius:10px;height:6px;overflow:hidden}.topic-bar-fill{height:100%;border-radius:10px}.q-review-list{text-align:left;margin-top:.5rem}.q-review-item{padding:.65rem 1rem;border-radius:8px;margin-bottom:.45rem;font-size:.83rem;line-height:1.52;display:flex;gap:.65rem;align-items:flex-start}.q-review-item.r-ok{background:var(--green-l);border-left:3px solid var(--teal-m);color:var(--green)}.q-review-item.r-bad{background:var(--coral-l);border-left:3px solid var(--coral-m);color:var(--coral)}.r-icon{font-size:.9rem;flex-shrink:0;margin-top:.08rem}.btn{padding:.58rem 1.3rem;border:none;border-radius:8px;cursor:pointer;font-size:.86rem;font-weight:600;transition:all .2s}.btn-p{background:var(--teal);color:#fff}.btn-p:hover{background:var(--teal-d)}.btn-row{display:flex;gap:.65rem;flex-wrap:wrap;justify-content:center}</style>

<div class="app-header"><div class="header-top"><div><div class="app-title">CISI UK Financial Regulation - Chapter 2, Section 1</div><div class="app-sub">COBS Application & General Provisions - location rule - activities subject to COBS - ECP disapplications - strengthened bank - syllabus 2.1 &nbsp;|&nbsp; 10 Qs per round</div></div><button class="reset-btn" onclick="doReset()">&#8634; New round</button></div></div>
<div class="screen"><div class="round-pill" id="round-label">Round 1</div><div class="tracker" id="tracker"></div><div class="score-bar"><div class="sc"><div class="n" id="s-num">0/10</div><div class="l">Progress</div></div><div class="sc"><div class="n n-ok" id="s-ok">0</div><div class="l">Correct</div></div><div class="sc"><div class="n n-bad" id="s-bad">0</div><div class="l">Wrong</div></div><div class="sc"><div class="n" id="s-pct">&mdash;</div><div class="l">Score</div></div></div><div id="q-area"></div></div>
<script>
const BANK=[{"tag": "cisi", "topic": "COBS Purpose", "q": "The Conduct of Business Sourcebook is located in which part of the FCA Handbook?", "opts": ["Prudential Standards", "Business Standards", "Threshold Conditions", "Supervision"], "ans": 1, "exp": "Correct: Business Standards. The manual places COBS inside the FCA Handbook’s Business Standards block. That matters because the examiner may place Handbook labels next to each other and expect you to distinguish them. COBS is about how firms conduct business with clients, not about prudential capital or threshold conditions. If you remember COBS alongside sourcebooks like SYSC and CASS in the broader conduct architecture, the answer becomes much easier."}, {"tag": "concept", "topic": "COBS Purpose", "q": "What is the best description of the regulatory style that COBS was designed to support?", "opts": ["Purely prescriptive compliance with fixed procedural rules", "Outcomes-based regulation using high-level conduct standards", "A self-regulatory regime with no FCA enforcement role", "A prudential regime focused on solvency and capital"], "ans": 1, "exp": "Correct: outcomes-based regulation using high-level standards. COBS was designed to move firms away from merely following detailed procedural instructions and toward achieving the right conduct outcome. The MiFID conduct provisions that informed COBS are framed at a high level and do not normally prescribe exactly how firms must achieve compliance. That does not mean there are no rules; it means the emphasis is on the result that the firm must deliver. The distractors are wrong because they either overstate prescription, remove FCA oversight, or confuse conduct with prudential supervision."}, {"tag": "detail", "topic": "COBS Scope", "q": "Which statement about the scope of COBS is the most accurate?", "opts": ["It only contains provisions for MiFID investment firms", "It applies only where a firm deals with retail clients", "It contains provisions for MiFID and certain non-MiFID investment firms", "It applies only to firms that hold client money"], "ans": 2, "exp": "Correct: COBS is not MiFID-only. The manual states that COBS implemented MiFID conduct provisions, but it also contains provisions for investment firms that are not subject to MiFID. That is why an answer limited to MiFID firms is too narrow. It is also wrong to make retail-client status the gateway because client category affects how some rules apply, not whether COBS exists at all. Client money is handled elsewhere and does not define the scope of COBS."}, {"tag": "cisi", "topic": "Location Rule", "q": "What is the broad basis of the general application rule for COBS?", "opts": ["Firm turnover", "Geographical location", "Client sophistication", "Product risk rating"], "ans": 1, "exp": "Correct: geographical location. The starting point in Section 1 is where the firm or its appointed representative has an establishment and whether the business is carried on with a client in the UK. Candidates often get distracted by client category or the type of investment, but those are later questions. The gateway test is location-based. This is why nationality and domicile are poor substitutes for the correct analysis."}, {"tag": "scenario", "topic": "Location Rule", "q": "A Singapore investment firm communicates with a client who is in London from its overseas office. Which answer is most likely to be correct under the general rule?", "opts": ["COBS cannot apply because the firm has no UK office", "COBS generally applies because the firm is carrying on business with a client in the UK from an overseas establishment", "COBS only applies if the client is a UK citizen", "COBS only applies if the product is a life policy"], "ans": 1, "exp": "Correct: COBS generally applies because the client is in the UK. The section makes clear that a firm can be caught even when it acts from an overseas establishment, provided that the business is carried on with a client in the UK and no exclusion removes it from scope. This is why citizenship is a poor answer trigger. A UK office is not essential in this scenario, and life policies are only one type of activity that can fall within COBS rather than the test for application itself."}, {"tag": "detail", "topic": "Location Rule", "q": "Which factor is least useful when deciding whether the general application rule brings an overseas interaction within COBS?", "opts": ["Where the client is located", "Whether the firm carries on business from an overseas establishment", "Whether an exclusion applies", "Whether the client is wealthy enough to absorb losses"], "ans": 3, "exp": "Correct: the client’s wealth is the least useful factor. Section 1 is driven by location and the structure of the business relationship, not by the economic strength of the client. The correct analysis asks where the client is, where the business is carried on from, and whether any exclusion changes the result. Wealth or loss-bearing capacity may matter elsewhere in regulation, but it does not form the basic Section 1 gateway test."}, {"tag": "cisi", "topic": "Brexit", "q": "After Brexit, how are EEA firms operating through a UK branch treated for MiFID business carried on in the UK?", "opts": ["As UK firms", "As exempt persons", "As third-country firms", "As appointed representatives"], "ans": 2, "exp": "Correct: as third-country firms. Before Brexit, passporting rights created a different structure. The manual is explicit that EEA firms operating from a branch in the UK are now classified as third-country firms when carrying on MiFID business in the UK. The other options import labels from different regulatory regimes. “UK firm” is wrong because the firm has not become domestically constituted merely by having a branch, and “appointed representative” has nothing to do with this context."}, {"tag": "concept", "topic": "Brexit", "q": "Which statement is correct about MiFID business carried on from an EEA establishment of a UK MiFID firm after Brexit?", "opts": ["UK COBS continues to apply in the same way as before Brexit", "UK COBS no longer applies to that MiFID business in the same way", "The business becomes unregulated", "The business automatically converts into ECP business"], "ans": 1, "exp": "Correct: UK COBS no longer applies to that MiFID business in the same way. The manual specifically flags this post-Brexit change. The wrong answers either assume no change, suggest the business ceases to be regulated at all, or confuse a territorial rule with client categorisation. The exam likes this because all of the wrong answers sound dramatic; the correct answer is simply that the territorial application changed."}, {"tag": "detail", "topic": "Home State Exception", "q": "Which pair is singled out as applying on a home-state basis only?", "opts": ["Client agreements and compensation information", "Investment research and personal account dealing", "Best execution and order aggregation", "Appropriateness and suitability"], "ans": 1, "exp": "Correct: investment research and personal account dealing. Section 1 gives these as the exception to the ordinary location rule. That means these aspects of COBS continue to apply to UK firms regardless of where they conduct the business. The other answer pairs belong to different parts of COBS and are not described as the home-state exception in this section."}, {"tag": "scenario", "topic": "Home State Exception", "q": "A UK firm produces investment research from an office outside the UK. Which statement is most accurate?", "opts": ["The research automatically falls outside COBS because it is produced overseas", "The home-state exception means the relevant COBS rules still apply to the UK firm", "The rules apply only if the research is sent to retail clients", "The rules apply only if the firm also accepts deposits"], "ans": 1, "exp": "Correct: the home-state exception keeps the relevant rules attached to the UK firm. This is one of the few places where the student should not rely on the ordinary territorial shortcut. The manual expressly states that investment research and personal account dealing are treated differently and apply to UK firms regardless of where the business is conducted. Client type and deposit-taking are distractions here."}, {"tag": "cisi", "topic": "Activities in Scope", "q": "Which list correctly identifies the activities subject to COBS?", "opts": ["Designated investment business only", "Designated investment business, long-term insurance business in relation to life policies, and accepting deposits in part", "Any activity carried on by an FCA-authorised firm", "Long-term insurance and managing client money only"], "ans": 1, "exp": "Correct: designated investment business, long-term insurance in relation to life policies, and accepting deposits in part. Section 1 uses that three-part structure. The words “in part” matter for deposits because the full COBS regime does not automatically apply. The other answers are either too narrow, too broad, or mix in topics from elsewhere in the Handbook."}, {"tag": "concept", "topic": "Deposits", "q": "Why is the phrase “accepting deposits — in part” important?", "opts": ["Because deposit-taking is outside regulation unless deposits exceed a threshold", "Because only some COBS rules, such as financial promotions and product information, apply to deposits", "Because deposit-taking firms are subject only to PRA rules and never FCA rules", "Because deposits are treated as ECP business by default"], "ans": 1, "exp": "Correct: only part of COBS applies. The manual gives examples such as financial promotions and product information. That is why answers implying the whole conduct regime automatically applies to deposits are too wide. It is also wrong to suggest that deposit-takers sit outside FCA conduct regulation altogether, because they are often dual-regulated. ECP status is unrelated to the simple fact that deposits are only partially within COBS."}, {"tag": "scenario", "topic": "Deposits", "q": "A student says that because a bank accepts deposits, every COBS chapter automatically applies to the deposit relationship. What is the best correction?", "opts": ["Correct, because deposits are regulated investments", "Incorrect, because only specified parts of COBS apply to deposit-taking", "Correct, but only for retail clients", "Incorrect, because deposit-taking is governed exclusively by SYSC"], "ans": 1, "exp": "Correct: only specified parts of COBS apply. This question tests whether you remember the narrow phrase “in part”. The fact that deposits are a regulated area does not mean that the whole of COBS overlays the relationship. Nor is the issue determined by client category. The better answer is the precise one: deposit-taking brings in certain conduct provisions, not the whole sourcebook."}, {"tag": "cisi", "topic": "ECP Disapplications", "q": "What is the general effect of carrying on business on an eligible-counterparty basis under Section 1?", "opts": ["No FCA rules apply at all", "A significant range of COBS protections is disapplied", "Only prudential rules are disapplied", "Only financial-promotion rules are disapplied"], "ans": 1, "exp": "Correct: a significant range of COBS protections is disapplied. The manual lists conduct obligations, much of communications and disclosure, costs and charges, client agreements, appropriateness, parts of best execution and client order handling, parts of research labelling, and reporting. This is broader than just promotions, but not so broad that all FCA rules disappear. The wrong answers either overstate or understate the effect."}, {"tag": "detail", "topic": "ECP Disapplications", "q": "Which of the following is explicitly mentioned as disapplied for ECP business?", "opts": ["Appropriateness requirements in COBS 10", "The authorisation requirement under FSMA", "The whole of SYSC 10 conflicts rules", "Threshold Conditions"], "ans": 0, "exp": "Correct: appropriateness requirements in COBS 10. The text gives COBS 10 as one of the chapters that falls away in ECP business. The authorisation requirement under FSMA does not disappear simply because the client is sophisticated. SYSC 10 conflicts rules are actually the classic example of something that still applies. Threshold Conditions belong to a different regulatory structure entirely."}, {"tag": "concept", "topic": "ECP Disapplications", "q": "Which statement about conflicts of interest in ECP business is correct?", "opts": ["They are disapplied because ECPs are sophisticated", "They continue to apply through SYSC 10", "They apply only when the ECP is outside the UK", "They are replaced by the appropriateness test"], "ans": 1, "exp": "Correct: conflicts of interest continue to apply through SYSC 10. This is one of the most frequently tested distinctions in the section because students often assume that ECP status strips away every conduct protection. It does not. The other answers are wrong because they either overstate ECP disapplication or confuse conflicts rules with different conduct obligations."}, {"tag": "scenario", "topic": "ECP Disapplications", "q": "A firm is dealing with an eligible counterparty and argues that it therefore owes no conflicts-of-interest obligations at all. How should that be answered?", "opts": ["The firm is correct because ECP status removes all conduct duties", "The firm is wrong because SYSC 10 conflicts rules still apply", "The firm is correct unless the ECP is a retail client for another product", "The firm is wrong only if best execution also applies"], "ans": 1, "exp": "Correct: the firm is wrong because SYSC 10 still applies. This question is designed to catch candidates who confuse “many COBS protections are disapplied” with “all conduct obligations vanish”. Conflicts management remains relevant even in sophisticated-counterparty settings. Best execution is a separate issue and is not what saves the analysis here."}, {"tag": "detail", "topic": "Regulated Market Members", "q": "What is the special rule mentioned for members and participants in a regulated market?", "opts": ["They are exempt from COBS entirely when dealing with each other", "They do not need to comply with COBS 11.4 client limit order rules in respect of each other", "They may ignore conflicts-of-interest rules in transactions between themselves", "They are treated automatically as appointed representatives"], "ans": 1, "exp": "Correct: they do not need to comply with COBS 11.4 client limit order rules in respect of each other. Section 1 mentions this as a narrow carve-out. It is not a blanket exemption from COBS, and it does not remove conflicts rules. The market-participant status also has nothing to do with AR status. The subtlety lies in the phrase “in respect of each other”."}, {"tag": "scenario", "topic": "Regulated Market Members", "q": "Two regulated market members transact with each other directly. Which answer is most accurate regarding client limit order rules?", "opts": ["COBS 11.4 must always apply because regulated-market status makes no difference", "COBS 11.4 does not need to apply in respect of each other, but it would apply if one were executing on behalf of a client", "COBS 11.4 is disapplied only if both parties are outside the UK", "COBS 11.4 is replaced by COBS 10 appropriateness"], "ans": 1, "exp": "Correct: the carve-out applies when they transact with each other, but not when one is executing for a client. This is exactly the nuance the manual highlights. The other answers either deny the carve-out, invent a location requirement, or confuse order-handling rules with appropriateness. Reading the final clause carefully is the key to this question."}, {"tag": "cisi", "topic": "Exam Trap", "q": "Which answer shows the safest exam method for deciding whether COBS applies in Section 1?", "opts": ["Start with client nationality, then consider investment risk", "Start with geographical location and establishment, then move to activity and any disapplications or exceptions", "Start with whether the client is wealthy, then check if the firm is MiFID", "Start with whether the product is promoted online"], "ans": 1, "exp": "Correct: start with geography and establishment. Section 1 works best when approached in order: location, activity, and then exceptions or disapplications. The other methods begin with factors that may sound relevant but are not the section’s gateway logic. This process answer is valuable because it helps you not just memorise the rule but apply it consistently under exam pressure."}, {"tag": "detail", "topic": "COBS Purpose", "q": "Why does the manual mention MiFID in the explanation of COBS?", "opts": ["Because MiFID replaced the FCA Handbook", "Because COBS implemented MiFID conduct-of-business provisions while still extending beyond MiFID-only firms", "Because MiFID only applies to deposit-taking", "Because MiFID created the PRA"], "ans": 1, "exp": "Correct: COBS implemented MiFID conduct-of-business provisions, but the sourcebook is not confined to MiFID-only firms. That is the point of mentioning MiFID at all. The other answers are historically or structurally wrong. MiFID did not replace the FCA Handbook, it is not a deposit-only regime, and it certainly did not create the PRA."}, {"tag": "scenario", "topic": "COBS Scope", "q": "A firm is not subject to MiFID but carries on investment business that falls within the relevant FCA perimeter. Which answer is best?", "opts": ["COBS must be irrelevant because the firm is outside MiFID", "COBS may still contain relevant provisions because it also applies to certain non-MiFID investment firms", "COBS applies only if the firm also operates a regulated market", "COBS applies only where the firm holds client money"], "ans": 1, "exp": "Correct: COBS may still apply because the sourcebook is wider than MiFID alone. The section expressly warns against reducing COBS to a MiFID-only concept. Regulated-market operation and client-money holding are not the Section 1 gateways here. The best answer stays closest to the text and avoids importing conditions the manual does not add."}, {"tag": "cisi", "topic": "Location Rule", "q": "Which statement about UK firms conducting MiFID business for UK clients in the UK is correct?", "opts": ["This is the straightforward case where COBS applies", "COBS applies only if the clients are retail clients", "COBS applies only if the firm is deposit-taking", "This falls outside COBS because MiFID business is covered elsewhere"], "ans": 0, "exp": "Correct: this is the straightforward case where COBS applies. The section uses it as the simple starting example. It is wrong to add a retail-client condition or a deposit condition, and it is also wrong to suggest that MiFID business somehow sits outside COBS. In fact, MiFID conduct provisions are one of the reasons COBS exists in its current form."}, {"tag": "detail", "topic": "Brexit", "q": "Why is the post-Brexit treatment of EEA branches examined in Section 1?", "opts": ["Because it changes the territorial application of COBS", "Because it changes who can be an ECP", "Because it creates a new home-state exception for all services", "Because it abolishes Business Standards"], "ans": 0, "exp": "Correct: it changes territorial application. The post-Brexit rule matters because Section 1 is fundamentally about where COBS bites. It does not reclassify clients as ECPs, it does not create a universal home-state exception, and it certainly does not abolish the Business Standards block. The examiner often uses Brexit facts as a test of whether you understand the structure, not just the history."}, {"tag": "scenario", "topic": "ECP Disapplications", "q": "A bank treats a transaction as eligible-counterparty business and therefore decides not to send costs-and-charges information under COBS 6. What is the most likely exam answer?", "opts": ["The bank is likely to be correct because COBS 6 is among the provisions disapplied for ECP business", "The bank is wrong because COBS 6 always applies to every client category", "The bank is right only if the client is also outside the UK", "The bank is wrong because ECP status affects only best execution"], "ans": 0, "exp": "Correct: the bank is likely to be correct because Section 1 lists COBS 6 among the provisions disapplied for ECP business. The other answers are either too absolute or too narrow. This is a good example of how the exam may test whether you know the exact areas that fall away for ECPs rather than merely knowing that “some protections are reduced”."}, {"tag": "concept", "topic": "ECP Disapplications", "q": "Which combination contains only items that the manual lists as disapplied in ECP business?", "opts": ["Appropriateness and client agreements", "Conflicts of interest and client categorisation", "Threshold Conditions and best execution", "Authorisation and reporting to clients"], "ans": 0, "exp": "Correct: appropriateness and client agreements. COBS 10 appropriateness and COBS 8A client agreements are both named as disapplied in the ECP context. Conflicts of interest is the famous item that still applies, and Threshold Conditions/authorisation are not the kind of client-protection provisions Section 1 is talking about. Reporting to clients is disapplied, but authorisation is not."}, {"tag": "detail", "topic": "Exam Trap", "q": "Which answer would be the worst exam shortcut when a Section 1 question asks whether COBS applies?", "opts": ["“Check location first”", "“Check whether any exception changes the ordinary rule”", "“Check whether the activity is one of the categories in scope”", "“Assume it depends mainly on whether the client is a national of the UK”"], "ans": 3, "exp": "Correct: assuming the answer depends mainly on nationality is the worst shortcut. Section 1 is built around geographic location, establishment and business carried on with a client in the UK. Nationality sounds legal and impressive, but it is not the correct anchor here. The other options are actually sensible revision methods because they mirror the structure of the section."}, {"tag": "scenario", "topic": "Home State Exception", "q": "Which question should alert you that the home-state exception might be relevant?", "opts": ["A question about investment research produced by a UK firm from an overseas office", "A question about whether COBS 8A applies to an ECP", "A question about whether an AR may manage investments", "A question about whether 30 days’ notice must be given for a new AR"], "ans": 0, "exp": "Correct: an investment-research question involving overseas activity by a UK firm should make you think of the home-state exception. The other answer choices belong to completely different topics: ECP disapplications, appointed representative restrictions and AR reform notifications. This is a recognition question — the right answer depends on spotting the Section 1 exception trigger quickly."}, {"tag": "cisi", "topic": "Activities in Scope", "q": "Long-term insurance business appears in Section 1 in what form?", "opts": ["All insurance business without distinction", "Only long-term insurance business in relation to life policies", "Only general insurance distribution", "Only reinsurance conducted cross-border"], "ans": 1, "exp": "Correct: only long-term insurance business in relation to life policies. That is the wording used in the section. The wrong answers expand the category too far or change its nature altogether. The test here is careful reading: the manual does not say “all insurance business”, and students lose marks when they generalise the category too broadly."}, {"tag": "scenario", "topic": "Activities in Scope", "q": "A candidate says that because life policies are mentioned, general insurance is automatically one of the three activity categories listed in Section 1. What is the best response?", "opts": ["Correct, because all insurance is one category for Section 1 purposes", "Incorrect, because the section specifies long-term insurance business in relation to life policies", "Correct, but only when the policyholder is in the UK", "Incorrect, because insurance never falls within COBS"], "ans": 1, "exp": "Correct: the section speaks specifically about long-term insurance business in relation to life policies. That is a narrower concept than “all insurance”. The UK-location rider in the third option does not cure the overbreadth. The last option is plainly too strong because the section expressly includes life-related long-term insurance in scope."}, {"tag": "detail", "topic": "ECP Disapplications", "q": "Which item below is most clearly associated with a provision that is disapplied for ECP business?", "opts": ["Client agreements under COBS 8A", "Conflicts of interest under SYSC 10", "Section 39 AR status", "Threshold Conditions"], "ans": 0, "exp": "Correct: client agreements under COBS 8A. Section 1 explicitly lists COBS 8A among the provisions disapplied in eligible-counterparty business. Conflicts under SYSC 10 remain applicable and are therefore the classic wrong answer. AR status and Threshold Conditions belong to different parts of the syllabus and are not Section 1 ECP disapplications."}, {"tag": "concept", "topic": "Summary Logic", "q": "Which summary statement is the most accurate?", "opts": ["COBS is mainly a nationality-based regime with only minor territorial elements", "COBS application is territorial, activity-based, and then modified by specific exceptions and disapplications", "COBS is only about MiFID firms and retail clients", "COBS stops mattering as soon as a client is sophisticated"], "ans": 1, "exp": "Correct: COBS application is territorial first, then activity-based, and then refined by exceptions and disapplications. That sentence captures the structure of Section 1 better than the other options. The alternatives either overstate the role of nationality, narrow COBS far too much, or incorrectly treat sophistication as eliminating the whole conduct framework. If you can hold this summary in mind, Section 1 questions become much easier to organise."}, {"tag": "detail", "topic": "COBS Scope", "q": "Which of the following is the least accurate description of COBS?", "opts": ["It is part of the Business Standards block", "It focuses on conduct of business standards", "It was designed to move away from prescriptive regulation", "It is a prudential sourcebook mainly concerned with capital adequacy"], "ans": 3, "exp": "Correct: the prudential-sourcebook description is the least accurate, because it is wrong. COBS is a conduct sourcebook, not a capital-adequacy regime. The other three statements are all broadly accurate and come directly from the way the manual frames the sourcebook. This kind of negative wording question is common in CISI-style exams, so read the stem carefully."}, {"tag": "scenario", "topic": "Location Rule", "q": "Which answer would best fit a question asking whether a non-UK branch in the UK can be subject to MiFID-derived COBS rules?", "opts": ["No, because only UK-incorporated firms can ever fall within MiFID-derived COBS rules", "Yes, a non-UK MiFID investment firm operating a UK branch can fall within those rules", "Only if it is also an appointed representative", "Only if it deals solely with retail clients"], "ans": 1, "exp": "Correct: a non-UK MiFID firm operating a UK branch can fall within the MiFID-derived COBS rules. The section expressly says so. The distractors attempt to add incorporation, AR status, or retail-only conditions that the text does not require. This is one of those questions where knowing the exact structure of the territorial rule is more important than memorising labels in isolation."}, {"tag": "cisi", "topic": "Exam Trap", "q": "Which answer most clearly reflects a common Section 1 trap?", "opts": ["Assuming SYSC 10 conflicts rules still apply to ECPs", "Assuming a UK firm doing MiFID business in the UK for a UK client will usually be within COBS", "Assuming all COBS protections disappear for ECP business", "Assuming deposits are only partially within COBS"], "ans": 2, "exp": "Correct: assuming all COBS protections disappear for ECP business is the trap. The other three statements are broadly correct. Students often remember that ECPs are sophisticated and then wrongly generalise that into a total removal of conduct duties. Section 1 specifically shows that this is false, especially through the continuing relevance of conflicts-of-interest rules."}];

const SK='cisi_ch2_sec1_v2';
const N=10;
let APP={round:[],answers:{},opts:{},seen:[],roundNum:0};
function save(){try{localStorage.setItem(SK,JSON.stringify(APP));}catch(e){}}
function load(){try{const d=localStorage.getItem(SK);if(d)APP=JSON.parse(d);}catch(e){}}
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function buildRound(){
  const lastWrong=Object.entries(APP.answers).filter(([,v])=>v&&v.v===0).map(([k])=>APP.round[parseInt(k)]).filter(x=>x!==undefined);
  const unseen=BANK.map((_,i)=>i).filter(i=>!APP.seen.includes(i));
  const seenOld=APP.seen.filter(i=>!APP.round.includes(i));
  let cands=[];
  cands.push(...shuffle(lastWrong).slice(0,3));
  cands.push(...shuffle(unseen.filter(i=>!cands.includes(i))).slice(0,N-cands.length));
  if(cands.length<N) cands.push(...shuffle(seenOld.filter(i=>!cands.includes(i))).slice(0,N-cands.length));
  if(cands.length<N) cands.push(...shuffle(BANK.map((_,i)=>i).filter(i=>!cands.includes(i))).slice(0,N-cands.length));
  const round=shuffle(cands).slice(0,N);
  round.forEach(i=>{if(!APP.seen.includes(i))APP.seen.push(i);});
  APP.round=round; APP.answers={}; APP.opts={}; APP.roundNum=(APP.roundNum||0)+1;
}
function doReset(){buildRound();save();render();window.scrollTo({top:0,behavior:'smooth'});} 
function pick(pos,oi){
  if(APP.answers[pos]) return;
  const q=BANK[APP.round[pos]];
  APP.answers[pos]={opt:q.opts[oi],v:oi===q.ans?1:0};
  save(); render();
}
function render(){
  const done=Object.keys(APP.answers).length;
  const ok=Object.values(APP.answers).filter(v=>v&&v.v===1).length;
  const bad=done-ok;
  const pct=done?Math.round(ok/done*100):null;
  document.getElementById('round-label').textContent = `Round ${APP.roundNum} · 10 questions per round · Bank: ${BANK.length}`;
  document.getElementById('s-num').textContent=`${done}/${N}`;
  document.getElementById('s-ok').textContent=ok;
  document.getElementById('s-bad').textContent=bad;
  document.getElementById('s-pct').textContent=pct===null?'—':pct+'%';
  const tr=document.getElementById('tracker'); tr.innerHTML='';
  for(let i=0;i<N;i++){ const d=document.createElement('div'); d.className='tracker-dot'+(APP.answers[i]?APP.answers[i].v===1?' t-ok':' t-bad':i===done?' t-cur':''); tr.appendChild(d);} 
  const area=document.getElementById('q-area'); area.innerHTML='';
  const L=['A','B','C','D'];
  const tmap={cisi:'CISI exam style',concept:'Concept check',scenario:'Scenario',detail:'Detail'};
  const tcls={cisi:'tag-cisi',concept:'tag-concept',scenario:'tag-scenario',detail:'tag-detail'};
  APP.round.forEach((qi,pos)=>{
    const q=BANK[qi]; const answered=!!APP.answers[pos]; const chosen=APP.answers[pos]?.opt; if(!APP.opts[pos]) APP.opts[pos]=shuffle(q.opts.map((_,i)=>i)); const oo=APP.opts[pos];
    let optsHtml=oo.map((oi,li)=>{ let c='opt'; if(answered) c+=' dis'; if(answered&&oi===q.ans) c+=' ok'; else if(answered&&q.opts[oi]===chosen&&oi!==q.ans) c+=' bad'; return `<div class="${c}" onclick="pick(${pos},${oi})"><span class="opt-l">${L[li]}</span><span>${q.opts[oi]}</span></div>`; }).join('');
    let expHtml=answered?`<div class="exp-box show ${APP.answers[pos].v===1?'exp-ok':'exp-bad'}"><strong>${APP.answers[pos].v===1?'✓ Correct!':'✗ Incorrect.'}</strong> ${q.exp}</div>`:'';
    const card=document.createElement('div');
    card.className='q-card';
    card.innerHTML=`<div class="q-meta"><span class="q-num">Q${pos+1}</span><span class="q-tag ${tcls[q.tag]}">${tmap[q.tag]}</span><span class="q-topic">${q.topic}</span></div><div class="q-text">${q.q}</div><div class="opts">${optsHtml}</div>${expHtml}`;
    area.appendChild(card);
  });
  if(done===N){
    const pF=Math.round(ok/N*100); let lbl,col,grade;
    if(pF>=80){lbl='Pass standard met!';col='var(--teal-m)';grade='Pass ✓';}
    else if(pF>=70){lbl='Close to pass standard — review weaker areas.';col='var(--amber)';grade='Near Pass';}
    else if(pF>=60){lbl='Borderline — further study recommended.';col='var(--coral-m)';grade='Borderline';}
    else{lbl='Below pass standard — keep practising.';col='#A32D2D';grade='Needs Work';}
    const ts={}; APP.round.forEach((qi,pos)=>{const t=BANK[qi].topic; if(!ts[t]) ts[t]={ok:0,tot:0}; ts[t].tot++; if(APP.answers[pos]?.v===1) ts[t].ok++;});
    let topicHtml=Object.entries(ts).map(([t,s])=>{ const pc=Math.round(s.ok/s.tot*100); return `<div class="topic-row"><div class="topic-name">${t} · ${s.ok}/${s.tot}</div><div class="topic-bar-wrap"><div class="topic-bar-fill" style="width:${pc}%;background:${pc>=80?'var(--teal-m)':pc>=60?'var(--amber)':'var(--coral-m)'}"></div></div></div>`;}).join('');
    let review=APP.round.map((qi,pos)=>{const q=BANK[qi]; const good=APP.answers[pos]?.v===1; return `<div class="q-review-item ${good?'r-ok':'r-bad'}"><div class="r-icon">${good?'✓':'✗'}</div><div><strong>Q${pos+1} · ${q.topic}</strong><br>${q.q}</div></div>`;}).join('');
    const rc=document.createElement('div'); rc.className='result-card'; rc.innerHTML=`<div class="result-big" style="color:${col}">${pF}%</div><div class="result-grade" style="background:${col};color:#fff">${grade}</div><div style="font-size:.92rem;color:var(--text2);margin-top:.35rem">${lbl}</div><div class="result-bar-wrap"><div class="result-bar-fill" style="width:${pF}%;background:${col}"></div></div><div class="result-breakdown"><div class="rp" style="background:var(--green-l);color:var(--green)">${ok} correct</div><div class="rp" style="background:var(--coral-l);color:var(--coral)">${N-ok} wrong</div><div class="rp" style="background:var(--gray-l);color:var(--gray-d)">Seen: ${APP.seen.length}/${BANK.length}</div></div><div class="topic-grid">${topicHtml}</div><div class="btn-row" style="margin-bottom:1rem"><button class="btn btn-p" onclick="doReset()">Start new round</button></div><div class="q-review-list">${review}</div>`; area.appendChild(rc);
  }
}
load(); if(!APP.round.length) buildRound(); save(); render();

</script>
