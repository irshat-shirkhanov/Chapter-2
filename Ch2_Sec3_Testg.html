<style>*{box-sizing:border-box;margin:0;padding:0}:root{--navy:#1E2761;--navy-l:#CADCFC;--navy-d:#12195F;--teal:#028090;--teal-l:#D6F0F3;--teal-d:#015E6A;--teal-m:#1D9E75;--amber:#B07D12;--amber-l:#FEF3C7;--amber-d:#7C5A0A;--coral:#993C1D;--coral-l:#FAECE7;--coral-m:#D85A30;--purple:#534AB7;--purple-l:#EEEDFE;--purple-d:#3C3489;--green-l:#E1F5EE;--green:#085041;--gray:#64748B;--gray-l:#F1F5F9;--gray-m:#CBD5E1;--gray-d:#334155;--bg:#F0F4F8;--card:#fff;--text:#1e293b;--text2:#475569;--text3:#94a3b8;--radius:12px;--shadow:0 2px 10px rgba(0,0,0,.09)}body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}.app-header{background:linear-gradient(135deg,var(--navy),var(--teal));padding:1.2rem 1.5rem .85rem;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.2)}.header-top{display:flex;align-items:flex-start;justify-content:space-between;gap:.75rem}.app-title{color:#fff;font-size:1.08rem;font-weight:700;line-height:1.3}.app-sub{color:var(--navy-l);font-size:.72rem;margin-top:.18rem}.reset-btn{background:rgba(255,255,255,.16);border:1.5px solid rgba(255,255,255,.38);color:#fff;border-radius:7px;padding:.36rem .95rem;font-size:.76rem;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap;flex-shrink:0}.reset-btn:hover{background:rgba(255,255,255,.3)}.screen{padding:1.4rem;max-width:820px;margin:0 auto}.round-pill{display:inline-flex;align-items:center;gap:.4rem;background:var(--navy);color:var(--navy-l);border-radius:7px;padding:.3rem .85rem;font-size:.73rem;font-weight:600;margin-bottom:1rem}.tracker{display:flex;gap:3px;margin-bottom:1.05rem}.tracker-dot{flex:1;height:10px;border-radius:5px;background:var(--gray-m);transition:background .3s}.tracker-dot.t-ok{background:var(--teal-m)}.tracker-dot.t-bad{background:var(--coral-m)}.tracker-dot.t-cur{background:var(--navy-l)}.score-bar{display:flex;gap:.65rem;margin-bottom:1rem}.sc{flex:1;background:var(--card);border-radius:10px;padding:.58rem .75rem;text-align:center;border:1px solid var(--gray-m);box-shadow:var(--shadow)}.sc .n{font-size:1.38rem;font-weight:700;color:var(--teal);line-height:1}.sc .n-ok{color:var(--teal-m)}.sc .n-bad{color:var(--coral-m)}.sc .l{font-size:.67rem;color:var(--text3);margin-top:.18rem}.q-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:1.4rem 1.5rem;margin-bottom:1rem;border:1px solid rgba(0,0,0,.05)}.q-meta{display:flex;align-items:center;gap:.5rem;margin-bottom:.65rem;flex-wrap:wrap}.q-num{font-size:.68rem;font-weight:700;color:var(--teal);text-transform:uppercase;letter-spacing:.07em}.q-tag{font-size:.64rem;font-weight:700;padding:.15rem .48rem;border-radius:20px}.tag-cisi{background:#FEF3C7;color:#7C5A0A}.tag-concept{background:var(--purple-l);color:var(--purple-d)}.tag-scenario{background:var(--teal-l);color:var(--teal-d)}.tag-detail{background:var(--gray-l);color:var(--gray-d)}.q-topic{font-size:.64rem;color:var(--text3);margin-left:auto}.q-text{font-size:.93rem;font-weight:500;line-height:1.6;margin-bottom:.95rem;color:var(--text)}.opts{display:flex;flex-direction:column;gap:.42rem}.opt{display:flex;align-items:flex-start;gap:.65rem;padding:.68rem .95rem;border-radius:8px;border:1.5px solid var(--gray-m);cursor:pointer;font-size:.86rem;line-height:1.46;background:var(--card);transition:all .16s}.opt:hover:not(.dis){border-color:var(--teal);background:var(--teal-l)}.opt.ok{border-color:var(--teal-m);background:var(--green-l);color:var(--green)}.opt.bad{border-color:var(--coral-m);background:var(--coral-l);color:var(--coral)}.opt.dis{cursor:default}.opt-l{width:21px;height:21px;min-width:21px;border-radius:50%;background:#e2e8f0;display:flex;align-items:center;justify-content:center;font-size:.69rem;font-weight:700;color:var(--gray);margin-top:1px;flex-shrink:0}.opt.ok .opt-l{background:var(--teal-m);color:#fff}.opt.bad .opt-l{background:var(--coral-m);color:#fff}.exp-box{margin-top:.8rem;padding:.7rem 1rem;border-radius:8px;font-size:.81rem;line-height:1.62;display:none}.exp-box.show{display:block}.exp-ok{background:var(--green-l);border-left:3px solid var(--teal-m);color:var(--green)}.exp-bad{background:var(--coral-l);border-left:3px solid var(--coral-m);color:var(--coral)}.result-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:2rem 1.5rem;text-align:center;margin-top:.5rem}.result-big{font-size:3.2rem;font-weight:800;margin:.4rem 0}.result-grade{display:inline-block;padding:.38rem 1.2rem;border-radius:20px;font-size:.92rem;font-weight:700;margin:.5rem 0 .8rem}.result-bar-wrap{background:var(--gray-l);border-radius:20px;height:14px;overflow:hidden;margin:.75rem auto;max-width:320px}.result-bar-fill{height:100%;border-radius:20px;transition:width .8s ease}.result-breakdown{display:flex;gap:.6rem;justify-content:center;flex-wrap:wrap;margin:1rem 0 1.2rem}.rp{padding:.3rem .9rem;border-radius:20px;font-size:.8rem;font-weight:600}.topic-grid{display:grid;grid-template-columns:1fr 1fr;gap:.45rem;margin:.5rem 0 1.2rem;text-align:left}.topic-row{background:var(--gray-l);border-radius:8px;padding:.5rem .75rem;font-size:.78rem}.topic-name{color:var(--text2);font-weight:600;margin-bottom:.2rem}.topic-bar-wrap{background:var(--gray-m);border-radius:10px;height:6px;overflow:hidden}.topic-bar-fill{height:100%;border-radius:10px}.q-review-list{text-align:left;margin-top:.5rem}.q-review-item{padding:.65rem 1rem;border-radius:8px;margin-bottom:.45rem;font-size:.83rem;line-height:1.52;display:flex;gap:.65rem;align-items:flex-start}.q-review-item.r-ok{background:var(--green-l);border-left:3px solid var(--teal-m);color:var(--green)}.q-review-item.r-bad{background:var(--coral-l);border-left:3px solid var(--coral-m);color:var(--coral)}.r-icon{font-size:.9rem;flex-shrink:0;margin-top:.08rem}.btn{padding:.58rem 1.3rem;border:none;border-radius:8px;cursor:pointer;font-size:.86rem;font-weight:600;transition:all .2s}.btn-p{background:var(--teal);color:#fff}.btn-p:hover{background:var(--teal-d)}.btn-row{display:flex;gap:.65rem;flex-wrap:wrap;justify-content:center}</style>

<div class="app-header"><div class="header-top"><div><div class="app-title">CISI UK Financial Regulation - Chapter 2, Section 3</div><div class="app-sub">Accepting Clients - Client Categorisation - Agents - Elective Professional / Elective ECP - Notifications - Reliance on Others &nbsp;|&nbsp; Syllabus 2.3 &nbsp;|&nbsp; 10 Qs per round</div></div><button class="reset-btn" onclick="doReset()">&#8634; New round</button></div></div>
<div class="screen"><div class="round-pill" id="round-label">Round 1</div><div class="tracker" id="tracker"></div><div class="score-bar"><div class="sc"><div class="n" id="s-num">0/10</div><div class="l">Progress</div></div><div class="sc"><div class="n n-ok" id="s-ok">0</div><div class="l">Correct</div></div><div class="sc"><div class="n n-bad" id="s-bad">0</div><div class="l">Wrong</div></div><div class="sc"><div class="n" id="s-pct">&mdash;</div><div class="l">Score</div></div></div><div id="q-area"></div></div>
<script>
const BANK=[{"tag": "scenario", "topic": "Client categorisation scope", "q": "A firm is required to categorise clients when it is carrying on which type of business?", "opts": ["Designated investment business", "Only advisory business for retail clients", "Any regulated activity, including pure deposit-taking and insurance administration", "Only MiFID investment advice"], "ans": 0, "exp": "Correct: A. The manual states that a firm is required to categorise its clients if it is carrying on designated investment business. That is the trigger point for Section 3. Why the other options are wrong: (B) is too narrow because categorisation is not limited to retail advice. (C) is too broad because not every regulated activity automatically triggers this categorisation regime. (D) is too narrow because Section 3 is relevant beyond advice and beyond pure MiFID-only contexts. Key exam point: start with designated investment business, then decide how the MiFID or non-MiFID overlay affects the application of the categories."}, {"tag": "concept", "topic": "MiFID vs non-MiFID", "q": "If a firm provides a mix of MiFID and non-MiFID services to the same client, which categorisation approach is generally used?", "opts": ["The non-MiFID categorisation because it is more protective", "MiFID categorisation, unless the MiFID business is conducted separately from the non-MiFID business", "Whichever categorisation the client prefers", "Separate categorisation is prohibited"], "ans": 1, "exp": "Correct: B. The manual says that if a firm provides a mix of MiFID and non-MiFID services, it must categorise clients in accordance with the MiFID requirements unless the MiFID business is conducted separately from the non-MiFID business. Why the other options are wrong: (A) reverses the rule. (C) client preference does not replace the rulebook. (D) separate categorisation is not prohibited; in fact, separation is the reason the exception exists. Exam logic: if mixed services are being delivered through one client relationship, expect MiFID categorisation to dominate."}, {"tag": "detail", "topic": "Definition of client", "q": "Under COBS, which statement best reflects the definition of a client?", "opts": ["Only a person with whom the firm has already signed a contract", "A person to whom a firm provides, intends to provide, or has provided a service in the course of a regulated activity", "Only a retail investor who has received personal advice", "Only a beneficial owner, never an agent"], "ans": 1, "exp": "Correct: B. COBS defines a client broadly. It includes someone to whom a firm provides, intends to provide, or has provided a service in the course of a regulated activity. Why the other options are wrong: (A) is too narrow because potential clients are included. (C) is too narrow because the term is not limited to retail investors or advised business. (D) is wrong because the section specifically addresses agents and does not automatically jump to the underlying beneficial owner. The exam often tests whether you understand that pre-contract stages still fall within the conduct framework."}, {"tag": "cisi", "topic": "Potential clients", "q": "Which statement is TRUE about potential clients under Section 3?", "opts": ["They are outside the rules until money changes hands", "They are included within the concept of client for relevant purposes", "They are treated as ECPs by default", "They matter only in relation to prudential supervision"], "ans": 1, "exp": "Correct: B. Potential clients are included in the concept of client. That is why categorisation and communication obligations can arise before the relationship is fully formed. Why the other options are wrong: (A) is a common mistake - the rules do not wait for money to move. (C) is obviously wrong because default ECP treatment would remove protections. (D) confuses conduct rules with prudential supervision. Key point: many Chapter 2 duties operate before the final transaction is completed."}, {"tag": "cisi", "topic": "Financial promotion recipients", "q": "For the financial promotion rules, the term client includes:", "opts": ["Only existing advisory clients", "Persons with whom the firm communicates, whether or not they become actual clients", "Only persons who sign a client agreement", "Only professional clients and ECPs"], "ans": 1, "exp": "Correct: B. In relation to financial promotions, the term includes persons with whom the firm communicates, whether or not they are actually clients. Why the other options are wrong: (A) and (C) are too narrow because promotion rules bite before a full relationship is created. (D) is wrong because promotions are particularly relevant to retail audiences too. This matters because firms cannot avoid responsibility by saying the recipient never became a customer."}, {"tag": "concept", "topic": "AR / tied agent clients", "q": "Clients of a firm's appointed representative or tied agent are regarded as:", "opts": ["Clients only of the representative, not of the firm", "Clients of the firm as well", "Clients of the FCA Handbook rather than of the firm", "Outside COBS"], "ans": 1, "exp": "Correct: B. The manual expressly states that clients of a firm's appointed representative or tied agent are also regarded as clients of the firm. Why the other options are wrong: (A) ignores the principal-responsibility structure. (C) is nonsense in legal terms. (D) is the opposite of the rule. This links Section 3 directly back to the logic in the appointed representative section."}, {"tag": "detail", "topic": "Categories", "q": "Under COBS, clients may be categorised as:", "opts": ["Retail, mass affluent, institutional", "Retail, professional, eligible counterparty", "Private, corporate, sovereign", "Standard, enhanced, exempt"], "ans": 1, "exp": "Correct: B. The three recognised categories are retail client, professional client and eligible counterparty. Why the other options are wrong: the other labels may sound commercially plausible but they are not the COBS categories. Exam point: learn the exact statutory language, because the wrong answer options are often designed to sound like ordinary market terminology."}, {"tag": "cisi", "topic": "Protection ladder", "q": "Which statement best describes the relationship between the three categories?", "opts": ["Retail clients receive the least protection and ECPs the most", "Retail clients receive the most protection and ECPs the least", "Professional clients and ECPs receive identical protection", "Protection depends only on whether the client has signed a waiver"], "ans": 1, "exp": "Correct: B. Retail clients receive the highest level of regulatory protection; professional clients receive less; eligible counterparties receive the least. Why the other options are wrong: (A) reverses the protection ladder. (C) is false because ECP status removes more protections than professional status. (D) is wrong because waivers do not replace the categorisation framework. The protection ladder is one of the most fundamental concepts in the section."}, {"tag": "cisi", "topic": "Retail client definition", "q": "A retail client is best defined as:", "opts": ["A client who is not a professional client or an eligible counterparty", "A client with less than EUR 500,000 in assets", "A natural person only", "Any client who requests the highest level of protection"], "ans": 0, "exp": "Correct: A. The retail category is residual: any client who is not a professional client or an eligible counterparty is retail. Why the other options are wrong: (B) invents a financial threshold that is not the definition. (C) is wrong because legal persons can also be retail clients. (D) is wrong because category is determined by the rules, not by preference alone."}, {"tag": "concept", "topic": "Per se professional", "q": "Which of the following is most clearly a per se professional client?", "opts": ["A small retail investor with one year of office experience", "An authorised investment firm", "Any company with any level of turnover", "Any person who has traded shares five times"], "ans": 1, "exp": "Correct: B. An entity required to be authorised or regulated to operate in financial markets, such as an investment firm, is a classic per se professional client. Why the other options are wrong: (A) and (D) may be relevant to experience but do not automatically create per se status. (C) is too broad because company size tests are specific and not every company qualifies. Exam trap: do not confuse per se professional with elective professional."}, {"tag": "detail", "topic": "Large undertakings MiFID", "q": "For MiFID business, a large undertaking may be per se professional if it meets:", "opts": ["Any one of the size criteria", "Any two of the specified size criteria", "All three criteria simultaneously", "A UK-only employee threshold test"], "ans": 1, "exp": "Correct: B. For MiFID and equivalent third-country business, a large undertaking must meet any two of the three specified criteria: balance sheet total EUR 20m, net turnover EUR 40m, or own funds EUR 2m. Why the other options are wrong: (A) is too lenient. (C) is too strict. (D) is not the MiFID test. This is a favourite numeric exam point."}, {"tag": "cisi", "topic": "ECP narrower than per se professional", "q": "Which statement is TRUE about the relationship between per se professional clients and eligible counterparties?", "opts": ["Every per se professional client is automatically an ECP", "The ECP category is narrower and does not include large undertakings", "Large undertakings are always ECPs if they meet any two size tests", "ECP status provides more protection than professional status"], "ans": 1, "exp": "Correct: B. The ECP category is narrower than the per se professional category and does not include large undertakings as a category. Why the other options are wrong: (A) overstates the overlap. (C) is exactly the trap the manual warns about. (D) reverses the protection ladder. If you remember one distinction here, remember that large undertakings can be per se professional without being ECP."}, {"tag": "cisi", "topic": "ECP business scope", "q": "Which of the following is within the definition of eligible counterparty business?", "opts": ["Personal recommendation to buy a pension product", "Discretionary portfolio management", "Execution of orders on behalf of clients", "General financial planning for a retail household"], "ans": 2, "exp": "Correct: C. The manual lists dealing on own account, execution of orders, and reception and transmission of orders among the core services that can be carried on with or for an ECP. Why the other options are wrong: (A) and (D) are advice/planning style activities. (B) investment management is outside the ECP-business list, so the client would need to be treated at least as a professional client for that service."}, {"tag": "concept", "topic": "ECP and advice", "q": "If an ECP wants investment advice or investment management, how should the firm treat it?", "opts": ["It remains an ECP for all purposes", "It must be treated as a per se professional client for that business", "It must automatically become retail", "The firm must refuse the business"], "ans": 1, "exp": "Correct: B. The section explains that if an ECP wants to engage in other types of business, such as investment management or investment advice, it will have to be classified as a per se professional client. Why the other options are wrong: (A) ignores the limited scope of ECP business. (C) overstates the downgrade. (D) the business is not prohibited; the categorisation simply changes."}, {"tag": "detail", "topic": "Agent rule default", "q": "If a firm knows that A is acting as agent for B, who is generally treated as the client?", "opts": ["B, because B is the ultimate principal", "A, unless an exception applies", "Both A and B automatically", "Whichever party is wealthier"], "ans": 1, "exp": "Correct: B. The default rule is that if a firm knows A is acting as agent for B, the firm should regard A as its client. Why the other options are wrong: (A) is the common but incorrect instinct. (C) is not the stated default rule. (D) is irrelevant. The exam often uses this because many candidates think the rule automatically looks through to B."}, {"tag": "scenario", "topic": "Agent rule written agreement", "q": "When may a firm treat B rather than A as the client where A is acting as agent?", "opts": ["Whenever B says so verbally", "Only if the firm has agreed in writing with A that B should be treated as the client", "Only if B is retail", "Only if the FCA pre-approves it"], "ans": 1, "exp": "Correct: B. One exception to the default agent rule is where the firm has agreed in writing with A that B should be treated as the client instead. Why the other options are wrong: (A) verbal preference is insufficient. (C) retail status is not the condition. (D) FCA pre-approval is not required. The requirement for writing is what makes this an exam-quality distinction."}, {"tag": "scenario", "topic": "Agent anti-avoidance", "q": "If A is inserted mainly to reduce the firm's duties to B, who must be treated as the client?", "opts": ["A, because A is the contracting intermediary", "B, under the anti-avoidance rule", "Neither A nor B until the transaction settles", "The principal's compliance department"], "ans": 1, "exp": "Correct: B. The manual states that where the involvement of A is mainly for the purpose of reducing the firm's duties to B, B should be treated as the client in any case. Why the other options are wrong: (A) ignores the anti-avoidance protection. (C) invents a waiting rule. (D) is not even a client. Key point: the rules prevent firms from using interposed agents to strip protections."}, {"tag": "concept", "topic": "Elective professional qualitative", "q": "What is the qualitative test for elective professional status designed to assess?", "opts": ["Whether the client is wealthy enough to bear losses", "Whether the client can make investment decisions and understand the risks involved", "Whether the client has signed at least 10 agreements", "Whether the client is already an ECP"], "ans": 1, "exp": "Correct: B. The qualitative test is about expertise, experience and knowledge. The firm must believe the client can make its own investment decisions and understand the risks involved. Why the other options are wrong: (A) financial capacity matters elsewhere but is not the qualitative test. (C) no such formal count exists. (D) elective professional status is distinct from ECP status."}, {"tag": "detail", "topic": "Elective professional quantitative", "q": "For MiFID business, how many of the quantitative criteria must usually be met for elective professional treatment?", "opts": ["One", "Any two", "All three", "None if the client is wealthy"], "ans": 1, "exp": "Correct: B. For MiFID business, the client must meet any two of the three quantitative criteria in addition to the qualitative test. Why the other options are wrong: (A) is too low. (C) is too strict. (D) wealth alone is not enough because the test is structured, not impressionistic."}, {"tag": "cisi", "topic": "Quant criterion 1", "q": "Which of the following is one of the MiFID quantitative criteria for elective professional status?", "opts": ["Ten significantly sized transactions on the relevant market in each of the last four quarters, on average", "Ten transactions in total over any period", "One leveraged transaction and a written request", "A portfolio over GBP 10 million for all clients"], "ans": 0, "exp": "Correct: A. One of the MiFID quantitative criteria is that the client carried out, on average, ten significantly sized transactions on the relevant market in each of the past four quarters. Why the other options are wrong: (B) weakens the frequency requirement. (C) invents a criterion. (D) confuses the local-authority test with the ordinary MiFID elective professional test."}, {"tag": "cisi", "topic": "Quant criterion 2", "q": "Under the ordinary MiFID quantitative test for elective professional status, the portfolio threshold is:", "opts": ["EUR 50,000", "EUR 500,000 including cash deposits and financial instruments", "GBP 500,000 excluding cash", "GBP 10 million"], "ans": 1, "exp": "Correct: B. The threshold is a financial portfolio exceeding EUR 500,000, and the manual specifically says this includes cash deposits and financial instruments. Why the other options are wrong: (A) is too low. (C) changes both the currency and the composition. (D) is the wrong threshold and belongs to the special local-authority framework."}, {"tag": "concept", "topic": "Quant criterion 3", "q": "Which statement correctly reflects the professional-experience limb of the MiFID quantitative test?", "opts": ["The client must have any work experience in any sector for one year", "The client must work or have worked in the financial sector for at least one year in a role requiring knowledge of the envisaged transactions or services", "The client must have passed an FCA exam", "The client must currently work for an investment bank"], "ans": 1, "exp": "Correct: B. The criterion requires at least one year of professional experience in the financial sector in a role requiring knowledge of the envisaged transactions or services. Why the other options are wrong: (A) is far too broad. (C) exams are not the test. (D) current employment at an investment bank is not the legal wording and is too narrow."}, {"tag": "detail", "topic": "Written formalities", "q": "Which sequence is necessary for valid elective professional reclassification?", "opts": ["Client oral request, firm internal note, no further action", "Client written request, firm clear written warning, client separate written acknowledgement of the consequences", "Client email only and immediate trading", "FCA approval and PRA sign-off"], "ans": 1, "exp": "Correct: B. The manual is clear: the client must request reclassification in writing, the firm must respond with a clear written warning explaining the protections to be lost, and the client must state separately in writing that it is aware of those consequences. Why the other options are wrong: (A) ignores the mandatory written warning and acknowledgement. (C) is incomplete and unsafe. (D) no FCA/PRA approval is part of the process."}, {"tag": "cisi", "topic": "Client duty after recategorisation", "q": "After becoming an elective professional client, who is expected to keep the firm informed of changes in circumstances that may affect the classification?", "opts": ["The FCA", "The professional client", "The FSCS", "The exchange on which the client trades"], "ans": 1, "exp": "Correct: B. The manual says it is up to the professional client to keep the firm up to date with circumstances and notify the firm of changes that may affect classification. Why the other options are wrong: the regulator, compensation scheme and exchange do not carry this duty. The exam may test this because recategorisation is not a one-time event frozen forever."}, {"tag": "scenario", "topic": "Firm action on changed circumstances", "q": "If a firm becomes aware that a client no longer fulfils the conditions for elective professional status, what should it do?", "opts": ["Nothing until the next annual review", "Take appropriate action, which may include recategorising the client as retail and notifying the client", "Automatically terminate the relationship", "Convert the client to ECP"], "ans": 1, "exp": "Correct: B. If the firm becomes aware that the client no longer fulfils the conditions, it must take appropriate action. If that means recategorising the client as retail, it must notify the client of the new categorisation. Why the other options are wrong: (A) delays action improperly. (C) is not required by the section. (D) is the wrong direction entirely."}, {"tag": "concept", "topic": "Elective ECP", "q": "A professional client may be treated as an elective ECP if:", "opts": ["It is any professional client that verbally requests it", "It is an undertaking, is a qualifying per se professional client, and requests ECP treatment", "It is a retail client with a EUR 500,000 portfolio", "It is a large undertaking only"], "ans": 1, "exp": "Correct: B. The manual states that a professional client may be treated as an elective ECP if it is an undertaking, it is a per se professional client (subject to the stated carve-out), and it requests to be treated as an ECP. Why the other options are wrong: (A) is too loose and misses the status conditions. (C) applies the wrong starting category. (D) is too narrow and in fact large undertakings are not automatically ECPs."}, {"tag": "detail", "topic": "Local authorities default", "q": "Under MiFID II, local authorities and municipalities are, by default:", "opts": ["Per se professional clients", "Eligible counterparties", "Retail clients", "Elective professional clients"], "ans": 2, "exp": "Correct: C. MiFID II introduced extra protections for local authorities and municipalities, which by default are now classified as retail clients. Why the other options are wrong: they reflect the old instinctive view of public bodies as sophisticated, but the manual is explicit that the default is retail. This is a classic exam trap."}, {"tag": "cisi", "topic": "Local authorities threshold", "q": "For local authorities seeking elective professional status, the financial-instrument portfolio threshold is:", "opts": ["EUR 500,000", "GBP 10 million", "EUR 20 million", "GBP 5 million"], "ans": 1, "exp": "Correct: B. The special quantitative test for local authorities includes a portfolio threshold above GBP 10 million. Why the other options are wrong: (A) is the ordinary MiFID elective professional threshold for other clients, not for local authorities. (C) and (D) are not the manual's figure. This distinction is very testable because the manual deliberately uses a different threshold here."}, {"tag": "cisi", "topic": "Higher protection requests", "q": "Which statement is TRUE about recategorisation to a higher-protection category?", "opts": ["Firms may refuse all such requests as a matter of policy", "Firms must allow professional clients and ECPs to request recategorisation to a higher-protection category", "Only retail clients may request recategorisation", "Higher protection can only be given on the firm's initiative, not at the client's request"], "ans": 1, "exp": "Correct: B. Firms must allow professional clients and ECPs to request recategorisation so that they can benefit from higher protections if they wish. Why the other options are wrong: (A) conflicts with the express rule. (C) gets the direction wrong. (D) ignores the client's express right to ask for more protection."}, {"tag": "concept", "topic": "Firm initiative", "q": "Which of the following may a firm do on its own initiative?", "opts": ["Treat a per se professional client as retail and a per se ECP as professional or retail", "Treat any retail client as ECP without consent", "Remove all categorisation records after the first trade", "Ignore client requests for higher protection"], "ans": 0, "exp": "Correct: A. The manual allows firms, on their own initiative, to treat per se professional clients as retail clients and per se ECPs as professional or retail clients. Why the other options are wrong: (B) would remove protection improperly. (C) breaches recordkeeping logic. (D) conflicts with the rule requiring firms to allow recategorisation requests."}, {"tag": "detail", "topic": "Transaction-specific recategorisation", "q": "Recategorisation may be carried out:", "opts": ["Only on a permanent, whole-relationship basis", "Only for retail clients", "Either on a general basis or on more specific terms such as a single transaction", "Only with court approval"], "ans": 2, "exp": "Correct: C. The section states that recategorisation may be carried out on a general basis or on more specific terms, for example in relation to a single transaction only. Why the other options are wrong: (A) is too rigid. (B) is not stated. (D) court approval is irrelevant. This matters because the rules allow tailored protection rather than only all-or-nothing classification changes."}, {"tag": "cisi", "topic": "Lost protections retail to elective professional", "q": "Which of the following is among the protections a client may lose when moving from retail to elective professional?", "opts": ["Suitability and appropriateness protections", "The need for the firm to remain authorised", "All anti-money laundering rules", "The legal concept of client status itself"], "ans": 0, "exp": "Correct: A. The manual's list of protections that may be lost includes suitability and appropriateness, among many others. Why the other options are wrong: (B) the firm's authorisation obligation never disappears. (C) AML rules do not vanish because of client categorisation. (D) the person remains a client; only the protection level changes. The exam may test the general direction rather than the full list."}, {"tag": "cisi", "topic": "Lost protections professional to elective ECP", "q": "Which of the following is among the protections a professional client may lose when becoming an elective ECP?", "opts": ["Client agreement and best execution protections", "The requirement for the firm to hold records", "The need for the client to exist in law", "The requirement to categorise clients"], "ans": 0, "exp": "Correct: A. The manual lists client agreement, appropriateness, best execution and order handling among the protections lost when a professional client becomes an elective ECP. Why the other options are wrong: operational compliance duties like recordkeeping and categorisation do not disappear in the broad way suggested. (C) is nonsense. The key exam point is that moving to ECP status strips away conduct protections, not the existence of the regulatory relationship."}, {"tag": "concept", "topic": "Notifications", "q": "Before services are provided, new clients must be told:", "opts": ["Only their firm's trading venue", "How they have been classified and their rights to request recategorisation, including any resulting limits in protection", "Only the names of relevant regulators", "Only the firm's complaints procedure"], "ans": 1, "exp": "Correct: B. New clients must be notified of their classification and, before services are provided, be advised of their rights to request recategorisation and of any limits in protections that arise from the classification. Why the other options are wrong: each picks out a narrower or unrelated item. The exam often asks not just what must be notified, but when - here, before services are provided."}, {"tag": "detail", "topic": "Policies and records", "q": "Which statement best reflects the firm's obligations on policies and records in Section 3?", "opts": ["No written process is needed if the adviser knows the client personally", "Firms must have appropriate written internal policies and procedures and keep records of notices and agreements", "Only MiFID firms need records; non-MiFID firms do not", "Records can be discarded once the first transaction is complete"], "ans": 1, "exp": "Correct: B. Firms must implement appropriate written internal policies and procedures to categorise clients and must make and retain records of notices and agreements for the relevant period after business ends. Why the other options are wrong: familiarity with a client is not a substitute for compliance. Non-MiFID firms are not excused from record discipline here. Immediate destruction of records would plainly defeat the rule."}, {"tag": "scenario", "topic": "Reliance on others MiFID", "q": "When a firm carrying out UK MiFID business receives a client through another UK MiFID firm, it may rely on:", "opts": ["Nothing at all - it must repeat every step independently", "Information relayed about the client and recommendations provided by the third-party firm", "Only oral summaries from the introducing firm", "Only data from a retail client questionnaire, never recommendations"], "ans": 1, "exp": "Correct: B. For UK MiFID business, the firm can rely on client information relayed to it by the third-party firm and on recommendations provided by that third-party firm. Why the other options are wrong: (A) overstates duplication. (C) the manual says information should be given in writing when reliance is used. (D) is too narrow because recommendations can also be relied upon. The key is that reliance is allowed, but responsibility is shared rather than eliminated."}, {"tag": "scenario", "topic": "Reliance responsibility split", "q": "Under MiFID reliance on others, who remains responsible for the completeness and accuracy of the client information and the appropriateness of any recommendations?", "opts": ["The receiving firm only", "The third-party firm", "The client", "The FCA"], "ans": 1, "exp": "Correct: B. The third-party firm retains responsibility for the completeness and accuracy of the client information and for the appropriateness of any recommendations it provides. The receiving firm takes responsibility for concluding the services or transactions. Why the other options are wrong: (A) places the whole burden on the receiving firm. (C) and (D) do not reflect the allocation in the manual. This split is highly testable because both firms retain different responsibilities."}, {"tag": "concept", "topic": "Reliance written information", "q": "When a firm relies on information provided by a third party under the MiFID reliance rule, that information should be:", "opts": ["Given in writing", "Confirmed only by telephone", "Approved by a court", "Verified by the FSCS"], "ans": 0, "exp": "Correct: A. The manual says that when a firm relies on information provided by a third party, this information should be given in writing. Why the other options are wrong: (B) is weaker than the manual's wording. (C) and (D) are irrelevant. This is a straightforward rule but it often appears in short detail questions."}, {"tag": "detail", "topic": "Reliance on others non-MiFID", "q": "For non-MiFID investment firms, reliance on written information from an unconnected authorised person or professional firm is generally reasonable unless:", "opts": ["The client is professional", "The firm is aware, or ought reasonably to be aware, of grounds to question the accuracy of the information", "The transaction is above EUR 500,000", "The introducing firm is overseas"], "ans": 1, "exp": "Correct: B. For non-MiFID firms, reliance is generally reasonable unless the firm is aware, or ought reasonably to be aware, of anything giving reasonable grounds to question the accuracy of the information. Why the other options are wrong: professional status, transaction size and overseas location are not the stated trigger points. The rule is about reliability and reasonableness, not arbitrary thresholds."}, {"tag": "scenario", "topic": "Non-MiFID reliance further step", "q": "When relying on another person for non-MiFID business, the firm should also take reasonable steps to establish that the other person is:", "opts": ["Connected and commercially aligned", "Unconnected and competent to provide the information", "An eligible counterparty", "A shareholder in the firm"], "ans": 1, "exp": "Correct: B. The FCA guidance says the firm should take reasonable steps to establish that the other person is unconnected and competent to provide the information. Why the other options are wrong: (A) says the opposite of 'unconnected'. (C) and (D) are not the test. This is one of those points that looks like ordinary common sense, but the exam likes to dress it up in formal language."}];
const SK='cisi_ch2s3_v1';
const N=10;
let APP={round:[],answers:{},opts:{},seen:[],roundNum:0};
function save(){try{localStorage.setItem(SK,JSON.stringify(APP));}catch(e){}}
function load(){try{const d=localStorage.getItem(SK);if(d)APP=JSON.parse(d);}catch(e){}}
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function buildRound(){
  const unseen=BANK.map((_,i)=>i).filter(i=>!APP.seen.includes(i));
  let pool=unseen.length>=N?unseen:BANK.map((_,i)=>i);
  APP.round=shuffle(pool).slice(0,N);
  APP.round.forEach(i=>{if(!APP.seen.includes(i))APP.seen.push(i);});
  APP.answers={};APP.opts={};APP.roundNum=(APP.roundNum||0)+1;
}
function doReset(){buildRound();save();render();window.scrollTo({top:0,behavior:'smooth'});}
function pick(pos,oi){
  if(APP.answers[pos]) return;
  const q=BANK[APP.round[pos]];
  APP.answers[pos]={opt:q.opts[oi],v:oi===q.ans?1:0};
  save(); render();
}
function render(){
  const done=Object.keys(APP.answers).length;
  const ok=Object.values(APP.answers).filter(v=>v&&v.v===1).length;
  const bad=done-ok;
  const pct=done?Math.round(ok/done*100):null;
  document.getElementById('round-label').textContent=`Round ${APP.roundNum} · 10 questions from bank of ${BANK.length} · Seen: ${APP.seen.length}/${BANK.length}`;
  document.getElementById('s-num').textContent=`${done}/${N}`;
  document.getElementById('s-ok').textContent=ok;
  document.getElementById('s-bad').textContent=bad;
  document.getElementById('s-pct').textContent=pct===null?'—':pct+'%';
  const tr=document.getElementById('tracker'); tr.innerHTML='';
  for(let i=0;i<N;i++){const d=document.createElement('div');d.className='tracker-dot'+(APP.answers[i]?APP.answers[i].v===1?' t-ok':' t-bad':i===done?' t-cur':'');tr.appendChild(d);}
  const area=document.getElementById('q-area'); area.innerHTML='';
  const L=['A','B','C','D'];
  const tmap={cisi:'CISI exam style',concept:'Concept check',scenario:'Scenario',detail:'Detail'};
  const tcls={cisi:'tag-cisi',concept:'tag-concept',scenario:'tag-scenario',detail:'tag-detail'};
  APP.round.forEach((qi,pos)=>{
    const q=BANK[qi]; const answered=!!APP.answers[pos]; const chosen=APP.answers[pos]?.opt;
    if(!APP.opts[pos]) APP.opts[pos]=shuffle(q.opts.map((_,i)=>i));
    const oo=APP.opts[pos];
    let optsHtml=oo.map((oi,li)=>{let c='opt'; if(answered) c+=' dis'; if(answered&&oi===q.ans) c+=' ok'; else if(answered&&q.opts[oi]===chosen&&oi!==q.ans) c+=' bad'; return `<div class="${c}" onclick="pick(${pos},${oi})"><span class="opt-l">${L[li]}</span><span>${q.opts[oi]}</span></div>`;}).join('');
    let expHtml=answered?`<div class="exp-box show ${APP.answers[pos].v===1?'exp-ok':'exp-bad'}"><strong>${APP.answers[pos].v===1?'✓ Correct!':'✗ Incorrect.'}</strong> ${q.exp}</div>`:'';
    const card=document.createElement('div'); card.className='q-card';
    card.innerHTML=`<div class="q-meta"><span class="q-num">Q${pos+1}</span><span class="q-tag ${tcls[q.tag]}">${tmap[q.tag]}</span><span class="q-topic">${q.topic}</span></div><div class="q-text">${q.q}</div><div class="opts">${optsHtml}</div>${expHtml}`;
    area.appendChild(card);
  });
  if(done===N){
    const pF=Math.round(ok/N*100); let col='var(--coral-m)',grade='Needs Work',lbl='Review the explanations carefully and go again.';
    if(pF>=80){col='var(--teal-m)';grade='Pass standard met';lbl='Strong round. Keep rotating through the bank to avoid memorising patterns.';}
    else if(pF>=70){col='var(--amber)';grade='Near pass';lbl='Close to the standard. Tighten the weaker distinctions.';}
    const ts={}; APP.round.forEach((qi,pos)=>{const t=BANK[qi].topic; if(!ts[t]) ts[t]={ok:0,tot:0}; ts[t].tot++; if(APP.answers[pos]?.v===1) ts[t].ok++;});
    let topicHtml=Object.entries(ts).map(([t,s])=>{const pc=Math.round(s.ok/s.tot*100); return `<div class="topic-row"><div class="topic-name">${t} · ${s.ok}/${s.tot}</div><div class="topic-bar-wrap"><div class="topic-bar-fill" style="width:${pc}%;background:${pc>=80?'var(--teal-m)':pc>=60?'var(--amber)':'var(--coral-m)'}"></div></div></div>`;}).join('');
    let review=APP.round.map((qi,pos)=>{const q=BANK[qi]; const good=APP.answers[pos]?.v===1; return `<div class="q-review-item ${good?'r-ok':'r-bad'}"><div class="r-icon">${good?'✓':'✗'}</div><div><strong>Q${pos+1} · ${q.topic}</strong><br>${q.q}</div></div>`;}).join('');
    const rc=document.createElement('div'); rc.className='result-card';
    rc.innerHTML=`<div class="result-big" style="color:${col}">${pF}%</div><div class="result-grade" style="background:${col};color:#fff">${grade}</div><div style="font-size:.92rem;color:var(--text2);margin-top:.35rem">${lbl}</div><div class="result-bar-wrap"><div class="result-bar-fill" style="width:${pF}%;background:${col}"></div></div><div class="result-breakdown"><div class="rp" style="background:var(--green-l);color:var(--green)">${ok} correct</div><div class="rp" style="background:var(--coral-l);color:var(--coral)">${N-ok} wrong</div><div class="rp" style="background:var(--gray-l);color:var(--gray-d)">Bank: ${BANK.length}</div></div><div class="topic-grid">${topicHtml}</div><div class="btn-row" style="margin-bottom:1rem"><button class="btn btn-p" onclick="doReset()">Start new round</button></div><div class="q-review-list">${review}</div>`;
    area.appendChild(rc);
  }
}
load(); if(!APP.round.length) buildRound(); save(); render();
</script></body></html>
