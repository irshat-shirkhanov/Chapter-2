<style>*{box-sizing:border-box;margin:0;padding:0}:root{--navy:#1E2761;--navy-l:#CADCFC;--navy-d:#12195F;--teal:#028090;--teal-l:#D6F0F3;--teal-d:#015E6A;--teal-m:#1D9E75;--amber:#B07D12;--amber-l:#FEF3C7;--amber-d:#7C5A0A;--coral:#993C1D;--coral-l:#FAECE7;--coral-m:#D85A30;--purple:#534AB7;--purple-l:#EEEDFE;--purple-d:#3C3489;--green-l:#E1F5EE;--green:#085041;--gray:#64748B;--gray-l:#F1F5F9;--gray-m:#CBD5E1;--gray-d:#334155;--bg:#F0F4F8;--card:#fff;--text:#1e293b;--text2:#475569;--text3:#94a3b8;--radius:12px;--shadow:0 2px 10px rgba(0,0,0,.09)}body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}.app-header{background:linear-gradient(135deg,var(--navy),var(--teal));padding:1.2rem 1.5rem .85rem;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.2)}.header-top{display:flex;align-items:flex-start;justify-content:space-between;gap:.75rem}.app-title{color:#fff;font-size:1.08rem;font-weight:700;line-height:1.3}.app-sub{color:var(--navy-l);font-size:.72rem;margin-top:.18rem}.reset-btn{background:rgba(255,255,255,.16);border:1.5px solid rgba(255,255,255,.38);color:#fff;border-radius:7px;padding:.36rem .95rem;font-size:.76rem;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap;flex-shrink:0}.reset-btn:hover{background:rgba(255,255,255,.3)}.screen{padding:1.4rem;max-width:820px;margin:0 auto}.round-pill{display:inline-flex;align-items:center;gap:.4rem;background:var(--navy);color:var(--navy-l);border-radius:7px;padding:.3rem .85rem;font-size:.73rem;font-weight:600;margin-bottom:1rem}.tracker{display:flex;gap:3px;margin-bottom:1.05rem}.tracker-dot{flex:1;height:10px;border-radius:5px;background:var(--gray-m);transition:background .3s}.tracker-dot.t-ok{background:var(--teal-m)}.tracker-dot.t-bad{background:var(--coral-m)}.tracker-dot.t-cur{background:var(--navy-l)}.score-bar{display:flex;gap:.65rem;margin-bottom:1rem}.sc{flex:1;background:var(--card);border-radius:10px;padding:.58rem .75rem;text-align:center;border:1px solid var(--gray-m);box-shadow:var(--shadow)}.sc .n{font-size:1.38rem;font-weight:700;color:var(--teal);line-height:1}.sc .n-ok{color:var(--teal-m)}.sc .n-bad{color:var(--coral-m)}.sc .l{font-size:.67rem;color:var(--text3);margin-top:.18rem}.q-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:1.4rem 1.5rem;margin-bottom:1rem;border:1px solid rgba(0,0,0,.05)}.q-meta{display:flex;align-items:center;gap:.5rem;margin-bottom:.65rem;flex-wrap:wrap}.q-num{font-size:.68rem;font-weight:700;color:var(--teal);text-transform:uppercase;letter-spacing:.07em}.q-tag{font-size:.64rem;font-weight:700;padding:.15rem .48rem;border-radius:20px}.tag-cisi{background:#FEF3C7;color:#7C5A0A}.tag-concept{background:var(--purple-l);color:var(--purple-d)}.tag-scenario{background:var(--teal-l);color:var(--teal-d)}.tag-detail{background:var(--gray-l);color:var(--gray-d)}.q-topic{font-size:.64rem;color:var(--text3);margin-left:auto}.q-text{font-size:.93rem;font-weight:500;line-height:1.6;margin-bottom:.95rem;color:var(--text)}.opts{display:flex;flex-direction:column;gap:.42rem}.opt{display:flex;align-items:flex-start;gap:.65rem;padding:.68rem .95rem;border-radius:8px;border:1.5px solid var(--gray-m);cursor:pointer;font-size:.86rem;line-height:1.46;background:var(--card);transition:all .16s}.opt:hover:not(.dis){border-color:var(--teal);background:var(--teal-l)}.opt.ok{border-color:var(--teal-m);background:var(--green-l);color:var(--green)}.opt.bad{border-color:var(--coral-m);background:var(--coral-l);color:var(--coral)}.opt.dis{cursor:default}.opt-l{width:21px;height:21px;min-width:21px;border-radius:50%;background:#e2e8f0;display:flex;align-items:center;justify-content:center;font-size:.69rem;font-weight:700;color:var(--gray);margin-top:1px;flex-shrink:0}.opt.ok .opt-l{background:var(--teal-m);color:#fff}.opt.bad .opt-l{background:var(--coral-m);color:#fff}.exp-box{margin-top:.8rem;padding:.7rem 1rem;border-radius:8px;font-size:.81rem;line-height:1.62;display:none}.exp-box.show{display:block}.exp-ok{background:var(--green-l);border-left:3px solid var(--teal-m);color:var(--green)}.exp-bad{background:var(--coral-l);border-left:3px solid var(--coral-m);color:var(--coral)}.result-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:2rem 1.5rem;text-align:center;margin-top:.5rem}.result-big{font-size:3.2rem;font-weight:800;margin:.4rem 0}.result-grade{display:inline-block;padding:.38rem 1.2rem;border-radius:20px;font-size:.92rem;font-weight:700;margin:.5rem 0 .8rem}.result-bar-wrap{background:var(--gray-l);border-radius:20px;height:14px;overflow:hidden;margin:.75rem auto;max-width:320px}.result-bar-fill{height:100%;border-radius:20px;transition:width .8s ease}.result-breakdown{display:flex;gap:.6rem;justify-content:center;flex-wrap:wrap;margin:1rem 0 1.2rem}.rp{padding:.3rem .9rem;border-radius:20px;font-size:.8rem;font-weight:600}.topic-grid{display:grid;grid-template-columns:1fr 1fr;gap:.45rem;margin:.5rem 0 1.2rem;text-align:left}.topic-row{background:var(--gray-l);border-radius:8px;padding:.5rem .75rem;font-size:.78rem}.topic-name{color:var(--text2);font-weight:600;margin-bottom:.2rem}.topic-bar-wrap{background:var(--gray-m);border-radius:10px;height:6px;overflow:hidden}.topic-bar-fill{height:100%;border-radius:10px}.q-review-list{text-align:left;margin-top:.5rem}.q-review-item{padding:.65rem 1rem;border-radius:8px;margin-bottom:.45rem;font-size:.83rem;line-height:1.52;display:flex;gap:.65rem;align-items:flex-start}.q-review-item.r-ok{background:var(--green-l);border-left:3px solid var(--teal-m);color:var(--green)}.q-review-item.r-bad{background:var(--coral-l);border-left:3px solid var(--coral-m);color:var(--coral)}.r-icon{font-size:.9rem;flex-shrink:0;margin-top:.08rem}.btn{padding:.58rem 1.3rem;border:none;border-radius:8px;cursor:pointer;font-size:.86rem;font-weight:600;transition:all .2s}.btn-p{background:var(--teal);color:#fff}.btn-p:hover{background:var(--teal-d)}.btn-row{display:flex;gap:.65rem;flex-wrap:wrap;justify-content:center}</style>

<div class="app-header"><div class="header-top"><div><div class="app-title">CISI UK Financial Regulation — Chapter 2, Section 4</div><div class="app-sub">Client Agreements &amp; Information: Agreement Requirements • Information Types • Cost Disclosure • Timing &nbsp;|&nbsp; Syllabus 2.4 &nbsp;|&nbsp; 10 Qs per round &nbsp;|&nbsp; Bank: 52 questions</div></div><button class="reset-btn" onclick="doReset()">&#8634; New round</button></div></div>
<div class="screen"><div class="round-pill" id="round-label">Round 1</div><div class="tracker" id="tracker"></div><div class="score-bar"><div class="sc"><div class="n" id="s-num">0/10</div><div class="l">Progress</div></div><div class="sc"><div class="n n-ok" id="s-ok">0</div><div class="l">Correct</div></div><div class="sc"><div class="n n-bad" id="s-bad">0</div><div class="l">Wrong</div></div><div class="sc"><div class="n" id="s-pct">&mdash;</div><div class="l">Score</div></div></div><div id="q-area"></div></div>
<script>
const BANK=[
// ── 4.1 CLIENT AGREEMENT REQUIREMENT ──────────────────────────────────────
{"tag":"cisi","topic":"Client Agreement","q":"To which of the following does the requirement to enter into a client agreement apply?","opts":["Retail clients for all regulated activities","Designated investment business for retail clients, and MiFID/ancillary services for retail and professional clients","All clients including ECPs for all business","Only professional clients engaged in MiFID business"],"ans":1,"exp":"Correct: B. Client agreement requirement = (1) designated investment business for retail clients; (2) MiFID business and ancillary services for retail AND professional clients. ECPs are excluded. Life insurance firms issuing policies as principal are also excluded. Key fact: Retail (all DIB) + Professional (MiFID only)."},
{"tag":"concept","topic":"Client Agreement","q":"What form must a client agreement take under COBS?","opts":["Any form agreed between firm and client","Written agreement on paper or other durable medium","Verbal agreement witnessed by a third party","Electronic confirmation only, with no durable medium required"],"ans":1,"exp":"Correct: B. A written basic agreement on paper or other durable medium is required. The agreement must set out the essential rights and obligations of both firm and client. Key fact: Written + durable medium."},
{"tag":"cisi","topic":"Client Agreement","q":"When must the terms of a client agreement and related firm information be provided to a retail client?","opts":["Within 5 business days of the first transaction","In good time before the client is bound by the agreement, or before investment services commence — whichever is earlier","Immediately after the agreement is signed","Only when the client specifically requests it"],"ans":1,"exp":"Correct: B. In good time BEFORE the client is bound by the agreement, OR before the provision of investment services — whichever comes first. This is the default rule. Key fact: Before bound / before services — whichever earlier."},
{"tag":"detail","topic":"Client Agreement","q":"Under what circumstances may a firm provide client agreement terms AFTER the client is bound by the agreement?","opts":["Never — pre-contractual disclosure is always required","When the client requests distance communications and the firm complies with voice telephone communication rules","When the client is a professional client","When the agreement is for non-MiFID business only"],"ans":1,"exp":"Correct: B. Exception: the firm may provide info immediately AFTER binding IF (a) client requested distance communications, AND (b) firm complies with voice telephone rules. Key fact: Exception = distance + voice telephone compliance."},
{"tag":"cisi","topic":"Client Agreement","q":"A firm amends a key term in its client agreement. What must it do?","opts":["Nothing — clients are bound by the original terms","Notify the client in good time before the change takes effect, in a durable medium","Apply the change immediately and inform the client within 30 days","Re-sign the entire agreement with the client"],"ans":1,"exp":"Correct: B. Material changes to client agreement terms must be notified in good time BEFORE the change takes effect, and in a durable medium. Key fact: Material change → notify in advance + durable medium."},
{"tag":"cisi","topic":"Client Agreement","q":"For how long must client agreement records generally be retained?","opts":["1 year after the agreement ends","The longer of: 5 years, the duration of the relationship, or indefinitely for pension transfers","3 years from the date of execution","10 years for all client types"],"ans":1,"exp":"Correct: B. Records kept for whichever is LONGER of: (1) 5 years; (2) duration of relationship; (3) indefinitely for pension transfers, pension opt-outs, or freestanding AVCs. Key fact: Max(5 yrs, relationship) — pensions = indefinitely."},
{"tag":"scenario","topic":"Client Agreement","q":"A client transferred his pension to a new firm 8 years ago. The firm no longer has a business relationship with him. Must it retain the client agreement records?","opts":["No — the 5-year minimum has been exceeded","No — the business relationship has ended","Yes — pension transfer records must be kept indefinitely","Yes — but only for 10 years from the last transaction"],"ans":2,"exp":"Correct: C. Pension transfer records must be retained INDEFINITELY. This is an exception to the standard 5-year / relationship-duration rule. Key fact: Pension transfers = indefinite retention."},
{"tag":"detail","topic":"Client Agreement","q":"Which of the following is NOT an exclusion from the client agreement requirement?","opts":["Insurance firms issuing life policies as principal","Firms providing MiFID business to professional clients","Firms providing designated investment business to retail clients who already have a long-standing account","Firms providing ancillary services to professional clients in connection with MiFID business"],"ans":3,"exp":"Correct: D. MiFID ancillary services for professional clients ARE within scope of the client agreement requirement. The only exclusion stated is insurance firms issuing life policies as principal. DIB for retail + MiFID/ancillary for retail/professional = ALL require agreement. Key fact: Exclusion = life insurance policies as principal only."},
// ── 4.2.1 NATURE AND RISK OF INVESTMENTS ──────────────────────────────────
{"tag":"cisi","topic":"Nature & Risk","q":"Under COBS 2.2 and 2.2A, which clients must receive information about the nature and risks of investments for MiFID business?","opts":["Retail clients only","Professional clients only","Both retail and professional clients (including potential clients)","Only clients who specifically request it"],"ans":2,"exp":"Correct: C. For MiFID business, COBS 2.2/2.2A requires disclosure to BOTH retail AND professional clients (and potential clients of both types). Key fact: MiFID = retail + professional (including potential)."},
{"tag":"cisi","topic":"Nature & Risk","q":"Which four categories of information must firms disclose to clients under the high-level MiFID disclosure requirements?","opts":["Firm info, investment strategies, costs, client profile","Firm and services, designated investments/strategies (inc. risk warnings), execution venues, costs and charges","Investment risks, suitability, appropriateness, conflicts of interest","Client categorisation, suitability, costs, compensation scheme"],"ans":1,"exp":"Correct: B. The four required disclosure areas: (1) firm and services; (2) designated investments and investment strategies including risk warnings; (3) execution venues; (4) costs and associated charges. Key fact: 4 areas = firm / investments+risks / execution / costs."},
{"tag":"detail","topic":"Nature & Risk","q":"For non-MiFID business, the information requirements about nature and risks of investments apply specifically to retail clients in relation to which products?","opts":["All investment products without exception","Equities, bonds and funds only","Derivatives, warrants and stock lending activity","Structured products and insurance-based investment products"],"ans":2,"exp":"Correct: C. Non-MiFID = disclosure applies to retail clients for: derivatives, warrants and stock lending activity. The broader MiFID rules cover all designated investments. Key fact: Non-MiFID = retail + derivatives/warrants/stock lending."},
{"tag":"concept","topic":"Nature & Risk","q":"What is the purpose of providing the information required under COBS 2.2 and 2.2A?","opts":["To satisfy the FCA's record-keeping obligations","To enable the client to reasonably understand the nature and risks of the service and take informed investment decisions","To confirm the client's suitability for the proposed product","To establish the client's categorisation as retail or professional"],"ans":1,"exp":"Correct: B. The purpose is to enable the client to reasonably understand the nature and risks of the service and the specific type of designated investment being offered, so they can take informed investment decisions. Key fact: Goal = informed decision-making."},
{"tag":"scenario","topic":"Nature & Risk","q":"A firm carries on non-MiFID business for a retail client who is interested in equity shares. Is the firm required to provide the full COBS 2.2 information disclosures?","opts":["Yes — all retail clients must receive full disclosures regardless of product","No — non-MiFID retail disclosures only apply to derivatives, warrants and stock lending","Yes — but only if the firm also conducts MiFID business","No — disclosure rules do not apply to non-MiFID firms"],"ans":1,"exp":"Correct: B. For non-MiFID business, the specific information disclosure requirements apply to retail clients only in relation to derivatives, warrants and stock lending. Equity shares for non-MiFID retail clients are not specifically covered by COBS 2.2 equivalent requirements (though general suitability and communications rules still apply). Key fact: Non-MiFID specific rules = derivatives/warrants/stock lending only."},
// ── 4.2.2 INFORMATION ABOUT THE FIRM ─────────────────────────────────────
{"tag":"cisi","topic":"Info: Firm","q":"To which clients must a firm provide general information about itself under COBS?","opts":["Retail clients only","Retail and professional clients only","Retail clients, professional clients, ECPs, and potential clients of all three types","Only clients who request this information"],"ans":2,"exp":"Correct: C. Information about the firm must be provided to ALL client types: retail, professional AND ECPs — including POTENTIAL clients of all three categories. Key fact: Firm info = ALL clients (including potential)."},
{"tag":"cisi","topic":"Info: Firm","q":"Which of the following is included in the information a firm must provide about itself to clients?","opts":["The firm's profit and loss statement for the previous year","The name and address of the firm and contact details sufficient for effective communication","The educational qualifications of the firm's directors","A list of all transactions the firm has executed on behalf of other clients"],"ans":1,"exp":"Correct: B. Required firm information includes: name and address with contact details for effective communication. Other required elements include: languages, communication methods, authorisation statement, AR/tied agent disclosure, reporting frequency, and conflicts of interest policy summary. Key fact: Name + address + contact = required."},
{"tag":"detail","topic":"Info: Firm","q":"For MiFID or equivalent third-country business, which additional element must be included in the information about the firm?","opts":["The firm's full regulatory history","The languages in which the client may communicate and receive documents","The names of all competent employees who will service the account","The firm's internal compliance procedures"],"ans":1,"exp":"Correct: B. For MiFID/equivalent third-country business, firms must additionally disclose the LANGUAGES in which the client may communicate and receive documents from the firm. Key fact: MiFID-specific addition = languages."},
{"tag":"concept","topic":"Info: Firm","q":"What must a firm disclose regarding its conflict of interest policy in the information provided to clients?","opts":["The full policy document must be attached to every client communication","A summary of the policy, how fair treatment will be ensured, and that full details are available on request","Only the fact that a policy exists","Details of every conflict of interest identified in the last 12 months"],"ans":1,"exp":"Correct: B. Required: a summary of the conflicts of interest policy, including how fair treatment of the client will be ensured, and that full details are available on request. Key fact: Summary + fair treatment mechanism + full policy on request."},
{"tag":"scenario","topic":"Info: Firm","q":"An investment firm provides services through an appointed representative (AR). What must it disclose to clients regarding this arrangement?","opts":["Nothing — AR arrangements are confidential","A statement that it is acting through an appointed representative","The full list of services the AR is authorised to provide","The AR's personal qualifications and FCA registration number"],"ans":1,"exp":"Correct: B. If the firm acts through an appointed representative (or tied agent), it must disclose this fact to clients. Key fact: AR arrangement = must be disclosed."},
{"tag":"detail","topic":"Info: Firm","q":"Which of the following relates to the COBS reporting obligation disclosed in firm information?","opts":["The firm must provide daily updates on portfolio value","Information about the nature, frequency and timing of reports on the firm's service performance (COBS 16)","The firm must disclose all trades within 24 hours","Monthly account statements must always be provided"],"ans":1,"exp":"Correct: B. Firm information must include details on the nature, frequency and timing of reports on the performance of the service (governed by COBS 16). Key fact: Nature + frequency + timing of reports = required disclosure."},
// ── 4.2.3 INVESTMENT MANAGEMENT INFO ────────────────────────────────────
{"tag":"cisi","topic":"Investment Management","q":"A firm manages a retail client's portfolio. Which of the following must it disclose SPECIFICALLY for managed accounts?","opts":["Only the benchmark used","The method and frequency of valuation, delegation details, benchmark, types of investment and transaction, and risk/discretion constraints","Only the types of investment that may be included","The names of all fund managers involved"],"ans":1,"exp":"Correct: B. For retail clients in managed accounts, firms must disclose (if applicable): (1) valuation method and frequency; (2) delegation of discretionary management; (3) benchmark; (4) types of investment/transactions permitted; (5) risk objectives and constraints on discretion. Key fact: 5 elements for retail managed accounts."},
{"tag":"concept","topic":"Investment Management","q":"What is the purpose of the benchmark a firm must establish when managing investments?","opts":["To compare the firm's performance against FTSE indices","To provide a meaningful comparison point based on the client's investment objectives and portfolio types, enabling assessment of the firm's performance","To satisfy FCA reporting obligations","To determine the client's risk tolerance"],"ans":1,"exp":"Correct: B. The benchmark must be based on the client's investment objectives and the types of instruments in the portfolio, and must enable the client to assess the firm's performance. Key fact: Benchmark = client's objectives + portfolio types → enables performance assessment."},
{"tag":"scenario","topic":"Investment Management","q":"A firm delegates discretionary management of part of a retail client's portfolio to a third party. What must it disclose?","opts":["Nothing if the third party is FCA-authorised","Details of any delegation of discretionary management of all or part of the portfolio","Only that delegation may occur, without specifying the third party","The full regulatory record of the delegated manager"],"ans":1,"exp":"Correct: B. The firm must provide details of any delegation of discretionary management of all or part of investments/funds in the client's portfolio. This is one of the five required disclosures for managed retail accounts. Key fact: Delegation details = required disclosure."},
// ── 4.2.4 SAFEGUARDING INVESTMENTS/MONEY ────────────────────────────────
{"tag":"cisi","topic":"Safeguarding","q":"To which clients must a firm provide information about the safeguarding of investments and client money?","opts":["Retail clients only","Retail and professional clients only","Retail, professional, ECPs and potential clients of all three types","Only clients whose assets are held by a third party"],"ans":2,"exp":"Correct: C. Safeguarding information must be provided to retail, professional and ECP clients — and potential clients of all three types — subject to the UK MiFID custody/client money rules. Key fact: All client types (including potential)."},
{"tag":"cisi","topic":"Safeguarding","q":"Which of the following must a firm disclose regarding third-party holding of client assets?","opts":["The identity of the third party must be kept confidential","That investments/money may be held by a third party on the firm's behalf, the firm's responsibility for any acts/omissions, and what happens if the third party becomes insolvent","Only that a third party holds assets; no further detail is required","The full financial statements of the third party"],"ans":1,"exp":"Correct: B. Required safeguarding disclosures include: (1) assets may be held by third party; (2) firm's responsibility for third-party acts/omissions; (3) what happens if third party becomes insolvent. Key fact: Third-party risk = must be disclosed in full."},
{"tag":"detail","topic":"Safeguarding","q":"A client's assets are held in a country where they cannot be separately designated from the custodian's own assets. What must the firm disclose?","opts":["Nothing — this is a standard commercial arrangement","What this means for the client and what the risks are to the client's assets in that country","Only that the assets are held overseas","That the firm guarantees the assets regardless of designation rules"],"ans":1,"exp":"Correct: B. If investments cannot be separately designated in the country of holding, the firm must explain what this means for the client and what the associated risks are. Key fact: Non-segregation risk = must be explained."},
{"tag":"detail","topic":"Safeguarding","q":"When must the disclosure about securities lending and related risks be provided in a durable medium?","opts":["After the securities lending transaction has been completed","In good time BEFORE entering into securities — clearly setting out the firm's obligations and risks","Only if the client specifically requests this information","Within 30 days of the transaction"],"ans":1,"exp":"Correct: B. Full and clear information about the firm's obligations and risks regarding investments held must be provided in a durable medium IN GOOD TIME BEFORE entering into securities. Key fact: Securities info = durable medium + BEFORE entry."},
{"tag":"scenario","topic":"Safeguarding","q":"A firm holds assets subject to a right of set-off. What must it disclose to the client?","opts":["Nothing — set-off rights are standard commercial terms","Full details of the fact that a security interest, lien or right of set-off exists, and the terms of it","Only that set-off rights may theoretically apply","Set-off arrangements must be reported to the FCA, not disclosed to clients"],"ans":1,"exp":"Correct: B. If investments or money are subject to any security interest, lien or right of set-off, the firm must disclose full details of this fact AND the terms of such an arrangement. Key fact: Security interest / lien / set-off = full disclosure of fact + terms."},
{"tag":"concept","topic":"Safeguarding","q":"What must a firm include in the safeguarding information regarding investor compensation schemes?","opts":["A full copy of the FSCS rulebook","A summary of the steps taken to protect the client's money/investments, including details of any relevant investor compensation or deposit guarantee scheme","Only the firm's membership number in the compensation scheme","No disclosure about compensation schemes is required under safeguarding rules"],"ans":1,"exp":"Correct: B. Firms must provide a summary of their steps to protect the client, including details of any relevant investor compensation or deposit guarantee schemes. Key fact: Protection measures + compensation/deposit scheme details."},
// ── 4.3 DISCLOSURE OF COSTS ─────────────────────────────────────────────
{"tag":"cisi","topic":"Costs Disclosure","q":"To which clients must a firm provide information on costs and charges in relation to investment services?","opts":["All clients including ECPs","Retail clients only, as a regulatory requirement","Professional clients only","MiFID clients only, regardless of category"],"ans":1,"exp":"Correct: B. Mandatory cost disclosure is required for RETAIL clients. Professional clients and ECPs may request this information, but there is no regulatory obligation for the firm to provide it — it is a commercial decision. Key fact: Costs disclosure = mandatory for retail only."},
{"tag":"cisi","topic":"Costs Disclosure","q":"Which of the following must always be shown separately in a cost disclosure to a retail client?","opts":["Third-party brokerage fees","The costs charged by the firm itself","Foreign exchange conversion rates only","Only costs exceeding £500"],"ans":1,"exp":"Correct: B. The costs charged by the FIRM must be itemised separately in every case. This is non-negotiable — even if other costs cannot be precisely stated, the firm's own charges must always be identified individually. Key fact: Firm's own costs = always itemised separately."},
{"tag":"detail","topic":"Costs Disclosure","q":"A firm cannot confirm the exact total costs at the time of disclosure. What must it do?","opts":["Delay disclosure until the costs are confirmed","Provide the basis for calculating the costs so the client can verify and clarify them later","Omit cost information and proceed with the transaction","Request a waiver from the FCA"],"ans":1,"exp":"Correct: B. If exact costs cannot be stated at the time, the firm must provide the basis for calculating the costs — so the client can later verify and clarify the amounts. Key fact: Unknown costs → provide calculation basis."},
{"tag":"detail","topic":"Costs Disclosure","q":"Client costs are denominated in a foreign currency. What additional information must the firm disclose?","opts":["Nothing additional — foreign currency costs are excluded from disclosure","The currency involved and the applicable conversion rates and costs","The historical exchange rate for the past 12 months","Only the fact that costs are in foreign currency, without further detail"],"ans":1,"exp":"Correct: B. If costs are to be paid in foreign currency, the firm must disclose: the currency, the conversion rates, and the costs applicable for conversion. Key fact: Foreign currency costs → currency + exchange rate + conversion costs."},
{"tag":"scenario","topic":"Costs Disclosure","q":"An ECP client asks a firm for a full breakdown of costs and charges. Is the firm obliged to provide this?","opts":["Yes — all clients have an unconditional right to cost information","No — there is no regulatory obligation; providing it is a commercial decision","Yes — but only for MiFID business","No — ECPs are exempt from all disclosure rules"],"ans":1,"exp":"Correct: B. There is NO regulatory obligation to provide cost disclosures to ECPs or professional clients. If they request it, it is a COMMERCIAL decision whether to comply. Key fact: ECP/Professional cost requests = commercial decision, not regulatory duty."},
{"tag":"concept","topic":"Costs Disclosure","q":"What information must the firm include regarding additional costs that it does not itself levy?","opts":["Nothing — only the firm's own charges are relevant","The fact that further costs, charges or taxes may be payable and, if so, how they will be levied and information about any compensation schemes","A guarantee that no further costs will arise","A list of all possible taxes in the client's jurisdiction"],"ans":1,"exp":"Correct: B. If other costs/taxes (not imposed by the firm) may apply, the firm must state: (1) the fact that they may be payable; (2) how they will be paid or levied; (3) information about any compensation schemes. Key fact: Possible third-party costs → disclose existence + levy mechanism + compensation scheme info."},
// ── 4.3.1 TIMING AND MEDIUM ───────────────────────────────────────────────
{"tag":"cisi","topic":"Timing & Medium","q":"When must cost information generally be provided to a retail client?","opts":["Immediately after the first transaction","In good time before the provision of the firm's services","Within 48 hours of completing the investment","At the annual review meeting"],"ans":1,"exp":"Correct: B. The default rule is: cost information (and other pre-contractual disclosures) must be provided IN GOOD TIME BEFORE the provision of the firm's services. Key fact: Default = before services, in good time."},
{"tag":"cisi","topic":"Timing & Medium","q":"In which medium must cost disclosures be made?","opts":["Only in paper form","In a durable medium, or via a website if the website conditions are satisfied","By telephone only","In any format chosen by the firm"],"ans":1,"exp":"Correct: B. Disclosures must be in a durable medium. A website is also acceptable IF the website conditions set out in COBS are satisfied. Key fact: Durable medium OR website (if conditions met)."},
{"tag":"detail","topic":"Timing & Medium","q":"An investor specifically requests to deal via telephone and the agreement is concluded before full cost disclosures can be sent. When may the firm provide the disclosures?","opts":["Within 5 business days","Immediately after the agreement, provided (a) it was at the client's request via distance communications and (b) the firm complies with voice telephone rules","Never — distance selling never permits delayed disclosure","Only with specific FCA approval"],"ans":1,"exp":"Correct: B. Exception to pre-service disclosure: firm may provide info IMMEDIATELY AFTER if (a) client requested distance communications (e.g. phone) which prevented prior disclosure, AND (b) firm complies with voice telephone communication rules. Both conditions must be met. Key fact: Exception = client's request + distance + voice telephone compliance — BOTH required."},
{"tag":"scenario","topic":"Timing & Medium","q":"A client received detailed cost disclosures by letter two months ago. The firm is now about to execute a similar transaction. Must it re-issue the full cost disclosure?","opts":["Yes — disclosures must be re-issued before every transaction","No — but the firm must ensure the client has received all relevant information specific to the new transaction (e.g. charges that may differ)","No — disclosure is a one-time obligation","Yes — but only if costs have changed by more than 10%"],"ans":1,"exp":"Correct: B. Existing clients: a firm does NOT need to treat repeated transactions in the same instrument as a new or different service, so it need not re-issue full disclosures. HOWEVER, it must ensure the client has received all information relevant to the new transaction — including any differing charges. Key fact: No full re-disclosure per transaction, but check for new/changed info."},
// ── 4.3.2 KEEPING CLIENT UP TO DATE ─────────────────────────────────────
{"tag":"cisi","topic":"Updating Info","q":"A material change occurs to information previously disclosed to a client. When must the firm notify the client?","opts":["Within 30 days of the change becoming effective","In good time BEFORE the change takes effect","Immediately after the change becomes effective","Only if the client asks for an update"],"ans":1,"exp":"Correct: B. The firm must notify the client of any material change to relevant information IN GOOD TIME BEFORE the change takes effect. Key fact: Material change → notify BEFORE effect."},
{"tag":"detail","topic":"Updating Info","q":"The original cost disclosure was provided in a durable medium. In what form must the update notification be given?","opts":["Any form, including verbal","In a durable medium — matching the medium in which the original information was provided","By email only","No specific form is required for updates"],"ans":1,"exp":"Correct: B. If the original information was in a durable medium, the notification of any material change must also be in a durable medium. The notification medium must match the original. Key fact: Update medium = same as original medium."},
// ── 4.3.3 EXISTING CLIENTS ───────────────────────────────────────────────
{"tag":"cisi","topic":"Existing Clients","q":"A firm executes three separate equity trades for a retail client over two weeks. Must it issue full cost disclosures for each trade?","opts":["Yes — every transaction requires a fresh disclosure","No — repeated transactions in the same instrument type need not be treated as a new service; no re-disclosure required for each trade","No — disclosures are only needed for the first transaction","Yes — but only if the value exceeds £10,000"],"ans":1,"exp":"Correct: B. A firm does NOT need to treat each transaction in the same instrument type as a new or different service. It therefore does not need to re-issue full disclosures for each trade. BUT it must ensure the client has all relevant information, including any differing charges. Key fact: Same instrument type = not a new service. No mandatory re-disclosure per transaction."},
{"tag":"scenario","topic":"Existing Clients","q":"A retail client has an ongoing managed account. The annual management charge has increased. What must the firm do?","opts":["Nothing — recurring charges need not be re-disclosed","Disclose the changed fee as material new information relevant to the ongoing service","Wait until the next annual review to disclose the change","Only disclose if the increase exceeds 5%"],"ans":1,"exp":"Correct: B. Even for existing clients, if there is a change to information relevant to a service being provided (such as a fee change), the firm must notify the client. The new charge information is relevant to the subsequent transaction. Key fact: Changed charges for existing clients = must be disclosed."},
// ── 4.3.4 COMPENSATION INFORMATION ──────────────────────────────────────
{"tag":"cisi","topic":"Compensation","q":"Which firms must provide information about investor compensation schemes to clients?","opts":["All FCA-authorised firms regardless of business type","Firms carrying on MiFID business, to clients who use or intend to use those services","Only firms that are members of FSCS","All firms when clients specifically request this information"],"ans":1,"exp":"Correct: B. The obligation to disclose compensation scheme information applies specifically to firms carrying on MiFID BUSINESS. The disclosure is to clients who use or intend to use those services. Key fact: Compensation info obligation = MiFID business firms only."},
{"tag":"cisi","topic":"Compensation","q":"What minimum information about an investor compensation scheme must be proactively made available to MiFID clients?","opts":["The full rulebook of the compensation scheme","The information necessary to identify the scheme AND the amount and scope of the cover offered","Only the scheme name","Whether the client is covered, without details of the amount"],"ans":1,"exp":"Correct: B. Minimum proactive disclosure: (1) information to identify the compensation scheme (or alternative arrangement); (2) the amount and scope of the cover offered. Key fact: Identity of scheme + amount and scope of cover = proactive minimum."},
{"tag":"detail","topic":"Compensation","q":"A client specifically asks for details about how to obtain compensation. What must the firm provide?","opts":["Refer the client to the FCA website only","Information on the conditions governing compensation and the formalities required to obtain it","A general statement that compensation may be available","Nothing additional beyond the standard scheme disclosure"],"ans":1,"exp":"Correct: B. On request: the firm must provide information about (1) the conditions governing compensation and (2) the formalities to be completed to obtain compensation. Key fact: On request = conditions + formalities for obtaining compensation."},
{"tag":"detail","topic":"Compensation","q":"In what form must compensation scheme information be provided to MiFID clients?","opts":["Verbally at the point of sale","In a durable medium or via a website if the website conditions are satisfied","In writing within 14 days of the first transaction","No specific medium is required"],"ans":1,"exp":"Correct: B. Compensation information must be in a durable medium, or via a website if the website conditions are satisfied. Same medium requirement as other disclosures. Key fact: Compensation info = durable medium or qualifying website."},
// ── CROSS-TOPIC / SCENARIO QUESTIONS ─────────────────────────────────────
{"tag":"scenario","topic":"Cross-Topic","q":"A firm provides MiFID investment management services to a professional client. Which information disclosures are required?","opts":["None — professional clients are exempt from all information requirements","Client agreement, information about the firm (including languages), investment management details, nature and risk of investments, and costs (if requested)","Nature and risk of investments only","Full retail-level disclosures including mandatory cost breakdown"],"ans":1,"exp":"Correct: B. For MiFID professional clients: (1) client agreement required; (2) firm information including languages; (3) if managing investments — valuation, benchmark, etc.; (4) nature and risk disclosures (COBS 2.2/2.2A); (5) costs if requested (commercial decision). Key fact: Professional MiFID = agreement + firm info + nature/risk. Costs = commercial (not mandatory)."},
{"tag":"scenario","topic":"Cross-Topic","q":"A client's assets include holdings in a non-UK jurisdiction where the assets are subject to local law. What must the firm disclose?","opts":["Nothing — overseas jurisdictions are the client's responsibility","That the investments are subject to non-UK jurisdiction laws and what this means for the client's rights over them","Only the name of the jurisdiction","The full text of the foreign jurisdiction's securities laws"],"ans":1,"exp":"Correct: B. If assets are subject to non-UK jurisdiction laws, the firm must disclose this fact AND explain what it means for the client's rights. This is one of the eight required safeguarding disclosures. Key fact: Non-UK jurisdiction → disclose + explain rights implications."},
{"tag":"concept","topic":"Cross-Topic","q":"A retail client complains that the firm did not disclose that it acts through an appointed representative. Which COBS requirement was potentially breached?","opts":["COBS 14.2 — product information requirement","The firm information disclosure requirement under COBS, which requires disclosure of AR/tied agent status","COBS 16 — reporting requirement","The suitability requirement"],"ans":1,"exp":"Correct: B. Failure to disclose that the firm acts through an appointed representative (AR) or tied agent breaches the firm information disclosure requirement. This is one of the required elements of firm information provided to all client types. Key fact: AR status = required firm information disclosure."},
{"tag":"detail","topic":"Cross-Topic","q":"Which of the following statements about the client information framework under COBS is CORRECT?","opts":["Information about the firm is only required for retail clients","Safeguarding disclosures are only required when a client specifically requests them","For MiFID business, nature and risk disclosures must be provided to both retail and professional clients","Cost disclosures are mandatory for all client types including ECPs"],"ans":2,"exp":"Correct: C. For MiFID business, COBS 2.2/2.2A requires nature and risk information for BOTH retail and professional clients. (A) incorrect — firm info is for all clients. (B) incorrect — safeguarding disclosures are proactive, not on request only. (D) incorrect — cost disclosure is mandatory for retail only. Key fact: MiFID nature/risk = retail + professional."},
{"tag":"cisi","topic":"Cross-Topic","q":"What is a 'durable medium' in the context of client disclosures under COBS?","opts":["Only a paper-based document signed by both parties","Any medium that allows the client to store information addressed personally to them in a way that is accessible for future reference for adequate time, and allows unchanged reproduction — including paper, email, and websites (if conditions met)","A USB drive or physical storage device only","Only the firm's official letterhead stationery"],"ans":1,"exp":"Correct: B. A durable medium allows the recipient to store personally addressed information, access it for adequate time, and reproduce it unchanged. This includes paper, email attachments, and websites (if specific conditions are met). Key fact: Durable medium = storable + accessible + reproducible. Website qualifies only if conditions met."},
{"tag":"scenario","topic":"Cross-Topic","q":"A firm provides information about the firm, costs, nature and risks to a potential retail client before any agreement is signed. Which principle guides this timing?","opts":["Information may be provided at any time before the transaction is completed","All required information must be provided in good time before the client is bound by any agreement or before services commence — whichever is earlier","A minimum 14-day cooling-off period must be observed","Information is only required after the client has been accepted"],"ans":1,"exp":"Correct: B. The overarching timing rule is: information must be provided IN GOOD TIME BEFORE the client is bound by any agreement OR before the provision of investment services — whichever is earlier. This applies to the client agreement, firm information, and cost disclosures. Key fact: Master timing rule = before bound OR before services (whichever earlier)."}
];
const SK='cisi_ch2s4_v1';const N=10;let APP={round:[],answers:{},opts:{},seen:[],roundNum:0};function save(){try{localStorage.setItem(SK,JSON.stringify(APP));}catch(e){}}function load(){try{const d=localStorage.getItem(SK);if(d)APP=JSON.parse(d);}catch(e){}}function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}function buildRound(){const lw=Object.entries(APP.answers).filter(([,v])=>v&&v.v===0).map(([k])=>APP.round[parseInt(k)]).filter(x=>x!==undefined);const us=BANK.map((_,i)=>i).filter(i=>!APP.seen.includes(i));const so=APP.seen.filter(i=>!APP.round.includes(i));let c=[];c.push(...shuffle(lw).slice(0,3));c.push(...shuffle(us.filter(i=>!c.includes(i))).slice(0,N-c.length));if(c.length<N)c.push(...shuffle(so.filter(i=>!c.includes(i))).slice(0,N-c.length));if(c.length<N)c.push(...shuffle(BANK.map((_,i)=>i).filter(i=>!c.includes(i))).slice(0,N-c.length));const r=shuffle(c).slice(0,N);r.forEach(i=>{if(!APP.seen.includes(i))APP.seen.push(i);});APP.round=r;APP.answers={};APP.opts={};APP.roundNum=(APP.roundNum||0)+1;}function doReset(){buildRound();save();render();window.scrollTo({top:0,behavior:'smooth'});}function pick(p,oi){if(APP.answers[p])return;const q=BANK[APP.round[p]];APP.answers[p]={opt:q.opts[oi],v:oi===q.ans?1:0};save();render();setTimeout(()=>{const d=Object.keys(APP.answers).length;if(d<N){const cards=document.querySelectorAll('#q-area .q-card');const nx=[...Array(N).keys()].find(j=>j>p&&!APP.answers[j]);if(nx!==undefined)cards[nx]?.scrollIntoView({behavior:'smooth',block:'center'});}else document.querySelector('#q-area .result-card')?.scrollIntoView({behavior:'smooth',block:'start'});},350);}function render(){const d=Object.keys(APP.answers).length;const ok=Object.values(APP.answers).filter(v=>v&&v.v===1).length;const bad=d-ok;const pct=d?Math.round(ok/d*100):null;document.getElementById('round-label').textContent=`Round ${APP.roundNum} \u00b7 10 Qs from bank of ${BANK.length} \u00b7 Seen: ${APP.seen.length}/${BANK.length}`;document.getElementById('s-num').textContent=`${d}/${N}`;document.getElementById('s-ok').textContent=ok;document.getElementById('s-bad').textContent=bad;document.getElementById('s-pct').textContent=pct===null?'\u2014':pct+'%';const tr=document.getElementById('tracker');tr.innerHTML='';for(let i=0;i<N;i++){const dot=document.createElement('div');dot.className='tracker-dot'+(APP.answers[i]?APP.answers[i].v===1?' t-ok':' t-bad':i===d?' t-cur':'');tr.appendChild(dot);}const area=document.getElementById('q-area');area.innerHTML='';const L=['A','B','C','D'];const tm={cisi:'CISI exam style',concept:'Concept check',scenario:'Scenario',detail:'Detail'};const tc={cisi:'tag-cisi',concept:'tag-concept',scenario:'tag-scenario',detail:'tag-detail'};APP.round.forEach((qi,pos)=>{const q=BANK[qi];const ans=!!APP.answers[pos];const ch=APP.answers[pos]?.opt;if(!APP.opts[pos])APP.opts[pos]=shuffle(q.opts.map((_,i)=>i));const oo=APP.opts[pos];let oh=oo.map((oi,li)=>{let cl='opt';if(ans)cl+=' dis';if(ans&&oi===q.ans)cl+=' ok';else if(ans&&q.opts[oi]===ch&&oi!==q.ans)cl+=' bad';return`<div class="${cl}" onclick="pick(${pos},${oi})"><span class="opt-l">${L[li]}</span><span>${q.opts[oi]}</span></div>`;}).join('');let eh=ans?`<div class="exp-box show ${APP.answers[pos].v===1?'exp-ok':'exp-bad'}"><strong>${APP.answers[pos].v===1?'\u2713 Correct!':'\u2717 Incorrect.'}</strong> ${q.exp}</div>`:'';const card=document.createElement('div');card.className='q-card';card.innerHTML=`<div class="q-meta"><span class="q-num">Q${pos+1}</span><span class="q-tag ${tc[q.tag]}">${tm[q.tag]}</span><span class="q-topic">${q.topic}</span></div><div class="q-text">${q.q}</div><div class="opts">${oh}</div>${eh}`;area.appendChild(card);});if(d===N){const pF=Math.round(ok/N*100);let lb,co,gr;if(pF>=80){lb='Pass standard met!';co='var(--teal-m)';gr='Pass \u2713';}else if(pF>=70){lb='Close \u2014 review weaker areas.';co='var(--amber)';gr='Near Pass';}else if(pF>=60){lb='Borderline.';co='var(--coral-m)';gr='Borderline';}else{lb='Below pass.';co='#A32D2D';gr='Needs Work';}const ts={};APP.round.forEach((qi,pos)=>{const t=BANK[qi].topic;if(!ts[t])ts[t]={ok:0,tot:0};ts[t].tot++;if(APP.answers[pos]?.v===1)ts[t].ok++;});let th=Object.entries(ts).map(([t,s])=>{const tp=Math.round(s.ok/s.tot*100);const cl=tp>=80?'var(--teal-m)':tp>=60?'var(--amber)':'var(--coral-m)';return`<div class="topic-row"><div class="topic-name">${t}</div><div style="font-size:.72rem;color:var(--text3);margin-bottom:.25rem">${s.ok}/${s.tot}</div><div class="topic-bar-wrap"><div class="topic-bar-fill" style="width:${tp}%;background:${cl}"></div></div></div>`;}).join('');let rh=APP.round.map((qi,pos)=>{const q=BANK[qi];const v=APP.answers[pos]?.v===1;return`<div class="q-review-item ${v?'r-ok':'r-bad'}"><span class="r-icon">${v?'\u2713':'\u2717'}</span><div><strong>Q${pos+1} \u00b7 ${q.topic}.</strong> ${q.q}<br><span style="font-size:.78rem;opacity:.85">Answer: ${q.opts[q.ans]}</span></div></div>`;}).join('');const rc=document.createElement('div');rc.className='result-card';rc.style.marginTop='1rem';rc.innerHTML=`<div style="font-size:.85rem;color:var(--text2);margin-bottom:.3rem">Round ${APP.roundNum} complete</div><div class="result-big" style="color:${co}">${ok}/${N}</div><div class="result-grade" style="background:${co}22;color:${co}">${gr}</div><div class="result-bar-wrap"><div class="result-bar-fill" style="width:${pF}%;background:${co}"></div></div><div style="font-size:.82rem;color:var(--text2);margin:.3rem 0 .2rem">${pF}% \u00b7 ${lb}</div><div class="result-breakdown"><span class="rp" style="background:var(--green-l);color:var(--green)">\u2713 ${ok}</span><span class="rp" style="background:var(--coral-l);color:var(--coral)">\u2717 ${N-ok}</span><span class="rp" style="background:var(--navy-l);color:var(--navy-d)">Seen: ${APP.seen.length}/${BANK.length}</span></div><div style="font-size:.8rem;font-weight:600;color:var(--text2);margin-bottom:.55rem;text-align:left">Topics:</div><div class="topic-grid">${th}</div><div class="btn-row" style="margin-bottom:1.4rem"><button class="btn btn-p" onclick="doReset()">\u21ba New round</button></div><div style="font-size:.8rem;font-weight:600;color:var(--text2);margin-bottom:.5rem;text-align:left">Review:</div><div class="q-review-list">${rh}</div>`;area.appendChild(rc);}}load();if(!APP.round||APP.round.length===0)buildRound();render();
</script>
