<style>*{box-sizing:border-box;margin:0;padding:0}:root{--navy:#1E2761;--navy-l:#CADCFC;--navy-d:#12195F;--teal:#028090;--teal-l:#D6F0F3;--teal-d:#015E6A;--teal-m:#1D9E75;--amber:#B07D12;--amber-l:#FEF3C7;--amber-d:#7C5A0A;--coral:#993C1D;--coral-l:#FAECE7;--coral-m:#D85A30;--purple:#534AB7;--purple-l:#EEEDFE;--purple-d:#3C3489;--green-l:#E1F5EE;--green:#085041;--gray:#64748B;--gray-l:#F1F5F9;--gray-m:#CBD5E1;--gray-d:#334155;--bg:#F0F4F8;--card:#fff;--text:#1e293b;--text2:#475569;--text3:#94a3b8;--radius:12px;--shadow:0 2px 10px rgba(0,0,0,.09)}body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}.app-header{background:linear-gradient(135deg,var(--navy),var(--teal));padding:1.2rem 1.5rem .85rem;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.2)}.header-top{display:flex;align-items:flex-start;justify-content:space-between;gap:.75rem}.app-title{color:#fff;font-size:1.08rem;font-weight:700;line-height:1.3}.app-sub{color:var(--navy-l);font-size:.72rem;margin-top:.18rem}.reset-btn{background:rgba(255,255,255,.16);border:1.5px solid rgba(255,255,255,.38);color:#fff;border-radius:7px;padding:.36rem .95rem;font-size:.76rem;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap;flex-shrink:0}.reset-btn:hover{background:rgba(255,255,255,.3)}.screen{padding:1.4rem;max-width:820px;margin:0 auto}.round-pill{display:inline-flex;align-items:center;gap:.4rem;background:var(--navy);color:var(--navy-l);border-radius:7px;padding:.3rem .85rem;font-size:.73rem;font-weight:600;margin-bottom:1rem}.tracker{display:flex;gap:3px;margin-bottom:1.05rem}.tracker-dot{flex:1;height:10px;border-radius:5px;background:var(--gray-m);transition:background .3s}.tracker-dot.t-ok{background:var(--teal-m)}.tracker-dot.t-bad{background:var(--coral-m)}.tracker-dot.t-cur{background:var(--navy-l)}.score-bar{display:flex;gap:.65rem;margin-bottom:1rem}.sc{flex:1;background:var(--card);border-radius:10px;padding:.58rem .75rem;text-align:center;border:1px solid var(--gray-m);box-shadow:var(--shadow)}.sc .n{font-size:1.38rem;font-weight:700;color:var(--teal);line-height:1}.sc .n-ok{color:var(--teal-m)}.sc .n-bad{color:var(--coral-m)}.sc .l{font-size:.67rem;color:var(--text3);margin-top:.18rem}.q-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:1.4rem 1.5rem;margin-bottom:1rem;border:1px solid rgba(0,0,0,.05)}.q-meta{display:flex;align-items:center;gap:.5rem;margin-bottom:.65rem;flex-wrap:wrap}.q-num{font-size:.68rem;font-weight:700;color:var(--teal);text-transform:uppercase;letter-spacing:.07em}.q-tag{font-size:.64rem;font-weight:700;padding:.15rem .48rem;border-radius:20px}.tag-cisi{background:#FEF3C7;color:#7C5A0A}.tag-concept{background:var(--purple-l);color:var(--purple-d)}.tag-scenario{background:var(--teal-l);color:var(--teal-d)}.tag-detail{background:var(--gray-l);color:var(--gray-d)}.q-topic{font-size:.64rem;color:var(--text3);margin-left:auto}.q-text{font-size:.93rem;font-weight:500;line-height:1.6;margin-bottom:.95rem;color:var(--text)}.opts{display:flex;flex-direction:column;gap:.42rem}.opt{display:flex;align-items:flex-start;gap:.65rem;padding:.68rem .95rem;border-radius:8px;border:1.5px solid var(--gray-m);cursor:pointer;font-size:.86rem;line-height:1.46;background:var(--card);transition:all .16s}.opt:hover:not(.dis){border-color:var(--teal);background:var(--teal-l)}.opt.ok{border-color:var(--teal-m);background:var(--green-l);color:var(--green)}.opt.bad{border-color:var(--coral-m);background:var(--coral-l);color:var(--coral)}.opt.dis{cursor:default}.opt-l{width:21px;height:21px;min-width:21px;border-radius:50%;background:#e2e8f0;display:flex;align-items:center;justify-content:center;font-size:.69rem;font-weight:700;color:var(--gray);margin-top:1px;flex-shrink:0}.opt.ok .opt-l{background:var(--teal-m);color:#fff}.opt.bad .opt-l{background:var(--coral-m);color:#fff}.exp-box{margin-top:.8rem;padding:.7rem 1rem;border-radius:8px;font-size:.81rem;line-height:1.62;display:none}.exp-box.show{display:block}.exp-ok{background:var(--green-l);border-left:3px solid var(--teal-m);color:var(--green)}.exp-bad{background:var(--coral-l);border-left:3px solid var(--coral-m);color:var(--coral)}.result-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:2rem 1.5rem;text-align:center;margin-top:.5rem}.result-big{font-size:3.2rem;font-weight:800;margin:.4rem 0}.result-grade{display:inline-block;padding:.38rem 1.2rem;border-radius:20px;font-size:.92rem;font-weight:700;margin:.5rem 0 .8rem}.result-bar-wrap{background:var(--gray-l);border-radius:20px;height:14px;overflow:hidden;margin:.75rem auto;max-width:320px}.result-bar-fill{height:100%;border-radius:20px;transition:width .8s ease}.result-breakdown{display:flex;gap:.6rem;justify-content:center;flex-wrap:wrap;margin:1rem 0 1.2rem}.rp{padding:.3rem .9rem;border-radius:20px;font-size:.8rem;font-weight:600}.topic-grid{display:grid;grid-template-columns:1fr 1fr;gap:.45rem;margin:.5rem 0 1.2rem;text-align:left}.topic-row{background:var(--gray-l);border-radius:8px;padding:.5rem .75rem;font-size:.78rem}.topic-name{color:var(--text2);font-weight:600;margin-bottom:.2rem}.topic-bar-wrap{background:var(--gray-m);border-radius:10px;height:6px;overflow:hidden}.topic-bar-fill{height:100%;border-radius:10px}.q-review-list{text-align:left;margin-top:.5rem}.q-review-item{padding:.65rem 1rem;border-radius:8px;margin-bottom:.45rem;font-size:.83rem;line-height:1.52;display:flex;gap:.65rem;align-items:flex-start}.q-review-item.r-ok{background:var(--green-l);border-left:3px solid var(--teal-m);color:var(--green)}.q-review-item.r-bad{background:var(--coral-l);border-left:3px solid var(--coral-m);color:var(--coral)}.r-icon{font-size:.9rem;flex-shrink:0;margin-top:.08rem}.btn{padding:.58rem 1.3rem;border:none;border-radius:8px;cursor:pointer;font-size:.86rem;font-weight:600;transition:all .2s}.btn-p{background:var(--teal);color:#fff}.btn-p:hover{background:var(--teal-d)}.btn-row{display:flex;gap:.65rem;flex-wrap:wrap;justify-content:center}</style>

<div class="app-header"><div class="header-top"><div><div class="app-title">CISI UK Financial Regulation - Chapter 2, Section 2</div><div class="app-sub">Appointed Representatives - principal responsibility - promotions - permitted activities - 2022 reforms - strengthened bank - syllabus 2.2 &nbsp;|&nbsp; 10 Qs per round</div></div><button class="reset-btn" onclick="doReset()">&#8634; New round</button></div></div>
<div class="screen"><div class="round-pill" id="round-label">Round 1</div><div class="tracker" id="tracker"></div><div class="score-bar"><div class="sc"><div class="n" id="s-num">0/10</div><div class="l">Progress</div></div><div class="sc"><div class="n n-ok" id="s-ok">0</div><div class="l">Correct</div></div><div class="sc"><div class="n n-bad" id="s-bad">0</div><div class="l">Wrong</div></div><div class="sc"><div class="n" id="s-pct">&mdash;</div><div class="l">Score</div></div></div><div id="q-area"></div></div>
<script>
const BANK=[{"tag": "cisi", "topic": "AR Status", "q": "What is an appointed representative under section 39 FSMA?", "opts": ["An authorised person with full Part 4A permission", "An exempt person acting under the umbrella of a principal firm", "A firm automatically regulated by the PRA", "A client-facing employee of the FCA"], "ans": 1, "exp": "Correct: an exempt person acting under the umbrella of a principal firm. Section 2 starts with this legal status because it explains everything that follows. The AR is not treated as a fully authorised firm with its own independent regulatory standing in the ordinary sense. Nor is AR status a prudential label or an FCA employment role. If you fix the section 39 point firmly, the rest of the section becomes much easier."}, {"tag": "concept", "topic": "COBS & ARs", "q": "How do COBS rules apply where relevant activities are carried out by an appointed representative?", "opts": ["They apply directly to the AR as though the AR were a principal", "They apply to the principal in relation to the activities carried out for it by the AR", "They do not apply because the AR is exempt", "They apply only if the clients are retail clients"], "ans": 1, "exp": "Correct: they apply to the principal in relation to the activities carried out for it by the AR. That phrasing is close to the way the rule is expressed and is exactly why Section 2 is so exam-friendly. The AR’s exempt status does not remove the principal’s conduct responsibility. Retail-client status is not the gateway issue. The correct legal structure is principal responsibility, not AR independence."}, {"tag": "detail", "topic": "Principal Responsibility", "q": "What must be true of the principal’s own permissions before its AR carries on a regulated activity?", "opts": ["The principal only needs a broad consumer-duty permission", "The principal must itself have the relevant permission for that activity", "The principal may rely on the AR’s competence instead of holding permission", "The principal needs permission only if the activity is dealing as principal"], "ans": 1, "exp": "Correct: the principal must itself have the relevant permission. Section 2 is clear that the AR cannot magic a permission into existence for the principal. The activity can only be carried on under the AR arrangement if the principal already has the right regulatory permission for it. Competence is not a substitute for permission, and the requirement is not limited to dealing as principal."}, {"tag": "scenario", "topic": "Principal Responsibility", "q": "An AR gives investment advice in circumstances where the principal has accepted responsibility for the AR’s regulated activities. How is that advice treated?", "opts": ["As advice of the AR only, because the AR spoke to the client", "As though it had been conducted by the principal", "As unregulated advice because the AR is exempt", "As conduct of a third-country firm"], "ans": 1, "exp": "Correct: it is treated as though it had been conducted by the principal. This is one of the key legal phrases in Section 2. The AR’s physical involvement does not prevent the law from treating the business as the principal’s business where responsibility has been accepted. The other answers try to distract you with who physically spoke, with exemption, or with an irrelevant territorial label."}, {"tag": "cisi", "topic": "Financial Promotions", "q": "A financial promotion communicated by an AR is technically what?", "opts": ["An unauthorised promotion that is automatically unlawful", "An exempt promotion", "A promotion that always needs FCA pre-approval", "A professional-client-only promotion"], "ans": 1, "exp": "Correct: an exempt promotion. The reason is structural: the AR is an exempt person under FSMA rather than an authorised person. The exam then expects you to go one step further and remember that this technical status does not remove the principal’s responsibility under COBS. The other answers either overstate illegality or invent approval and client-category requirements that the section does not contain."}, {"tag": "scenario", "topic": "Financial Promotions", "q": "Which answer is best if an AR communicates a misleading promotion to clients?", "opts": ["Only the AR is responsible because it sent the communication", "The principal is responsible for the content of the promotion communicated by its AR", "No one is responsible because AR promotions are technically exempt", "Responsibility rests with the FCA for failing to approve the communication"], "ans": 1, "exp": "Correct: the principal is responsible for the content. This is the key trap in the section and a favourite exam point. Technical exemption does not free the principal from COBS 4 responsibility. The FCA does not pre-approve ordinary promotions in the way the distractor suggests, and the AR’s own role does not remove the principal from the picture. The safest exam answer is to anchor responsibility firmly at principal level."}, {"tag": "detail", "topic": "Financial Promotions", "q": "For which AR promotions is the principal responsible under the exam point highlighted in Section 2?", "opts": ["Only promotions for MiFID business", "Only retail promotions", "Only written promotions", "All types of financial promotions communicated by the AR"], "ans": 3, "exp": "Correct: all types of financial promotions communicated by the AR. Section 2 explicitly highlights this as the tested point. The narrower answers are attractive because they sound regulatory, but they are too limited. If the question asks you to choose between “some” and “all”, the section directs you firmly to “all”."}, {"tag": "cisi", "topic": "Permitted Activities", "q": "Which activity is clearly permitted for an appointed representative?", "opts": ["Managing investments", "Advising on investments", "Dealing in investments as principal", "Accepting deposits as a bank"], "ans": 1, "exp": "Correct: advising on investments is permitted. Section 2 lists advising among the AR activities that can be undertaken under the principal’s umbrella. Managing investments and dealing as principal are the two classic prohibited activities. Accepting deposits as a bank is not the type of listed AR activity this section is focused on."}, {"tag": "detail", "topic": "Prohibited Activities", "q": "Which pair of activities is specifically not permitted for ARs?", "opts": ["Advising and arranging", "Dealing as principal and managing investments", "Arranging and assisting in insurance administration", "Basic stakeholder advice and home-finance advice"], "ans": 1, "exp": "Correct: dealing as principal and managing investments. The section highlights these two because they are easy to confuse with the wider list of permitted AR functions. The other three answer pairs all contain activities that the section presents as permitted, subject to the relevant structure and permissions. This is one of the highest-yield memorisation points in Section 2."}, {"tag": "scenario", "topic": "Prohibited Activities", "q": "An AR wants to deal in investments as principal because its principal has extensive permissions and the client is highly sophisticated. Which answer is best?", "opts": ["That is fine because the principal’s permission cures the issue", "That is fine because sophistication of the client removes the restriction", "That is not permitted: dealing as principal is prohibited for ARs", "That is fine if the AR is also a third-country branch"], "ans": 2, "exp": "Correct: it is not permitted. The restriction is structural and is not cured by the client’s sophistication or by the principal’s willingness to allow it. AR status does not become more flexible merely because the client is strong or the principal is experienced. The third-country-branch wording is irrelevant to the AR prohibition."}, {"tag": "concept", "topic": "Agent Activity", "q": "When may an AR deal as agent?", "opts": ["For any specified investment", "Only in relation to pure protection or general insurance contracts", "Only for professional clients", "Only where the principal is a bank"], "ans": 1, "exp": "Correct: only in relation to pure protection or general insurance contracts. This is the kind of narrow qualifier that students often forget under pressure. The distractors are wrong because they either generalise the permission too far or add restrictions the section does not use. The right way to revise this is not “ARs may deal as agent”, but “ARs may deal as agent only in the insurance-related case described”."}, {"tag": "detail", "topic": "Consumer Credit", "q": "Which statement about consumer-credit permission and AR status is correct?", "opts": ["An AR can never hold any permission of its own", "A firm may hold limited permission for consumer-credit activities and also be an AR for other regulated activities", "Holding consumer-credit permission cancels AR status automatically", "Consumer-credit activity is prohibited to all ARs"], "ans": 1, "exp": "Correct: a firm may hold limited consumer-credit permission and also be an AR for other activities. Section 2 specifically flags this because it tests whether you understand that the AR regime can interact with other regulated statuses. The absolute answers are too strong. Limited permission does not destroy AR status, and consumer-credit activity is not automatically prohibited."}, {"tag": "detail", "topic": "Controlled Functions", "q": "What additional point does the section make about certain persons within the AR?", "opts": ["They are automatically exempt from approval requirements", "Certain persons, including governors and those performing customer functions, must be approved for controlled functions", "They are treated as ECPs", "They fall outside any training and competence expectations"], "ans": 1, "exp": "Correct: certain persons in the AR need approval for controlled functions. The section mentions governors such as directors or partners and individuals performing customer functions. This does not make them exempt from approval; the opposite is true. Nor does the point have anything to do with ECP status. The purpose is to remind you that AR arrangements still contain controlled-function discipline."}, {"tag": "cisi", "topic": "2022 Reforms", "q": "How many days before a new AR appointment takes effect must the principal notify the FCA?", "opts": ["14 days", "30 days", "60 days", "90 days"], "ans": 1, "exp": "Correct: 30 days. This is one of the easiest marks in Section 2 if you separate it from the other timeframe in the reforms. The 60-day period relates to information on existing ARs when the rules came into force, not to a new appointment. The other figures are common distractors because they resemble other regulatory timeframes."}, {"tag": "detail", "topic": "2022 Reforms", "q": "What does the 60-day period in the 2022 reforms refer to?", "opts": ["The deadline for notifying the FCA before a new AR appointment takes effect", "The period within which principals had to provide information on existing ARs when the rules came into force", "The maximum period for annual self-assessment preparation", "The FCA response time to every AR notification"], "ans": 1, "exp": "Correct: it refers to providing information on existing ARs when the new rules came into force. This is the companion number to the 30-day new-appointment notice and the exam often sets them against each other. The self-assessment point is annual but is not framed as a 60-day rule, and the FCA is not said to have a fixed 60-day response time for all notifications."}, {"tag": "scenario", "topic": "2022 Reforms", "q": "A principal plans to appoint a new AR next week and send notification to the FCA on the day the appointment starts. Which answer is best?", "opts": ["That is acceptable because ARs are exempt persons", "That breaches the reform requirement because 30 days’ advance notice is required", "That is acceptable if the AR only communicates promotions", "That is acceptable if the principal prepares a self-assessment document later"], "ans": 1, "exp": "Correct: 30 days’ advance notice is required. Exempt-person status does not remove the principal’s reform obligations. Limiting the AR’s activity to promotions does not waive the notification requirement, and a later self-assessment document does not cure the failure to notify in advance. This is a straightforward compliance question dressed up with plausible excuses."}, {"tag": "detail", "topic": "2022 Reforms", "q": "Which item is specifically listed among the information and notification requirements in the 2022 reforms?", "opts": ["Complaints and revenue data on ARs", "A mandatory public prospectus for each AR", "An annual solvency ratio for each AR", "A requirement that every AR hold a professional-client register"], "ans": 0, "exp": "Correct: complaints and revenue data on ARs. The reforms require principals to provide more information to the FCA about their ARs, and complaints and revenue data are expressly mentioned. The other options sound regulatory but are not the listed requirements in this section. The point of the reforms is better visibility and better oversight, not forcing every AR into a prospectus or solvency framework."}, {"tag": "concept", "topic": "2022 Reforms", "q": "What standard of oversight must principals apply to ARs under the strengthened regime?", "opts": ["A standard broadly comparable to supervising third-party suppliers", "A comparable standard to the one applied to direct employees", "Any standard the principal considers commercially reasonable", "Only the minimum standard needed to prevent fraud"], "ans": 1, "exp": "Correct: a comparable standard to that applied to direct employees. This language is one of the most important governance lines in the section. It signals that the FCA expects real supervision, not distant commercial monitoring. The other answers are too weak or simply invented. If you remember nothing else from the reform narrative, remember the employee-equivalent oversight benchmark."}, {"tag": "scenario", "topic": "2022 Reforms", "q": "A principal says that because an AR is legally separate, it only needs to monitor the AR at a lighter standard than its own employees. Which answer is best?", "opts": ["Correct, because the AR is not on the principal’s payroll", "Correct, unless the AR advises retail clients", "Incorrect, because the reforms require oversight to a comparable standard to direct employees", "Incorrect, but only if the AR manages investments"], "ans": 2, "exp": "Correct: the statement is incorrect because the reforms require oversight to a comparable standard to direct employees. The legal separateness of the AR does not justify weak supervision. Retail-client status is not the trigger for this requirement, and the managing-investments point is irrelevant because ARs cannot do that activity in the first place. This question tests whether you understand the governance direction of the reforms rather than just the numbers."}, {"tag": "detail", "topic": "2022 Reforms", "q": "Which of the following is specifically part of the principal’s strengthened responsibility under the reforms?", "opts": ["Monitoring the risk of harm to consumers and market integrity", "Guaranteeing that no AR ever makes a complaint-handling error", "Replacing the FCA as the AR’s direct regulator", "Ensuring every AR becomes authorised in its own right within 12 months"], "ans": 0, "exp": "Correct: monitoring the risk of harm to consumers and market integrity. That wording is very close to the text of the section. The other answers overstate the obligation or invent requirements that are not there. The reforms are about stronger oversight and responsibility, not impossible guarantees or compulsory conversion of every AR into an authorised firm."}, {"tag": "cisi", "topic": "2022 Reforms", "q": "What must principals prepare as part of the annual review requirement?", "opts": ["A self-assessment document", "A prospectus for all AR products", "A capital-adequacy statement for the AR", "A new section 39 contract each month"], "ans": 0, "exp": "Correct: a self-assessment document. The annual review covers the AR’s activities, business and senior management, and the principal must prepare a self-assessment document. The distractors are attractive because they sound formal, but they are not what the section requires. This is another high-yield memory point because it combines annual review with documentary evidence of oversight."}, {"tag": "scenario", "topic": "Orderly Wind-Down", "q": "Under the reform package, why is clarity on terminating an AR relationship important?", "opts": ["Because principals must know when to end the relationship and assist with an orderly wind-down", "Because ARs automatically become authorised once terminated", "Because termination removes the need for any further FCA notification", "Because termination is only relevant where the AR communicated promotions"], "ans": 0, "exp": "Correct: principals must know when termination is appropriate and support an orderly wind-down. This requirement shows that the FCA expects AR oversight to continue through the exit phase rather than ending at the moment the relationship becomes problematic. The other answers either invent automatic authorisation, remove later obligations incorrectly, or narrow the point to promotions only."}, {"tag": "detail", "topic": "Reform Outcomes", "q": "Which of the following matches one of the FCA outcomes sought by the 2022 AR reforms?", "opts": ["Retail consumers can access better-quality information on principals and ARs", "Every AR will move into the prudential regime", "All principals will stop using regulatory hosting services", "Every AR relationship will be reviewed by the PRA"], "ans": 0, "exp": "Correct: better-quality information for retail consumers is one of the listed outcomes. The section gives four policy outcomes, including stronger principal understanding and oversight, improved FCA ability to challenge firms, problem remediation where harm exists or may arise, and better-quality information for retail consumers. The other answers are not stated outcomes and either overreach or involve the wrong regulator."}, {"tag": "concept", "topic": "Reform Outcomes", "q": "Which statement best captures the direction of the 2022 AR reforms?", "opts": ["The reforms were mainly about removing principal responsibility and letting ARs operate independently", "The reforms were about stronger information flows, stronger principal oversight and earlier challenge where harm could arise", "The reforms were limited to changing the exam syllabus and had no operational effect", "The reforms created a complete ban on AR financial promotions"], "ans": 1, "exp": "Correct: stronger information, stronger oversight and earlier challenge is the essence of the reform direction. The reforms did not dissolve principal responsibility; they intensified it. Nor were they purely academic changes or a total ban on AR promotions. This answer is useful because it captures the policy purpose behind the detailed rules, which helps in scenario questions."}, {"tag": "scenario", "topic": "Principal Liability", "q": "If an AR breaches a conduct rule while carrying on business for which the principal has accepted responsibility, what is the best exam answer?", "opts": ["The AR alone is liable because it carried out the act", "The principal is responsible because the business is treated as if conducted by the principal", "Neither party is responsible because the AR is exempt", "The client bears the loss because AR business is self-directed"], "ans": 1, "exp": "Correct: the principal is responsible because the business is treated as its own. This is the legal consequence at the heart of Section 2. The AR’s exempt status does not create a liability vacuum, and the client does not somehow assume the regulatory risk. The examiner often tests this by describing the AR’s conduct in detail and seeing whether you remember where responsibility sits."}, {"tag": "detail", "topic": "Financial Promotions", "q": "Why does the section stress AR promotions so strongly?", "opts": ["Because ARs are the only persons allowed to communicate promotions", "Because the technical exemption of the promotion can mislead students into forgetting principal responsibility", "Because all AR promotions require PRA approval", "Because promotions are the only activity ARs may carry on"], "ans": 1, "exp": "Correct: the technical exemption can mislead students. The section highlights promotions precisely because many candidates hear “exempt promotion” and stop the analysis too early. The principal’s COBS responsibility remains central. The other answers either exaggerate the uniqueness of AR promotions or assign them to the wrong regulator."}, {"tag": "scenario", "topic": "Permitted Activities", "q": "Which answer is most accurate if an AR proposes to arrange safeguarding and administration of assets?", "opts": ["That is one of the listed permitted activities", "That is prohibited because any custody-related activity requires direct authorisation", "That is only permitted for ECP clients", "That is only permitted where the AR also manages investments"], "ans": 0, "exp": "Correct: arranging safeguarding and administration of assets is among the listed permitted activities. The distractors work by making the activity sound more operationally risky than the section treats it. ECP status is not the qualifier used here, and managing investments is prohibited rather than a condition that unlocks other permissions. The safest approach is to compare the activity directly against the enumerated list."}, {"tag": "detail", "topic": "Permitted Activities", "q": "Which activity below is least likely to be permitted for an AR under the list in Section 2?", "opts": ["Operating an electronic platform for lending", "Basic advice on stakeholder products", "Managing investments on a discretionary basis", "Advising on home finance transactions"], "ans": 2, "exp": "Correct: managing investments on a discretionary basis is least likely to be permitted because it is expressly prohibited. The other three items are listed in the permitted side of the section. The use of “least likely” rather than “not permitted” is an example of how the exam may soften the stem while still testing the same black-letter point."}, {"tag": "concept", "topic": "Section Logic", "q": "Which sentence best summarises the structure of Section 2?", "opts": ["ARs are independent firms with minor links to principals", "ARs are exempt persons, principals hold the permissions and responsibility, and the reforms strengthened oversight of that arrangement", "ARs are mainly a prudential device for reducing capital burdens", "ARs exist mainly to disapply financial-promotion rules"], "ans": 1, "exp": "Correct: the second statement captures the section accurately. ARs are exempt persons under section 39 FSMA; principals hold the permissions and accept responsibility; and the 2022 reforms increased oversight, information and governance expectations. The other answers shrink or distort the relationship and therefore miss the purpose of the regime."}, {"tag": "detail", "topic": "Notifications", "q": "Which of the following did the reforms say principals must tell the FCA about in addition to appointments and existing AR information?", "opts": ["Whether they provide or cease to provide regulatory hosting services", "The personal tax position of each AR director", "Every client complaint outcome within 24 hours", "Every future product that an AR might discuss"], "ans": 0, "exp": "Correct: principals must notify the FCA whether they provide or cease to provide regulatory hosting services. This sits alongside the broader information and notification package. The other answers go far beyond the section or impose unrealistic real-time obligations that are not stated. This is a detail question, but the correct answer comes directly from the reforms list."}, {"tag": "scenario", "topic": "Notifications", "q": "A principal says it will notify the FCA about a new AR after the contract is signed but before the AR first speaks to a client, even if that is only five days later. What is the best view?", "opts": ["That is enough because the AR has not yet started advising clients", "That is not enough because the notice must be given 30 days before the appointment takes effect", "That is enough if the AR only arranges deals and does not advise", "That is enough if the principal has strong internal controls"], "ans": 1, "exp": "Correct: it is not enough because the 30-day requirement is tied to the appointment taking effect, not simply to first client contact. The section uses a clear pre-effectiveness notice period, and strong controls or narrower activity do not rewrite that rule. This is the sort of operational timing scenario that appears simple but is designed to check whether you remember the exact structure of the reform obligation."}, {"tag": "cisi", "topic": "Exam Trap", "q": "Which of the following is the most common Section 2 mistake?", "opts": ["Remembering that 30 days applies to new AR appointments", "Remembering that the principal must hold the relevant permissions", "Thinking that technical exemption of an AR promotion removes principal responsibility", "Remembering that ARs cannot manage investments"], "ans": 2, "exp": "Correct: thinking that exemption removes principal responsibility is the classic mistake. The other three statements are actually correct and are exactly the kind of high-yield facts students should remember. Section 2 repeatedly warns that the technical exemption of the promotion should not be confused with the principal’s continuing COBS responsibility."}, {"tag": "scenario", "topic": "Review Process", "q": "During an annual AR review, which area would most clearly fit the reform requirements?", "opts": ["Reviewing the AR’s activities, business and senior management and documenting the assessment", "Checking only whether the AR met its sales targets", "Reviewing only the AR’s marketing style because promotions are the sole AR issue", "Skipping review where the AR has generated no complaints"], "ans": 0, "exp": "Correct: the reforms require an annual review of the AR’s activities, business and senior management, together with a self-assessment document. Sales alone are too narrow, promotions are not the only issue, and a clean complaint history does not eliminate the need for review. The point of the reforms is continuing, structured oversight rather than reactive attention only when something goes wrong."}, {"tag": "detail", "topic": "Section Logic", "q": "Which answer most accurately explains why ARs are useful but risky from a regulatory perspective?", "opts": ["They let a principal extend regulated activity through exempt persons, which makes principal oversight and responsibility critical", "They remove the need for permissions entirely", "They transfer all conduct risk to clients", "They are mainly used to avoid the financial-promotion regime"], "ans": 0, "exp": "Correct: ARs allow regulated activity to be carried on through exempt persons under a principal’s umbrella, which is precisely why oversight is so important. The structure offers commercial flexibility, but it also creates the risk that principals supervise too weakly. The other answers all misdescribe the regime by removing permissions, shifting risk onto clients, or treating promotions as the sole purpose of AR status."}];

const SK='cisi_ch2_sec2_v2';
const N=10;
let APP={round:[],answers:{},opts:{},seen:[],roundNum:0};
function save(){try{localStorage.setItem(SK,JSON.stringify(APP));}catch(e){}}
function load(){try{const d=localStorage.getItem(SK);if(d)APP=JSON.parse(d);}catch(e){}}
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function buildRound(){
  const lastWrong=Object.entries(APP.answers).filter(([,v])=>v&&v.v===0).map(([k])=>APP.round[parseInt(k)]).filter(x=>x!==undefined);
  const unseen=BANK.map((_,i)=>i).filter(i=>!APP.seen.includes(i));
  const seenOld=APP.seen.filter(i=>!APP.round.includes(i));
  let cands=[];
  cands.push(...shuffle(lastWrong).slice(0,3));
  cands.push(...shuffle(unseen.filter(i=>!cands.includes(i))).slice(0,N-cands.length));
  if(cands.length<N) cands.push(...shuffle(seenOld.filter(i=>!cands.includes(i))).slice(0,N-cands.length));
  if(cands.length<N) cands.push(...shuffle(BANK.map((_,i)=>i).filter(i=>!cands.includes(i))).slice(0,N-cands.length));
  const round=shuffle(cands).slice(0,N);
  round.forEach(i=>{if(!APP.seen.includes(i))APP.seen.push(i);});
  APP.round=round; APP.answers={}; APP.opts={}; APP.roundNum=(APP.roundNum||0)+1;
}
function doReset(){buildRound();save();render();window.scrollTo({top:0,behavior:'smooth'});} 
function pick(pos,oi){
  if(APP.answers[pos]) return;
  const q=BANK[APP.round[pos]];
  APP.answers[pos]={opt:q.opts[oi],v:oi===q.ans?1:0};
  save(); render();
}
function render(){
  const done=Object.keys(APP.answers).length;
  const ok=Object.values(APP.answers).filter(v=>v&&v.v===1).length;
  const bad=done-ok;
  const pct=done?Math.round(ok/done*100):null;
  document.getElementById('round-label').textContent = `Round ${APP.roundNum} · 10 questions per round · Bank: ${BANK.length}`;
  document.getElementById('s-num').textContent=`${done}/${N}`;
  document.getElementById('s-ok').textContent=ok;
  document.getElementById('s-bad').textContent=bad;
  document.getElementById('s-pct').textContent=pct===null?'—':pct+'%';
  const tr=document.getElementById('tracker'); tr.innerHTML='';
  for(let i=0;i<N;i++){ const d=document.createElement('div'); d.className='tracker-dot'+(APP.answers[i]?APP.answers[i].v===1?' t-ok':' t-bad':i===done?' t-cur':''); tr.appendChild(d);} 
  const area=document.getElementById('q-area'); area.innerHTML='';
  const L=['A','B','C','D'];
  const tmap={cisi:'CISI exam style',concept:'Concept check',scenario:'Scenario',detail:'Detail'};
  const tcls={cisi:'tag-cisi',concept:'tag-concept',scenario:'tag-scenario',detail:'tag-detail'};
  APP.round.forEach((qi,pos)=>{
    const q=BANK[qi]; const answered=!!APP.answers[pos]; const chosen=APP.answers[pos]?.opt; if(!APP.opts[pos]) APP.opts[pos]=shuffle(q.opts.map((_,i)=>i)); const oo=APP.opts[pos];
    let optsHtml=oo.map((oi,li)=>{ let c='opt'; if(answered) c+=' dis'; if(answered&&oi===q.ans) c+=' ok'; else if(answered&&q.opts[oi]===chosen&&oi!==q.ans) c+=' bad'; return `<div class="${c}" onclick="pick(${pos},${oi})"><span class="opt-l">${L[li]}</span><span>${q.opts[oi]}</span></div>`; }).join('');
    let expHtml=answered?`<div class="exp-box show ${APP.answers[pos].v===1?'exp-ok':'exp-bad'}"><strong>${APP.answers[pos].v===1?'✓ Correct!':'✗ Incorrect.'}</strong> ${q.exp}</div>`:'';
    const card=document.createElement('div');
    card.className='q-card';
    card.innerHTML=`<div class="q-meta"><span class="q-num">Q${pos+1}</span><span class="q-tag ${tcls[q.tag]}">${tmap[q.tag]}</span><span class="q-topic">${q.topic}</span></div><div class="q-text">${q.q}</div><div class="opts">${optsHtml}</div>${expHtml}`;
    area.appendChild(card);
  });
  if(done===N){
    const pF=Math.round(ok/N*100); let lbl,col,grade;
    if(pF>=80){lbl='Pass standard met!';col='var(--teal-m)';grade='Pass ✓';}
    else if(pF>=70){lbl='Close to pass standard — review weaker areas.';col='var(--amber)';grade='Near Pass';}
    else if(pF>=60){lbl='Borderline — further study recommended.';col='var(--coral-m)';grade='Borderline';}
    else{lbl='Below pass standard — keep practising.';col='#A32D2D';grade='Needs Work';}
    const ts={}; APP.round.forEach((qi,pos)=>{const t=BANK[qi].topic; if(!ts[t]) ts[t]={ok:0,tot:0}; ts[t].tot++; if(APP.answers[pos]?.v===1) ts[t].ok++;});
    let topicHtml=Object.entries(ts).map(([t,s])=>{ const pc=Math.round(s.ok/s.tot*100); return `<div class="topic-row"><div class="topic-name">${t} · ${s.ok}/${s.tot}</div><div class="topic-bar-wrap"><div class="topic-bar-fill" style="width:${pc}%;background:${pc>=80?'var(--teal-m)':pc>=60?'var(--amber)':'var(--coral-m)'}"></div></div></div>`;}).join('');
    let review=APP.round.map((qi,pos)=>{const q=BANK[qi]; const good=APP.answers[pos]?.v===1; return `<div class="q-review-item ${good?'r-ok':'r-bad'}"><div class="r-icon">${good?'✓':'✗'}</div><div><strong>Q${pos+1} · ${q.topic}</strong><br>${q.q}</div></div>`;}).join('');
    const rc=document.createElement('div'); rc.className='result-card'; rc.innerHTML=`<div class="result-big" style="color:${col}">${pF}%</div><div class="result-grade" style="background:${col};color:#fff">${grade}</div><div style="font-size:.92rem;color:var(--text2);margin-top:.35rem">${lbl}</div><div class="result-bar-wrap"><div class="result-bar-fill" style="width:${pF}%;background:${col}"></div></div><div class="result-breakdown"><div class="rp" style="background:var(--green-l);color:var(--green)">${ok} correct</div><div class="rp" style="background:var(--coral-l);color:var(--coral)">${N-ok} wrong</div><div class="rp" style="background:var(--gray-l);color:var(--gray-d)">Seen: ${APP.seen.length}/${BANK.length}</div></div><div class="topic-grid">${topicHtml}</div><div class="btn-row" style="margin-bottom:1rem"><button class="btn btn-p" onclick="doReset()">Start new round</button></div><div class="q-review-list">${review}</div>`; area.appendChild(rc);
  }
}
load(); if(!APP.round.length) buildRound(); save(); render();

</script>
