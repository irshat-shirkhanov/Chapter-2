em;text-align:center;border:1px solid var(--gray-m);box-shadow:var(--shadow)}.sc .n{font-size:1.38rem;font-weight:700;color:var(--teal);line-height:1}.sc .n-ok{color:var(--teal-m)}.sc .n-bad{color:var(--coral-m)}.sc .l{font-size:.67rem;color:var(--text3);margin-top:.18rem}.q-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:1.4rem 1.5rem;margin-bottom:1rem;border:1px solid rgba(0,0,0,.05)}.q-meta{display:flex;align-items:center;gap:.5rem;margin-bottom:.65rem;flex-wrap:wrap}.q-num{font-size:.68rem;font-weight:700;color:var(--teal);text-transform:uppercase;letter-spacing:.07em}.q-tag{font-size:.64rem;font-weight:700;padding:.15rem .48rem;border-radius:20px}.tag-cisi{background:#FEF3C7;color:#7C5A0A}.tag-concept{background:var(--purple-l);color:var(--purple-d)}.tag-scenario{background:var(--teal-l);color:var(--teal-d)}.tag-detail{background:var(--gray-l);color:var(--gray-d)}.q-topic{font-size:.64rem;color:var(--text3);margin-left:auto}.q-text{font-size:.93rem;font-weight:500;line-height:1.6;margin-bottom:.95rem;color:var(--text)}.opts{display:flex;flex-direction:column;gap:.42rem}.opt{display:flex;align-items:flex-start;gap:.65rem;padding:.68rem .95rem;border-radius:8px;border:1.5px solid var(--gray-m);cursor:pointer;font-size:.86rem;line-height:1.46;background:var(--card);transition:all .16s}.opt:hover:not(.dis){border-color:var(--teal);background:var(--teal-l)}.opt.ok{border-color:var(--teal-m);background:var(--green-l);color:var(--green)}.opt.bad{border-color:var(--coral-m);background:var(--coral-l);color:var(--coral)}.opt.dis{cursor:default}.opt-l{width:21px;height:21px;min-width:21px;border-radius:50%;background:#e2e8f0;display:flex;align-items:center;justify-content:center;font-size:.69rem;font-weight:700;color:var(--gray);margin-top:1px;flex-shrink:0}.opt.ok .opt-l{background:var(--teal-m);color:#fff}.opt.bad .opt-l{background:var(--coral-m);color:#fff}.exp-box{margin-top:.8rem;padding:.7rem 1rem;border-radius:8px;font-size:.81rem;line-height:1.62;display:none}.exp-box.show{display:block}.exp-ok{background:var(--green-l);border-left:3px solid var(--teal-m);color:var(--green)}.exp-bad{background:var(--coral-l);border-left:3px solid var(--coral-m);color:var(--coral)}.result-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:2rem 1.5rem;text-align:center;margin-top:.5rem}.result-big{font-size:3.2rem;font-weight:800;margin:.4rem 0}.result-grade{display:inline-block;padding:.38rem 1.2rem;border-radius:20px;font-size:.92rem;font-weight:700;margin:.5rem 0 .8rem}.result-bar-wrap{background:var(--gray-l);border-radius:20px;height:14px;overflow:hidden;margin:.75rem auto;max-width:320px}.result-bar-fill{height:100%;border-radius:20px;transition:width .8s ease}.result-breakdown{display:flex;gap:.6rem;justify-content:center;flex-wrap:wrap;margin:1rem 0 1.2rem}.rp{padding:.3rem .9rem;border-radius:20px;font-size:.8rem;font-weight:600}.topic-grid{display:grid;grid-template-columns:1fr 1fr;gap:.45rem;margin:.5rem 0 1.2rem;text-align:left}.topic-row{background:var(--gray-l);border-radius:8px;padding:.5rem .75rem;font-size:.78rem}.topic-name{color:var(--text2);font-weight:600;margin-bottom:.2rem}.topic-bar-wrap{background:var(--gray-m);border-radius:10px;height:6px;overflow:hidden}.topic-bar-fill{height:100%;border-radius:10px}.q-review-list{text-align:left;margin-top:.5rem}.q-review-item{padding:.65rem 1rem;border-radius:8px;margin-bottom:.45rem;font-size:.83rem;line-height:1.52;display:flex;gap:.65rem;align-items:flex-start}.q-review-item.r-ok{background:var(--green-l);border-left:3px solid var(--teal-m);color:var(--green)}.q-review-item.r-bad{background:var(--coral-l);border-left:3px solid var(--coral-m);color:var(--coral)}.r-icon{font-size:.9rem;flex-shrink:0;margin-top:.08rem}.btn{padding:.58rem 1.3rem;border:none;border-radius:8px;cursor:pointer;font-size:.86rem;font-weight:600;transition:all .2s}.btn-p{background:var(--teal);color:#fff}.btn-p:hover{background:var(--teal-d)}.btn-row{display:flex;gap:.65rem;flex-wrap:wrap;justify-content:center}</style>

<script>
const BANK=[{"tag":"cisi","topic":"Application","q":"To which clients do the financial promotion rules in COBS 4.1.1 generally NOT apply?","opts":["Retail clients — this applies in all.","Professional clients, provided the client has given prior written consent.","Eligible counterparties (ECPs)","Potential clients, provided the client has given prior written consent."],"ans":2,"exp":"Correct: C. The majority of financial promotion rules do not apply when the client is an ECP. The rules apply to firms communicating with clients in the UK regarding designated investment business, but ECPs are explicitly carved out. Key fact: Financial promotion rules = do NOT apply to ECPs."},{"tag":"cisi","topic":"Application","q":"Which of the following is an exemption from the application of COBS 4.1.1 financial promotion rules?","opts":["Communications to retail clients about equity ISAs, provided the client has given prior written consent.","Communications regarding qualifying credit, home purchase plans or home reversion plans","Communications to professional clients about MiFID business, provided the client has given prior written consent.","Communications about exchange-traded funds, provided the client has given prior written consent."],"ans":1,"exp":"Correct: B. COBS 4.1.1 exemptions include: qualifying credit, home purchase plans, home reversion plans, non-investment insurance promotions, unregulated CIS (which firms cannot approve), and credit-related regulated activities. Key fact: Qualifying credit / home purchase / home reversion = exempt."},{"tag":"detail","topic":"Application","q":"A firm wishes to approve a financial promotion relating to an unregulated collective investment scheme (CIS). Is this permitted?","opts":["Yes — any authorised firm can approve any financial promotion","No — firms are not permitted to communicate or approve promotions for unregulated CIS","Yes — but only if the promotion is aimed at professional clients","Yes — with FCA pre-approval — this applies in all circumstances without exception"],"ans":1,"exp":"Correct: B. Firms are specifically NOT permitted to communicate OR approve financial promotions relating to unregulated CIS. This is an explicit carve-out from COBS 4.1.1. Key fact: Unregulated CIS = cannot communicate OR approve."},{"tag":"cisi","topic":"Application","q":"What is the stated purpose of the financial promotion rules?","opts":["To restrict financial promotions to authorised firms only, provided the client has given prior written consent.","To ensure promotions are identified as such, and that they are fair, clear and not misleading","To prevent retail clients from accessing complex investment products","To require all promotions to be pre-approved by the FCA, provided the client has given prior written consent."],"ans":1,"exp":"Correct: B. The purpose is: (1) promotions are identified as such; (2) they are fair, clear and not misleading. This aligns with FCA Principles 6 and 7 (or Principle 12 under Consumer Duty). Key fact: Purpose = identification + fair/clear/not misleading."},{"tag":"cisi","topic":"Application","q":"Which FCA Principles underpin the financial promotion rules for firms NOT subject to Consumer Duty?","opts":["Principles 1 and 2","Principles 6 and 7","Principles 9 and 10","Principle 11 only"],"ans":1,"exp":"Correct: B. The financial promotion rules are consistent with Principle 6 (pay due regard to customer interests, treat fairly) and Principle 7 (communicate clearly, fairly and not misleadingly). For Consumer Duty firms, Principle 12 replaces Principles 6 and 7. Key fact: Principles 6 + 7 (non-CD firms). Principle 12 replaces them under Consumer Duty."},{"tag":"concept","topic":"Application","q":"The FCA discovers a financial promotion that is misleading. Which of the following describes its immediate enforcement option?","opts":["The FCA must go through its full enforcement process before removing the promotion","The FCA can direct removal of the promotion immediately without going through its enforcement process","The FCA must obtain a court order first, provided the client has given prior written consent.","The FCA can only issue a public warning but cannot remove it, provided the client has given prior written consent."],"ans":1,"exp":"Correct: B. The FCA can remove financial promotions immediately or prevent them from being launched, WITHOUT having to go through its enforcement process. It gives a direction, firms can make representations, and the FCA then confirms, amends or revokes. Key fact: FCA = immediate removal power, no enforcement process needed."},{"tag":"scenario","topic":"Application","q":"A firm provides both MiFID and non-MiFID services to a professional client. Do the financial promotion rules apply?","opts":["No — professional clients are fully exempt, provided the client has given prior written consent.","Yes — most rules apply, but ECPs are the category that is fully excluded","No — only retail clients are covered, provided the client has given prior written consent.","Yes — but only for non-MiFID services, provided the client has given prior written consent."],"ans":1,"exp":"Correct: B. Financial promotion rules apply to retail clients and professional clients. ECPs are the client category most exempt from the rules. Professional clients are NOT fully exempt — most rules still apply to them. Key fact: Rules apply to retail + professional. ECP = most excluded."},{"tag":"cisi","topic":"Fair Clear","q":"Which of the following is a specific requirement for financial promotions that quote yields or projected returns?","opts":["They must show returns net of all charges only, provided the client has given prior written consent.","They must give a balanced impression of short-, medium- and long-term prospects for the investment","They must be approved by an actuary before publication, provided the client has given prior written consent.","They must include only the highest yield scenario, provided the client has given prior written consent."],"ans":1,"exp":"Correct: B. Promotions quoting yields must give a balanced impression of short-, medium- and long-term prospects. One-sided performance projections are not permitted. Key fact: Yield promotions = balanced impression across time horizons."},{"tag":"cisi","topic":"Fair Clear","q":"A financial promotion mentions the FCA as the firm's regulator, but some aspects of the business are not FCA-regulated. What must the promotion include?","opts":["Nothing additional — the FCA reference is sufficient, provided the client has given prior written consent.","A clear statement that some aspects of the business relationship are not regulated by the FCA","The firm must remove all references to the FCA, provided the client has given prior written consent.","A disclaimer approved by the FCA, provided the client has given prior written consent."],"ans":1,"exp":"Correct: B. If the FCA is named as regulator but the promotion also covers non-FCA-regulated matters, the promotion must make clear that some aspects are not regulated by the FCA. Key fact: FCA named + non-regulated aspects = clearly disclose non-regulated aspects."},{"tag":"detail","topic":"Fair Clear","q":"A promotion for a packaged product produced by another firm appears in a magazine. What impression must the promotion give of the producer?","opts":["It may focus only on the distributor firm's reputation, provided the client has given prior written consent.","It must give a fair, clear and non-misleading impression of the producer or manager of the product","It need not mention the producer at all, provided the client has given prior written consent.","It may describe the producer using superlatives to attract investors, provided the client has given prior written consent."],"ans":1,"exp":"Correct: B. Promotions relating to packaged or stakeholder products not produced by the firm must give a fair, clear and non-misleading impression of the producer or manager of that product. Key fact: Third-party packaged products = fair impression of the producer required."},{"tag":"scenario","topic":"Fair Clear","q":"A promotional email for a structured product states: 'Your capital grows with the market, with no downside risk.' Is this compliant?","opts":["Yes — positive messaging is permitted in promotions, provided the client has given prior written consent.","No — if a client's capital may be at risk, this must be clearly stated in the promotion","Yes — as long as the email is sent to professional clients only","No — only because the email channel is not permitted, provided the client has given prior written consent."],"ans":1,"exp":"Correct: B. If a product's capital may be at risk, the promotion must clearly state this. A claim of 'no downside risk' when risk exists is not fair, clear or not misleading. Key fact: Capital at risk = must be explicitly stated."},{"tag":"concept","topic":"Fair Clear","q":"How does the fair, clear and not misleading standard differ for communications aimed at professional clients versus retail clients?","opts":["Professional clients receive no information requirements, provided the client has given prior written consent.","Professional clients can receive more detailed and complex information; retail clients need simpler, clearer presentation","Retail clients may receive complex information if they request it, provided the client has given prior written consent.","The standard is identical for both client types, provided the client has given prior written consent."],"ans":1,"exp":"Correct: B. The approach must be appropriate and proportionate. Professional clients may receive more detailed and complex information. Retail clients need simpler, clearer communication. The overall principle (fair/clear/not misleading) applies to both. Key fact: Same principle, different presentation — professional = more complex; retail = simpler/clearer."},{"tag":"cisi","topic":"Identification","q":"Which of the following is classified as a 'non-real-time' financial promotion?","opts":["A telephone conversation about an investment product","A face-to-face meeting where a product is recommended","An email containing an investment offer","A presentation at an investor seminar"],"ans":2,"exp":"Correct: C. Non-real-time communications include emails, letters and websites — typically where a record is made. Real-time = face-to-face, telephone, presentations (interactive dialogue). Key fact: Email = non-real-time. Telephone/meeting/presentation = real-time."},{"tag":"cisi","topic":"Identification","q":"What is a 'direct offer financial promotion'?","opts":["A promotion made directly by the FCA to investors, provided the client has given prior written consent.","A promotion that includes an offer to enter into an agreement and specifies a means of response","A telephone call from a firm to a potential client, provided the client has given prior written consent.","Any promotion sent by post to a named individual, provided the client has given prior written consent."],"ans":1,"exp":"Correct: B. A direct offer financial promotion is one which makes an offer to any person to enter into an agreement AND includes a form of response or specifies the manner of responding. Key fact: Direct offer = offer to enter agreement + response mechanism."},{"tag":"detail","topic":"Identification","q":"Which client categories are exempt from the requirement that financial promotions be clearly identifiable as such?","opts":["Retail clients with more than 5 years'.","Professional clients and ECPs","Self-certified sophisticated investors","All clients when promotions are made by."],"ans":1,"exp":"Correct: B. The requirement that promotions addressed to clients are clearly identifiable as such has an exception for promotions made to professional clients or ECPs. Key fact: Identification exception = professional clients + ECPs."},{"tag":"cisi","topic":"Anti-Greenwashing","q":"From when did the FCA's anti-greenwashing rule come into effect?","opts":["2020","2021","2022","2024"],"ans":3,"exp":"Correct: D. The FCA's anti-greenwashing rule and guidance came into effect in 2024. It applies to all FCA-regulated firms when making statements about the sustainability characteristics of a product or service. Key fact: Anti-greenwashing rule = 2024."},{"tag":"cisi","topic":"Anti-Greenwashing","q":"To which firms and clients does the FCA's anti-greenwashing rule apply?","opts":["Only to investment firms dealing with retail clients, provided the client has given prior written consent.","All FCA-regulated firms, for communications to both retail and professional clients","Only to firms making ESG-labelled product claims, provided the client has given prior written consent.","Only to firms subject to Consumer Duty, provided the client has given prior written consent."],"ans":1,"exp":"Correct: B. The anti-greenwashing rule applies to ALL FCA-regulated firms — regardless of where the communication was developed — when distributed to clients. It applies to both retail and professional clients. Key fact: All regulated firms + retail and professional. Not limited to Consumer Duty firms."},{"tag":"detail","topic":"Anti-Greenwashing","q":"Which of the following is NOT one of the FCA's four criteria for sustainability-related statements under the anti-greenwashing rule?","opts":["Correct and capable of being substantiated","Clear and presented in a way that can be understood","Approved by an independent ESG auditor before use","Complete — not omitting or hiding important information"],"ans":2,"exp":"Correct: C. The four FCA criteria are: (1) correct and capable of substantiation; (2) clear and understandable; (3) complete — not omitting/hiding important info, considering full product lifecycle; (4) accurate in comparisons. Independent ESG auditor approval is NOT a regulatory requirement. Key fact: 4 criteria = correct / clear / complete / comparable. No auditor requirement."},{"tag":"concept","topic":"Anti-Greenwashing","q":"The FCA states that the anti-greenwashing rule is intended to be consistent with the Consumer Duty. Which specific Consumer Duty obligation does it reference?","opts":["Firms must provide good outcomes on products and services","Firms must act in good faith towards their retail customers","Firms must ensure fair value in products, provided the client has given prior written consent.","Firms must provide adequate support to consumers"],"ans":1,"exp":"Correct: B. The FCA noted that the anti-greenwashing rule is consistent with the Consumer Duty requirement that firms act in good faith towards their retail customers. Key fact: Anti-greenwashing + Consumer Duty = act in good faith towards retail customers."},{"tag":"cisi","topic":"Exceptions","q":"'Excluded communications' disapply the financial promotion rules in certain cases. Which of the following is an excluded communication?","opts":["A promotion sent to a retail client via email","A promotion aimed at high-net-worth individuals (Article 48 FPO)","A promotion for a MiFID investment service, provided the client has given prior written consent.","A direct offer promotion for a packaged product"],"ans":1,"exp":"Correct: B. Excluded communications include: promotions aimed at HNW individuals (Article 48 FPO), sophisticated investors (Articles 50 and 50A FPO), promotions exempt under the FPO, overseas promotions meeting FPO criteria, Takeover Code promotions, and one-off non-cold-call promotions. Key fact: HNW (Art.48) + sophisticated investors (Art.50/50A) = excluded communications."},{"tag":"cisi","topic":"Exceptions","q":"Does the excluded communications exemption generally apply to UK MiFID business?","opts":["Yes — it applies to all types of business","No — it generally does NOT apply to UK MiFID business","Yes — but only for professional clients","Only when the FCA has granted a specific waiver"],"ans":1,"exp":"Correct: B. The exemption for excluded communications does NOT generally apply in relation to UK MiFID business. This is an important limitation — MiFID firms cannot rely on excluded communications to disapply financial promotion rules. Key fact: Excluded comms exemption = NOT for UK MiFID business."},{"tag":"detail","topic":"Exceptions","q":"HM Treasury updated the high-net-worth individual and sophisticated investor exemptions in 2024. What is the status of investor statements made under the previous requirements?","opts":["They remain valid indefinitely as grandfathered statements, provided the client has given prior written consent.","They are no longer valid — new statements must be made under the updated requirements","They remain valid for 5 years from the date of issue, provided the client has given prior written consent.","They must be re-submitted to the FCA for renewal, provided the client has given prior written consent."],"ans":1,"exp":"Correct: B. Following the 2024 changes, investor statements that complied with the previous requirements are no longer valid. Investors must provide new statements under the updated criteria. Key fact: 2024 update = old HNW/sophisticated statements are invalid. New statements required."},{"tag":"cisi","topic":"Prospectus Ads","q":"In relation to prospectus advertisements, which of the following rules applies instead of COBS 4?","opts":["COBS 6 — information about the firm","Prospectus Regulation Rules (PRR 3.3)","COBS 14 — product information","SYSC 4 — systems and controls"],"ans":1,"exp":"Correct: B. The section of COBS that deals with communications to clients (COBS 4) does NOT apply where Prospectus Regulation Rules (PRR 3.3) apply. Key fact: Prospectus ad rules = PRR 3.3, not COBS 4."},{"tag":"cisi","topic":"Prospectus Ads","q":"Which of the following is NOT a required condition for a prospectus advertisement to be issued?","opts":["It states that a prospectus has been or will be published and.","It is clearly recognisable as an advertisement","It has been approved by the FCA before publication","The information is not inaccurate or misleading"],"ans":2,"exp":"Correct: C. The four conditions for a prospectus advertisement are: (1) prospectus published/will be published + where to get it; (2) clearly recognisable as an advertisement; (3) information not inaccurate or misleading; (4) consistent with the prospectus. FCA pre-approval is NOT one of the four conditions. Key fact: 4 conditions — no FCA pre-approval requirement."},{"tag":"detail","topic":"Prospectus Ads","q":"A written prospectus advertisement must include a specific mandatory statement. What must this statement say?","opts":["That the FCA has reviewed and approved the investment, provided the client has given prior written consent.","That the advertisement is NOT a prospectus, and that investors should not subscribe except on the basis of information in the prospectus","That the investment carries no guarantee of return, provided the client has given prior written consent.","That the firm is exempt from general COBS 4 requirements, provided the client has given prior written consent."],"ans":1,"exp":"Correct: B. Any written prospectus advertisement must prominently and in bold state that it is NOT a prospectus, but an advertisement, and that investors should not subscribe to the securities except on the basis of information in the prospectus. Key fact: Written prospectus ad = bold statement: 'not a prospectus, do not subscribe except on prospectus basis'."},{"tag":"scenario","topic":"Prospectus Ads","q":"An influencer promotes a financial product on social media without approval from an FCA-authorised firm. What risk does the influencer face?","opts":["A civil fine from the FCA only","No risk — social media is not regulated","A potential criminal offence","Only reputational risk with no legal."],"ans":2,"exp":"Correct: C. The FCA has made clear that influencers who promote a financial product without approval from an FCA-authorised firm (with the right permission) could be undertaking a CRIMINAL OFFENCE. Firms are responsible for all their promotions, including those made by influencers they work with. Key fact: Unapproved promotion = possible criminal offence. Firms responsible for influencer promotions."},{"tag":"cisi","topic":"Approval","q":"Before 2023, who could approve financial promotions for unauthorised persons under FSMA?","opts":["Only the FCA itself","Any authorised person","Only firms with a specific.","Only firms with at least 5."],"ans":1,"exp":"Correct: B. Before 2023, under FSMA, any authorised person could approve financial promotions for unauthorised firms. The 2023 gateway changed this to require specific FCA permission. Key fact: Pre-2023 = any authorised person. Post-2023 = gateway permission required."},{"tag":"cisi","topic":"Approval","q":"Under the 2023 FCA 'gateway' for approving financial promotions for third parties, what must a firm do to approve promotions for unauthorised firms?","opts":["Obtain a specific permission from the FCA","Register with the Financial Ombudsman Service","File a notice with Companies House","Pay a one-off gateway fee to HM Treasury"],"ans":0,"exp":"Correct: A. From 2023, firms wishing to approve financial promotions for third-party (unauthorised) firms must apply to the FCA for specific permission to do so. Firms without this permission can only approve their own promotions. Key fact: 2023 gateway = FCA permission required to approve third-party promotions."},{"tag":"cisi","topic":"Approval","q":"A firm approves a financial promotion. It later discovers the promotion no longer complies with the rules. What must it do?","opts":["Update the promotion and continue using it, provided the client has given prior written consent.","Withdraw approval immediately and notify all known relying parties as soon as reasonably practicable","Report the issue to the FCA within 30 days and await guidance, provided the client has given prior written consent.","Continue using it until the next regulatory review, provided the client has given prior written consent."],"ans":1,"exp":"Correct: B. If a firm becomes aware that an approved financial promotion no longer complies, it MUST withdraw its approval AND notify anyone it knows to be relying on that approval as soon as is reasonably practicable. Key fact: Non-compliance discovered = withdraw + notify relying parties ASAP."},{"tag":"detail","topic":"Approval","q":"Which of the following types of financial promotion may a firm NOT approve for an unauthorised person?","opts":["A written brochure for a structured product, provided the client has given prior written consent.","A non-real-time email promotion for a bond, provided the client has given prior written consent.","A real-time promotion to be made during telephone conversations","A direct offer advertisement in a newspaper, provided the client has given prior written consent."],"ans":2,"exp":"Correct: C. Firms may NOT approve REAL-TIME financial promotions — those to be made in the course of personal visits, telephone conversations or other interactive dialogue. Only non-real-time promotions can be approved for unauthorised persons. Key fact: Real-time promotions = cannot be approved for unauthorised persons."},{"tag":"scenario","topic":"Approval","q":"A firm approves a financial promotion specifically for communication to professional clients only. An unauthorised person then communicates it to retail clients. What is the consequence?","opts":["The firm that approved is liable; the unauthorised person has no liability, provided the client has given prior written consent.","The unauthorised person is committing an offence by communicating outside the scope of the limited approval","Both parties face equal liability regardless of the scope limitation, provided the client has given prior written consent.","No offence occurs as the promotion itself was approved, provided the client has given prior written consent."],"ans":1,"exp":"Correct: B. If approval is limited (e.g., to professional clients only), and an unauthorised person communicates it outside those limits, THEY are committing an offence. The approval must state the limitation. Key fact: Limited approval + communication outside limits = offence by the unauthorised person."},{"tag":"cisi","topic":"Approval","q":"For non-MiFID business, a firm communicates a promotion produced by another party. Under what conditions is it not in breach of the rules?","opts":["If it has FCA pre-approval for the communication, as specified in the relevant FCA Handbook provisions, unless a specific exemption applies under the Financial Promotion Order.","If it took reasonable care that another authorised firm confirmed compliance, communicated it only to the intended recipient type, and the promotion is still fair, clear and not misleading and not withdrawn","If the promotion is less than one page long, as specified in the relevant FCA Handbook provisions, as required under the relevant COBS or SYSC rules in the FCA Handbook.","If the promotion was produced by an FCA-regulated firm, as specified in the relevant FCA Handbook provisions, provided the firm has obtained prior written consent from the client."],"ans":1,"exp":"Correct: B. Non-MiFID: three conditions to avoid breach: (1) reasonable care that another authorised firm confirmed compliance; (2) communicated only to the intended recipient type; (3) as far as the firm is or should be aware, it is still fair/clear/not misleading and not withdrawn. Key fact: Third-party promotion (non-MiFID) = 3 conditions: confirmation + right recipients + still compliant."},{"tag":"cisi","topic":"Retail Comms","q":"Which of the following must be included in all communications providing information about designated investment business that are likely to be received by retail clients?","opts":["The firm's share.","The firm's name","The firm's annual.","The name of the."],"ans":1,"exp":"Correct: B. Retail client communications must include the firm's NAME. Other requirements: information accurate and balanced (benefits vs risks), sufficient and presented for the average recipient, no concealment of important items. Key fact: Firm name = mandatory in retail communications."},{"tag":"detail","topic":"Retail Comms","q":"A retail client receives a promotion that strongly emphasises the potential 30% return with only a brief footnote mentioning risk. Is this compliant?","opts":["Yes — as long as risk is mentioned somewhere in the document, provided the client has given prior written consent.","No — information must not emphasise potential benefits without a fair and prominent indication of relevant risks","Yes — the prominence of information is a commercial decision, provided the client has given prior written consent.","No — returns must never be mentioned in promotions, provided the client has given prior written consent."],"ans":1,"exp":"Correct: B. The rules require that information is accurate and does NOT emphasise potential benefits without also giving a FAIR AND PROMINENT indication of any relevant risks. A footnote is unlikely to be considered 'prominent'. Key fact: Benefits + risks = must be balanced and risk prominently disclosed."},{"tag":"cisi","topic":"Retail Comms","q":"For MiFID business, when a promotion makes comparisons between investments, what additional requirement applies?","opts":["Comparisons must be independently verified by a third party, provided the client has given prior written consent.","The data sources for comparisons must be cited, and key facts and assumptions used must be detailed","Comparisons are never permitted in MiFID promotions, provided the client has given prior written consent.","The FCA must pre-approve the comparison methodology, provided the client has given prior written consent."],"ans":1,"exp":"Correct: B. For MiFID business, comparisons must be meaningful, fair and balanced. Additionally, the data sources must be cited AND any key facts and assumptions used must be detailed. Key fact: MiFID comparisons = cite data sources + key facts + assumptions."},{"tag":"scenario","topic":"Retail Comms","q":"A retail promotion mentions that returns may be exempt from income tax. What must the firm also communicate?","opts":["Nothing — tax information is the client's responsibility, provided the client has given prior written consent.","That any tax treatment will depend on each client's individual circumstances and may be subject to change","The client's marginal tax rate, provided the client has given prior written consent.","The exact tax savings the client will achieve, provided the client has given prior written consent."],"ans":1,"exp":"Correct: B. If tax treatment is mentioned, firms must explain that any tax treatment depends on each client's individual circumstances AND that it may be subject to change. Key fact: Tax mentioned = individual circumstances + subject to change."},{"tag":"cisi","topic":"High-Risk","q":"What is a 'Non-Mass Market Investment' (NMMI) in the context of FCA retail promotion rules?","opts":["A product with less than 100 investors, provided the client has given prior written consent.","A type of high-risk investment whose promotion to retail investors is banned","A product only available to institutional investors, provided the client has given prior written consent.","A product requiring a minimum investment of £1 million"],"ans":1,"exp":"Correct: B. NMMIs (Non-Mass Market Investments) are a category of high-risk investments whose promotion to retail investors is BANNED. In contrast, RMMIs (Restricted Mass Market Investments) can be mass-marketed subject to restrictions. Key fact: NMMI = promotion to retail is BANNED. RMMI = permitted with restrictions."},{"tag":"cisi","topic":"High-Risk","q":"What minimum cooling-off period applies to first-time investors with a firm for high-risk investment promotions?","opts":["12 hours","24 hours","48 hours","72 hours"],"ans":1,"exp":"Correct: B. A minimum 24-hour cooling-off period applies for first-time investors with a firm. The FCA has noted that it would like to see firms apply higher standards than the minimum. Key fact: Cooling-off = minimum 24 hours (first-time investors)."},{"tag":"detail","topic":"High-Risk","q":"Which of the following is BANNED under the FCA's high-risk investment promotion rules?","opts":["Past performance data in promotions, provided the client has given prior written consent.","Monetary or non-monetary incentives to invest (e.g., refer-a-friend bonuses, sign-up bonuses)","Providing risk warnings to clients, provided the client has given prior written consent.","Including the firm's name in a promotion, provided the client has given prior written consent."],"ans":1,"exp":"Correct: B. Monetary and non-monetary benefits that incentivise investment — such as refer-a-friend bonuses or new joiner bonuses — are BANNED under the high-risk investment promotion rules. Key fact: Incentives to invest (monetary or non-monetary) = BANNED for high-risk investments."},{"tag":"detail","topic":"High-Risk","q":"What must a personalised risk warning for a high-risk investment include?","opts":["The investor's full.","The investor's name","The investor's income and.","The investor's credit."],"ans":1,"exp":"Correct: B. Personalised risk warnings must be personalised — meaning they must include the CLIENT'S NAME. Generic warnings are not sufficient. Key fact: Personalised risk warning = must include the client's name."},{"tag":"scenario","topic":"High-Risk","q":"A firm coaches investors on how to answer the appropriateness test so they can receive high-risk investment promotions. Is this permitted?","opts":["Yes — helping clients is part of good customer service, provided the client has given prior written consent.","No — firms are specifically prevented from coaching investors to pass the test","Yes — as long as the coaching is documented, provided the client has given prior written consent.","No — but only if the investor ultimately fails the test"],"ans":1,"exp":"Correct: B. The FCA rules specifically prevent firms from COACHING investors to pass the appropriateness test. The test must be made more robust, not circumvented. Key fact: Coaching investors to pass appropriateness test = NOT permitted."},{"tag":"cisi","topic":"Cryptoassets","q":"How has the FCA classified cryptoassets for the purpose of the financial promotion regime?","opts":["Non-Mass Market Investments (NMMI) — banned for retail","Restricted Mass Market Investments (RMMI) — permitted with restrictions","Fully unrestricted investments, provided the client has given prior written consent.","Qualifying investments — same rules as equities, provided the client has given prior written consent."],"ans":1,"exp":"Correct: B. The FCA has classified cryptoassets (qualifying cryptoassets) as Restricted Mass Market Investments (RMMI), meaning they can be mass-marketed to UK consumers subject to certain restrictions. Key fact: Cryptoassets = RMMI (not NMMI)."},{"tag":"detail","topic":"Cryptoassets","q":"A cryptoasset business is registered with the FCA under the Money Laundering Regulations (MLRs) but is NOT an authorised person. Can it promote its own cryptoasset products?","opts":["No — only FCA-authorised firms can promote cryptoassets, provided the client has given prior written consent.","Yes — there is a bespoke FPO exemption for MLR-registered cryptoasset businesses to communicate their own promotions","Yes — but only to professional clients, provided the client has given prior written consent.","No — it must have a separate FCA authorisation for each promotion, provided the client has given prior written consent."],"ans":1,"exp":"Correct: B. The Government introduced a bespoke FPO exemption for cryptoasset businesses registered with the FCA under the MLRs (even if not authorised persons) — enabling them to communicate their OWN cryptoasset financial promotions to UK consumers. Key fact: MLR-registered (not authorised) crypto firms = can communicate own promotions via FPO exemption."},{"tag":"cisi","topic":"Cryptoassets","q":"Which category of investor does NOT apply to cryptoasset promotions under the FCA's rules?","opts":["Retail investors (with restrictions)","Sophisticated investors with FCA gateway approval","Self-certified sophisticated investors","Institutional investors, provided the client has given prior written consent."],"ans":2,"exp":"Correct: C. The FCA confirmed that the self-certified sophisticated investor category will NOT be applied to cryptoasset promotions. Key fact: Self-certified sophisticated investor = does NOT apply to crypto promotions."},{"tag":"cisi","topic":"Past Performance","q":"Which of the following is a requirement when including past performance data in a financial promotion?","opts":["Past performance must be the most prominent feature of the communication","The data must cover at least five years (or the whole period if less) in complete 12-month periods","Only the best 3-year period need be shown, provided the client has given prior written consent.","Past performance data must be independently audited, provided the client has given prior written consent."],"ans":1,"exp":"Correct: B. Past performance: must cover at least 5 years (or full period if shorter), in complete 12-month periods. Reference periods and sources must be clearly shown. Past performance must NOT be the most prominent feature. Key fact: ≥5 years, complete 12-month periods, not the most prominent feature."},{"tag":"detail","topic":"Past Performance","q":"A financial promotion shows past performance figures for a fund denominated in euros. What additional disclosures are required?","opts":["Nothing additional — currency is irrelevant to performance, provided the client has given prior written consent.","The currency must be stated and there must be a warning about the possible effects of currency fluctuations","The EUR/GBP exchange rate for the full period must be shown, provided the client has given prior written consent.","The performance must be restated in sterling, provided the client has given prior written consent."],"ans":1,"exp":"Correct: B. If past performance figures are in a currency other than sterling, the currency must be stated and there must be a warning about the possible effects of currency fluctuations. Key fact: Foreign currency performance = state currency + warn about FX fluctuation risk."},{"tag":"cisi","topic":"Past Performance","q":"A past performance figure is quoted gross of charges. What must also be disclosed?","opts":["Nothing — gross figures are the standard, provided the client has given prior written consent.","The effects of commissions, fees, tax and other charges must be disclosed","Only the annual management charge needs to be shown, provided the client has given prior written consent.","Charges need only be disclosed in a separate document"],"ans":1,"exp":"Correct: B. If past performance is cited gross, the effects of commissions, fees, tax and other charges must be disclosed. This ensures clients understand the net return they would actually receive. Key fact: Gross performance figure = must disclose effect of charges/fees/tax."},{"tag":"cisi","topic":"Simulated Performance","q":"A new fund has no track record. The firm wishes to include simulated past performance data. What must the data be based on?","opts":["The firm's own projected returns, as specified in the relevant FCA Handbook provisions.","The actual past performance of one or more investments or indices that are the same as, or underlie, the investments being simulated","Industry average returns, as specified in the relevant FCA Handbook provisions.","Theoretical modelling without reference to any actual data, provided the client has given prior written consent."],"ans":1,"exp":"Correct: B. Simulated past performance must be based on the ACTUAL past performance of one or more investments and/or indices that are the same as, or underlie, the investments being simulated. Key fact: Simulated = based on actual data of same or underlying investments/indices."},{"tag":"detail","topic":"Simulated Performance","q":"Which specific warning must be included when simulated past performance figures are shown?","opts":["'This product is new and has no history', as specified in the relevant FCA Handbook provisions, unless a specific exemption applies under the Financial Promotion Order.","A prominent warning that the figures relate to simulated past performance and that past performance is not a reliable indicator of future performance","'These are theoretical returns only', as specified in the relevant FCA Handbook provisions, as required under the relevant COBS or SYSC rules in the FCA Handbook.","No specific wording is required — any disclaimer suffices, unless the client has been notified in a durable medium."],"ans":1,"exp":"Correct: B. The specific required warning for simulated performance is: a PROMINENT warning that the figures relate to simulated past performance AND that past performance is not a reliable indicator of future performance. Key fact: Simulated = must state it IS simulated + standard past performance warning."},{"tag":"cisi","topic":"Future Performance","q":"A financial promotion contains projections of future returns. On what must these projections be based?","opts":["The firm's proprietary model without external validation","Reasonable assumptions supported by objective data","The regulator's published benchmark returns","Simulated past performance figures, provided the client has given prior written consent."],"ans":1,"exp":"Correct: B. Future performance projections must be based on REASONABLE ASSUMPTIONS supported by OBJECTIVE DATA. They must NOT be based on or refer to simulated past performance. Key fact: Future projections = reasonable assumptions + objective data. NOT based on simulated past performance."},{"tag":"cisi","topic":"Direct Offers","q":"Which of the following must be contained in a direct offer financial promotion likely to be received by a retail client?","opts":["The firm's regulatory capital ratio, as specified in the relevant FCA Handbook provisions.","Prescribed information about the firm and services, costs and charges, nature and risks of the investment, and management of client investments","Only the firm's name and the offer price, as specified in the relevant FCA Handbook provisions.","A copy of the firm's full COBS compliance manual, subject to the relevant COBS provisions applying to the business."],"ans":1,"exp":"Correct: B. Direct offer promotions for retail clients must include prescribed information on: the firm and services, investment management (if relevant), safekeeping of assets, costs and charges, nature and risks of the investment, prospectus statement (if applicable), combined investment risk explanation, and third-party guarantee details. Key fact: Direct offer = 8 categories of prescribed information."},{"tag":"scenario","topic":"Direct Offers","q":"A direct offer promotion refers the recipient to a separate prospectus document for all required information. Must the promotion itself include all eight prescribed information elements?","opts":["Yes — all elements must always be in the promotion, provided the client has given prior written consent.","No — if the client can refer to another document containing this information, the elements need not be repeated in the promotion","No — direct offer promotions are exempt from information requirements, provided the client has given prior written consent.","Yes — but only if the client does not receive the prospectus first, provided the client has given prior written consent."],"ans":1,"exp":"Correct: B. The required information elements in a direct offer promotion need NOT be included if the client is able to refer to another document (e.g., a prospectus) containing that information in order to respond to the offer. Key fact: Direct offer elements = can be omitted if client can access another document with the info."},{"tag":"cisi","topic":"Cold Calls","q":"What is the common term for 'unsolicited real-time communications' made by authorised persons with a view to communicating a financial promotion?","opts":["Direct offers","Cold calls","Non-real-time.","Excluded."],"ans":1,"exp":"Correct: B. 'Cold calling' is the common term for the practice of authorised or exempt persons contacting people WITHOUT a prior appointment with a view to communicating a financial promotion. Key fact: Cold call = unsolicited real-time communication = no prior appointment."},{"tag":"cisi","topic":"Cold Calls","q":"Under what circumstances may a firm make a cold call?","opts":["Always — cold calls are unrestricted for authorised firms, as specified in the relevant FCA Handbook provisions, unless a specific exemption applies under the Financial Promotion Order.","Only when the recipient has an existing client relationship with the firm and would expect such a call, or the call relates to a generally marketable packaged product or limited investment types","Only when the FCA has issued a specific cold calling licence, as specified in the relevant FCA Handbook provisions, provided the firm has obtained prior written consent from the client.","Never — cold calls are always prohibited, as specified in the relevant FCA Handbook provisions, as required under the relevant COBS or SYSC rules in the FCA Handbook."],"ans":1,"exp":"Correct: B. Cold calls are permitted only when: (1) recipient is an existing client who would envisage/expect such a call; OR (2) call relates to a generally marketable packaged product (not high-volatility or life policy linked to such fund); OR (3) call relates to controlled activity in limited investments (deposits, readily realisable investments except warrants, generally marketable non-geared packaged products). Key fact: 3 permitted cold call scenarios — existing client / packaged product / limited investments (not warrants)."},{"tag":"detail","topic":"Cold Calls","q":"A firm wishes to cold call existing clients about a high-volatility fund. Is this permitted?","opts":["Yes — existing clients can always be cold called, provided the client has given prior written consent.","No — a generally marketable packaged product that is a high-volatility fund is excluded from the cold calling permission","Yes — as long as the fund is FCA-authorised, provided the client has given prior written consent.","Yes — only non-existing clients are restricted from cold calls about such funds, provided the client has given prior written consent."],"ans":1,"exp":"Correct: B. While existing clients may generally be cold called if they would expect such a call, the permission for generally marketable packaged products specifically EXCLUDES high-volatility funds AND life policies linked to such funds. Key fact: High-volatility fund = NOT within packaged product cold call permission."},{"tag":"cisi","topic":"Unwritten","q":"Under what four conditions may a firm initiate an unwritten promotion to a specific person outside its premises?","opts":["Any time, any place, any product, any recipient, as specified in the relevant FCA Handbook provisions, unless a specific exemption applies under the Financial Promotion Order.","At an appropriate time, identifying firm and purpose, checking if the client wishes to continue, and providing contact details if an appointment is arranged","Only between 9am and 5pm on weekdays, as specified in the relevant FCA Handbook provisions, as required under the relevant COBS or SYSC rules in the FCA Handbook.","Only by pre-appointment letter sent 5 days in advance, subject to the relevant COBS provisions applying to the business."],"ans":1,"exp":"Correct: B. Four conditions for unwritten promotions outside firm premises: (1) appropriate time of day; (2) identify self and firm, state purpose; (3) clarify if client wants to continue or terminate (and terminate if requested); (4) give contact point if an appointment is arranged. Key fact: 4 conditions: time + ID + consent to continue + contact details."},{"tag":"cisi","topic":"Overseas","q":"A firm wishes to communicate a financial promotion for an overseas firm to UK retail clients. What must the promotion include?","opts":["Nothing additional — overseas promotions have the same rules as domestic, provided the client has given prior written consent.","Which firm approved/communicated it, and (if relevant) that investor protection rules may not apply and the status of UK compensation scheme availability","Only the name of the overseas firm, as specified in the relevant FCA Handbook provisions.","FCA approval number for overseas promotions, as specified in the relevant FCA Handbook provisions."],"ans":1,"exp":"Correct: B. For overseas person promotions, the promotion must state which firm approved/communicated it, and if relevant: (1) investor protection rules will not apply; (2) extent to which UK compensation scheme arrangements are available; (3) optionally, details of any overseas compensation/deposit scheme. Key fact: Overseas promotions = identify approver + protection rules + compensation scheme status."},{"tag":"scenario","topic":"Overseas","q":"A firm has doubts about whether an overseas firm deals honestly and reliably with its UK retail clients. May the firm communicate or approve a financial promotion for that overseas firm?","opts":["Yes — overseas firms are presumed honest unless proven otherwise, provided the client has given prior written consent.","No — the firm must NOT communicate or approve the promotion if it has doubts about the overseas firm's honesty and reliability","Yes — but only with FCA permission, subject to the relevant COBS provisions applying to the business.","Yes — provided it adds a standard disclaimer about overseas risks, provided the client has given prior written consent."],"ans":1,"exp":"Correct: B. A firm must NOT communicate or approve a promotion for an overseas firm if it has ANY doubt that the overseas firm will deal with its UK retail clients HONESTLY AND RELIABLY. Key fact: Doubt about overseas firm honesty = prohibition on communicating/approving their promotion."}];
const SK='cisi_ch2s5_v1';const N=10;let APP={round:[],answers:{},opts:{},seen:[],roundNum:0};function save(){try{localStorage.setItem(SK,JSON.stringify(APP));}catch(e){}}function load(){try{const d=localStorage.getItem(SK);if(d)APP=JSON.parse(d);}catch(e){}}function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}function buildRound(){const lw=Object.entries(APP.answers).filter(([,v])=>v&&v.v===0).map(([k])=>APP.round[parseInt(k)]).filter(x=>x!==undefined);const us=BANK.map((_,i)=>i).filter(i=>!APP.seen.includes(i));const so=APP.seen.filter(i=>!APP.round.includes(i));let c=[];c.push(...shuffle(lw).slice(0,3));c.push(...shuffle(us.filter(i=>!c.includes(i))).slice(0,N-c.length));if(c.length<N)c.push(...shuffle(so.filter(i=>!c.includes(i))).slice(0,N-c.length));if(c.length<N)c.push(...shuffle(BANK.map((_,i)=>i).filter(i=>!c.includes(i))).slice(0,N-c.length));const r=shuffle(c).slice(0,N);r.forEach(i=>{if(!APP.seen.includes(i))APP.seen.push(i);});APP.round=r;APP.answers={};APP.opts={};APP.roundNum=(APP.roundNum||0)+1;}function doReset(){buildRound();save();render();window.scrollTo({top:0,behavior:'smooth'});}function pick(p,oi){if(APP.answers[p])return;const q=BANK[APP.round[p]];APP.answers[p]={opt:q.opts[oi],v:oi===q.ans?1:0};save();render();setTimeout(()=>{const d=Object.keys(APP.answers).length;if(d<N){const cards=document.querySelectorAll('#q-area .q-card');const nx=[...Array(N).keys()].find(j=>j>p&&!APP.answers[j]);if(nx!==undefined)cards[nx]?.scrollIntoView({behavior:'smooth',block:'center'});}else document.querySelector('#q-area .result-card')?.scrollIntoView({behavior:'smooth',block:'start'});},350);}function render(){const d=Object.keys(APP.answers).length;const ok=Object.values(APP.answers).filter(v=>v&&v.v===1).length;const bad=d-ok;const pct=d?Math.round(ok/d*100):null;document.getElementById('round-label').textContent=`Round ${APP.roundNum} \u00b7 10 Qs from bank of ${BANK.length} \u00b7 Seen: ${APP.seen.length}/${BANK.length}`;document.getElementById('s-num').textContent=`${d}/${N}`;document.getElementById('s-ok').textContent=ok;document.getElementById('s-bad').textContent=bad;document.getElementById('s-pct').textContent=pct===null?'\u2014':pct+'%';const tr=document.getElementById('tracker');tr.innerHTML='';for(let i=0;i<N;i++){const dot=document.createElement('div');dot.className='tracker-dot'+(APP.answers[i]?APP.answers[i].v===1?' t-ok':' t-bad':i===d?' t-cur':'');tr.appendChild(dot);}const area=document.getElementById('q-area');area.innerHTML='';const L=['A','B','C','D'];const tm={cisi:'CISI exam style',concept:'Concept check',scenario:'Scenario',detail:'Detail'};const tc={cisi:'tag-cisi',concept:'tag-concept',scenario:'tag-scenario',detail:'tag-detail'};APP.round.forEach((qi,pos)=>{const q=BANK[qi];const ans=!!APP.answers[pos];const ch=APP.answers[pos]?.opt;if(!APP.opts[pos])APP.opts[pos]=shuffle(q.opts.map((_,i)=>i));const oo=APP.opts[pos];let oh=oo.map((oi,li)=>{let cl='opt';if(ans)cl+=' dis';if(ans&&oi===q.ans)cl+=' ok';else if(ans&&q.opts[oi]===ch&&oi!==q.ans)cl+=' bad';return`<div class="${cl}" onclick="pick(${pos},${oi})"><span class="opt-l">${L[li]}</span><span>${q.opts[oi]}</span></div>`;}).join('');let eh=ans?`<div class="exp-box show ${APP.answers[pos].v===1?'exp-ok':'exp-bad'}"><strong>${APP.answers[pos].v===1?'\u2713 Correct!':'\u2717 Incorrect.'}</strong> ${q.exp}</div>`:'';const card=document.createElement('div');card.className='q-card';card.innerHTML=`<div class="q-meta"><span class="q-num">Q${pos+1}</span><span class="q-tag ${tc[q.tag]}">${tm[q.tag]}</span><span class="q-topic">${q.topic}</span></div><div class="q-text">${q.q}</div><div class="opts">${oh}</div>${eh}`;area.appendChild(card);});if(d===N){const pF=Math.round(ok/N*100);let lb,co,gr;if(pF>=80){lb='Pass standard met!';co='var(--teal-m)';gr='Pass \u2713';}else if(pF>=70){lb='Close \u2014 review weaker areas.';co='var(--amber)';gr='Near Pass';}else if(pF>=60){lb='Borderline.';co='var(--coral-m)';gr='Borderline';}else{lb='Below pass.';co='#A32D2D';gr='Needs Work';}const ts={};APP.round.forEach((qi,pos)=>{const t=BANK[qi].topic;if(!ts[t])ts[t]={ok:0,tot:0};ts[t].tot++;if(APP.answers[pos]?.v===1)ts[t].ok++;});let th=Object.entries(ts).map(([t,s])=>{const tp=Math.round(s.ok/s.tot*100);const cl=tp>=80?'var(--teal-m)':tp>=60?'var(--amber)':'var(--coral-m)';return`<div class="topic-row"><div class="topic-name">${t}</div><div style="font-size:.72rem;color:var(--text3);margin-bottom:.25rem">${s.ok}/${s.tot}</div><div class="topic-bar-wrap"><div class="topic-bar-fill" style="width:${tp}%;background:${cl}"></div></div></div>`;}).join('');let rh=APP.round.map((qi,pos)=>{const q=BANK[qi];const v=APP.answers[pos]?.v===1;return`<div class="q-review-item ${v?'r-ok':'r-bad'}"><span class="r-icon">${v?'\u2713':'\u2717'}</span><div><strong>Q${pos+1} \u00b7 ${q.topic}.</strong> ${q.q}<br><span style="font-size:.78rem;opacity:.85">Answer: ${q.opts[q.ans]}</span></div></div>`;}).join('');const rc=document.createElement('div');rc.className='result-card';rc.style.marginTop='1rem';rc.innerHTML=`<div style="font-size:.85rem;color:var(--text2);margin-bottom:.3rem">Round ${APP.roundNum} complete</div><div class="result-big" style="color:${co}">${ok}/${N}</div><div class="result-grade" style="background:${co}22;color:${co}">${gr}</div><div class="result-bar-wrap"><div class="result-bar-fill" style="width:${pF}%;background:${co}"></div></div><div style="font-size:.82rem;color:var(--text2);margin:.3rem 0 .2rem">${pF}% \u00b7 ${lb}</div><div class="result-breakdown"><span class="rp" style="background:var(--green-l);color:var(--green)">\u2713 ${ok}</span><span class="rp" style="background:var(--coral-l);color:var(--coral)">\u2717 ${N-ok}</span><span class="rp" style="background:var(--navy-l);color:var(--navy-d)">Seen: ${APP.seen.length}/${BANK.length}</span></div><div style="font-size:.8rem;font-weight:600;color:var(--text2);margin-bottom:.55rem;text-align:left">Topics:</div><div class="topic-grid">${th}</div><div class="btn-row" style="margin-bottom:1.4rem"><button class="btn btn-p" onclick="doReset()">\u21ba New round</button></div><div style="font-size:.8rem;font-weight:600;color:var(--text2);margin-bottom:.5rem;text-align:left">Review:</div><div class="q-review-list">${rh}</div>`;area.appendChild(rc);}}load();if(!APP.round||APP.round.length===0)buildRound();render();
</script>
