l Promotions"}, {"tag": "cisi", "topic": "Approval", "q": "Before 2023, who could approve financial promotions for unauthorised persons under FSMA?", "opts": ["Only the FCA itself", "Any authorised person", "Only firms with a specific.", "Only firms with at least 5."], "ans": 1, "exp": "Correct: B. Before 2023, under FSMA, any authorised person could approve financial promotions for unauthorised firms. The 2023 gateway changed this to require specific FCA permission. Key fact: Pre-2023 = any authorised person. Post-2023 = gateway permission required.", "section": "S5: Financial Promotions"}, {"tag": "cisi", "topic": "Approval", "q": "Under the 2023 FCA 'gateway' for approving financial promotions for third parties, what must a firm do to approve promotions for unauthorised firms?", "opts": ["Obtain a specific permission from the FCA", "Register with the Financial Ombudsman Service", "File a notice with Companies House", "Pay a one-off gateway fee to HM Treasury"], "ans": 0, "exp": "Correct: A. From 2023, firms wishing to approve financial promotions for third-party (unauthorised) firms must apply to the FCA for specific permission to do so. Firms without this permission can only approve their own promotions. Key fact: 2023 gateway = FCA permission required to approve third-party promotions.", "section": "S5: Financial Promotions"}, {"tag": "cisi", "topic": "Approval", "q": "A firm approves a financial promotion. It later discovers the promotion no longer complies with the rules. What must it do?", "opts": ["Update the promotion and continue using it, provided the client has given prior written consent.", "Withdraw approval immediately and notify all known relying parties as soon as reasonably practicable", "Report the issue to the FCA within 30 days and await guidance, provided the client has given prior written consent.", "Continue using it until the next regulatory review, provided the client has given prior written consent."], "ans": 1, "exp": "Correct: B. If a firm becomes aware that an approved financial promotion no longer complies, it MUST withdraw its approval AND notify anyone it knows to be relying on that approval as soon as is reasonably practicable. Key fact: Non-compliance discovered = withdraw + notify relying parties ASAP.", "section": "S5: Financial Promotions"}, {"tag": "detail", "topic": "Approval", "q": "Which of the following types of financial promotion may a firm NOT approve for an unauthorised person?", "opts": ["A written brochure for a structured product, provided the client has given prior written consent.", "A non-real-time email promotion for a bond, provided the client has given prior written consent.", "A real-time promotion to be made during telephone conversations", "A direct offer advertisement in a newspaper, provided the client has given prior written consent."], "ans": 2, "exp": "Correct: C. Firms may NOT approve REAL-TIME financial promotions — those to be made in the course of personal visits, telephone conversations or other interactive dialogue. Only non-real-time promotions can be approved for unauthorised persons. Key fact: Real-time promotions = cannot be approved for unauthorised persons.", "section": "S5: Financial Promotions"}, {"tag": "scenario", "topic": "Approval", "q": "A firm approves a financial promotion specifically for communication to professional clients only. An unauthorised person then communicates it to retail clients. What is the consequence?", "opts": ["The firm that approved is liable; the unauthorised person has no liability, provided the client has given prior written consent.", "The unauthorised person is committing an offence by communicating outside the scope of the limited approval", "Both parties face equal liability regardless of the scope limitation, provided the client has given prior written consent.", "No offence occurs as the promotion itself was approved, provided the client has given prior written consent."], "ans": 1, "exp": "Correct: B. If approval is limited (e.g., to professional clients only), and an unauthorised person communicates it outside those limits, THEY are committing an offence. The approval must state the limitation. Key fact: Limited approval + communication outside limits = offence by the unauthorised person.", "section": "S5: Financial Promotions"}, {"tag": "cisi", "topic": "Approval", "q": "For non-MiFID business, a firm communicates a promotion produced by another party. Under what conditions is it not in breach of the rules?", "opts": ["If it has FCA pre-approval for the communication, as specified in the relevant FCA Handbook provisions, unless a specific exemption applies under the Financial Promotion Order.", "If it took reasonable care that another authorised firm confirmed compliance, communicated it only to the intended recipient type, and the promotion is still fair, clear and not misleading and not withdrawn", "If the promotion is less than one page long, as specified in the relevant FCA Handbook provisions, as required under the relevant COBS or SYSC rules in the FCA Handbook.", "If the promotion was produced by an FCA-regulated firm, as specified in the relevant FCA Handbook provisions, provided the firm has obtained prior written consent from the client."], "ans": 1, "exp": "Correct: B. Non-MiFID: three conditions to avoid breach: (1) reasonable care that another authorised firm confirmed compliance; (2) communicated only to the intended recipient type; (3) as far as the firm is or should be aware, it is still fair/clear/not misleading and not withdrawn. Key fact: Third-party promotion (non-MiFID) = 3 conditions: confirmation + right recipients + still compliant.", "section": "S5: Financial Promotions"}, {"tag": "cisi", "topic": "Retail Comms", "q": "Which of the following must be included in all communications providing information about designated investment business that are likely to be received by retail clients?", "opts": ["The firm's share.", "The firm's name", "The firm's annual.", "The name of the."], "ans": 1, "exp": "Correct: B. Retail client communications must include the firm's NAME. Other requirements: information accurate and balanced (benefits vs risks), sufficient and presented for the average recipient, no concealment of important items. Key fact: Firm name = mandatory in retail communications.", "section": "S5: Financial Promotions"}, {"tag": "detail", "topic": "Retail Comms", "q": "A retail client receives a promotion that strongly emphasises the potential 30% return with only a brief footnote mentioning risk. Is this compliant?", "opts": ["Yes — as long as risk is mentioned somewhere in the document, provided the client has given prior written consent.", "No — information must not emphasise potential benefits without a fair and prominent indication of relevant risks", "Yes — the prominence of information is a commercial decision, provided the client has given prior written consent.", "No — returns must never be mentioned in promotions, provided the client has given prior written consent."], "ans": 1, "exp": "Correct: B. The rules require that information is accurate and does NOT emphasise potential benefits without also giving a FAIR AND PROMINENT indication of any relevant risks. A footnote is unlikely to be considered 'prominent'. Key fact: Benefits + risks = must be balanced and risk prominently disclosed.", "section": "S5: Financial Promotions"}, {"tag": "cisi", "topic": "Retail Comms", "q": "For MiFID business, when a promotion makes comparisons between investments, what additional requirement applies?", "opts": ["Comparisons must be independently verified by a third party, provided the client has given prior written consent.", "The data sources for comparisons must be cited, and key facts and assumptions used must be detailed", "Comparisons are never permitted in MiFID promotions, provided the client has given prior written consent.", "The FCA must pre-approve the comparison methodology, provided the client has given prior written consent."], "ans": 1, "exp": "Correct: B. For MiFID business, comparisons must be meaningful, fair and balanced. Additionally, the data sources must be cited AND any key facts and assumptions used must be detailed. Key fact: MiFID comparisons = cite data sources + key facts + assumptions.", "section": "S5: Financial Promotions"}, {"tag": "scenario", "topic": "Retail Comms", "q": "A retail promotion mentions that returns may be exempt from income tax. What must the firm also communicate?", "opts": ["Nothing — tax information is the client's responsibility, provided the client has given prior written consent.", "That any tax treatment will depend on each client's individual circumstances and may be subject to change", "The client's marginal tax rate, provided the client has given prior written consent.", "The exact tax savings the client will achieve, provided the client has given prior written consent."], "ans": 1, "exp": "Correct: B. If tax treatment is mentioned, firms must explain that any tax treatment depends on each client's individual circumstances AND that it may be subject to change. Key fact: Tax mentioned = individual circumstances + subject to change.", "section": "S5: Financial Promotions"}, {"tag": "cisi", "topic": "High-Risk", "q": "What is a 'Non-Mass Market Investment' (NMMI) in the context of FCA retail promotion rules?", "opts": ["A product with less than 100 investors, provided the client has given prior written consent.", "A type of high-risk investment whose promotion to retail investors is banned", "A product only available to institutional investors, provided the client has given prior written consent.", "A product requiring a minimum investment of £1 million"], "ans": 1, "exp": "Correct: B. NMMIs (Non-Mass Market Investments) are a category of high-risk investments whose promotion to retail investors is BANNED. In contrast, RMMIs (Restricted Mass Market Investments) can be mass-marketed subject to restrictions. Key fact: NMMI = promotion to retail is BANNED. RMMI = permitted with restrictions.", "section": "S5: Financial Promotions"}, {"tag": "cisi", "topic": "High-Risk", "q": "What minimum cooling-off period applies to first-time investors with a firm for high-risk investment promotions?", "opts": ["12 hours", "24 hours", "48 hours", "72 hours"], "ans": 1, "exp": "Correct: B. A minimum 24-hour cooling-off period applies for first-time investors with a firm. The FCA has noted that it would like to see firms apply higher standards than the minimum. Key fact: Cooling-off = minimum 24 hours (first-time investors).", "section": "S5: Financial Promotions"}, {"tag": "detail", "topic": "High-Risk", "q": "Which of the following is BANNED under the FCA's high-risk investment promotion rules?", "opts": ["Past performance data in promotions, provided the client has given prior written consent.", "Monetary or non-monetary incentives to invest (e.g., refer-a-friend bonuses, sign-up bonuses)", "Providing risk warnings to clients, provided the client has given prior written consent.", "Including the firm's name in a promotion, provided the client has given prior written consent."], "ans": 1, "exp": "Correct: B. Monetary and non-monetary benefits that incentivise investment — such as refer-a-friend bonuses or new joiner bonuses — are BANNED under the high-risk investment promotion rules. Key fact: Incentives to invest (monetary or non-monetary) = BANNED for high-risk investments.", "section": "S5: Financial Promotions"}, {"tag": "detail", "topic": "High-Risk", "q": "What must a personalised risk warning for a high-risk investment include?", "opts": ["The investor's full.", "The investor's name", "The investor's income and.", "The investor's credit."], "ans": 1, "exp": "Correct: B. Personalised risk warnings must be personalised — meaning they must include the CLIENT'S NAME. Generic warnings are not sufficient. Key fact: Personalised risk warning = must include the client's name.", "section": "S5: Financial Promotions"}, {"tag": "scenario", "topic": "High-Risk", "q": "A firm coaches investors on how to answer the appropriateness test so they can receive high-risk investment promotions. Is this permitted?", "opts": ["Yes — helping clients is part of good customer service, provided the client has given prior written consent.", "No — firms are specifically prevented from coaching investors to pass the test", "Yes — as long as the coaching is documented, provided the client has given prior written consent.", "No — but only if the investor ultimately fails the test"], "ans": 1, "exp": "Correct: B. The FCA rules specifically prevent firms from COACHING investors to pass the appropriateness test. The test must be made more robust, not circumvented. Key fact: Coaching investors to pass appropriateness test = NOT permitted.", "section": "S5: Financial Promotions"}, {"tag": "cisi", "topic": "Cryptoassets", "q": "How has the FCA classified cryptoassets for the purpose of the financial promotion regime?", "opts": ["Non-Mass Market Investments (NMMI) — banned for retail", "Restricted Mass Market Investments (RMMI) — permitted with restrictions", "Fully unrestricted investments, provided the client has given prior written consent.", "Qualifying investments — same rules as equities, provided the client has given prior written consent."], "ans": 1, "exp": "Correct: B. The FCA has classified cryptoassets (qualifying cryptoassets) as Restricted Mass Market Investments (RMMI), meaning they can be mass-marketed to UK consumers subject to certain restrictions. Key fact: Cryptoassets = RMMI (not NMMI).", "section": "S5: Financial Promotions"}, {"tag": "detail", "topic": "Cryptoassets", "q": "A cryptoasset business is registered with the FCA under the Money Laundering Regulations (MLRs) but is NOT an authorised person. Can it promote its own cryptoasset products?", "opts": ["No — only FCA-authorised firms can promote cryptoassets, provided the client has given prior written consent.", "Yes — there is a bespoke FPO exemption for MLR-registered cryptoasset businesses to communicate their own promotions", "Yes — but only to professional clients, provided the client has given prior written consent.", "No — it must have a separate FCA authorisation for each promotion, provided the client has given prior written consent."], "ans": 1, "exp": "Correct: B. The Government introduced a bespoke FPO exemption for cryptoasset businesses registered with the FCA under the MLRs (even if not authorised persons) — enabling them to communicate their OWN cryptoasset financial promotions to UK consumers. Key fact: MLR-registered (not authorised) crypto firms = can communicate own promotions via FPO exemption.", "section": "S5: Financial Promotions"}, {"tag": "cisi", "topic": "Cryptoassets", "q": "Which category of investor does NOT apply to cryptoasset promotions under the FCA's rules?", "opts": ["Retail investors (with restrictions)", "Sophisticated investors with FCA gateway approval", "Self-certified sophisticated investors", "Institutional investors, provided the client has given prior written consent."], "ans": 2, "exp": "Correct: C. The FCA confirmed that the self-certified sophisticated investor category will NOT be applied to cryptoasset promotions. Key fact: Self-certified sophisticated investor = does NOT apply to crypto promotions.", "section": "S5: Financial Promotions"}, {"tag": "cisi", "topic": "Past Performance", "q": "Which of the following is a requirement when including past performance data in a financial promotion?", "opts": ["Past performance must be the most prominent feature of the communication", "The data must cover at least five years (or the whole period if less) in complete 12-month periods", "Only the best 3-year period need be shown, provided the client has given prior written consent.", "Past performance data must be independently audited, provided the client has given prior written consent."], "ans": 1, "exp": "Correct: B. Past performance: must cover at least 5 years (or full period if shorter), in complete 12-month periods. Reference periods and sources must be clearly shown. Past performance must NOT be the most prominent feature. Key fact: ≥5 years, complete 12-month periods, not the most prominent feature.", "section": "S5: Financial Promotions"}, {"tag": "detail", "topic": "Past Performance", "q": "A financial promotion shows past performance figures for a fund denominated in euros. What additional disclosures are required?", "opts": ["Nothing additional — currency is irrelevant to performance, provided the client has given prior written consent.", "The currency must be stated and there must be a warning about the possible effects of currency fluctuations", "The EUR/GBP exchange rate for the full period must be shown, provided the client has given prior written consent.", "The performance must be restated in sterling, provided the client has given prior written consent."], "ans": 1, "exp": "Correct: B. If past performance figures are in a currency other than sterling, the currency must be stated and there must be a warning about the possible effects of currency fluctuations. Key fact: Foreign currency performance = state currency + warn about FX fluctuation risk.", "section": "S5: Financial Promotions"}, {"tag": "cisi", "topic": "Past Performance", "q": "A past performance figure is quoted gross of charges. What must also be disclosed?", "opts": ["Nothing — gross figures are the standard, provided the client has given prior written consent.", "The effects of commissions, fees, tax and other charges must be disclosed", "Only the annual management charge needs to be shown, provided the client has given prior written consent.", "Charges need only be disclosed in a separate document"], "ans": 1, "exp": "Correct: B. If past performance is cited gross, the effects of commissions, fees, tax and other charges must be disclosed. This ensures clients understand the net return they would actually receive. Key fact: Gross performance figure = must disclose effect of charges/fees/tax.", "section": "S5: Financial Promotions"}, {"tag": "cisi", "topic": "Simulated Performance", "q": "A new fund has no track record. The firm wishes to include simulated past performance data. What must the data be based on?", "opts": ["The firm's own projected returns, as specified in the relevant FCA Handbook provisions.", "The actual past performance of one or more investments or indices that are the same as, or underlie, the investments being simulated", "Industry average returns, as specified in the relevant FCA Handbook provisions.", "Theoretical modelling without reference to any actual data, provided the client has given prior written consent."], "ans": 1, "exp": "Correct: B. Simulated past performance must be based on the ACTUAL past performance of one or more investments and/or indices that are the same as, or underlie, the investments being simulated. Key fact: Simulated = based on actual data of same or underlying investments/indices.", "section": "S5: Financial Promotions"}, {"tag": "detail", "topic": "Simulated Performance", "q": "Which specific warning must be included when simulated past performance figures are shown?", "opts": ["'This product is new and has no history', as specified in the relevant FCA Handbook provisions, unless a specific exemption applies under the Financial Promotion Order.", "A prominent warning that the figures relate to simulated past performance and that past performance is not a reliable indicator of future performance", "'These are theoretical returns only', as specified in the relevant FCA Handbook provisions, as required under the relevant COBS or SYSC rules in the FCA Handbook.", "No specific wording is required — any disclaimer suffices, unless the client has been notified in a durable medium."], "ans": 1, "exp": "Correct: B. The specific required warning for simulated performance is: a PROMINENT warning that the figures relate to simulated past performance AND that past performance is not a reliable indicator of future performance. Key fact: Simulated = must state it IS simulated + standard past performance warning.", "section": "S5: Financial Promotions"}, {"tag": "cisi", "topic": "Future Performance", "q": "A financial promotion contains projections of future returns. On what must these projections be based?", "opts": ["The firm's proprietary model without external validation", "Reasonable assumptions supported by objective data", "The regulator's published benchmark returns", "Simulated past performance figures, provided the client has given prior written consent."], "ans": 1, "exp": "Correct: B. Future performance projections must be based on REASONABLE ASSUMPTIONS supported by OBJECTIVE DATA. They must NOT be based on or refer to simulated past performance. Key fact: Future projections = reasonable assumptions + objective data. NOT based on simulated past performance.", "section": "S5: Financial Promotions"}, {"tag": "cisi", "topic": "Direct Offers", "q": "Which of the following must be contained in a direct offer financial promotion likely to be received by a retail client?", "opts": ["The firm's regulatory capital ratio, as specified in the relevant FCA Handbook provisions.", "Prescribed information about the firm and services, costs and charges, nature and risks of the investment, and management of client investments", "Only the firm's name and the offer price, as specified in the relevant FCA Handbook provisions.", "A copy of the firm's full COBS compliance manual, subject to the relevant COBS provisions applying to the business."], "ans": 1, "exp": "Correct: B. Direct offer promotions for retail clients must include prescribed information on: the firm and services, investment management (if relevant), safekeeping of assets, costs and charges, nature and risks of the investment, prospectus statement (if applicable), combined investment risk explanation, and third-party guarantee details. Key fact: Direct offer = 8 categories of prescribed information.", "section": "S5: Financial Promotions"}, {"tag": "scenario", "topic": "Direct Offers", "q": "A direct offer promotion refers the recipient to a separate prospectus document for all required information. Must the promotion itself include all eight prescribed information elements?", "opts": ["Yes — all elements must always be in the promotion, provided the client has given prior written consent.", "No — if the client can refer to another document containing this information, the elements need not be repeated in the promotion", "No — direct offer promotions are exempt from information requirements, provided the client has given prior written consent.", "Yes — but only if the client does not receive the prospectus first, provided the client has given prior written consent."], "ans": 1, "exp": "Correct: B. The required information elements in a direct offer promotion need NOT be included if the client is able to refer to another document (e.g., a prospectus) containing that information in order to respond to the offer. Key fact: Direct offer elements = can be omitted if client can access another document with the info.", "section": "S5: Financial Promotions"}, {"tag": "cisi", "topic": "Cold Calls", "q": "What is the common term for 'unsolicited real-time communications' made by authorised persons with a view to communicating a financial promotion?", "opts": ["Direct offers", "Cold calls", "Non-real-time.", "Excluded."], "ans": 1, "exp": "Correct: B. 'Cold calling' is the common term for the practice of authorised or exempt persons contacting people WITHOUT a prior appointment with a view to communicating a financial promotion. Key fact: Cold call = unsolicited real-time communication = no prior appointment.", "section": "S5: Financial Promotions"}, {"tag": "cisi", "topic": "Cold Calls", "q": "Under what circumstances may a firm make a cold call?", "opts": ["Always — cold calls are unrestricted for authorised firms, as specified in the relevant FCA Handbook provisions, unless a specific exemption applies under the Financial Promotion Order.", "Only when the recipient has an existing client relationship with the firm and would expect such a call, or the call relates to a generally marketable packaged product or limited investment types", "Only when the FCA has issued a specific cold calling licence, as specified in the relevant FCA Handbook provisions, provided the firm has obtained prior written consent from the client.", "Never — cold calls are always prohibited, as specified in the relevant FCA Handbook provisions, as required under the relevant COBS or SYSC rules in the FCA Handbook."], "ans": 1, "exp": "Correct: B. Cold calls are permitted only when: (1) recipient is an existing client who would envisage/expect such a call; OR (2) call relates to a generally marketable packaged product (not high-volatility or life policy linked to such fund); OR (3) call relates to controlled activity in limited investments (deposits, readily realisable investments except warrants, generally marketable non-geared packaged products). Key fact: 3 permitted cold call scenarios — existing client / packaged product / limited investments (not warrants).", "section": "S5: Financial Promotions"}, {"tag": "detail", "topic": "Cold Calls", "q": "A firm wishes to cold call existing clients about a high-volatility fund. Is this permitted?", "opts": ["Yes — existing clients can always be cold called, provided the client has given prior written consent.", "No — a generally marketable packaged product that is a high-volatility fund is excluded from the cold calling permission", "Yes — as long as the fund is FCA-authorised, provided the client has given prior written consent.", "Yes — only non-existing clients are restricted from cold calls about such funds, provided the client has given prior written consent."], "ans": 1, "exp": "Correct: B. While existing clients may generally be cold called if they would expect such a call, the permission for generally marketable packaged products specifically EXCLUDES high-volatility funds AND life policies linked to such funds. Key fact: High-volatility fund = NOT within packaged product cold call permission.", "section": "S5: Financial Promotions"}, {"tag": "cisi", "topic": "Unwritten", "q": "Under what four conditions may a firm initiate an unwritten promotion to a specific person outside its premises?", "opts": ["Any time, any place, any product, any recipient, as specified in the relevant FCA Handbook provisions, unless a specific exemption applies under the Financial Promotion Order.", "At an appropriate time, identifying firm and purpose, checking if the client wishes to continue, and providing contact details if an appointment is arranged", "Only between 9am and 5pm on weekdays, as specified in the relevant FCA Handbook provisions, as required under the relevant COBS or SYSC rules in the FCA Handbook.", "Only by pre-appointment letter sent 5 days in advance, subject to the relevant COBS provisions applying to the business."], "ans": 1, "exp": "Correct: B. Four conditions for unwritten promotions outside firm premises: (1) appropriate time of day; (2) identify self and firm, state purpose; (3) clarify if client wants to continue or terminate (and terminate if requested); (4) give contact point if an appointment is arranged. Key fact: 4 conditions: time + ID + consent to continue + contact details.", "section": "S5: Financial Promotions"}, {"tag": "cisi", "topic": "Overseas", "q": "A firm wishes to communicate a financial promotion for an overseas firm to UK retail clients. What must the promotion include?", "opts": ["Nothing additional — overseas promotions have the same rules as domestic, provided the client has given prior written consent.", "Which firm approved/communicated it, and (if relevant) that investor protection rules may not apply and the status of UK compensation scheme availability", "Only the name of the overseas firm, as specified in the relevant FCA Handbook provisions.", "FCA approval number for overseas promotions, as specified in the relevant FCA Handbook provisions."], "ans": 1, "exp": "Correct: B. For overseas person promotions, the promotion must state which firm approved/communicated it, and if relevant: (1) investor protection rules will not apply; (2) extent to which UK compensation scheme arrangements are available; (3) optionally, details of any overseas compensation/deposit scheme. Key fact: Overseas promotions = identify approver + protection rules + compensation scheme status.", "section": "S5: Financial Promotions"}, {"tag": "scenario", "topic": "Overseas", "q": "A firm has doubts about whether an overseas firm deals honestly and reliably with its UK retail clients. May the firm communicate or approve a financial promotion for that overseas firm?", "opts": ["Yes — overseas firms are presumed honest unless proven otherwise, provided the client has given prior written consent.", "No — the firm must NOT communicate or approve the promotion if it has doubts about the overseas firm's honesty and reliability", "Yes — but only with FCA permission, subject to the relevant COBS provisions applying to the business.", "Yes — provided it adds a standard disclaimer about overseas risks, provided the client has given prior written consent."], "ans": 1, "exp": "Correct: B. A firm must NOT communicate or approve a promotion for an overseas firm if it has ANY doubt that the overseas firm will deal with its UK retail clients HONESTLY AND RELIABLY. Key fact: Doubt about overseas firm honesty = prohibition on communicating/approving their promotion.", "section": "S5: Financial Promotions"}, {"tag": "cisi", "topic": "Consumer Duty", "q": "Which FCA Principle embodies the Consumer Duty?", "opts": ["Principle 6", "Principle 7", "Principle 12", "Principle 11"], "ans": 2, "exp": "Correct: C. Consumer Duty is Principle 12. It sets a higher standard of care for retail customers, replacing Principles 6 and 7 for firms within its scope. Key fact: Consumer Duty = Principle 12.", "section": "S6-7: Consumer Duty"}, {"tag": "cisi", "topic": "Consumer Duty", "q": "Which of the following are the four outcome-focused elements of the Consumer Duty?", "opts": ["Suitability, Appropriateness, Disclosure, Reporting, provided the client has given prior written consent.", "Products & Services, Price & Value, Consumer Understanding, Consumer Support", "Fair Treatment, Transparency, Access, Redress, provided the client has given prior written consent.", "Client Categorisation, Conflicts, Promotion, Advice, provided the client has given prior written consent."], "ans": 1, "exp": "Correct: B. The Consumer Duty has four outcomes: (1) Products and Services; (2) Price and Value; (3) Consumer Understanding; (4) Consumer Support. Key fact: 4 outcomes — Products+Services / Price+Value / Understanding / Support.", "section": "S6-7: Consumer Duty"}, {"tag": "concept", "topic": "Consumer Duty", "q": "To which group of clients does the Consumer Duty apply?", "opts": ["All clients including ECPs.", "Retail customers only", "Professional clients and.", "Only high-net-worth retail."], "ans": 1, "exp": "Correct: B. Consumer Duty applies to RETAIL CUSTOMERS only. It does not apply to professional clients or ECPs. Key fact: Consumer Duty = retail customers only.", "section": "S6-7: Consumer Duty"}, {"tag": "detail", "topic": "Consumer Duty", "q": "Which Consumer Duty outcome requires that the price paid must be reasonable relative to the benefits delivered?", "opts": ["Consumer.", "Consumer Support", "Products and Services", "Price and Value"], "ans": 3, "exp": "Correct: D. The Price and Value outcome requires that products/services represent fair value — the price paid must be reasonable relative to the benefits delivered. Key fact: Price and Value = fair value (price proportionate to benefits).", "section": "S6-7: Consumer Duty"}, {"tag": "scenario", "topic": "Consumer Duty", "q": "A firm's marketing communications are complex and difficult for average retail clients to understand. Which Consumer Duty outcome is most likely breached?", "opts": ["Price and Value, provided the client has given prior written consent.", "Consumer Support", "Consumer Understanding", "Products and Services"], "ans": 2, "exp": "Correct: C. Consumer Understanding requires that communications are clear and enable consumers to make well-informed financial decisions. Complex, unclear marketing for retail clients would breach this outcome. Key fact: Consumer Understanding = clear comms enabling well-informed decisions.", "section": "S6-7: Consumer Duty"}, {"tag": "cisi", "topic": "FTOC", "q": "A firm deals exclusively with wholesale and professional clients and is outside the scope of Consumer Duty. Which obligation regarding fair treatment still applies?", "opts": ["Consumer Duty outcomes still apply in full, provided the client has given prior written consent.", "The Fair Treatment of Customers (FTOC) initiative, underpinned by Principles 6 and 7", "The firm has no fair treatment obligations outside Consumer Duty", "Only Principle 12 applies as a backstop, provided the client has given prior written consent."], "ans": 1, "exp": "Correct: B. Firms outside the scope of Consumer Duty remain subject to the Fair Treatment of Customers (FTOC) initiative, underpinned by Principles 6 and 7. Key fact: Outside Consumer Duty = FTOC applies (Principles 6 + 7).", "section": "S6-7: Consumer Duty"}, {"tag": "detail", "topic": "FTOC", "q": "What must firms have in place to demonstrate compliance with FTOC?", "opts": ["A signed attestation from the FCA, provided the client has given prior written consent.", "Management information (MI) demonstrating fair treatment at all stages of the client relationship", "Annual audit reports submitted to the FCA, provided the client has given prior written consent.", "A board-approved fair treatment policy publicly available on their website"], "ans": 1, "exp": "Correct: B. Firms must have management information (MI) arrangements in place to monitor their own performance and demonstrate they are treating customers fairly at ALL stages of the relationship. Key fact: FTOC = MI demonstrating fair treatment at all stages.", "section": "S6-7: Consumer Duty"}, {"tag": "cisi", "topic": "Suitability — Scope", "q": "The COBS suitability rules apply when a firm makes personal recommendations relating to designated investments. Which other activity also triggers the suitability rules?", "opts": ["Providing execution-only services to retail clients", "Managing investments on behalf of a retail client", "Providing general information about investment products", "Approving financial promotions for third parties"], "ans": 1, "exp": "Correct: B. Suitability rules are triggered by: (1) personal recommendations on designated investments; (2) managing investments for retail clients; (3) managing pension scheme assets. Execution-only and general information do NOT trigger suitability rules. Key fact: Suitability = personal recommendations + investment management + pension scheme management.", "section": "S6-7: Consumer Duty"}, {"tag": "cisi", "topic": "Suitability — Scope", "q": "For non-MiFID business, to which clients do the suitability rules apply?", "opts": ["All clients including professional clients and ECPs", "Retail clients only (or pension scheme asset management)", "Professional clients only; retail clients are not within scope", "All clients, but with reduced obligations for professional clients"], "ans": 1, "exp": "Correct: B. For non-MiFID business, suitability rules apply only to retail clients (or where the firm is managing the assets of an occupational, stakeholder or personal pension scheme). Key fact: Non-MiFID suitability = retail clients only.", "section": "S6-7: Consumer Duty"}, {"tag": "cisi", "topic": "Suitability — Scope", "q": "Under UK MiFID, suitability extends beyond recommending a product to buy. Which additional decisions does it capture?", "opts": ["Only recommendations to sell a financial instrument, provided the client has given prior written consent.", "All decisions whether to trade — including buy, sell or take no action (hold)", "Only decisions made under a discretionary mandate, provided the client has given prior written consent.", "Only recommendations made in writing, provided the client has given prior written consent."], "ans": 1, "exp": "Correct: B. Under UK MiFID, suitability captures ALL decisions whether to trade — including personal recommendations to buy, sell, or take no action (hold). Not limited to purchase recommendations. Key fact: MiFID suitability = buy + sell + hold decisions.", "section": "S6-7: Consumer Duty"}, {"tag": "detail", "topic": "Suitability — Scope", "q": "A firm provides portfolio management services to a client under a mandate. When must the firm conduct a suitability assessment?", "opts": ["Only at the start of the mandate, provided the client has given prior written consent.", "Before recommending any changes to the mandate that require the client to alter it", "Only after the client requests a review, provided the client has given prior written consent.", "Every 5 years as a standard requirement, provided the client has given prior written consent."], "ans": 1, "exp": "Correct: B. For portfolio management, the firm must conduct a suitability assessment BEFORE making a personal recommendation or providing advice that would require the client to alter the agreed mandate. It must also keep client information up to date on an ongoing basis. Key fact: Portfolio management = suitability assessment before recommending mandate changes.", "section": "S6-7: Consumer Duty"}, {"tag": "cisi", "topic": "Suitability — Info", "q": "Which three areas of information must a firm obtain to conduct a suitability assessment?", "opts": ["Name, address and tax reference, unless the client has been notified in a durable medium.", "Knowledge and experience; financial situation (incl. ability to bear losses); investment objectives and risk profile", "Risk appetite, liquidity needs, and time horizon only, provided the client has given prior written consent.", "Employment status, income and credit score, provided the client has given prior written consent."], "ans": 1, "exp": "Correct: B. The three required areas for suitability assessment: (1) knowledge and experience in the relevant investment field; (2) financial situation, including ability to bear losses; (3) investment objectives and risk profile. Key fact: 3 areas = knowledge+experience / financial situation / investment objectives+risk profile.", "section": "S6-7: Consumer Duty"}, {"tag": "detail", "topic": "Suitability — Info", "q": "When assessing a client's knowledge and experience, which of the following should the firm obtain information about?", "opts": ["The client's investment performance over the last 5 years, provided the client has given prior written consent.", "Types of investments/transactions the client is familiar with, nature/volume/frequency of past involvement, and level of education or profession", "The client's tax bracket and inheritance plans, subject to the relevant COBS provisions applying to the business.", "The client's relationship with previous firms only, subject to the relevant COBS provisions applying to the business."], "ans": 1, "exp": "Correct: B. For knowledge and experience, the firm must gather information on: (1) types of service, transaction and investment with which the client is familiar; (2) the nature, volume, frequency and period of involvement in such transactions; (3) the client's level of education, profession or relevant former profession. Key fact: Knowledge+experience = familiar types + past involvement (nature/volume/frequency) + education/profession.", "section": "S6-7: Consumer Duty"}, {"tag": "cisi", "topic": "Suitability — Info", "q": "A client refuses to provide information needed to assess suitability. What must the firm do?", "opts": ["Proceed with the transaction using its best estimate, provided the client has given prior written consent.", "Make the personal recommendation or trade based on available public information", "Not make a personal recommendation or take a decision to trade for the client", "Immediately report the client to the FCA, provided the client has given prior written consent."], "ans": 2, "exp": "Correct: C. If the firm cannot obtain the information it needs to assess suitability, it must NOT make a personal recommendation or take a decision to trade for the client. Cannot substitute the missing information. Key fact: Cannot obtain info = cannot advise or trade.", "section": "S6-7: Consumer Duty"}, {"tag": "concept", "topic": "Suitability — Info", "q": "A firm receives client information that appears somewhat dated. Is the firm entitled to rely on it?", "opts": ["Yes — firms may always rely on client-provided information, provided the client has given prior written consent.", "No — firms may never rely on information more than one year old, provided the client has given prior written consent.", "Firms are entitled to rely on client-provided information unless it is manifestly out of date, inaccurate or incomplete", "Firms must always independently verify all client information before relying on it, provided the client has given prior written consent."], "ans": 2, "exp": "Correct: C. Firms are entitled to rely on information provided by the client UNLESS the information is manifestly out of date, inaccurate or incomplete. The firm is not obliged to independently verify all information. Key fact: Firm may rely on client info — unless manifestly out of date, inaccurate or incomplete.", "section": "S6-7: Consumer Duty"}, {"tag": "detail", "topic": "Suitability — Info", "q": "May a firm discourage a client from providing information needed for the suitability assessment?", "opts": ["Yes — if providing the information might cause the firm to turn away business", "Yes — if the firm already has sufficient information to make a recommendation", "No — firms must not discourage clients from providing this information", "No — but the firm may charge a fee for processing detailed client information"], "ans": 2, "exp": "Correct: C. Firms must NOT discourage clients from providing suitability information. To do so risks giving unsuitable advice or losing the business. The firm's interests (potential loss of business) do not justify discouraging information provision. Key fact: Must not discourage information provision.", "section": "S6-7: Consumer Duty"}, {"tag": "cisi", "topic": "Professional Clients", "q": "For UK MiFID suitability, what may a firm assume about a per se professional client?", "opts": ["That they have no investment experience or knowledge, provided the client has given prior written consent.", "That they have the necessary experience and knowledge AND can financially bear related investment risks", "That they require the same suitability assessment as retail clients, provided the client has given prior written consent.", "That they are exempt from all suitability obligations, provided the client has given prior written consent."], "ans": 1, "exp": "Correct: B. For per se professional clients: a firm may assume BOTH (1) necessary experience and knowledge, AND (2) ability to financially bear related investment risks. These are TWO separate assumptions permitted for per se professionals. Key fact: Per se professional = assume knowledge+experience AND financial loss-bearing ability.", "section": "S6-7: Consumer Duty"}, {"tag": "cisi", "topic": "Professional Clients", "q": "A firm has classified a client as an elective professional client. The firm wishes to assume this client can financially bear investment risks. Is this permitted?", "opts": ["Yes — all professional clients (per se and elective) share this assumption", "No — the assumption of financial risk-bearing does NOT apply to elective professional clients", "Yes — but only for MiFID business, provided the client has given prior written consent.", "No — this assumption applies only to ECPs, not professional clients"], "ans": 1, "exp": "Correct: B. The financial risk-bearing assumption applies ONLY to per se professional clients. Firms CANNOT make this assumption for elective professional clients — they must assess the elective professional's ability to bear losses. Key fact: Elective professional = CANNOT assume financial loss-bearing. Must assess.", "section": "S6-7: Consumer Duty"}, {"tag": "scenario", "topic": "Professional Clients", "q": "A firm provides investment advice on UK MiFID business to a professional client. Does it still need to assess suitability?", "opts": ["No — professional clients are exempt from all suitability requirements, provided the client has given prior written consent.", "Yes — suitability rules apply to professional clients for MiFID business, though certain assumptions may be made", "No — only appropriateness rules apply to professional clients, provided the client has given prior written consent.", "Yes — but only if the professional client requests a formal assessment, provided the client has given prior written consent."], "ans": 1, "exp": "Correct: B. Suitability rules apply to professional clients for MiFID business. However, the firm may make certain assumptions: both per se and elective professionals are assumed to have the necessary knowledge and experience; per se professionals are also assumed able to bear losses. Suitability is still assessed — just with those assumptions built in. Key fact: Suitability applies to professional MiFID clients — assumptions reduce (not eliminate) the assessment burden.", "section": "S6-7: Consumer Duty"}, {"tag": "cisi", "topic": "Churning", "q": "What is 'churning' in the context of the COBS suitability rules?", "opts": ["Providing unsuitable recommendations based on incorrect client information, provided the client has given prior written consent.", "Over-dealing or trading more frequently than necessary for a client to generate additional fees or commissions", "Switching a client from one regulated CIS to another, provided the client has given prior written consent.", "Failing to provide a suitability report after a personal recommendation, provided the client has given prior written consent."], "ans": 1, "exp": "Correct: B. Churning is the activity of over-dealing or trading more frequently for a client than is necessary, in order to generate additional fees or commissions for the firm. Most relevant in discretionary portfolio management. Key fact: Churning = over-trading to generate fees. Most relevant in discretionary management.", "section": "S6-7: Consumer Duty"}, {"tag": "cisi", "topic": "Churning", "q": "According to FCA guidance on switching, when may a series of individually suitable transactions become unsuitable?", "opts": ["When each individual transaction is above £10,000, provided the client has given prior written consent.", "When the recommendations or trading decisions are so frequent as to be detrimental to the client", "When the client's portfolio exceeds £500,000, provided the client has given prior written consent.", "When more than three switches occur within a single calendar year, provided the client has given prior written consent."], "ans": 1, "exp": "Correct: B. The FCA states that a series of transactions that look suitable in isolation may NOT be suitable if the recommendations and/or trading decisions are so frequent as to be detrimental to the client. Firms must consider the client's overall investment strategy. Key fact: Individually suitable transactions may become collectively unsuitable if too frequent / detrimental.", "section": "S6-7: Consumer Duty"}, {"tag": "scenario", "topic": "Churning", "q": "A discretionary portfolio manager makes 35 trades in one month for a conservative retail client with a long-term income strategy. This is significantly above average. What concern does this raise?", "opts": ["None — a manager has full discretion to trade as frequently as they wish, provided the client has given prior written consent.", "Potential churning — the frequency of trading may be detrimental to the client and inconsistent with their investment strategy", "A breach of the financial promotion rules, unless the client has been notified in a durable medium.", "A conflict of interest under SYSC, subject to the relevant COBS provisions applying to the business."], "ans": 1, "exp": "Correct: B. Excessive trading in a discretionary account — especially inconsistent with the client's investment strategy (conservative, long-term income) — raises a churning concern. The FCA expects firms to check for spikes in adviser/manager trading patterns and ensure trading frequency aligns with client strategy. Key fact: Excessive trading inconsistent with client strategy = potential churning.", "section": "S6-7: Consumer Duty"}, {"tag": "cisi", "topic": "Suitability Report", "q": "When is a firm required to provide a suitability report?", "opts": ["Only when the client requests one, provided the client has given prior written consent.", "Whenever the firm makes a personal recommendation", "Only when the recommendation involves a pension product", "Only when the client is classified as retail"], "ans": 1, "exp": "Correct: B. A firm must provide a suitability report whenever it makes a PERSONAL RECOMMENDATION. Under MiFID II this covers all investment advice (= personal recommendations). Key fact: Personal recommendation = always requires a suitability report.", "section": "S6-7: Consumer Duty"}, {"tag": "cisi", "topic": "Suitability Report", "q": "Which of the following investments requires a suitability report when a personal recommendation is made?", "opts": ["Only regulated collective investment schemes, provided the client has given prior written consent.", "Equities, derivatives, structured products, unregulated CIS, pension transfers, and life assurance — among others", "Only pension products and life assurance, provided the client has given prior written consent.", "Only unregulated investments — this applies in all circumstances without exception"], "ans": 1, "exp": "Correct: B. Suitability report requirement applies to personal recommendations on: equities, derivatives, structured products, unregulated CIS; regulated CIS/investment trusts (in certain circumstances); pension transfers/opt-outs; income withdrawals/short-term annuities; and life assurance policies. The list is comprehensive. Key fact: Suitability report = required for broad range incl. equities, derivatives, structured, pensions, life assurance.", "section": "S6-7: Consumer Duty"}, {"tag": "detail", "topic": "Suitability Report", "q": "Which of the following is an EXCEPTION to the requirement to provide a suitability report?", "opts": ["A recommendation to purchase equities for a retail client, provided the client has given prior written consent.", "A recommendation to enter into a pension transfer, provided the client has given prior written consent.", "A firm acting as investment manager for a retail client making a personal recommendation in connection with a regulated CIS", "A recommendation to sell a structured product, provided the client has given prior written consent."], "ans": 2, "exp": "Correct: C. Where a firm is acting as an INVESTMENT MANAGER for a retail client and makes a personal recommendation in connection with a REGULATED CIS, no suitability report is required. This is one of five exceptions. Key fact: Investment manager + regulated CIS recommendation = suitability report NOT required.", "section": "S6-7: Consumer Duty"}, {"tag": "detail", "topic": "Suitability Report", "q": "A firm gives a personal recommendation for a friendly society's life policy with an annual premium of £45. Must it provide a suitability report?", "opts": ["Yes — suitability reports are always required for life policies, provided the client has given prior written consent.", "No — there is an exception for friendly society small life policies with premiums not exceeding £50/year (or £1/week)", "Only if the client requests one, unless the client has been notified in a durable medium.", "Yes — but in a simplified one-page format, provided the client has given prior written consent."], "ans": 1, "exp": "Correct: B. One of the five exceptions to the suitability report requirement is where the personal recommendation is made by a friendly society in connection with a small life policy with a premium not exceeding £50 per year (or £1 per week). £45/year qualifies. Key fact: Friendly society + small life policy (≤£50/yr or ≤£1/wk) = exception.", "section": "S6-7: Consumer Duty"}, {"tag": "cisi", "topic": "Suitability Report", "q": "What is the timing requirement for a suitability report in connection with a personal or stakeholder pension scheme where cancellation rules apply?", "opts": ["Before the contract is concluded", "Within 14 days of concluding the contract", "Within 30 days of concluding the contract", "Immediately after the transaction is executed"], "ans": 1, "exp": "Correct: B. For a personal pension scheme or stakeholder pension scheme where cancellation rules apply, the suitability report must be provided within 14 DAYS of concluding the contract. Key fact: Pension with cancellation rights = suitability report within 14 days.", "section": "S6-7: Consumer Duty"}, {"tag": "cisi", "topic": "Suitability Report", "q": "What must a suitability report contain at a minimum?", "opts": ["Full financial plan and projected outcomes over 20 years, provided the client has given prior written consent.", "Client's demands and needs; explanation of disadvantages of the transaction; explanation of why the firm concluded the recommendation is suitable", "A copy of the fact-find questionnaire and the client's signature, provided the client has given prior written consent.", "The fee structure and details of all charges, subject to the relevant COBS provisions applying to the business."], "ans": 1, "exp": "Correct: B. The suitability report must at minimum: (1) specify the client's demands and needs; (2) explain any possible disadvantages of the transaction for the client; (3) explain why the firm concluded the recommended transaction is suitable for the client, having regard to the client's information provided. Key fact: Suitability report contents = demands+needs + disadvantages + why suitable.", "section": "S6-7: Consumer Duty"}, {"tag": "scenario", "topic": "Suitability Report", "q": "A firm gives investment advice over the telephone to sell a life policy. The entire relationship before contract conclusion is by telephone. What special requirements apply to the suitability report?", "opts": ["No suitability report is needed for telephone-only sales, provided the client has given prior written consent.", "The report must comply with Distance Marketing Directive rules, be provided immediately after contract conclusion, and be in a durable medium", "The report may be provided orally and confirmed in writing within 14 days, provided the client has given prior written consent.", "The report must be filed with the FCA within 30 days, unless the client has been notified in a durable medium."], "ans": 1, "exp": "Correct: B. For life policy sales where the only contact before conclusion is by telephone: (1) the report must comply with DMD rules; (2) it must be provided IMMEDIATELY AFTER conclusion of the contract; (3) it must be in a DURABLE MEDIUM. Key fact: Telephone life policy = DMD compliant + immediately after + durable medium.", "section": "S6-7: Consumer Duty"}, {"tag": "detail", "topic": "Suitability Report", "q": "Under what circumstances may a suitability report be provided AFTER a transaction is concluded (in cases other than life policies or pensions)?", "opts": ["Never — suitability reports must always precede the transaction, as specified in the relevant FCA Handbook provisions, provided the firm has obtained prior written consent from the client.", "When the agreement is concluded using distance marketing communications AND the client consents — in which case the report must be provided as soon as possible after execution", "Only if the client signs a waiver, as specified in the relevant FCA Handbook provisions, as required under the relevant COBS or SYSC rules in the FCA Handbook.", "When the transaction is below £5,000 in value, as specified in the relevant FCA Handbook provisions, unless a specific exemption applies under the Financial Promotion Order."], "ans": 1, "exp": "Correct: B. In cases other than life policies or pensions, the suitability report must generally be provided BEFORE the transaction is concluded. Exception: if the agreement is concluded using distance marketing communications AND the client consents — the report must then be provided as soon as possible after execution. Key fact: Distance marketing exception = report ASAP after execution (with client consent).", "section": "S6-7: Consumer Duty"}, {"tag": "cisi", "topic": "Insistent Clients", "q": "Which of the following correctly defines an 'insistent client'?", "opts": ["A client who demands a guaranteed return on their investment, provided the client has given prior written consent.", "A client who has received a personal recommendation, decides to proceed with a different or contrary transaction, and asks the firm to facilitate it", "A client who complains repeatedly about the firm's service, provided the client has given prior written consent.", "A client who refuses to provide information for a suitability assessment, provided the client has given prior written consent."], "ans": 1, "exp": "Correct: B. An insistent client is one where: (1) the firm has given a personal recommendation; (2) the client decides to enter into a transaction different from (or contrary to) the recommendation; AND (3) the client wishes the firm to facilitate the transaction. Key fact: Insistent client = disagrees with recommendation + asks firm to proceed anyway.", "section": "S6-7: Consumer Duty"}, {"tag": "cisi", "topic": "Insistent Clients", "q": "What information must the firm communicate to an insistent client when executing a transaction contrary to its recommendation?", "opts": ["Only the risk warnings required by the product manufacturer, as specified in the relevant FCA Handbook provisions, as required under the relevant COBS or SYSC rules in the FCA Handbook.", "That the firm has not recommended the transaction; the reasons why it is not in accordance with the recommendation; the risks of the proposed transaction; and why the firm did not recommend it", "Only that the client is acting against advice — no further detail is required, as specified in the relevant FCA Handbook provisions, provided the firm has obtained prior written consent from the client.", "The firm's compliance officer must contact the client directly, as specified in the relevant FCA Handbook provisions, unless a specific exemption applies under the Financial Promotion Order."], "ans": 1, "exp": "Correct: B. The firm must communicate to the insistent client: (1) that the firm has NOT recommended this transaction; (2) the REASONS why it is not in accordance with the recommendation; (3) the RISKS of the client's proposed transaction; and (4) the REASONS why the firm did not recommend it. Key fact: 4 elements to communicate to insistent client.", "section": "S6-7: Consumer Duty"}, {"tag": "scenario", "topic": "Insistent Clients", "q": "A firm recommends that a retail client holds their existing equity portfolio. The client insists on selling everything and investing in a single unrated bond. The firm is willing to facilitate. What must the firm do first?", "opts": ["Refuse to proceed — firms cannot facilitate insistent client requests, provided the client has given prior written consent.", "Proceed without comment as the client has the right to make their own decisions, provided the client has given prior written consent.", "Communicate in a clear, fair and not misleading way: that this is not the recommended action, the reasons, the risks, and why the firm didn't recommend it", "Only document the client's instructions internally without communicating anything to the client, provided the client has given prior written consent."], "ans": 2, "exp": "Correct: C. The firm must communicate to the insistent client — in a way that is clear, fair and not misleading — all four required elements: (1) not recommended; (2) reasons not in line with recommendation; (3) risks of the proposed transaction; (4) why the firm didn't recommend it. Only then may it facilitate. Key fact: Must communicate all 4 elements before facilitating an insistent client transaction.", "section": "S6-7: Consumer Duty"}, {"tag": "cisi", "topic": "Appropriateness", "q": "To which type of services do the appropriateness rules apply?", "opts": ["Only to advised services for retail clients, as specified in the relevant FCA Handbook provisions, as required under the relevant COBS or SYSC rules in the FCA Handbook.", "Non-advised MiFID investment services (excluding personal recommendations and investment management), warrants/derivatives for retail clients responding to a direct offer, and assessment on behalf of other MiFID firms", "All investment services regardless of whether they are advised or non-advised, as specified in the relevant FCA Handbook provisions, provided the firm has obtained prior written consent from the client.", "Only to professional clients for MiFID business, as specified in the relevant FCA Handbook provisions, unless a specific exemption applies under the Financial Promotion Order."], "ans": 1, "exp": "Correct: B. Appropriateness rules apply to: (1) non-advised MiFID investment services (other than personal recommendations or managing investments); (2) arranging or dealing in warrants/derivatives for retail clients where the order responds to a direct offer financial promotion; (3) firms assessing appropriateness on behalf of other UK MiFID firms. Key fact: Appropriateness = non-advised MiFID services + warrants/derivatives (direct offer) + on behalf of other MiFID firms.", "section": "S6-7: Consumer Duty"}, {"tag": "concept", "topic": "Appropriateness", "q": "What is the purpose of the appropriateness assessment?", "opts": ["To replace the suitability assessment for professional clients", "To provide a degree of protection for non-advised transactions", "To ensure all clients have a minimum level of investment experience", "To assess whether the client can afford to invest"], "ans": 1, "exp": "Correct: B. The purpose of the appropriateness test is to provide a degree of PROTECTION FOR NON-ADVISED TRANSACTIONS. It is not as comprehensive as suitability — it focuses on knowledge and experience only (not financial situation or objectives). Key fact: Appropriateness = protection for non-advised transactions. Knowledge + experience ONLY.", "section": "S6-7: Consumer Duty"}, {"tag": "cisi", "topic": "Appropriateness", "q": "What information must a firm obtain to assess appropriateness?", "opts": ["Financial situation, investment objectives and risk appetite", "Knowledge and experience in the relevant investment field only", "Full fact-find including income, tax situation and financial goals", "Credit history and existing portfolio composition"], "ans": 1, "exp": "Correct: B. For appropriateness, the firm assesses the client's KNOWLEDGE AND EXPERIENCE in the relevant investment field only. Unlike suitability, it does NOT require information about financial situation or investment objectives. Key fact: Appropriateness = knowledge + experience only (NOT financial situation or objectives).", "section": "S6-7: Consumer Duty"}, {"tag": "detail", "topic": "Appropriateness", "q": "When assessing appropriateness, may a firm assume a professional client has the necessary knowledge and experience?", "opts": ["No — all clients must provide information regardless of classification, provided the client has given prior written consent.", "Yes — a firm may assume a professional client has the necessary knowledge and experience for services/products for which they are classified as professional", "Yes — but only for per se professional clients, not elective professionals, provided the client has given prior written consent.", "No — professional clients still need to complete the appropriateness test in full, provided the client has given prior written consent."], "ans": 1, "exp": "Correct: B. For appropriateness, the firm may ASSUME that a professional client has the necessary knowledge and experience for the services or products for which they are classified as professional. This applies to both per se and elective professional clients for appropriateness purposes. Key fact: Appropriateness = professional client assumed to have sufficient knowledge+experience.", "section": "S6-7: Consumer Duty"}, {"tag": "cisi", "topic": "Appropriateness", "q": "May a firm infer a client's knowledge from their experience when assessing appropriateness?", "opts": ["No — knowledge and experience must always be assessed separately", "Yes — where reasonable, a firm may infer knowledge from experience", "Only for professional clients — this applies in all circumstances without exception", "Only if the client has been with the firm for more than two years"], "ans": 1, "exp": "Correct: B. Where it is REASONABLE to do so, a firm may INFER KNOWLEDGE FROM EXPERIENCE when assessing appropriateness. The firm may also satisfy itself that a client's knowledge alone is sufficient to understand the risks. Key fact: Appropriateness = may infer knowledge from experience (where reasonable).", "section": "S6-7: Consumer Duty"}, {"tag": "cisi", "topic": "Warn / No Info", "q": "If a firm concludes that a product is NOT appropriate for a client, what must it do?", "opts": ["Refuse to execute the transaction in all circumstances, provided the client has given prior written consent.", "Warn the client that the product is not appropriate — this warning may be in a standardised format", "Report the transaction to the FCA, provided the client has given prior written consent.", "Immediately re-classify the client as retail, provided the client has given prior written consent."], "ans": 1, "exp": "Correct: B. If the firm concludes that the product/service is NOT appropriate for the client, it MUST WARN the client of that fact. The warning may be delivered in a standardised format. The firm is not required to refuse to execute — the client may still ask to proceed. Key fact: Not appropriate = must warn (standardised format OK). Does not mean automatic refusal.", "section": "S6-7: Consumer Duty"}, {"tag": "cisi", "topic": "Warn / No Info", "q": "A client declines to provide the information needed to assess appropriateness. What must the firm do?", "opts": ["Proceed with the transaction as if the client has the necessary experience", "Warn the client that it is unable to assess the appropriateness of the product/service", "Refuse to deal with the client, provided the client has given prior written consent.", "Apply the suitability rules instead, provided the client has given prior written consent."], "ans": 1, "exp": "Correct: B. If the client declines to provide information, the firm must WARN the client that it is unable to assess whether the product/service is appropriate for them. It may use a standardised format for this warning. If the client then asks to proceed regardless, the firm may decide whether to do so. Key fact: Client refuses info = warn that appropriateness cannot be assessed. Client may still ask to proceed — firm decides.", "section": "S6-7: Consumer Duty"}, {"tag": "cisi", "topic": "Execution-Only", "q": "Which THREE conditions must ALL be met for a firm to be exempt from the appropriateness assessment (execution-only)?", "opts": ["Client is professional, product is non-complex, transaction is below £10,000, as specified in the relevant FCA Handbook provisions, unless a specific exemption applies under the Financial Promotion Order.", "The service is at the client's initiative, the client is clearly informed they will not benefit from appropriateness protections, and the firm complies with its conflicts of interest obligations", "Client is retail, product is a UCITS fund, and the firm is FCA-authorised, as specified in the relevant FCA Handbook provisions, as required under the relevant COBS or SYSC rules in the FCA Handbook.", "The product is non-complex, the client has prior experience, and the transaction is executed online, provided the client has given prior written consent."], "ans": 1, "exp": "Correct: B. THREE conditions for execution-only exemption: (1) service is at the CLIENT'S INITIATIVE (execution-only or receipt/transmission of orders); (2) client is CLEARLY INFORMED that appropriateness won't be assessed and they won't benefit from that protection; (3) firm COMPLIES WITH CONFLICTS OF INTEREST obligations. All three must be met. Key fact: Execution-only = client initiative + informed no protection + conflicts compliance — ALL required.", "section": "S6-7: Consumer Duty"}, {"tag": "cisi", "topic": "Non-Complex", "q": "Which of the following is a 'non-complex' financial instrument for execution-only purposes?", "opts": ["An equity warrant with a complex payoff structure", "A listed share on a UK regulated market", "A structured product with embedded interest rate.", "A hedge fund unit not admitted to a regulated market"], "ans": 1, "exp": "Correct: B. Listed shares on a UK or EEA regulated market (or equivalent third-country market) are non-complex instruments for execution-only purposes. Warrants, derivatives, structured products with embedded derivatives, and hedge funds are generally NOT non-complex. Key fact: Listed shares + money market instruments + bonds (no embedded derivatives) + UCITS = non-complex.", "section": "S6-7: Consumer Duty"}, {"tag": "detail", "topic": "Non-Complex", "q": "Which of the following is a condition for a financial instrument to be classified as 'non-complex'?", "opts": ["It must generate guaranteed returns, as specified in the relevant FCA Handbook provisions, as required under the relevant COBS or SYSC rules in the FCA Handbook.", "It must NOT be a derivative AND must have sufficient liquidity AND must not involve liability exceeding the cost of acquisition AND must have publicly available comprehensive information", "It must be FCA-approved and have a track record of at least 5 years, as specified in the relevant FCA Handbook provisions, unless a specific exemption applies under the Financial Promotion Order.", "It must be denominated in sterling and listed on the London Stock Exchange, subject to the relevant COBS provisions applying to the business."], "ans": 1, "exp": "Correct: B. A non-complex instrument must satisfy ALL FOUR conditions: (1) is NOT a derivative; (2) has sufficient liquidity; (3) does not involve client liability exceeding the cost of acquiring the investment; (4) publicly available with comprehensive information. ALL four conditions must be met. Key fact: Non-complex = not derivative + liquid + no excess liability + publicly available info (ALL four).", "section": "S6-7: Consumer Duty"}, {"tag": "detail", "topic": "Non-Complex", "q": "Holdings in UCITS funds — are these considered non-complex instruments for execution-only purposes?", "opts": ["No — collective investment schemes are always complex, provided the client has given prior written consent.", "Yes — holdings in UCITS funds are specifically listed as non-complex instruments", "Only if the UCITS fund has no derivatives in its portfolio", "Only if the UCITS fund is domiciled in the UK, provided the client has given prior written consent."], "ans": 1, "exp": "Correct: B. Holdings in UCITS funds are specifically listed as non-complex instruments for execution-only purposes. This means appropriateness assessment is not required for execution-only transactions in UCITS funds (provided all three execution-only conditions are met). Key fact: UCITS funds = non-complex instruments.", "section": "S6-7: Consumer Duty"}, {"tag": "scenario", "topic": "Non-Complex", "q": "A retail client asks a firm to execute an order in a bond that has no embedded derivatives, is listed on a regulated market, is highly liquid, and has comprehensive publicly available information. May the firm provide this execution-only without an appropriateness assessment?", "opts": ["No — bonds always require an appropriateness assessment, provided the client has given prior written consent.", "Yes — this bond meets all four criteria for a non-complex instrument, so execution-only is permitted (if the other two conditions are also met)", "Only if the client is classified as professional, subject to the relevant COBS provisions applying to the business.", "Yes — but only for bonds with a credit rating of investment grade or above, provided the client has given prior written consent."], "ans": 1, "exp": "Correct: B. A bond without embedded derivatives, listed on a regulated market, with sufficient liquidity and comprehensive public information meets all four non-complex criteria. Execution-only is permitted for non-complex instruments, subject to the three execution-only conditions (client initiative, informed, conflicts). Key fact: Bond (no embedded derivatives + listed + liquid + public info) = non-complex = execution-only permitted.", "section": "S6-7: Consumer Duty"}, {"tag": "detail", "topic": "Execution-Only", "q": "A client has been engaged in a series of similar equity trades under an execution-only arrangement. Must the firm re-assess appropriateness before each individual trade?", "opts": ["Yes — appropriateness must be assessed before every transaction, subject to the relevant COBS provisions applying to the business.", "No — firms do not need to reassess appropriateness for each transaction in a series of similar transactions, but must do so before beginning a new type of service", "Only if the trade value exceeds the previous trade by more than 20%, unless the client has been notified in a durable medium.", "Only on the first trade of each calendar year, as specified in the relevant FCA Handbook provisions."], "ans": 1, "exp": "Correct: B. Firms do NOT need to reassess appropriateness each time for a series of similar transactions/services. However, they MUST reassess before beginning to provide a NEW service. Key fact: Series of similar transactions = no re-assessment needed per trade. New service = must reassess.", "section": "S6-7: Consumer Duty"}, {"tag": "scenario", "topic": "Appropriateness", "q": "A retail client contacts a firm to place an execution-only order in a complex structured product with embedded derivatives. The firm assesses appropriateness and concludes the product is NOT appropriate for the client. The client insists on proceeding. What should the firm do?", "opts": ["Refuse in all circumstances — a negative appropriateness assessment means the firm cannot proceed", "Warn the client that the product is not appropriate, and then may decide whether to proceed based on the circumstances", "Proceed without warning since the client has overridden the assessment, provided the client has given prior written consent.", "Transfer the client to a full advice process immediately, provided the client has given prior written consent."], "ans": 1, "exp": "Correct: B. When appropriateness assessment results in 'not appropriate' — the firm MUST WARN the client. If the client then asks to proceed regardless, it is up to the FIRM TO DECIDE whether to do so based on circumstances. The firm is not automatically prohibited from proceeding. Key fact: Not appropriate + client insists = warn + firm decides whether to proceed.", "section": "S6-7: Consumer Duty"}, {"tag": "scenario", "topic": "Suitability — Scope", "q": "A firm manages the assets of a stakeholder pension scheme. Do the COBS suitability rules apply?", "opts": ["No — pension scheme management is exempt from suitability rules, subject to the relevant COBS provisions applying to the business.", "Yes — managing the assets of an occupational, stakeholder or personal pension scheme triggers the suitability rules (other than for MiFID or equivalent business)", "Only if the scheme has more than 100 members, as specified in the relevant FCA Handbook provisions.", "Yes — but only the appropriateness rules, not the full suitability rules, provided the client has given prior written consent."], "ans": 1, "exp": "Correct: B. The suitability rules apply when a firm manages the assets of an occupational pension scheme, stakeholder pension scheme or personal pension scheme — other than in relation to MiFID, equivalent third-country or optional exemption business. Key fact: Pension scheme asset management (non-MiFID) = triggers suitability rules.", "section": "S6-7: Consumer Duty"}, {"tag": "concept", "topic": "Consumer Duty", "q": "The Consumer Duty requires that products are designed to meet the needs of an identified target market and do not cause foreseeable harm. Which Consumer Duty outcome does this describe?", "opts": ["Consumer Understanding", "Price and Value", "Products and Services", "Consumer Support"], "ans": 2, "exp": "Correct: C. The Products and Services outcome requires that firms offer products/services designed to meet the needs of an identified target market and that do not cause foreseeable harm to those consumers. Key fact: Products and Services outcome = designed for target market + no foreseeable harm.", "section": "S6-7: Consumer Duty"}, {"tag": "cisi", "topic": "Suitability Report", "q": "A recommendation is made to a retail client in connection with a life assurance policy entirely by telephone. The client requires cover immediately. When must the suitability report be provided?", "opts": ["14 days after the contract is concluded, provided the client has given prior written consent.", "Before the contract is concluded in all circumstances", "Immediately after the contract is concluded, in a durable medium", "Within 5 business days of the contract being concluded"], "ans": 2, "exp": "Correct: C. For life policy recommendations, the general rule is the suitability report must be provided before the contract is concluded. However, if information is provided orally, OR if cover is required immediately — the suitability report must be provided in a durable medium IMMEDIATELY AFTER the contract is concluded. Key fact: Life policy urgent cover = suitability report immediately after conclusion, in durable medium.", "section": "S6-7: Consumer Duty"}, {"tag": "detail", "topic": "Churning", "q": "In which specific context is churning most relevant according to COBS?", "opts": ["Execution-only brokerage services", "Discretionary portfolio management", "Non-advised investment platforms", "Advised pension switching"], "ans": 1, "exp": "Correct: B. Churning is most relevant where a firm manages a client's portfolio on a DISCRETIONARY BASIS — because in that context, the firm makes trading decisions without needing to seek the client's approval for each individual trade. Key fact: Churning = most relevant in discretionary portfolio management.", "section": "S6-7: Consumer Duty"}, {"tag": "scenario", "topic": "Insistent Clients", "q": "After communicating all four required elements to an insistent client, must the firm refuse to facilitate the transaction?", "opts": ["Yes — once the four elements are communicated, the firm cannot proceed, provided the client has given prior written consent.", "No — after communicating all required information, the firm may decide whether to facilitate based on the circumstances", "Yes — unless the FCA gives specific permission to proceed, provided the client has given prior written consent.", "No — the firm must alw
