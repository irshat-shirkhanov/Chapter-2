<style>*{box-sizing:border-box;margin:0;padding:0}:root{--navy:#1E2761;--navy-l:#CADCFC;--navy-d:#12195F;--teal:#028090;--teal-l:#D6F0F3;--teal-d:#015E6A;--teal-m:#1D9E75;--amber:#B07D12;--amber-l:#FEF3C7;--amber-d:#7C5A0A;--coral:#993C1D;--coral-l:#FAECE7;--coral-m:#D85A30;--purple:#534AB7;--purple-l:#EEEDFE;--purple-d:#3C3489;--green-l:#E1F5EE;--green:#085041;--gray:#64748B;--gray-l:#F1F5F9;--gray-m:#CBD5E1;--gray-d:#334155;--bg:#F0F4F8;--card:#fff;--text:#1e293b;--text2:#475569;--text3:#94a3b8;--radius:12px;--shadow:0 2px 10px rgba(0,0,0,.09)}body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}.app-header{background:linear-gradient(135deg,var(--navy),var(--teal));padding:1.2rem 1.5rem .85rem;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.2)}.header-top{display:flex;align-items:flex-start;justify-content:space-between;gap:.75rem}.app-title{color:#fff;font-size:1.08rem;font-weight:700;line-height:1.3}.app-sub{color:var(--navy-l);font-size:.72rem;margin-top:.18rem}.reset-btn{background:rgba(255,255,255,.16);border:1.5px solid rgba(255,255,255,.38);color:#fff;border-radius:7px;padding:.36rem .95rem;font-size:.76rem;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap;flex-shrink:0}.reset-btn:hover{background:rgba(255,255,255,.3)}.screen{padding:1.4rem;max-width:820px;margin:0 auto}.round-pill{display:inline-flex;align-items:center;gap:.4rem;background:var(--navy);color:var(--navy-l);border-radius:7px;padding:.3rem .85rem;font-size:.73rem;font-weight:600;margin-bottom:1rem}.tracker{display:flex;gap:3px;margin-bottom:1.05rem}.tracker-dot{flex:1;height:10px;border-radius:5px;background:var(--gray-m);transition:background .3s}.tracker-dot.t-ok{background:var(--teal-m)}.tracker-dot.t-bad{background:var(--coral-m)}.tracker-dot.t-cur{background:var(--navy-l)}.score-bar{display:flex;gap:.65rem;margin-bottom:1rem}.sc{flex:1;background:var(--card);border-radius:10px;padding:.58rem .75rem;text-align:center;border:1px solid var(--gray-m);box-shadow:var(--shadow)}.sc .n{font-size:1.38rem;font-weight:700;color:var(--teal);line-height:1}.sc .n-ok{color:var(--teal-m)}.sc .n-bad{color:var(--coral-m)}.sc .l{font-size:.67rem;color:var(--text3);margin-top:.18rem}.q-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:1.4rem 1.5rem;margin-bottom:1rem;border:1px solid rgba(0,0,0,.05)}.q-meta{display:flex;align-items:center;gap:.5rem;margin-bottom:.65rem;flex-wrap:wrap}.q-num{font-size:.68rem;font-weight:700;color:var(--teal);text-transform:uppercase;letter-spacing:.07em}.q-tag{font-size:.64rem;font-weight:700;padding:.15rem .48rem;border-radius:20px}.tag-cisi{background:#FEF3C7;color:#7C5A0A}.tag-concept{background:var(--purple-l);color:var(--purple-d)}.tag-scenario{background:var(--teal-l);color:var(--teal-d)}.tag-detail{background:var(--gray-l);color:var(--gray-d)}.q-topic{font-size:.64rem;color:var(--text3);margin-left:auto}.q-text{font-size:.93rem;font-weight:500;line-height:1.6;margin-bottom:.95rem;color:var(--text)}.opts{display:flex;flex-direction:column;gap:.42rem}.opt{display:flex;align-items:flex-start;gap:.65rem;padding:.68rem .95rem;border-radius:8px;border:1.5px solid var(--gray-m);cursor:pointer;font-size:.86rem;line-height:1.46;background:var(--card);transition:all .16s}.opt:hover:not(.dis){border-color:var(--teal);background:var(--teal-l)}.opt.ok{border-color:var(--teal-m);background:var(--green-l);color:var(--green)}.opt.bad{border-color:var(--coral-m);background:var(--coral-l);color:var(--coral)}.opt.dis{cursor:default}.opt-l{width:21px;height:21px;min-width:21px;border-radius:50%;background:#e2e8f0;display:flex;align-items:center;justify-content:center;font-size:.69rem;font-weight:700;color:var(--gray);margin-top:1px;flex-shrink:0}.opt.ok .opt-l{background:var(--teal-m);color:#fff}.opt.bad .opt-l{background:var(--coral-m);color:#fff}.exp-box{margin-top:.8rem;padding:.7rem 1rem;border-radius:8px;font-size:.81rem;line-height:1.62;display:none}.exp-box.show{display:block}.exp-ok{background:var(--green-l);border-left:3px solid var(--teal-m);color:var(--green)}.exp-bad{background:var(--coral-l);border-left:3px solid var(--coral-m);color:var(--coral)}.result-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:2rem 1.5rem;text-align:center;margin-top:.5rem}.result-big{font-size:3.2rem;font-weight:800;margin:.4rem 0}.result-grade{display:inline-block;padding:.38rem 1.2rem;border-radius:20px;font-size:.92rem;font-weight:700;margin:.5rem 0 .8rem}.result-bar-wrap{background:var(--gray-l);border-radius:20px;height:14px;overflow:hidden;margin:.75rem auto;max-width:320px}.result-bar-fill{height:100%;border-radius:20px;transition:width .8s ease}.result-breakdown{display:flex;gap:.6rem;justify-content:center;flex-wrap:wrap;margin:1rem 0 1.2rem}.rp{padding:.3rem .9rem;border-radius:20px;font-size:.8rem;font-weight:600}.topic-grid{display:grid;grid-template-columns:1fr 1fr;gap:.45rem;margin:.5rem 0 1.2rem;text-align:left}.topic-row{background:var(--gray-l);border-radius:8px;padding:.5rem .75rem;font-size:.78rem}.topic-name{color:var(--text2);font-weight:600;margin-bottom:.2rem}.topic-bar-wrap{background:var(--gray-m);border-radius:10px;height:6px;overflow:hidden}.topic-bar-fill{height:100%;border-radius:10px}.q-review-list{text-align:left;margin-top:.5rem}.q-review-item{padding:.65rem 1rem;border-radius:8px;margin-bottom:.45rem;font-size:.83rem;line-height:1.52;display:flex;gap:.65rem;align-items:flex-start}.q-review-item.r-ok{background:var(--green-l);border-left:3px solid var(--teal-m);color:var(--green)}.q-review-item.r-bad{background:var(--coral-l);border-left:3px solid var(--coral-m);color:var(--coral)}.r-icon{font-size:.9rem;flex-shrink:0;margin-top:.08rem}.btn{padding:.58rem 1.3rem;border:none;border-radius:8px;cursor:pointer;font-size:.86rem;font-weight:600;transition:all .2s}.btn-p{background:var(--teal);color:#fff}.btn-p:hover{background:var(--teal-d)}.btn-row{display:flex;gap:.65rem;flex-wrap:wrap;justify-content:center}</style>

<div class="screen"><div class="round-pill" id="round-label">Round 1</div><div class="tracker" id="tracker"></div><div class="score-bar"><div class="sc"><div class="n" id="s-num">0/10</div><div class="l">Progress</div></div><div class="sc"><div class="n n-ok" id="s-ok">0</div><div class="l">Correct</div></div><div class="sc"><div class="n n-bad" id="s-bad">0</div><div class="l">Wrong</div></div><div class="sc"><div class="n" id="s-pct">&mdash;</div><div class="l">Score</div></div></div><div id="q-area"></div></div>
<script>
const BANK=[{"tag": "cisi", "topic": "Core Rule", "q": "What is the central purpose of the financial-promotion rules in Chapter 2 Section 5?", "opts": ["To ensure promotions are identifiable and fair, clear and not misleading", "To ensure every promotion is pre-approved by the FCA before use", "To ensure promotions are sent only to professional clients and ECPs", "To ensure firms use identical wording for every client category"], "ans": 0, "exp": "Correct answer: To ensure promotions are identifiable and fair, clear and not misleading. Section 5 begins with the conduct standard that promotions must be fair, clear and not misleading, and the wider purpose is that promotions should be recognisable as promotions and should not distort the client’s understanding. Option A is correct because it captures both the identification point and the fair, clear and not misleading standard. Option B is wrong because FCA pre-approval is not the general rule. Option C is wrong because retail clients are very much within scope. Option D is wrong because the rules are outcomes-based and proportionate, not a requirement for identical wording."}, {"tag": "concept", "topic": "Core Rule", "q": "How should a firm decide what level of detail and presentation style is appropriate in a communication?", "opts": ["By using the same depth and technicality for every audience and medium", "By taking account of the communication method, its purpose and the type of recipient", "By giving the fullest possible disclosure in every case, regardless of usability", "By prioritising sales impact over whether the message is readily understood"], "ans": 1, "exp": "Correct answer: By taking account of the communication method, its purpose and the type of recipient. Section 5 says the approach should be appropriate and proportionate, taking account of the means of communication, the type of communication and what it is intended to convey. Option A is wrong because the section recognises that retail and professional audiences may require different treatment. Option B is correct because it reflects the proportionality and audience-based approach. Option C is wrong because more words do not automatically make a promotion compliant. Option D is wrong because the rule is client-protection focused, not sales-led."}, {"tag": "detail", "topic": "Capital-at-Risk Warnings", "q": "Where a promotion relates to a product or service in which the client’s capital may be at risk, what must the firm do?", "opts": ["Make that fact clear in the promotion", "Mention the risk only in a separate document available on request", "Omit the point if projected returns are shown elsewhere in the promotion", "Treat the point as relevant only for professional clients"], "ans": 0, "exp": "Correct answer: Make that fact clear in the promotion. Section 5 expressly states that promotions dealing with products or services where capital may be at risk must make this clear. Option A is correct because the warning must appear clearly in the promotion itself. Option B is wrong because hiding the point in a separate document would undermine clarity. Option C is wrong because benefits cannot be emphasised without fair presentation of the risk. Option D is wrong because this is not confined to professional clients."}, {"tag": "detail", "topic": "Yields", "q": "If a promotion quotes yields, what impression must it give?", "opts": ["A balanced impression of short-, medium- and long-term prospects", "The strongest possible impression of recent performance momentum", "A short-term impression only, because medium-term data may confuse clients", "A balanced impression only where the promotion is addressed to retail clients"], "ans": 0, "exp": "Correct answer: A balanced impression of short-, medium- and long-term prospects. Section 5 specifically mentions quoted yields and requires a balanced impression rather than a selective focus on favourable periods. Option A is correct because it reflects the exact balance requirement. Option B is wrong because it over-emphasises benefit. Option C is wrong because removing medium-term context would be misleading. Option D is wrong because the rule is not framed as a retail-only carve-out."}, {"tag": "scenario", "topic": "Complex Products", "q": "A firm is promoting a product with complex charges and multiple remuneration streams. Which approach best matches Section 5?", "opts": ["Communicate the complexity and remuneration fairly, clearly and in a way that fits the audience’s information needs", "Provide only a broad summary because detail itself would make the promotion unclear", "Explain the complexity only if the recipient asks for a second-stage disclosure", "Avoid mentioning remuneration if the client category is professional rather than retail"], "ans": 0, "exp": "Correct answer: Communicate the complexity and remuneration fairly, clearly and in a way that fits the audience’s information needs. Section 5 says that where a product is complex, or where the firm receives more than one element of remuneration, this must be communicated fairly, clearly and not misleadingly with regard to the information needs of recipients. Option A is correct because it captures both fairness and audience suitability. Option B is wrong because simplification cannot become concealment. Option C is wrong because the initial promotion itself must not mislead. Option D is wrong because professional status does not justify omission."}, {"tag": "detail", "topic": "FCA Name", "q": "If a promotion names the FCA as regulator but also refers to matters that are not regulated by the FCA, what should the firm do?", "opts": ["Make it clear that some aspects of the relationship are not regulated by the FCA", "Remove every reference to the FCA from the communication", "Assume that mention of the FCA is enough to cover all parts of the relationship", "Include the clarification only if the promotion is a direct offer"], "ans": 0, "exp": "Correct answer: Make it clear that some aspects of the relationship are not regulated by the FCA. Section 5 requires the firm to avoid implying that FCA regulation covers matters that in fact fall outside the regulated relationship. Option A is correct because it prevents a misleading impression. Option B is wrong because the section does not ban mention of the FCA. Option C is wrong because that would be misleading. Option D is wrong because the point is broader than direct offers."}, {"tag": "detail", "topic": "Third-Party Products", "q": "How should a promotion describe a packaged or stakeholder product not produced by the firm itself?", "opts": ["It must give a fair, clear and non-misleading impression of the product producer or manager", "It may focus on the distributor because the underlying producer is not material", "It may treat the product as if it were the firm’s own where the wording is commercially convenient", "It may rely on the provider’s brand name alone without further explanation"], "ans": 0, "exp": "Correct answer: It must give a fair, clear and non-misleading impression of the product producer or manager. Section 5 specifically mentions promotions for packaged or stakeholder products not produced by the firm. Option A is correct because it reflects the exact conduct standard. Option B is wrong because it downplays a relevant party. Option C is wrong because it risks misleading attribution. Option D is wrong because branding alone is not the same as fair description."}, {"tag": "cisi", "topic": "Identifying Promotions", "q": "What must a firm ensure about financial promotions addressed to clients, subject to the stated exceptions?", "opts": ["They are clearly identifiable as financial promotions", "They are sent only in a durable medium", "They are approved by the FCA before communication", "They contain a full suitability assessment for the recipient"], "ans": 0, "exp": "Correct answer: They are clearly identifiable as financial promotions. Section 5.1.3 requires financial promotions communicated or approved by firms and addressed to clients to be clearly identifiable as such, subject to limited exceptions. Option A is correct because identification is the direct rule. Option B is wrong because the rule concerns identification, not a universal medium requirement. Option C is wrong because the FCA does not pre-approve ordinary promotions. Option D is wrong because suitability is a separate topic."}, {"tag": "detail", "topic": "Communication Types", "q": "Which of the following is a non-real-time communication for Section 5 purposes?", "opts": ["An email sent to clients", "A face-to-face meeting with interactive dialogue", "A live telephone call discussing an investment", "A presentation delivered with immediate audience interaction"], "ans": 0, "exp": "Correct answer: An email sent to clients. Section 5 describes non-real-time communications as communications such as emails, letters or websites where there is typically a record. Option A is correct because email is one of the listed examples. Options B, C and D are real-time or interactive communications."}, {"tag": "detail", "topic": "Communication Types", "q": "Which statement best describes a direct offer financial promotion?", "opts": ["A promotion that offers entry into an agreement and includes a form of response or way of responding", "A communication that merely raises awareness of a market theme without inviting any response", "Any interactive telephone call about an investment service", "Any approval given by an authorised firm to an unauthorised person’s promotion"], "ans": 0, "exp": "Correct answer: A promotion that offers entry into an agreement and includes a form of response or way of responding. Section 5.1.3 defines direct offer promotions in those terms. Option A is correct because it captures both the offer and the response mechanism. Option B is wrong because it lacks an offer or invitation mechanism. Option C is wrong because that describes a real-time communication, not necessarily a direct offer. Option D confuses approval with the substance of the promotion."}, {"tag": "concept", "topic": "Anti-Greenwashing", "q": "What is the purpose of the FCA’s anti-greenwashing rule discussed in Section 5?", "opts": ["To ensure sustainability claims are consistent with the product or service and are fair, clear and not misleading", "To prohibit all use of sustainability language in client communications", "To apply only to dedicated sustainable-investment firms rather than all regulated firms", "To replace the existing fair, clear and not misleading rules for all promotions"], "ans": 0, "exp": "Correct answer: To ensure sustainability claims are consistent with the product or service and are fair, clear and not misleading. Section 5 says the rule applies to sustainability characteristics statements and complements existing conduct rules. Option A is correct because it states both limbs of the rule. Option B is wrong because the rule does not ban sustainability claims. Option C is wrong because it applies to all FCA-regulated firms making such claims. Option D is wrong because it complements rather than replaces existing rules."}, {"tag": "detail", "topic": "Anti-Greenwashing", "q": "To which client groups can the anti-greenwashing rule apply if the communication is distributed by an FCA-regulated firm?", "opts": ["Both retail and professional clients", "Retail clients only", "Professional clients and ECPs only", "Only clients receiving MiFID portfolio management"], "ans": 0, "exp": "Correct answer: Both retail and professional clients. The manual states that if an FCA-regulated firm distributes the communication to its clients, the anti-greenwashing rule applies to both retail and professional clients. Option A is correct because it mirrors the text. Option B is too narrow. Option C is wrong because the text specifically names retail and professional clients. Option D invents a service limitation not stated in the section."}, {"tag": "detail", "topic": "Anti-Greenwashing", "q": "Which of the following is one of the FCA’s expectations for sustainability references?", "opts": ["They should be correct and capable of being substantiated", "They may omit inconvenient information if the overall impression remains positive", "They should focus on marketing appeal rather than full product life-cycle context", "They may rely on vague aspirational wording instead of objective support"], "ans": 0, "exp": "Correct answer: They should be correct and capable of being substantiated. Section 5 says sustainability references should be correct, understandable, complete and fair in comparisons. Option A is correct because substantiation is expressly required. Option B is wrong because omitting important information conflicts with completeness. Option C is wrong because the FCA specifically says firms should consider the full life cycle where relevant. Option D is wrong because unsupported vagueness risks greenwashing."}, {"tag": "cisi", "topic": "Exceptions", "q": "What are 'excluded communications' in the context of Section 5.2?", "opts": ["Communications aimed at high-net-worth individuals or sophisticated investors, or otherwise exempt under the FPO", "Communications that are automatically outside FSMA because they mention only brand awareness", "Communications that may be sent to retail clients without any conduct requirements", "Communications that are approved by a non-UK regulator rather than an authorised person"], "ans": 0, "exp": "Correct answer: Communications aimed at high-net-worth individuals or sophisticated investors, or otherwise exempt under the FPO. Section 5.2 identifies excluded communications in those terms. Option A is correct because it matches the section wording. Option B is wrong because brand awareness does not automatically remove a promotion from the regime. Option C is wrong because retail communications are not given a blanket exemption. Option D is wrong because overseas approval is not the definition here."}, {"tag": "detail", "topic": "Exceptions", "q": "How does Section 5 treat the excluded-communications exemption in relation to UK MiFID business?", "opts": ["It does not generally apply in relation to UK MiFID business", "It automatically applies to all UK MiFID promotions", "It applies only where the client is a retail client", "It applies only to direct-offer promotions and prospectus advertisements"], "ans": 0, "exp": "Correct answer: It does not generally apply in relation to UK MiFID business. The manual makes this limitation explicit. Option A is correct because it states the limitation exactly. Option B is the opposite of the rule. Option C invents a retail trigger. Option D wrongly restricts the point to two sub-categories."}, {"tag": "detail", "topic": "Exceptions", "q": "What changed in 2024 in relation to high-net-worth and self-certified sophisticated investor statements?", "opts": ["Investor statements meeting the previous requirements were no longer valid", "The exemptions were removed entirely from the Financial Promotion Order", "The changes applied only to insurance promotions and not to investment promotions", "Authorised firms were no longer required to identify themselves in exempt communications"], "ans": 0, "exp": "Correct answer: Investor statements meeting the previous requirements were no longer valid. The manual says HM Treasury updated the exemptions and statements, and that previous-compliant statements ceased to be valid once the changes took effect. Option A is correct because it reflects the transition rule. Option B is wrong because the exemptions were updated, not abolished. Option C is wrong because the changes also affect collective-investment-scheme exemptions. Option D is wrong because the updated regime requires businesses to provide details of themselves."}, {"tag": "cisi", "topic": "Prospectus Advertisements", "q": "When do the COBS 4 communication rules not apply because another regime takes over?", "opts": ["Where the Prospectus Regulation Rules apply", "Where the promotion is directed to a professional client", "Where the communication is delivered through a website", "Where the promotion concerns a structured deposit"], "ans": 0, "exp": "Correct answer: Where the Prospectus Regulation Rules apply. Section 5.3 says COBS 4 does not apply where the Prospectus Regulation Rules apply. Option A is correct because it names the substitute regime. Option B is wrong because professional-client status is not the trigger. Option C is wrong because website delivery alone does not move the communication outside COBS 4. Option D is wrong because structured deposits are not the dividing line here."}, {"tag": "detail", "topic": "Prospectus Advertisements", "q": "Which statement must a prospectus advertisement include about the prospectus?", "opts": ["That a prospectus has been or will be published and where investors may obtain it", "That the advertisement itself forms part of the prospectus and may be relied on as such", "That no separate prospectus is required where the advertisement contains key facts", "That investors may subscribe solely on the basis of the advertisement"], "ans": 0, "exp": "Correct answer: That a prospectus has been or will be published and where investors may obtain it. Section 5.3 lists this as one of the core conditions. Option A is correct because it reflects the actual wording. Option B is wrong because the advertisement is not itself the prospectus. Option C is wrong because the section does not create such a substitute. Option D is wrong because investors should not subscribe except on the basis of information in the prospectus."}, {"tag": "detail", "topic": "Prospectus Advertisements", "q": "Which of the following is a specific written-advertisement requirement under the prospectus rules?", "opts": ["A bold and prominent statement that the advertisement is not itself a prospectus", "A requirement to include a full appropriateness test for retail readers", "A requirement to contain the firm’s complete conflicts-of-interest policy", "A requirement to include five years of past performance figures"], "ans": 0, "exp": "Correct answer: A bold and prominent statement that the advertisement is not itself a prospectus. Section 5.3 expressly requires this for written advertisements. Option A is correct because it is the stated written-ad requirement. Option B is wrong because appropriateness belongs elsewhere. Option C is wrong because conflicts-policy disclosure is not the prospectus-advertisement rule here. Option D is wrong because past-performance rules are a different subsection."}, {"tag": "scenario", "topic": "Prospectus Advertisements", "q": "A newspaper advertisement encourages investors to subscribe for transferable securities before the prospectus is available. Which answer best matches Section 5.3?", "opts": ["That would conflict with the prospectus-advertisement rules because investors should not subscribe except on the basis of the prospectus", "That is acceptable if the advertisement names the FCA as regulator and includes a helpline", "That is acceptable if the product is aimed at professional clients rather than retail clients", "That is acceptable if the advertisement also includes a simulated-performance chart"], "ans": 0, "exp": "Correct answer: That would conflict with the prospectus-advertisement rules because investors should not subscribe except on the basis of the prospectus. The written-advertisement rules require a prominent statement to that effect. Option A is correct because it matches that rule. Option B is wrong because FCA naming does not cure the problem. Option C is wrong because the prospectus-advertisement rule is not removed simply by client category. Option D is wrong because extra marketing detail does not solve the defect."}, {"tag": "cisi", "topic": "Approval", "q": "What is the general FSMA position for an unauthorised person wishing to communicate a financial promotion?", "opts": ["It is an offence unless the promotion is exempt or approved by an authorised firm", "It is permitted provided the promotion is addressed only to retail clients", "It is permitted if the unauthorised person keeps records of the promotion", "It is permitted provided the promotion is not a direct-offer promotion"], "ans": 0, "exp": "Correct answer: It is an offence unless the promotion is exempt or approved by an authorised firm. Section 5.4 states this directly. Option A is correct because it gives the basic gateway rule. Option B is wrong because retail targeting does not create permission. Option C is wrong because record-keeping is not the gateway. Option D is wrong because the rule is wider than direct offers."}, {"tag": "detail", "topic": "Approval", "q": "What was the effect of the 2023 FCA 'gateway' for approving third-party promotions?", "opts": ["Firms needed FCA permission if they wished to continue approving promotions for third parties", "All authorised firms automatically gained permanent power to approve any third-party promotion", "The gateway applied only to real-time promotions made in person or by telephone", "The gateway removed the need for firms to review third-party promotions after approval"], "ans": 0, "exp": "Correct answer: Firms needed FCA permission if they wished to continue approving promotions for third parties. Section 5.4 explains that firms without gateway permission may no longer approve promotions other than their own. Option A is correct because it states the reform outcome. Option B is the opposite of the reform. Option C is wrong because real-time promotions cannot in fact be approved in that way. Option D is wrong because firms must withdraw approval if they later become aware of non-compliance."}, {"tag": "scenario", "topic": "Approval", "q": "Before approving a promotion for communication by an unauthorised person, what must an authorised firm do?", "opts": ["Confirm that the promotion complies with the financial-promotion rules", "Ask the FCA to certify the wording line by line", "Obtain written confirmation from the recipient clients that they understand the risks", "Assume compliance if the promotion has already been used in another jurisdiction"], "ans": 0, "exp": "Correct answer: Confirm that the promotion complies with the financial-promotion rules. Section 5.4.1 says this directly. Option A is correct because compliance confirmation is the formal approval step. Option B is wrong because the FCA does not certify wording line by line. Option C is wrong because recipient understanding is not the condition for approval. Option D is wrong because prior foreign use is not a compliance shortcut."}, {"tag": "detail", "topic": "Approval", "q": "If an authorised firm later becomes aware that a promotion it approved no longer complies, what must it do?", "opts": ["Withdraw its approval and notify anyone it knows is relying on that approval as soon as reasonably practicable", "Leave the approval in place until the next annual review cycle", "Withdraw the approval only if the promotion was aimed at retail clients", "Do nothing unless the FCA first instructs it to cancel the approval"], "ans": 0, "exp": "Correct answer: Withdraw its approval and notify anyone it knows is relying on that approval as soon as reasonably practicable. Section 5.4.1 sets out this follow-up obligation. Option A is correct because it captures both withdrawal and notification. Option B is wrong because delay is inconsistent with the rule. Option C is wrong because the obligation is not limited that way. Option D is wrong because the duty arises once the firm is aware of non-compliance."}, {"tag": "detail", "topic": "Approval", "q": "Which type of financial promotion may not be approved by an authorised firm under Section 5.4.1?", "opts": ["A real-time promotion made in personal visits, telephone conversations or other interactive dialogue", "A website promotion aimed at retail clients", "A written direct-offer promotion in a trade magazine", "A prospectus advertisement that meets the relevant prospectus rules"], "ans": 0, "exp": "Correct answer: A real-time promotion made in personal visits, telephone conversations or other interactive dialogue. Section 5.4.1 states that firms may not approve real-time financial promotions. Option A is correct because real-time promotions are the excluded category for approval. Options B, C and D are not excluded on that basis alone."}, {"tag": "scenario", "topic": "Approval Limits", "q": "A firm approves a promotion on terms that rely on a disapplication available only for professional clients. What should the approval state?", "opts": ["That the approval is limited to those circumstances", "That the approval automatically extends to retail clients if they ask to participate", "That the approval is valid globally without reference to audience limitations", "That the approval remains effective even if the basis for the disapplication changes"], "ans": 0, "exp": "Correct answer: That the approval is limited to those circumstances. Section 5.4.1 gives this exact example: if approval depends on communication to professional clients or ECPs, the approval must state that limitation. Option A is correct because the approval must mirror its legal basis. Option B is wrong because it would overextend the approval. Option C is wrong because the approval must reflect its basis. Option D is wrong because ongoing compliance still matters."}, {"tag": "cisi", "topic": "Retail Communications", "q": "Which is one of the four general retail-communication rules highlighted in Section 5.5?", "opts": ["The firm’s name must be included on the communication", "The communication must always be shorter than two minutes of reading time", "The communication must avoid any discussion of risk so as not to confuse readers", "The communication must contain the client’s signed categorisation statement"], "ans": 0, "exp": "Correct answer: The firm’s name must be included on the communication. Section 5.5 lists this among the core rules for communications likely to be received by retail clients. Option A is correct because it is one of the express requirements. Option B relates only to prescribed risk summaries in a different high-risk context. Option C is the opposite of the requirement. Option D is not one of the general communication rules."}, {"tag": "detail", "topic": "Retail Communications", "q": "How must retail-directed information deal with benefits and risks?", "opts": ["It must not emphasise potential benefits without also giving fair and prominent indication of relevant risks", "It may emphasise benefits provided risks appear somewhere else on the firm’s website", "It may focus mainly on benefits where the product has performed well in the recent past", "It may reserve risk discussion for the application stage rather than the promotion stage"], "ans": 0, "exp": "Correct answer: It must not emphasise potential benefits without also giving fair and prominent indication of relevant risks. This comes directly from Section 5.5. Option A is correct because it states the balancing rule. Option B is wrong because hidden or remote risk disclosure is not enough. Option C is wrong because past performance does not justify imbalance. Option D is wrong because the promotion itself must not mislead."}, {"tag": "detail", "topic": "Retail Communications", "q": "If comparisons are made in a retail communication, what is required?", "opts": ["They must be meaningful and presented in a fair and balanced way", "They may compare only the strongest features of the promoted product", "They are prohibited unless the promotion is approved by the FCA", "They may be selective if the target audience is sophisticated enough"], "ans": 0, "exp": "Correct answer: They must be meaningful and presented in a fair and balanced way. Section 5.5 says this expressly. Option A is correct because it captures both meaning and balance. Option B is wrong because selective comparison may mislead. Option C is wrong because FCA approval is not the test. Option D is wrong because sophistication does not justify unfair comparison."}, {"tag": "detail", "topic": "Retail Communications", "q": "For MiFID business, what extra requirement applies when a retail communication makes comparisons?", "opts": ["The data sources, and key facts and assumptions used, must be cited", "The comparison must always be based on at least ten years of data", "The comparison may use internal estimates without identifying them", "The comparison is allowed only if the client has opted in to receiving promotions"], "ans": 0, "exp": "Correct answer: The data sources, and key facts and assumptions used, must be cited. Section 5.5 adds this MiFID-specific comparison requirement. Option A is correct because it states the additional MiFID discipline. Option B is wrong because ten years is not the rule. Option C is wrong because unidentified internal estimates would undermine transparency. Option D invents an unrelated condition."}, {"tag": "detail", "topic": "Tax Warnings", "q": "If tax treatment is mentioned in a communication, what should the firm explain?", "opts": ["That tax treatment depends on the individual client’s circumstances and may change in future", "That the stated tax position will apply equally to all clients receiving the promotion", "That the firm guarantees the tax result described if the investment is held to maturity", "That tax treatment need not be explained if the communication concerns MiFID business"], "ans": 0, "exp": "Correct answer: That tax treatment depends on the individual client’s circumstances and may change in future. Section 5.5 states this directly. Option A is correct because it reflects the prescribed tax caveat. Option B is wrong because tax treatment is individual. Option C is wrong because firms do not guarantee tax outcomes in this way. Option D is wrong because the warning is not removed for MiFID business."}, {"tag": "concept", "topic": "Disapplications", "q": "Which retail-communication rules are disapplied for third-party prospectuses and image advertising?", "opts": ["The Section 5.5 retail communication rules discussed in that subsection", "All fair, clear and not misleading obligations in Section 5 generally", "Only the rules on the firm’s name and tax warnings", "Only the rules on performance information and direct offers"], "ans": 0, "exp": "Correct answer: The Section 5.5 retail communication rules discussed in that subsection. The manual says those rules are disapplied for third-party prospectuses and image advertising, with a further non-MiFID disapplication for excluded communications. Option A is correct because it keeps the point at the correct level. Option B is too broad. Option C and D pick fragments and miss the stated point."}, {"tag": "cisi", "topic": "High-Risk Promotions", "q": "What is the position on Non-Mass Market Investments (NMMIs) in relation to retail investors?", "opts": ["Their promotion is banned to retail investors", "They may be promoted freely if accompanied by a cooling-off notice", "They may be promoted if the firm also includes a personalised warning only", "They may be promoted only through direct-offer advertisements in print media"], "ans": 0, "exp": "Correct answer: Their promotion is banned to retail investors. Section 5.5 says this expressly in the high-risk investment rules. Option A is correct because it states the retail prohibition. Option B is wrong because cooling-off alone does not make NMMIs promotable to retail investors. Option C is wrong because personalised warnings do not override the ban. Option D is wrong because medium does not create permission."}, {"tag": "detail", "topic": "High-Risk Promotions", "q": "What is the position on Restricted Mass Market Investments (RMMIs) in relation to retail investors?", "opts": ["They may be promoted only subject to specified restrictions", "They are banned to retail investors in exactly the same way as NMMIs", "They may be promoted without friction if a prospectus is available", "They are outside the financial-promotion regime altogether"], "ans": 0, "exp": "Correct answer: They may be promoted only subject to specified restrictions. Section 5 distinguishes RMMIs from NMMIs by making them subject to restrictions rather than an outright retail ban. Option A is correct because it captures that distinction. Option B is wrong because it ignores the difference between NMMIs and RMMIs. Option C is wrong because a prospectus does not remove the restrictions. Option D is wrong because they are very much within the regime."}, {"tag": "detail", "topic": "High-Risk Promotions", "q": "Which of the following is one of the specific high-risk-promotion requirements?", "opts": ["A minimum 24-hour cooling-off period for first-time investors with the firm", "A mandatory 14-day cancellation period for every promotion of a risky investment", "An obligation to allow refer-a-friend bonuses if a risk summary is included", "A rule that risk summaries must always be identical to FCA specimen wording"], "ans": 0, "exp": "Correct answer: A minimum 24-hour cooling-off period for first-time investors with the firm. Section 5 lists this as one of the positive frictions. Option A is correct because it is one of the named high-risk controls. Option B confuses cooling-off for promotions with cancellation rights in another area. Option C is wrong because incentives to invest are banned. Option D is wrong because firms may diverge from prescribed summaries where there are valid reasons."}, {"tag": "detail", "topic": "High-Risk Promotions", "q": "What does Section 5 say about incentives to invest in the high-risk-promotion regime?", "opts": ["They are banned, whether monetary or non-monetary", "They are allowed if the promotion contains a personalised risk warning", "They are allowed for professional clients only if disclosed clearly", "They are banned only where the product is a non-Mass Market Investment"], "ans": 0, "exp": "Correct answer: They are banned, whether monetary or non-monetary. The manual gives examples such as refer-a-friend and new-joiner bonuses. Option A is correct because the ban applies across both forms. Option B is wrong because risk warnings do not legitimise incentives. Option C is wrong because the section frames this as a high-risk-promotion restriction, not a simple professional-client exception. Option D is too narrow."}, {"tag": "scenario", "topic": "Personalised Risk Warnings", "q": "A firm sends a high-risk investment promotion to a named investor. What is required for the personalised risk warning?", "opts": ["It must be genuinely personalised, including the investor’s name", "It may be generic provided the product category is described accurately", "It is needed only if the investor is later classified as retail after the promotion", "It may be omitted where the investor has previously traded similar products"], "ans": 0, "exp": "Correct answer: It must be genuinely personalised, including the investor’s name. Section 5 says personalised risk warnings must in fact be personalised. Option A is correct because the manual even gives the name as an example. Option B is wrong because generic wording is not enough. Option C is wrong because the rule concerns the investor receiving the promotion. Option D is wrong because prior experience does not remove the requirement."}, {"tag": "detail", "topic": "Appropriate Test", "q": "What does Section 5 say firms must not do in relation to the high-risk appropriate test?", "opts": ["Coach investors to pass the test", "Retain metrics on categorisation and assessment outcomes", "Display the approver’s name and date of approval", "Use personalised risk warnings in the customer journey"], "ans": 0, "exp": "Correct answer: Coach investors to pass the test. Section 5 lists this specifically. Option A is correct because preventing coaching is part of making the test more robust. Option B is wrong because record keeping and metrics are required, not prohibited. Option C is wrong because that is part of later handbook guidance for promotions. Option D is wrong because personalised warnings are also part of the regime."}, {"tag": "concept", "topic": "Cryptoassets", "q": "How are qualifying cryptoassets treated for financial-promotion purposes under the rules described in Section 5?", "opts": ["Promotions of qualifying cryptoassets are brought within the financial-promotion regime", "Qualifying cryptoassets remain entirely outside the regime because they are not investments", "Only institutional cryptoasset promotions are within scope, not consumer promotions", "Cryptoasset promotions are lawful only if made by the Bank of England or the FCA"], "ans": 0, "exp": "Correct answer: Promotions of qualifying cryptoassets are brought within the financial-promotion regime. Section 5 explains that HM Treasury brought qualifying cryptoasset promotions into scope. Option A is correct because it states the key policy change. Option B is wrong because the key change was to bring them within the regime. Option C is wrong because the section discusses UK consumers specifically. Option D is wrong because there are several lawful routes, not just communications by regulators."}, {"tag": "detail", "topic": "Cryptoassets", "q": "How many routes to legally promoting cryptoassets to UK consumers does the manual identify?", "opts": ["Four routes", "Two routes", "Three routes", "Five routes"], "ans": 0, "exp": "Correct answer: Four routes. Section 5.5.1 sets out four routes, including communication by an authorised person, approval by an authorised person, communication by or on behalf of an FCA-registered cryptoasset business relying on an FPO exemption, and another applicable FPO exemption. Option A is correct because it matches that list count. The other answer counts are therefore wrong."}, {"tag": "detail", "topic": "Cryptoassets", "q": "How does the FCA classify cryptoassets for the mass-market-promotion regime described in Section 5?", "opts": ["As Restricted Mass Market Investments", "As Non-Mass Market Investments", "As generally marketable packaged products", "As regulated deposits for COBS purposes"], "ans": 0, "exp": "Correct answer: As Restricted Mass Market Investments. The manual says the FCA consulted on classifying cryptoassets as RMMIs. Option A is correct because it reflects the section wording. Option B is wrong because that would imply a retail ban. Option C is wrong because the section uses the RMMI classification. Option D is plainly wrong."}, {"tag": "cisi", "topic": "Past Performance", "q": "Which statement about past performance is correct under Section 5.6.1?", "opts": ["Past performance must not be the most prominent feature of the communication", "Past performance may be the dominant feature if the track record is strong enough", "Past performance may be shown without warning if the figures are factual", "Past performance may be shown only for professional clients and never for retail clients"], "ans": 0, "exp": "Correct answer: Past performance must not be the most prominent feature of the communication. Section 5.6.1 states this directly. Option A is correct because prominence is specifically restricted. Option B is wrong because strong historic returns do not justify dominance. Option C is wrong because a clear and prominent warning is required. Option D is wrong because past performance may be shown subject to the rules."}, {"tag": "detail", "topic": "Past Performance", "q": "How much past-performance history should generally be covered if available?", "opts": ["At least the immediately preceding five years, shown as complete 12-month periods", "At least the immediately preceding three years, even if partial years are used", "Only the most recent 12 months, because that is most relevant to clients", "Any period the firm chooses, provided the source is named"], "ans": 0, "exp": "Correct answer: At least the immediately preceding five years, shown as complete 12-month periods. Section 5.6.1 gives this rule, subject to using the whole shorter period where less than five years exists. Option A is correct because it captures both the period and the complete-period rule. Option B is wrong because three years is not the stated period. Option C is wrong because one year is too short. Option D is wrong because firms do not have a free choice."}, {"tag": "detail", "topic": "Past Performance", "q": "If past-performance figures are shown in a currency other than sterling, what else is required?", "opts": ["The currency must be stated and there must be a warning about possible currency fluctuations", "The figures must be translated into sterling and no original-currency reference may remain", "No additional statement is required if the target audience is professional", "Only the source of the exchange rate needs to be cited, not the currency risk itself"], "ans": 0, "exp": "Correct answer: The currency must be stated and there must be a warning about possible currency fluctuations. Section 5.6.1 says exactly this. Option A is correct because it states both elements. Option B is wrong because translation into sterling is not the rule. Option C is wrong because the currency-warning requirement is part of the past-performance rules. Option D is wrong because the rule is not limited to citing an exchange-rate source."}, {"tag": "detail", "topic": "Past Performance", "q": "If performance is cited gross, what must the communication disclose?", "opts": ["The effects of commissions, fees, tax and other charges", "Only the headline annual management charge", "Only that charges may apply in general terms", "Nothing further if the figures are historically accurate"], "ans": 0, "exp": "Correct answer: The effects of commissions, fees, tax and other charges. Section 5.6.1 requires this where figures are shown gross. Option A is correct because it gives the full disclosure point. Option B and C are too narrow. Option D is wrong because historical accuracy does not remove the disclosure requirement."}, {"tag": "concept", "topic": "Simulated Past Performance", "q": "When may a firm use simulated past-performance figures?", "opts": ["Where the product or service lacks a track record and the figures meet the stated simulation conditions", "Whenever real past performance looks unattractive and a better comparator is available", "Only where the simulation is based on the firm’s internal revenue expectations", "Only for communications aimed exclusively at elective professional clients"], "ans": 0, "exp": "Correct answer: Where the product or service lacks a track record and the figures meet the stated simulation conditions. Section 5.6.2 allows simulated past performance in those circumstances. Option A is correct because it matches the conditional permission. Option B is wrong because simulation is not a device to improve the sales message. Option C is wrong because the simulation must be based on actual past performance of relevant investments or indices. Option D invents a client-category restriction."}, {"tag": "detail", "topic": "Simulated Past Performance", "q": "Which warning must simulated past performance contain?", "opts": ["A prominent warning that it relates to simulated past performance and that past performance is not a reliable indicator of future performance", "A warning only that the investment may fall as well as rise in value", "A statement that the figures may be relied upon as equivalent to actual performance", "A warning only if the communication is likely to be received by a retail client"], "ans": 0, "exp": "Correct answer: A prominent warning that it relates to simulated past performance and that past performance is not a reliable indicator of future performance. Section 5.6.2 states this expressly. Option A is correct because it gives the specific simulation warning. Option B is too general and incomplete. Option C is the opposite of the rule. Option D is wrong because the simulation warning is part of the content requirement itself."}, {"tag": "concept", "topic": "Future Performance", "q": "Which statement best matches the rule on possible future performance?", "opts": ["It must be based on reasonable assumptions supported by objective data and must not be based on simulated past performance", "It may be derived from simulated past performance provided the simulation is explained clearly", "It may be based on aggressive assumptions if the target audience is professional", "It may be shown without a warning if the communication also includes past performance"], "ans": 0, "exp": "Correct answer: It must be based on reasonable assumptions supported by objective data and must not be based on simulated past performance. Section 5.6.3 states both points. Option A is correct because it combines the required positive and negative conditions. Option B is wrong because future performance must not be based on or refer to simulated past performance. Option C is wrong because client sophistication does not justify unreasonable assumptions. Option D is wrong because a prominent warning is still required."}, {"tag": "detail", "topic": "Future Performance", "q": "What warning must a future-performance indication contain?", "opts": ["A prominent warning that forecasts are not reliable indicators of future performance", "A warning only that tax treatment may change", "A statement that the forecast has been approved by the FCA", "A warning only where the forecast is shown net of charges rather than gross"], "ans": 0, "exp": "Correct answer: A prominent warning that forecasts are not reliable indicators of future performance. Section 5.6.3 requires this warning. Option A is correct because it states the required warning. Option B is a different warning. Option C is wrong because the FCA does not approve forecasts in this way. Option D is wrong because the warning is not limited to gross-versus-net presentation."}, {"tag": "cisi", "topic": "Direct Offers", "q": "A direct-offer promotion likely to be received by a retail client must contain which broad category of information?", "opts": ["Prescribed information about the firm and its services", "A complete suitability report tailored to that individual recipient", "An FCA approval certificate and case reference number", "A statement that the promotion may be ignored without further action"], "ans": 0, "exp": "Correct answer: Prescribed information about the firm and its services. Section 5.7 lists this among the required content items for direct offers or invitations. Option A is correct because it is one of the express required categories. Option B is wrong because a suitability report is not the rule here. Option C is wrong because FCA approval is not the requirement. Option D is irrelevant."}, {"tag": "detail", "topic": "Direct Offers", "q": "Which additional direct-offer item is required if relevant?", "opts": ["Prescribed information about the management of the client’s investments", "The full conflicts register for the firm’s entire investment business", "The names of every third-party service provider used by the firm", "A statement that all future communications will be non-promotional"], "ans": 0, "exp": "Correct answer: Prescribed information about the management of the client’s investments. Section 5.7 includes this where relevant. Option A is correct because it is one of the listed content headings. Option B is wrong because the full conflicts register is not required. Option C is wrong because that is not one of the listed direct-offer items. Option D is irrelevant."}, {"tag": "detail", "topic": "Direct Offers", "q": "What must a direct-offer promotion say if the designated investment combines components so that the combined risk is greater than that of a single component?", "opts": ["It must adequately describe the components and how the increased risk arises", "It may describe only the main component if the secondary components are operationally linked", "It may omit the interaction risk if each component is individually regulated", "It must replace the description with a generic warning that all investments carry risk"], "ans": 0, "exp": "Correct answer: It must adequately describe the components and how the increased risk arises. Section 5.7 states this expressly. Option A is correct because it reflects the required explanatory detail. Option B and C are wrong because they would conceal a material risk feature. Option D is wrong because a generic warning is not a substitute for the specific explanation required."}, {"tag": "detail", "topic": "Direct Offers", "q": "What must be included if the designated investment incorporates a third-party guarantee?", "opts": ["Enough detail for the client to make a fair assessment of the guarantee", "Only the guarantor’s logo and country of incorporation", "A statement that guarantees always remove investment risk", "Nothing, because guarantees are dealt with in the prospectus regime only"], "ans": 0, "exp": "Correct answer: Enough detail for the client to make a fair assessment of the guarantee. Section 5.7 says this directly. Option A is correct because the client must be able to assess the guarantee fairly. Option B is too little. Option C is misleading because guarantees do not necessarily remove all risk. Option D is wrong because Section 5.7 specifically includes this requirement."}, {"tag": "scenario", "topic": "Direct Offers", "q": "When may some of the prescribed direct-offer information be omitted from the promotion itself?", "opts": ["Where the client can refer to another document containing that information in order to respond to the offer", "Whenever the client is a professional client rather than a retail client", "Where the firm has already used the same promotion for another product line", "Where the communication is sent by post rather than by email or website"], "ans": 0, "exp": "Correct answer: Where the client can refer to another document containing that information in order to respond to the offer. Section 5.7 provides this practical exception. Option A is correct because it states the actual conditional carve-out. Option B is wrong because the exception is framed by availability of information, not client category alone. Option C and D are unrelated."}, {"tag": "detail", "topic": "Direct Offers", "q": "What additional statement should the direct offer include if the recipient is unsure about the suitability of the investment or service being promoted?", "opts": ["That the recipient should seek a personal recommendation", "That the recipient should rely on the promotion alone and ignore third-party advice", "That suitability is irrelevant because direct offers are execution-only by definition", "That the firm guarantees suitability if the client accepts promptly"], "ans": 0, "exp": "Correct answer: That the recipient should seek a personal recommendation. Section 5.7 says the offer should include this statement. Option A is correct because it matches the exam-style wording. Option B is wrong because it discourages appropriate advice. Option C is wrong because direct offer status does not eliminate suitability issues. Option D is plainly misleading."}, {"tag": "cisi", "topic": "Unwritten Promotions", "q": "Before initiating an unwritten promotion to a particular person outside its premises, what must a firm do at the outset?", "opts": ["Identify itself and its firm and make the reason for the contact clear", "Deliver a written cooling-off notice before speaking further", "Obtain FCA approval for the specific contact", "Treat the contact as lawful automatically if the product is regulated"], "ans": 0, "exp": "Correct answer: Identify itself and its firm and make the reason for the contact clear. Section 5.8.1 lists this as one of the basic unwritten-promotion requirements. Option A is correct because it captures the required start-of-contact disclosure. Option B is not the stated opening requirement. Option C is wrong because there is no FCA contact-by-contact approval. Option D is wrong because regulation of the product does not eliminate the conduct rule."}, {"tag": "detail", "topic": "Unwritten Promotions", "q": "Which of the following is one of the express conditions for an unwritten promotion outside the firm’s premises?", "opts": ["The communicator must check whether the client wishes to continue or terminate the contact", "The communicator must provide the full conflicts policy before any further dialogue", "The communicator must restrict the discussion to professional clients only", "The communicator must make the promotion non-identifiable until interest is shown"], "ans": 0, "exp": "Correct answer: The communicator must check whether the client wishes to continue or terminate the contact. Section 5.8.1 says the communicator must get clarification on this and terminate the communication if requested. Option A is correct because it reflects that choice-and-stop rule. Options B, C and D are not the stated conditions."}, {"tag": "detail", "topic": "Unwritten Promotions", "q": "If an appointment is arranged following an unwritten promotion, what else must be given?", "opts": ["A contact point for the client", "A guaranteed return illustration", "The client’s final categorisation outcome", "A copy of the firm’s last annual report"], "ans": 0, "exp": "Correct answer: A contact point for the client. Section 5.8.1 includes this expressly. Option A is correct because it is the listed follow-up step. The other items are not part of this specific requirement."}, {"tag": "cisi", "topic": "Cold Calling", "q": "What is 'cold calling' in Section 5.8.2?", "opts": ["Contacting people without a prior appointment with a view to communicating a financial promotion", "Any written direct-offer promotion sent to more than one potential client", "Any communication made by a firm to an existing client about a product review", "Any promotion that is approved by an authorised person for third-party use"], "ans": 0, "exp": "Correct answer: Contacting people without a prior appointment with a view to communicating a financial promotion. Section 5.8.2 defines cold calling in these terms. Option A is correct because it mirrors the definition. Option B confuses cold calling with direct offers. Option C is wrong because an existing-client contact is not automatically a cold call. Option D concerns approval, not cold calling."}, {"tag": "scenario", "topic": "Cold Calling", "q": "Which of the following would allow a firm to make an unsolicited real-time communication under the stated cold-calling exceptions?", "opts": ["The recipient has an existing client relationship and would envisage or expect the call", "The product is complex, so the firm prefers to explain it verbally rather than in writing", "The client is busy and has not previously engaged with the firm", "The firm is authorised and therefore may cold call at any reasonable time"], "ans": 0, "exp": "Correct answer: The recipient has an existing client relationship and would envisage or expect the call. Section 5.8.2 lists this as one of the cold-calling exceptions. Option A is correct because expected contact within an existing relationship is one of the limited gateways. Option B is wrong because complexity does not create an exception. Option C is the opposite of an expected call. Option D is wrong because authorisation does not itself permit cold calling."}, {"tag": "detail", "topic": "Cold Calling", "q": "Which product-related exception to the cold-calling restriction is listed in Section 5.8.2?", "opts": ["A generally marketable packaged product that is neither a higher-volatility fund nor a life policy linked to such a fund", "Any speculative illiquid security promoted with a personalised risk warning", "Any cryptoasset promotion communicated by a registered MLR business", "Any direct-offer promotion where the firm includes a prospectus statement"], "ans": 0, "exp": "Correct answer: A generally marketable packaged product that is neither a higher-volatility fund nor a life policy linked to such a fund. Section 5.8.2 lists this exception expressly. Option A is correct because it matches the narrow product carve-out. Option B is wrong because speculative illiquid securities are heavily restricted. Option C concerns cryptoasset routes, not the cold-calling exception. Option D is about direct-offer content, not cold calling."}, {"tag": "detail", "topic": "Cold Calling", "q": "Which limited range of investments is mentioned in the cold-calling exception for controlled activities?", "opts": ["Deposits and readily realisable investments other than warrants or generally marketable non-geared packaged products", "All designated investments except structured deposits and derivatives", "Only units in collective investment schemes and speculative illiquid securities", "Only listed equities and government bonds in any jurisdiction"], "ans": 0, "exp": "Correct answer: Deposits and readily realisable investments other than warrants or generally marketable non-geared packaged products. Section 5.8.2 gives this formulation. Option A is correct because it is the listed range. The other options rework the list into something the manual does not say."}, {"tag": "scenario", "topic": "Overseas Persons", "q": "A UK authorised firm is considering communicating or approving a promotion for an overseas firm. Which answer best matches Section 5.8.3?", "opts": ["It may do so only if the required disclosures are included and it has no doubt the overseas firm will deal honestly and reliably with UK retail clients", "It may do so automatically because the overseas firm is outside the UK perimeter", "It may do so only if the overseas firm undertakes never to contact retail clients at all", "It may do so without further checks provided the promotion is aimed at professional clients"], "ans": 0, "exp": "Correct answer: It may do so only i const SK="cisi_ch2_sec6_v1";
const N=10;
let APP={round:[],answers:{},opts:{},seen:[],roundNum:0};
function save(){try{localStorage.setItem(SK,JSON.stringify(APP));}catch(e){}}
function load(){try{const d=localStorage.getItem(SK);if(d)APP=JSON.parse(d);}catch(e){}}
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function buildRound(){
  const lastWrong=Object.entries(APP.answers).filter(([,v])=>v&&v.v===0).map(([k])=>APP.round[parseInt(k)]).filter(x=>x!==undefined);
  const unseen=BANK.map((_,i)=>i).filter(i=>!APP.seen.includes(i));
  const seenOld=APP.seen.filter(i=>!APP.round.includes(i));
  let cands=[];
  cands.push(...shuffle(lastWrong).slice(0,3));
  cands.push(...shuffle(unseen.filter(i=>!cands.includes(i))).slice(0,N-cands.length));
  if(cands.length<N) cands.push(...shuffle(seenOld.filter(i=>!cands.includes(i))).slice(0,N-cands.length));
  if(cands.length<N) cands.push(...shuffle(BANK.map((_,i)=>i).filter(i=>!cands.includes(i))).slice(0,N-cands.length));
  const round=shuffle(cands).slice(0,N);
  round.forEach(i=>{if(!APP.seen.includes(i))APP.seen.push(i);});
  APP.round=round; APP.answers={}; APP.opts={}; APP.roundNum=(APP.roundNum||0)+1;
}
function doReset(){buildRound();save();render();window.scrollTo({top:0,behavior:'smooth'});} 
function pick(pos,oi){
  if(APP.answers[pos]) return;
  const q=BANK[APP.round[pos]];
  APP.answers[pos]={opt:q.opts[oi],v:oi===q.ans?1:0};
  save(); render();
}
function render(){
  const done=Object.keys(APP.answers).length;
  const ok=Object.values(APP.answers).filter(v=>v&&v.v===1).length;
  const bad=done-ok;
  const pct=done?Math.round(ok/done*100):null;
  document.getElementById('round-label').textContent = `Round ${APP.roundNum} · 10 questions per round · Bank: ${BANK.length}`;
  document.getElementById('s-num').textContent=`${done}/${N}`;
  document.getElementById('s-ok').textContent=ok;
  document.getElementById('s-bad').textContent=bad;
  document.getElementById('s-pct').textContent=pct===null?'—':pct+'%';
  const tr=document.getElementById('tracker'); tr.innerHTML='';
  for(let i=0;i<N;i++){ const d=document.createElement('div'); d.className='tracker-dot'+(APP.answers[i]?APP.answers[i].v===1?' t-ok':' t-bad':i===done?' t-cur':''); tr.appendChild(d);} 
  const area=document.getElementById('q-area'); area.innerHTML='';
  const L=['A','B','C','D'];
  const tmap={cisi:'CISI exam style',concept:'Concept check',scenario:'Scenario',detail:'Detail'};
  const tcls={cisi:'tag-cisi',concept:'tag-concept',scenario:'tag-scenario',detail:'tag-detail'};
  APP.round.forEach((qi,pos)=>{
    const q=BANK[qi]; const answered=!!APP.answers[pos]; const chosen=APP.answers[pos]?.opt; if(!APP.opts[pos]) APP.opts[pos]=shuffle(q.opts.map((_,i)=>i)); const oo=APP.opts[pos];
    let optsHtml=oo.map((oi,li)=>{ let c='opt'; if(answered) c+=' dis'; if(answered&&oi===q.ans) c+=' ok'; else if(answered&&q.opts[oi]===chosen&&oi!==q.ans) c+=' bad'; return `<div class="${c}" onclick="pick(${pos},${oi})"><span class="opt-l">${L[li]}</span><span>${q.opts[oi]}</span></div>`; }).join('');
    let expHtml=answered?`<div class="exp-box show ${APP.answers[pos].v===1?'exp-ok':'exp-bad'}"><strong>${APP.answers[pos].v===1?'✓ Correct!':'✗ Incorrect.'}</strong> ${q.exp}</div>`:'';
    const card=document.createElement('div');
    card.className='q-card';
    card.innerHTML=`<div class="q-meta"><span class="q-num">Q${pos+1}</span><span class="q-tag ${tcls[q.tag]}">${tmap[q.tag]}</span><span class="q-topic">${q.topic}</span></div><div class="q-text">${q.q}</div><div class="opts">${optsHtml}</div>${expHtml}`;
    area.appendChild(card);
  });
  if(done===N){
    const pF=Math.round(ok/N*100); let lbl,col,grade;
    if(pF>=80){lbl='Pass standard met!';col='var(--teal-m)';grade='Pass ✓';}
    else if(pF>=70){lbl='Close to pass standard — review weaker areas.';col='var(--amber)';grade='Near Pass';}
    else if(pF>=60){lbl='Borderline — further study recommended.';col='var(--coral-m)';grade='Borderline';}
    else{lbl='Below pass standard — keep practising.';col='#A32D2D';grade='Needs Work';}
    const ts={}; APP.round.forEach((qi,pos)=>{const t=BANK[qi].topic; if(!ts[t]) ts[t]={ok:0,tot:0}; ts[t].tot++; if(APP.answers[pos]?.v===1) ts[t].ok++;});
    let topicHtml=Object.entries(ts).map(([t,s])=>{ const pc=Math.round(s.ok/s.tot*100); return `<div class="topic-row"><div class="topic-name">${t} · ${s.ok}/${s.tot}</div><div class="topic-bar-wrap"><div class="topic-bar-fill" style="width:${pc}%;background:${pc>=80?'var(--teal-m)':pc>=60?'var(--amber)':'var(--coral-m)'}"></div></div></div>`;}).join('');
    let review=APP.round.map((qi,pos)=>{const q=BANK[qi]; const good=APP.answers[pos]?.v===1; return `<div class="q-review-item ${good?'r-ok':'r-bad'}"><div class="r-icon">${good?'✓':'✗'}</div><div><strong>Q${pos+1} · ${q.topic}</strong><br>${q.q}</div></div>`;}).join('');
    const rc=document.createElement('div'); rc.className='result-card'; rc.innerHTML=`<div class="result-big" style="color:${col}">${pF}%</div><div class="result-grade" style="background:${col};color:#fff">${grade}</div><div style="font-size:.92rem;color:var(--text2);margin-top:.35rem">${lbl}</div><div class="result-bar-wrap"><div class="result-bar-fill" style="width:${pF}%;background:${col}"></div></div><div class="result-breakdown"><div class="rp" style="background:var(--green-l);color:var(--green)">${ok} correct</div><div class="rp" style="background:var(--coral-l);color:var(--coral)">${N-ok} wrong</div><div class="rp" style="background:var(--gray-l);color:var(--gray-d)">Seen: ${APP.seen.length}/${BANK.length}</div></div><div class="topic-grid">${topicHtml}</div><div class="btn-row" style="margin-bottom:1rem"><button class="btn btn-p" onclick="doReset()">Start new round</button></div><div class="q-review-list">${review}</div>`; area.appendChild(rc);
  }
}
load(); if(!APP.round.length) buildRound(); save(); render();

</script>
